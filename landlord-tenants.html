<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 房客名單</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 68px;
      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #effcf4;
      --page-bg: #f4f6fa;
      --card-bg: #ffffff;
      --text-main: #171a1f;
      --text-muted: #747b85;
      --border: #e7ebf0;
      --danger: #e5484d;
      --danger-soft: #fff1f2;
      --warning: #e69b00;
      --warning-soft: #fff7df;
      --blue: #246bfd;
      --blue-soft: #eef4ff;
      --purple: #7c3aed;
      --purple-soft: #f4efff;
      --shadow: 0 7px 24px rgba(30, 40, 60, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text-main);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background: var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        16px
        16px
        calc(var(--nav-height) + 28px + env(safe-area-inset-bottom));
    }

    .card {
      margin-bottom: 14px;
      border: 1px solid rgba(231, 235, 240, 0.92);
      border-radius: 18px;
      background: var(--card-bg);
      box-shadow: var(--shadow);
    }

    .header-card {
      padding: 19px;
      background:
        linear-gradient(
          145deg,
          rgba(6, 199, 85, 0.11),
          rgba(255, 255, 255, 0.98) 62%
        );
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .eyebrow {
      margin-bottom: 5px;
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 900;
    }

    .page-title {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.45px;
    }

    .page-subtitle {
      margin-top: 7px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .refresh-button {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #626975;
      cursor: pointer;
    }

    .refresh-button svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .refresh-button.loading svg {
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .summary-box {
      min-width: 0;
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.84);
    }

    .summary-label {
      margin-bottom: 5px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
    }

    .summary-value {
      overflow: hidden;
      font-size: 16px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-value.green {
      color: var(--primary-dark);
    }

    .summary-value.red {
      color: var(--danger);
    }

    .summary-value.purple {
      color: var(--purple);
    }

    .create-tenant-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 15px;
    }

    .create-tenant-title {
      font-size: 14px;
      font-weight: 900;
    }

    .create-tenant-desc {
      margin-top: 5px;
      color: var(--text-muted);
      font-size: 10px;
      line-height: 1.55;
    }

    .create-tenant-button {
      min-height: 42px;
      flex: 0 0 auto;
      padding: 0 14px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 10px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(6, 199, 85, 0.18);
    }

    .toolbar-card {
      padding: 15px;
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 13px;
      width: 20px;
      height: 20px;
      transform: translateY(-50%);
      fill: none;
      stroke: #9aa1aa;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 46px;
      padding: 0 42px 0 42px;
      border: 1px solid var(--border);
      border-radius: 14px;
      outline: none;
      background: #fbfcfd;
      color: var(--text-main);
      font-size: 14px;
    }

    .search-input:focus {
      border-color: rgba(6, 199, 85, 0.55);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.09);
    }

    .clear-search {
      position: absolute;
      top: 50%;
      right: 9px;
      width: 30px;
      height: 30px;
      display: none;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 999px;
      background: #eef1f4;
      color: #7e858f;
      transform: translateY(-50%);
      cursor: pointer;
    }

    .clear-search.show {
      display: inline-flex;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-top: 12px;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar {
      display: none;
    }

    .filter-button {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #ffffff;
      color: #646b75;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-button.active {
      border-color: rgba(6, 199, 85, 0.24);
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 17px 2px 10px;
    }

    .list-title {
      font-size: 17px;
      font-weight: 900;
    }

    .list-count {
      color: var(--text-muted);
      font-size: 11px;
    }

    .tenant-card {
      overflow: hidden;
    }

    .tenant-card-button {
      width: 100%;
      display: block;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
    }

    .tenant-card-button:active {
      opacity: 0.72;
    }

    .tenant-head {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 16px 16px 13px;
    }

    .avatar {
      width: 47px;
      height: 47px;
      flex: 0 0 47px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 19px;
      font-weight: 900;
    }

    .tenant-main {
      min-width: 0;
      flex: 1;
    }

    .tenant-name-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 4px;
    }

    .tenant-name {
      overflow: hidden;
      max-width: 190px;
      font-size: 16px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tenant-meta {
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.55;
    }

    .tenant-arrow {
      flex: 0 0 auto;
      color: #b4bac2;
      font-size: 22px;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 23px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f0f2f5;
      color: #6c727c;
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.green {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .badge.warning {
      background: var(--warning-soft);
      color: #b87500;
    }

    .badge.danger {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.blue {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge.purple {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .tenant-status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 0 16px 13px;
    }

    .tenant-money-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-top: 1px solid var(--border);
      background: #fbfcfd;
    }

    .money-box {
      min-width: 0;
      padding: 12px 15px;
    }

    .money-box + .money-box {
      border-left: 1px solid var(--border);
    }

    .money-label {
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 700;
    }

    .money-value {
      overflow: hidden;
      font-size: 14px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .money-value.green {
      color: var(--primary-dark);
    }

    .money-value.red {
      color: var(--danger);
    }

    .tenant-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-top: 1px solid var(--border);
    }

    .tenant-action-button {
      min-height: 42px;
      border: 0;
      background: #ffffff;
      color: #5f6670;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .tenant-action-button + .tenant-action-button {
      border-left: 1px solid var(--border);
    }

    .tenant-action-button.purple {
      color: var(--purple);
    }

    .tenant-action-button:active {
      background: #f7f8fa;
    }

    .loading-card,
    .error-card,
    .empty-card {
      padding: 30px 18px;
      text-align: center;
    }

    .loading-spinner {
      width: 30px;
      height: 30px;
      margin: 0 auto 13px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .loading-text,
    .error-text,
    .empty-text {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .error-title,
    .empty-title {
      margin-bottom: 8px;
      font-size: 17px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .primary-button {
      width: 100%;
      min-height: 46px;
      margin-top: 15px;
      padding: 12px 16px;
      border: 0;
      border-radius: 13px;
      background: var(--primary);
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    .toast {
      position: absolute;
      z-index: 3000;
      right: 18px;
      bottom: calc(var(--nav-height) + 22px + env(safe-area-inset-bottom));
      left: 18px;
      display: none;
      padding: 13px 15px;
      border-radius: 13px;
      background: rgba(25, 28, 33, 0.94);
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 390px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .tenant-name {
        max-width: 145px;
      }

      .page {
        padding-right: 13px;
        padding-left: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-text">房客名單載入中...</div>
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(location.search);

    const TEST_MODE =
      URL_PARAMS.get('test') === '1';

    let LINE_USER_ID = '';
    let TENANT_DATA = null;
    let ALL_TENANTS = [];
    let CONTRACT_REQUESTS = [];
    let CONTRACT_SUMMARY_BY_TENANT = {};
    let ACTIVE_FILTER = 'all';
    let SEARCH_TEXT = '';
    let toastTimer = null;

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      if (
        value === undefined ||
        value === null
      ) {
        return '';
      }

      return String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function numberValue(value) {
      return Number(value || 0) || 0;
    }

    function money(value) {
      return (
        'NT$ ' +
        Math.round(
          numberValue(value)
        ).toLocaleString('zh-TW')
      );
    }

    function normalizeStatus(value) {
      return rawText(value)
        .trim()
        .toLowerCase();
    }

    function statusLabel(value) {
      const status =
        normalizeStatus(value);

      const map = {
        active: '有效',
        enabled: '啟用',
        bound: '已綁定',
        unbound: '未綁定',
        pending: '待處理',
        paid: '已繳',
        unpaid: '未繳',
        overdue: '逾期',
        approved: '已核准'
      };

      return (
        map[status] ||
        rawText(value) ||
        '-'
      );
    }

    function statusBadgeClass(value) {
      const status =
        normalizeStatus(value);

      if (
        [
          'active',
          'enabled',
          'bound',
          'paid'
        ].indexOf(status) >= 0
      ) {
        return 'badge green';
      }

      if (
        [
          'pending',
          'unbound'
        ].indexOf(status) >= 0
      ) {
        return 'badge warning';
      }

      if (
        [
          'unpaid',
          'overdue'
        ].indexOf(status) >= 0
      ) {
        return 'badge danger';
      }

      if (status === 'approved') {
        return 'badge purple';
      }

      return 'badge';
    }

    function goPage(page) {
      const separator =
        page.indexOf('?') >= 0
          ? '&'
          : '?';

      location.href =
        page +
        separator +
        'v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        );
    }

    function goTenantDetail(
      tenantId
    ) {
      let url =
        'landlord-tenant-detail.html' +
        '?tenant_id=' +
        encodeURIComponent(
          tenantId || ''
        ) +
        '&v=' +
        Date.now();

      if (TEST_MODE) {
        url += '&test=1';
      }

      location.href = url;
    }

    function goTenantContractRequests(
      tenantId,
      event
    ) {
      if (event) {
        event.stopPropagation();
      }

      let url =
        'landlord-contract-requests.html' +
        '?tenant_id=' +
        encodeURIComponent(
          tenantId || ''
        ) +
        '&v=' +
        Date.now();

      if (TEST_MODE) {
        url += '&test=1';
      }

      location.href = url;
    }

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

      entryUrl.searchParams.set(
        'return_to',
        returnTo
      );

      return entryUrl.href;
    }

    function goCreateTenant() {
      goPage(
        'landlord-tenant-create.html'
      );
    }

    function showToast(message) {
      const toast =
        document.getElementById('toast');

      toast.textContent =
        rawText(message) || '提示';

      toast.classList.add('show');

      clearTimeout(toastTimer);

      toastTimer =
        setTimeout(function () {
          toast.classList.remove('show');
        }, 2300);
    }

    function jsonpRequest(action, params) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_tenants_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() * 1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;

          const timer =
            setTimeout(function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 載入逾時'
                )
              );
            }, 30000);

          function cleanup() {
            clearTimeout(timer);

            if (script.parentNode) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (result) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();
              resolve(result);
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(action) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params || {}
          ).forEach(function (key) {
            const value =
              params[key];

            if (
              value === undefined ||
              value === null
            ) {
              return;
            }

            url +=
              '&' +
              encodeURIComponent(key) +
              '=' +
              encodeURIComponent(value);
          });

          script.charset = 'UTF-8';

          script.onerror =
            function () {
              console.warn(
                'JSONP script onerror ignored.'
              );
            };

          script.src = url;
          document.body.appendChild(
            script
          );
        }
      );
    }

    async function initLineUserId() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      if (
        typeof liff === 'undefined'
      ) {
        throw new Error(
          'LIFF SDK 載入失敗'
        );
      }

      await liff.init({
        liffId: LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            buildLandlordLoginRedirectUri()
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId || '';

      if (!LINE_USER_ID) {
        throw new Error(
          '無法取得房東 LINE User ID'
        );
      }

      return true;
    }

    function unwrapData(result) {
      if (
        result &&
        result.success === true
      ) {
        return (
          result.data !== undefined
            ? result.data
            : result
        );
      }

      throw new Error(
        result && result.message
          ? result.message
          : '查詢失敗'
      );
    }

    function buildContractSummary(
      requests
    ) {
      const summary = {};

      (requests || []).forEach(
        function (request) {
          const tenantId =
            rawText(
              request.tenant_id
            ).trim();

          if (!tenantId) {
            return;
          }

          if (!summary[tenantId]) {
            summary[tenantId] = {
              pending: 0,
              approved: 0,
              totalActive: 0,
              latestType: ''
            };
          }

          const status =
            normalizeStatus(
              request.status
            );

          if (status === 'pending') {
            summary[tenantId].pending += 1;
            summary[tenantId].totalActive += 1;
          }

          if (status === 'approved') {
            summary[tenantId].approved += 1;
            summary[tenantId].totalActive += 1;
          }

          if (
            status === 'pending' ||
            status === 'approved'
          ) {
            summary[tenantId].latestType =
              normalizeStatus(
                request.request_type
              );
          }
        }
      );

      return summary;
    }

    function getFilteredTenants() {
      return ALL_TENANTS.filter(
        function (tenant) {
          const tenantId =
            rawText(
              tenant.tenant_id
            ).trim();

          const contract =
            CONTRACT_SUMMARY_BY_TENANT[
              tenantId
            ] || {
              pending: 0,
              approved: 0,
              totalActive: 0
            };

          const hasArrears =
            numberValue(
              tenant.unpaid_bill_count
            ) > 0 ||
            normalizeStatus(
              tenant.latest_payment_status
            ) === 'unpaid';

          const isPaid =
            normalizeStatus(
              tenant.latest_payment_status
            ) === 'paid';

          const hasContract =
            contract.totalActive > 0;

          const isUnbound =
            !rawText(
              tenant.tenant_line_user_id
            ).trim() ||
            normalizeStatus(
              tenant.tenant_binding_status
            ) === 'unbound';

          let matchFilter = true;

          if (
            ACTIVE_FILTER ===
            'arrears'
          ) {
            matchFilter = hasArrears;
          }

          if (
            ACTIVE_FILTER ===
            'paid'
          ) {
            matchFilter = isPaid;
          }

          if (
            ACTIVE_FILTER ===
            'contract'
          ) {
            matchFilter = hasContract;
          }

          if (
            ACTIVE_FILTER ===
            'unbound'
          ) {
            matchFilter = isUnbound;
          }

          if (!matchFilter) {
            return false;
          }

          const haystack =
            [
              tenant.tenant_name,
              tenant.tenant_id,
              tenant.room_list,
              tenant.tenant_phone,
              tenant.tenant_email
            ]
              .map(function (value) {
                return rawText(value)
                  .toLowerCase();
              })
              .join(' ');

          return (
            !SEARCH_TEXT ||
            haystack.indexOf(
              SEARCH_TEXT
            ) >= 0
          );
        }
      );
    }

    function setFilter(value) {
      ACTIVE_FILTER = value;

      document
        .querySelectorAll(
          '.filter-button'
        )
        .forEach(function (button) {
          button.classList.toggle(
            'active',
            button.dataset.filter ===
              value
          );
        });

      renderTenantList();
    }

    function updateSearch(value) {
      SEARCH_TEXT =
        rawText(value)
          .trim()
          .toLowerCase();

      const clearButton =
        document.getElementById(
          'clearSearchButton'
        );

      if (clearButton) {
        clearButton.classList.toggle(
          'show',
          Boolean(SEARCH_TEXT)
        );
      }

      renderTenantList();
    }

    function clearSearch() {
      const input =
        document.getElementById(
          'tenantSearch'
        );

      if (input) {
        input.value = '';
      }

      updateSearch('');
    }

    function renderTenantCard(
      tenant
    ) {
      const tenantId =
        rawText(
          tenant.tenant_id
        ).trim();

      const contract =
        CONTRACT_SUMMARY_BY_TENANT[
          tenantId
        ] || {
          pending: 0,
          approved: 0,
          totalActive: 0,
          latestType: ''
        };

      const paymentStatus =
        normalizeStatus(
          tenant.latest_payment_status
        );

      const hasArrears =
        numberValue(
          tenant.unpaid_bill_count
        ) > 0 ||
        paymentStatus === 'unpaid';

      const bindingStatus =
        rawText(
          tenant.tenant_line_user_id
        ).trim()
          ? 'bound'
          : (
              tenant.tenant_binding_status ||
              'unbound'
            );

      const avatarText =
        rawText(
          tenant.tenant_name
        ).trim().slice(0, 1) ||
        '房';

      let contractBadge = '';

      if (contract.pending > 0) {
        contractBadge = `
          <span class="badge warning">
            合約待審 ${contract.pending}
          </span>
        `;
      } else if (
        contract.approved > 0
      ) {
        contractBadge = `
          <span class="badge purple">
            合約待完成 ${contract.approved}
          </span>
        `;
      }

      return `
        <section class="card tenant-card">
          <button
            class="tenant-card-button"
            type="button"
            onclick="goTenantDetail('${safeHtml(tenantId)}')"
          >
            <div class="tenant-head">
              <div class="avatar">
                ${safeHtml(avatarText)}
              </div>

              <div class="tenant-main">
                <div class="tenant-name-row">
                  <div class="tenant-name">
                    ${safeHtml(
                      tenant.tenant_name ||
                      '未命名房客'
                    )}
                  </div>

                  <span class="${statusBadgeClass(bindingStatus)}">
                    ${safeHtml(
                      statusLabel(
                        bindingStatus
                      )
                    )}
                  </span>
                </div>

                <div class="tenant-meta">
                  房號 ${safeHtml(
                    tenant.room_list || '-'
                  )}
                  ・${safeHtml(tenantId || '-')}
                </div>
              </div>

              <div class="tenant-arrow">›</div>
            </div>

            <div class="tenant-status-row">
              <span class="${statusBadgeClass(paymentStatus)}">
                帳款 ${safeHtml(
                  statusLabel(
                    paymentStatus
                  )
                )}
              </span>

              ${
                hasArrears
                  ? `
                    <span class="badge danger">
                      欠款 ${numberValue(
                        tenant.unpaid_bill_count
                      )} 筆
                    </span>
                  `
                  : ''
              }

              ${contractBadge}
            </div>

            <div class="tenant-money-grid">
              <div class="money-box">
                <div class="money-label">最新帳單</div>
                <div class="money-value">
                  ${money(
                    tenant.latest_total_amount
                  )}
                </div>
              </div>

              <div class="money-box">
                <div class="money-label">目前未繳</div>
                <div class="money-value ${hasArrears ? 'red' : 'green'}">
                  ${
                    hasArrears
                      ? money(
                          tenant.unpaid_total_amount
                        )
                      : '已繳清'
                  }
                </div>
              </div>
            </div>
          </button>

          <div class="tenant-actions">
            <button
              class="tenant-action-button"
              type="button"
              onclick="goTenantDetail('${safeHtml(tenantId)}')"
            >
              查看房客資料
            </button>

            <button
              class="tenant-action-button purple"
              type="button"
              onclick="goTenantContractRequests('${safeHtml(tenantId)}', event)"
            >
              ${
                contract.totalActive > 0
                  ? '處理合約申請'
                  : '合約申請紀錄'
              }
            </button>
          </div>
        </section>
      `;
    }

    function renderTenantList() {
      const list =
        document.getElementById(
          'tenantList'
        );

      const count =
        document.getElementById(
          'tenantListCount'
        );

      if (!list || !count) {
        return;
      }

      const tenants =
        getFilteredTenants();

      count.textContent =
        tenants.length +
        ' / ' +
        ALL_TENANTS.length +
        ' 位';

      if (tenants.length === 0) {
        list.innerHTML = `
          <section class="card empty-card">
            <div class="empty-title">
              找不到符合條件的房客
            </div>
            <div class="empty-text">
              請調整搜尋文字或篩選條件。
            </div>
          </section>
        `;

        return;
      }

      list.innerHTML =
        tenants
          .map(renderTenantCard)
          .join('');
    }

    function renderPage(
      tenantData,
      contractData
    ) {
      TENANT_DATA =
        tenantData || {};

      ALL_TENANTS =
        Array.isArray(
          TENANT_DATA.tenants
        )
          ? TENANT_DATA.tenants
          : [];

      CONTRACT_REQUESTS =
        contractData &&
        Array.isArray(
          contractData.requests
        )
          ? contractData.requests
          : [];

      CONTRACT_SUMMARY_BY_TENANT =
        buildContractSummary(
          CONTRACT_REQUESTS
        );

      const landlord =
        TENANT_DATA.landlord || {};

      const summary =
        TENANT_DATA.summary || {};

      const tenantCount =
        numberValue(
          summary.tenant_count ||
          ALL_TENANTS.length
        );

      const unpaidTenantCount =
        numberValue(
          summary.unpaid_tenant_count
        );

      const paidTenantCount =
        numberValue(
          summary.paid_tenant_count
        );

      const activeContractTenantCount =
        Object.keys(
          CONTRACT_SUMMARY_BY_TENANT
        ).filter(function (tenantId) {
          return (
            CONTRACT_SUMMARY_BY_TENANT[
              tenantId
            ].totalActive > 0
          );
        }).length;

      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card header-card">
          <div class="header-row">
            <div>
              <div class="eyebrow">
                ${safeHtml(
                  landlord.landlord_name ||
                  '房東'
                )}・房客管理
              </div>

              <h1 class="page-title">
                房客名單
              </h1>

              <div class="page-subtitle">
                查看房客帳款、LINE 綁定及續約／解約申請狀態。
              </div>
            </div>

            <button
              id="refreshButton"
              class="refresh-button"
              type="button"
              onclick="loadPage()"
              aria-label="重新整理"
            >
              <svg viewBox="0 0 24 24">
                <path d="M20 11a8 8 0 1 0-2.34 5.66"></path>
                <path d="M20 5v6h-6"></path>
              </svg>
            </button>
          </div>

          <div class="summary-grid">
            <div class="summary-box">
              <div class="summary-label">房客總數</div>
              <div class="summary-value">
                ${tenantCount} 位
              </div>
            </div>

            <div class="summary-box">
              <div class="summary-label">已繳房客</div>
              <div class="summary-value green">
                ${paidTenantCount} 位
              </div>
            </div>

            <div class="summary-box">
              <div class="summary-label">欠款房客</div>
              <div class="summary-value red">
                ${unpaidTenantCount} 位
              </div>
            </div>

            <div class="summary-box">
              <div class="summary-label">合約待處理房客</div>
              <div class="summary-value purple">
                ${activeContractTenantCount} 位
              </div>
            </div>
          </div>
        </section>

        <section class="card create-tenant-card">
          <div>
            <div class="create-tenant-title">
              建立新房客與初始租約
            </div>

            <div class="create-tenant-desc">
              選擇房間、設定租期與租金，再將手機綁定訊息傳給房客。
            </div>
          </div>

          <button
            class="create-tenant-button"
            type="button"
            onclick="goCreateTenant()"
          >
            ＋ 新增房客
          </button>
        </section>

        <section class="card toolbar-card">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20l-4-4"></path>
            </svg>

            <input
              id="tenantSearch"
              class="search-input"
              type="search"
              placeholder="搜尋姓名、房號、電話或房客 ID"
              oninput="updateSearch(this.value)"
            />

            <button
              id="clearSearchButton"
              class="clear-search"
              type="button"
              onclick="clearSearch()"
              aria-label="清除搜尋"
            >
              ×
            </button>
          </div>

          <div class="filter-row">
            <button
              class="filter-button active"
              data-filter="all"
              type="button"
              onclick="setFilter('all')"
            >
              全部
            </button>

            <button
              class="filter-button"
              data-filter="arrears"
              type="button"
              onclick="setFilter('arrears')"
            >
              有欠款
            </button>

            <button
              class="filter-button"
              data-filter="paid"
              type="button"
              onclick="setFilter('paid')"
            >
              已繳清
            </button>

            <button
              class="filter-button"
              data-filter="contract"
              type="button"
              onclick="setFilter('contract')"
            >
              合約待處理
            </button>

            <button
              class="filter-button"
              data-filter="unbound"
              type="button"
              onclick="setFilter('unbound')"
            >
              未綁定 LINE
            </button>
          </div>
        </section>

        <div class="list-header">
          <div class="list-title">房客清單</div>
          <div
            id="tenantListCount"
            class="list-count"
          ></div>
        </div>

        <div id="tenantList"></div>
      `;

      renderTenantList();
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">
            房客名單讀取失敗
          </div>

          <div class="error-text">
            ${safeHtml(
              message || '未知錯誤'
            )}
          </div>

          <button
            class="primary-button"
            type="button"
            onclick="loadPage()"
          >
            重新整理
          </button>
        </section>
      `;
    }

    function setRefreshLoading(
      loading
    ) {
      const button =
        document.getElementById(
          'refreshButton'
        );

      if (!button) {
        return;
      }

      button.classList.toggle(
        'loading',
        Boolean(loading)
      );
    }

    async function loadPage() {
      setRefreshLoading(true);

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLineUserId();

          if (!ready) {
            return;
          }
        }

        const results =
          await Promise.allSettled([
            jsonpRequest(
              'landlord_tenants',
              {}
            ),
            jsonpRequest(
              'landlord_contract_requests_init',
              {}
            )
          ]);

        if (
          results[0].status !==
          'fulfilled'
        ) {
          throw results[0].reason;
        }

        const tenantData =
          unwrapData(
            results[0].value
          );

        let contractData = {
          requests: []
        };

        if (
          results[1].status ===
          'fulfilled'
        ) {
          try {
            contractData =
              unwrapData(
                results[1].value
              );
          } catch (error) {
            console.warn(
              '合約申請資料讀取失敗：',
              error
            );
          }
        }

        renderPage(
          tenantData,
          contractData
        );
      } catch (error) {
        renderError(
          error && error.message
            ? error.message
            : String(error)
        );
      } finally {
        setRefreshLoading(false);
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    window.addEventListener(
      'orientationchange',
      function () {
        setTimeout(
          setAppHeight,
          250
        );
      }
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
