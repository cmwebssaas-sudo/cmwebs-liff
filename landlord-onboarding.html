<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 房東初始設定</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #edf9f2;
      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;
      --danger: #d93025;
      --danger-soft: #fff0ef;
      --orange: #ef8f00;
      --orange-soft: #fff5df;
      --blue: #1a73e8;
      --blue-soft: #edf4ff;
      --purple: #7654c4;
      --purple-soft: #f3efff;
      --shadow: 0 10px 34px rgba(25, 35, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 620px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(
          circle at 100% 0%,
          rgba(6, 199, 85, 0.13),
          transparent 28%
        ),
        var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(18px, env(safe-area-inset-top))
        15px
        calc(28px + env(safe-area-inset-bottom));
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: var(--primary);
      color: #ffffff;
      font-size: 17px;
      font-weight: 900;
      box-shadow: 0 8px 20px rgba(6, 199, 85, 0.22);
    }

    .brand-name {
      font-size: 16px;
      font-weight: 900;
    }

    .brand-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 9px;
    }

    .exit-button {
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      color: #626975;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 20px;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #08ad4d 0%,
          #06c755 58%,
          #059e43 100%
        );
    }

    .hero::after {
      position: absolute;
      top: -70px;
      right: -55px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      content: "";
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      margin-bottom: 6px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 10px;
      font-weight: 900;
    }

    .hero-title {
      margin: 0;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .hero-desc {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 11px;
      line-height: 1.65;
    }

    .workspace-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 15px;
      padding: 11px 12px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.12);
    }

    .workspace-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 9px;
    }

    .workspace-name {
      margin-top: 3px;
      font-size: 12px;
      font-weight: 900;
    }

    .workspace-role {
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 9px;
      font-weight: 900;
      white-space: nowrap;
    }

    .stepper-card {
      padding: 15px 12px;
    }

    .stepper {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 4px;
    }

    .stepper::before {
      position: absolute;
      top: 16px;
      right: 12.5%;
      left: 12.5%;
      height: 2px;
      background: #e8ebef;
      content: "";
    }

    .step-item {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      flex-direction: column;
      gap: 7px;
      border: 0;
      background: transparent;
      color: #8b9098;
      cursor: default;
    }

    .step-item.clickable {
      cursor: pointer;
    }

    .step-circle {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #e3e7eb;
      border-radius: 50%;
      background: #ffffff;
      font-size: 11px;
      font-weight: 900;
    }

    .step-item.active {
      color: var(--primary-dark);
    }

    .step-item.active .step-circle {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 0 0 4px rgba(6, 199, 85, 0.1);
    }

    .step-item.done {
      color: var(--primary-dark);
    }

    .step-item.done .step-circle {
      border-color: #bfe8cf;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .step-name {
      font-size: 9px;
      font-weight: 900;
      text-align: center;
      line-height: 1.35;
    }

    .form-card {
      padding: 18px;
    }

    .form-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .form-step {
      margin-bottom: 4px;
      color: var(--primary-dark);
      font-size: 10px;
      font-weight: 900;
    }

    .form-title {
      font-size: 19px;
      font-weight: 900;
    }

    .form-desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.65;
    }

    .status-pill {
      flex: 0 0 auto;
      min-height: 25px;
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--orange-soft);
      color: #a96700;
      font-size: 9px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-pill.done {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .field {
      margin-top: 14px;
    }

    .field-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 900;
    }

    .required {
      color: var(--danger);
      font-size: 9px;
    }

    .optional {
      color: var(--muted);
      font-size: 9px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      background: #ffffff;
      color: var(--text);
    }

    .input,
    .select {
      height: 46px;
      padding: 0 13px;
    }

    .textarea {
      min-height: 88px;
      padding: 11px 13px;
      resize: vertical;
      line-height: 1.55;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: rgba(6, 199, 85, 0.55);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.1);
    }

    .field-help {
      margin-top: 6px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.5;
    }

    .input-prefix {
      position: relative;
    }

    .input-prefix::before {
      position: absolute;
      top: 50%;
      left: 13px;
      z-index: 1;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      transform: translateY(-50%);
      content: "NT$";
    }

    .input-prefix .input {
      padding-left: 43px;
    }

    .info-note {
      margin-top: 15px;
      padding: 12px 13px;
      border: 1px solid #dbe6fa;
      border-radius: 13px;
      background: var(--blue-soft);
      color: #3b5f91;
      font-size: 10px;
      line-height: 1.65;
    }

    .info-note.orange {
      border-color: #f0dfb9;
      background: var(--orange-soft);
      color: #74500c;
    }

    .action-row {
      display: grid;
      grid-template-columns: minmax(0, 0.8fr) minmax(0, 1.2fr);
      gap: 10px;
      margin-top: 18px;
    }

    .primary-button,
    .secondary-button,
    .danger-button {
      min-height: 47px;
      padding: 10px 14px;
      border-radius: 13px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary-button {
      border: 0;
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 7px 18px rgba(6, 199, 85, 0.18);
    }

    .secondary-button {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .danger-button {
      border: 0;
      background: var(--danger);
      color: #ffffff;
    }

    .primary-button:disabled,
    .secondary-button:disabled {
      cursor: default;
      opacity: 0.52;
      box-shadow: none;
    }

    .summary-section {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface-soft);
    }

    .summary-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .summary-title {
      font-size: 13px;
      font-weight: 900;
    }

    .edit-button {
      border: 0;
      background: transparent;
      color: var(--blue);
      font-size: 10px;
      font-weight: 900;
      cursor: pointer;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .summary-item {
      min-width: 0;
      padding: 10px 11px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #ffffff;
    }

    .summary-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 9px;
    }

    .summary-value {
      overflow: hidden;
      font-size: 11px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-value.wrap {
      white-space: normal;
      word-break: break-word;
    }

    .complete-banner {
      padding: 24px 18px;
      text-align: center;
    }

    .complete-icon {
      width: 66px;
      height: 66px;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 21px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 31px;
      font-weight: 900;
    }

    .complete-title {
      font-size: 21px;
      font-weight: 900;
    }

    .complete-text {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
    }

    .loading-card,
    .error-card {
      padding: 30px 20px;
      text-align: center;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 14px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-title,
    .error-title {
      margin-bottom: 7px;
      font-size: 18px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .loading-text,
    .error-text {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
    }

    .toast {
      position: absolute;
      z-index: 1800;
      right: 16px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      left: 16px;
      max-width: 470px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 13px;
      background: #22252a;
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.55;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.22);
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition:
        opacity 0.18s ease,
        transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--danger);
    }

    .modal-backdrop {
      position: absolute;
      z-index: 1700;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px 16px;
      background: rgba(17, 24, 39, 0.5);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 430px;
      padding: 19px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 900;
    }

    .modal-message {
      margin-top: 9px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      white-space: pre-line;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 16px;
    }

    .modal-actions .primary-button,
    .modal-actions .secondary-button {
      width: 100%;
    }

    @media (max-width: 430px) {
      .field-row,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .action-row {
        grid-template-columns: 1fr;
      }

      .step-name {
        font-size: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-icon">CM</div>

          <div>
            <div class="brand-name">CMWebs 智慧租管</div>
            <div class="brand-subtitle">Workspace Onboarding</div>
          </div>
        </div>

        <button
          class="exit-button"
          type="button"
          onclick="goEntry()"
        >
          稍後繼續
        </button>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">初始設定載入中</div>
          <div class="loading-text">
            正在讀取管理團隊、收款、物件與房間資料。
          </div>
        </section>
      </div>
    </main>

    <div id="confirmModal" class="modal-backdrop">
      <div class="modal-box">
        <div id="modalTitle" class="modal-title">確認完成</div>
        <div id="modalMessage" class="modal-message"></div>

        <div class="modal-actions">
          <button
            class="secondary-button"
            type="button"
            onclick="hideModal()"
          >
            返回檢查
          </button>

          <button
            id="modalConfirmButton"
            class="primary-button"
            type="button"
          >
            確認完成
          </button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(
        location.search
      );

    const TEST_MODE =
      URL_PARAMS.get('test') ===
      '1';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let CURRENT_STEP = 'payment';
    let toastTimer = null;

    const STEPS = [
      'payment',
      'property',
      'room',
      'review'
    ];

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      if (
        value === undefined ||
        value === null
      ) {
        return '';
      }

      return String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function numberValue(value) {
      const number =
        Number(
          rawText(value)
            .replace(/,/g, '')
        );

      return Number.isFinite(number)
        ? number
        : 0;
    }

    function money(value) {
      return (
        'NT$ ' +
        Math.round(
          numberValue(value)
        ).toLocaleString(
          'zh-TW'
        )
      );
    }

    function propertyTypeText(value) {
      const map = {
        apartment: '公寓／華廈',
        suite: '套房',
        building: '大樓',
        house: '透天',
        shop: '店面',
        office: '辦公室',
        other: '其他'
      };

      return (
        map[
          rawText(value)
            .toLowerCase()
        ] ||
        rawText(value) ||
        '-'
      );
    }

    function maskAccount(value) {
      const text =
        rawText(value)
          .replace(/\s/g, '');

      if (text.length <= 4) {
        return text || '-';
      }

      return (
        '••••••' +
        text.slice(-4)
      );
    }

    function buildPageUrl(page) {
      return (
        page +
        '?v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        )
      );
    }

    function goEntry() {
      location.href =
        buildPageUrl(
          'landlord-entry.html'
        );
    }

    function goHome() {
      location.replace(
        buildPageUrl(
          'landlord-home.html'
        )
      );
    }

    function showToast(
      message,
      isError
    ) {
      const toast =
        document.getElementById(
          'toast'
        );

      clearTimeout(
        toastTimer
      );

      toast.textContent =
        message || '';

      toast.className =
        isError
          ? 'toast error show'
          : 'toast show';

      toastTimer =
        setTimeout(
          function () {
            toast.className =
              'toast';
          },
          2800
        );
    }

    function showModal(
      title,
      message,
      onConfirm
    ) {
      document.getElementById(
        'modalTitle'
      ).textContent =
        title || '確認';

      document.getElementById(
        'modalMessage'
      ).textContent =
        message || '';

      const button =
        document.getElementById(
          'modalConfirmButton'
        );

      button.onclick =
        function () {
          hideModal();

          if (
            typeof onConfirm ===
            'function'
          ) {
            onConfirm();
          }
        };

      document.getElementById(
        'confirmModal'
      ).classList.add(
        'show'
      );
    }

    function hideModal() {
      document.getElementById(
        'confirmModal'
      ).classList.remove(
        'show'
      );
    }

    function jsonpRequest(
      action,
      params
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_onboarding_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;

          const timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished = true;
                cleanup();

                reject(
                  new Error(
                    'API 載入逾時'
                  )
                );
              },
              25000
            );

          function cleanup() {
            clearTimeout(timer);

            if (script.parentNode) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (result) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();
              resolve(result);
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params || {}
          ).forEach(
            function (key) {
              const value =
                params[key];

              if (
                value === undefined ||
                value === null
              ) {
                return;
              }

              url +=
                '&' +
                encodeURIComponent(
                  key
                ) +
                '=' +
                encodeURIComponent(
                  value
                );
            }
          );

          script.charset =
            'UTF-8';

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗，請確認初始設定後端已重新部署'
                )
              );
            };

          script.src = url;

          document.body.appendChild(
            script
          );
        }
      );
    }

    async function initLine() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      if (
        typeof liff ===
        'undefined'
      ) {
        throw new Error(
          'LIFF SDK 載入失敗'
        );
      }

      await liff.init({
        liffId: LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            location.href
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId || '';

      if (!LINE_USER_ID) {
        throw new Error(
          '無法取得 LINE User ID'
        );
      }

      return true;
    }

    function stepDone(step) {
      const progress =
        PAGE_DATA &&
        PAGE_DATA.progress
          ? PAGE_DATA.progress
          : {};

      if (step === 'payment') {
        return (
          progress.payment_completed ===
          true
        );
      }

      if (step === 'property') {
        return (
          progress.property_completed ===
          true
        );
      }

      if (step === 'room') {
        return (
          progress.room_completed ===
          true
        );
      }

      if (step === 'review') {
        return (
          progress.payment_completed ===
            true &&
          progress.property_completed ===
            true &&
          progress.room_completed ===
            true
        );
      }

      return false;
    }

    function canOpenStep(step) {
      if (step === 'payment') {
        return true;
      }

      if (step === 'property') {
        return stepDone('payment');
      }

      if (step === 'room') {
        return (
          stepDone('payment') &&
          stepDone('property')
        );
      }

      if (step === 'review') {
        return stepDone('review');
      }

      return false;
    }

                  ? ''
                  : 'disabled'
              }
              onclick="confirmComplete()"
            >
              完成初始設定
            </button>
          </div>
        </section>
      `;
    }

    function summaryItem(
      label,
      value,
      wrap
    ) {
      return `
        <div class="summary-item">
          <div class="summary-label">
            ${safeHtml(label)}
          </div>

          <div class="summary-value ${
            wrap
              ? 'wrap'
              : ''
          }">
            ${safeHtml(
              value || '-'
            )}
          </div>
        </div>
      `;
    }

    function completeHtml() {
      return `
        <section class="card complete-banner">
          <div class="complete-icon">
            ✓
          </div>

          <div class="complete-title">
            初始設定已完成
          </div>

          <div class="complete-text">
            管理團隊、預設收款帳號、第一個物件與第一個房間均已建立。現在可以進入房東首頁繼續新增房客、合約及團隊成員。
          </div>

          <button
            class="primary-button"
            type="button"
            onclick="goHome()"
            style="width:100%;margin-top:18px;"
          >
            進入房東管理首頁
          </button>
        </section>
      `;
    }

    function renderPage() {
      if (
        PAGE_DATA.progress &&
        PAGE_DATA.progress.completed
      ) {
        document.getElementById(
          'app'
        ).innerHTML =
          heroHtml() +
          completeHtml();

        return;
      }

      let form = '';

      if (
        CURRENT_STEP ===
        'payment'
      ) {
        form =
          paymentFormHtml();
      }

      if (
        CURRENT_STEP ===
        'property'
      ) {
        form =
          propertyFormHtml();
      }

      if (
        CURRENT_STEP ===
        'room'
      ) {
        form =
          roomFormHtml();
      }

      if (
        CURRENT_STEP ===
        'review'
      ) {
        form =
          reviewHtml();
      }

      document.getElementById(
        'app'
      ).innerHTML =
        heroHtml() +
        stepperHtml() +
        form;

      document.querySelector(
        '.page'
      ).scrollTop = 0;
    }

    function openStep(step) {
      if (!canOpenStep(step)) {
        showToast(
          '請先完成前一個步驟。',
          true
        );

        return;
      }

      CURRENT_STEP =
        step;

      renderPage();
    }

    function digitsOnly(
      input,
      maxLength
    ) {
      input.value =
        rawText(input.value)
          .replace(/\D/g, '')
          .slice(
            0,
            maxLength
          );
    }

    function getInput(id) {
      const element =
        document.getElementById(
          id
        );

      return element
        ? rawText(
            element.value
          ).trim()
        : '';
    }

    function setSaving(
      saving,
      text
    ) {
      const button =
        document.getElementById(
          'saveButton'
        );

      if (!button) {
        return;
      }

      button.disabled =
        Boolean(saving);

      if (saving) {
        button.dataset.original =
          button.textContent;

        button.textContent =
          text || '儲存中...';
      } else {
        button.textContent =
          button.dataset.original ||
          button.textContent;
      }
    }

    async function saveStep(
      step,
      payload,
      nextStep
    ) {
      setSaving(
        true,
        '儲存中...'
      );

      try {
        const result =
          await jsonpRequest(
            'landlord_onboarding_save',
            Object.assign(
              {
                step:
                  step
              },
              payload
            )
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '資料儲存失敗'
          );
        }

        PAGE_DATA =
          result.data ||
          PAGE_DATA;

        CURRENT_STEP =
          nextStep ||
          (
            PAGE_DATA.progress &&
            PAGE_DATA.progress.current_step
              ? PAGE_DATA.progress.current_step
              : CURRENT_STEP
          );

        showToast(
          '資料已儲存。'
        );

        renderPage();

      } catch (error) {
        showToast(
          error &&
          error.message
            ? error.message
            : '資料儲存失敗',
          true
        );

      } finally {
        setSaving(false);
      }
    }

    function savePayment() {
      const bankCode =
        getInput(
          'bankCode'
        );

      const bankName =
        getInput(
          'bankName'
        );

      const branchName =
        getInput(
          'branchName'
        );

      const bankAccount =
        getInput(
          'bankAccount'
        ).replace(/\s/g, '');

      const bankAccountName =
        getInput(
          'bankAccountName'
        );

      const paymentNote =
        getInput(
          'paymentNote'
        );

      if (
        !/^\d{3}$/.test(
          bankCode
        )
      ) {
        showToast(
          '銀行代碼必須是 3 位數字。',
          true
        );

        return;
      }

      if (!bankName) {
        showToast(
          '請輸入銀行名稱。',
          true
        );

        return;
      }

      if (
        !/^\d{6,20}$/.test(
          bankAccount
        )
      ) {
        showToast(
          '銀行帳號必須是 6 至 20 位數字。',
          true
        );

        return;
      }

      if (!bankAccountName) {
        showToast(
          '請輸入銀行戶名。',
          true
        );

        return;
      }

      saveStep(
        'payment',
        {
          bank_code:
            bankCode,
          bank_name:
            bankName,
          branch_name:
            branchName,
          bank_account:
            bankAccount,
          bank_account_name:
            bankAccountName,
          payment_note:
            paymentNote
        },
        'property'
      );
    }

    function saveProperty() {
      const propertyName =
        getInput(
          'propertyName'
        );

      const city =
        getInput(
          'city'
        );

      const district =
        getInput(
          'district'
        );

      const propertyAddress =
        getInput(
          'propertyAddress'
        );

      const propertyType =
        getInput(
          'propertyType'
        );

      if (!propertyName) {
        showToast(
          '請輸入物件名稱。',
          true
        );

        return;
      }

      if (
        !city ||
        !district ||
        !propertyAddress
      ) {
        showToast(
          '請完整輸入縣市、行政區與地址。',
          true
        );

        return;
      }

      saveStep(
        'property',
        {
          property_name:
            propertyName,
          city:
            city,
          district:
            district,
          property_address:
            propertyAddress,
          property_type:
            propertyType
        },
        'room'
      );
    }

    function saveRoom() {
      const roomName =
        getInput(
          'roomName'
        );

      const rentAmount =
        numberValue(
          getInput(
            'rentAmount'
          )
        );

      const managementFee =
        numberValue(
          getInput(
            'managementFee'
          )
        );

      const electricityRate =
        numberValue(
          getInput(
            'electricityRate'
          )
        );

      const equipmentRate =
        numberValue(
          getInput(
            'equipmentRate'
          )
        );

      const paymentDay =
        Number(
          getInput(
            'paymentDay'
          )
        );

      const depositMonths =
        Number(
          getInput(
            'depositMonths'
          )
        );

      if (!roomName) {
        showToast(
          '請輸入房號或房間名稱。',
          true
        );

        return;
      }

      if (rentAmount <= 0) {
        showToast(
          '每月租金必須大於 0。',
          true
        );

        return;
      }

      if (
        managementFee < 0 ||
        electricityRate < 0 ||
        equipmentRate < 0
      ) {
        showToast(
          '費用不得為負數。',
          true
        );

        return;
      }

      saveStep(
        'room',
        {
          room_name:
            roomName,
          rent_amount:
            rentAmount,
          management_fee:
            managementFee,
          electricity_fee_rate:
            electricityRate,
          equipment_fee_rate:
            equipmentRate,
          payment_day:
            paymentDay,
          deposit_months:
            depositMonths
        },
        'review'
      );
    }

    function confirmComplete() {
      if (!stepDone('review')) {
        showToast(
          '請先完成所有資料。',
          true
        );

        return;
      }

      const workspace =
        PAGE_DATA.workspace || {};

      const property =
        PAGE_DATA.property || {};

      const room =
        PAGE_DATA.room || {};

      showModal(
        '完成初始設定',
        '管理團隊：' +
        (
          workspace.workspace_name ||
          '-'
        ) +
        '\n物件：' +
        (
          property.property_name ||
          '-'
        ) +
        '\n房間：' +
        (
          room.room_name ||
          '-'
        ) +
        '\n\n完成後會進入房東管理首頁。',
        completeOnboarding
      );
    }

    async function completeOnboarding() {
      const button =
        document.getElementById(
          'completeButton'
        );

      if (button) {
        button.disabled = true;
        button.textContent =
          '完成中...';
      }

      try {
        const result =
          await jsonpRequest(
            'landlord_onboarding_complete',
            {}
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '初始設定完成失敗'
          );
        }

        showToast(
          '初始設定已完成。'
        );

        setTimeout(
          goHome,
          700
        );

      } catch (error) {
        showToast(
          error &&
          error.message
            ? error.message
            : '初始設定完成失敗',
          true
        );

        if (button) {
          button.disabled = false;
          button.textContent =
            '完成初始設定';
        }
      }
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">
            初始設定載入失敗
          </div>

          <div class="error-text">
            ${safeHtml(
              message ||
              '未知錯誤'
            )}
          </div>

          <div class="action-row">
            <button
              class="secondary-button"
              type="button"
              onclick="goEntry()"
            >
              返回入口
            </button>

            <button
              class="primary-button"
              type="button"
              onclick="loadPage()"
            >
              重新整理
            </button>
          </div>
        </section>
      `;
    }

    async function loadPage() {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">
            初始設定載入中
          </div>
          <div class="loading-text">
            正在讀取管理團隊、收款、物件與房間資料。
          </div>
        </section>
      `;

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLine();

          if (!ready) {
            return;
          }
        }

        const result =
          await jsonpRequest(
            'landlord_onboarding_init',
            {}
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '初始設定資料載入失敗'
          );
        }

        PAGE_DATA =
          result.data || {};

        CURRENT_STEP =
          PAGE_DATA.progress &&
          PAGE_DATA.progress.current_step
            ? PAGE_DATA.progress.current_step
            : 'payment';

        if (
          CURRENT_STEP ===
          'completed'
        ) {
          renderPage();
          return;
        }

        if (
          STEPS.indexOf(
            CURRENT_STEP
          ) === -1
        ) {
          CURRENT_STEP =
            'payment';
        }

        renderPage();

      } catch (error) {
        renderError(
          error &&
          error.message
            ? error.message
            : String(error)
        );
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    window.addEventListener(
      'orientationchange',
      function () {
        setTimeout(
          setAppHeight,
          250
        );
      }
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
