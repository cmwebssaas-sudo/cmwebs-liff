<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 加入這行可以防止手機版網頁被不正常放大縮小 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMWebs 系統綁定</title>
    <!-- 引入 LINE LIFF 官方 SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 讓畫面完美貼齊邊緣，隱藏捲軸 */
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f4f4f4; }
        
        /* 載入畫面的設計 */
        #loader { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
        }
        .spinner { 
            border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; 
            border-radius: 50%; border-left-color: #06C755; 
            animation: spin 1s linear infinite; margin-bottom: 15px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #555; font-size: 14px; letter-spacing: 1px; }
        
        /* 隱藏的 Tally 畫框，等載入完成後才顯示 */
        #tally-frame {
            display: none; width: 100vw; height: 100vh; border: none;
        }
    </style>
</head>
<body>
    <!-- 1. 一開始先顯示轉圈圈 -->
    <div id="loader">
        <div class="spinner"></div>
        <p>安全驗證與身分綁定中...</p>
    </div>
    
    <!-- 2. 準備用來裝 Tally 表單的隱形畫框 -->
    <iframe id="tally-frame" src=""></iframe>

    <script>
        // 設定您的專屬 ID 與目標網址
        const myLiffId = "2010314940-at3zGKFb"; 
        const tallyBaseUrl = "https://tally.so/r/rjvdPX";

        async function main() {
            try {
                // 初始化 LIFF
                await liff.init({ liffId: myLiffId });
                
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    const userId = profile.userId; // 成功抓取 UID
                    
                    const iframe = document.getElementById('tally-frame');
                    
                    // 將 Tally 網址加上 UID 後，塞進畫框裡面
                    iframe.src = `${tallyBaseUrl}?uid=${userId}`;
                    
                    // 監聽畫框：只要 Tally 載入完畢，就隱藏轉圈圈，顯示表單
                    iframe.onload = function() {
                        document.getElementById('loader').style.display = 'none';
                        iframe.style.display = 'block';
                    };
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF 初始化失敗", err);
                document.getElementById('loader').innerHTML = "<p>系統連線失敗，請關閉視窗後重試。</p>";
            }
        }

        main();
    </script>
</body>
</html>
