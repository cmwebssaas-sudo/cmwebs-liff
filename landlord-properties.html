<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 物件與房間</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 68px;
      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #edf9f2;
      --purple: #7654c4;
      --purple-soft: #f3efff;
      --blue: #1a73e8;
      --blue-soft: #edf4ff;
      --orange: #ef8f00;
      --orange-soft: #fff5df;
      --danger: #d93025;
      --danger-soft: #fff0ef;
      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;
      --shadow: 0 10px 34px rgba(25, 35, 55, 0.08);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 620px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(
          circle at 100% 0%,
          rgba(118, 84, 196, 0.1),
          transparent 28%
        ),
        var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(16px, env(safe-area-inset-top))
        15px
        calc(
          var(--nav-height) +
          22px +
          env(safe-area-inset-bottom)
        );
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .eyebrow {
      color: var(--purple);
      font-size: 10px;
      font-weight: 900;
    }

    .page-title {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 900;
    }

    .refresh-button {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #5f6670;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #6342ad 0%,
          #7654c4 58%,
          #5e3ca9 100%
        );
    }

    .hero::after {
      position: absolute;
      top: -65px;
      right: -45px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      content: "";
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 9px;
      font-weight: 900;
    }

    .workspace-name {
      margin-top: 5px;
      font-size: 21px;
      font-weight: 900;
    }

    .hero-desc {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 10px;
      line-height: 1.6;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 15px;
    }

    .summary-item {
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.1);
    }

    .summary-label {
      color: rgba(255, 255, 255, 0.72);
      font-size: 8px;
    }

    .summary-value {
      margin-top: 4px;
      font-size: 17px;
      font-weight: 900;
    }

    .actions-card {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      padding: 13px;
    }

    .action-button {
      min-height: 44px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .action-button.primary {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .action-button.secondary {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .action-button:disabled,
    .small-button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .filter-card {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px;
      scrollbar-width: none;
    }

    .filter-card::-webkit-scrollbar {
      display: none;
    }

    .filter-button {
      min-height: 35px;
      flex: 0 0 auto;
      padding: 0 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #ffffff;
      color: #656c76;
      font-size: 10px;
      font-weight: 900;
      cursor: pointer;
    }

    .filter-button.active {
      border-color: #d8cdf4;
      background: var(--purple-soft);
      color: var(--purple);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 9px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 900;
    }

    .section-count {
      color: var(--muted);
      font-size: 10px;
    }

    .property-card {
      overflow: hidden;
    }

    .property-head {
      padding: 15px;
    }

    .property-main {
      display: flex;
      align-items: flex-start;
      gap: 11px;
    }

    .property-icon {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: var(--purple-soft);
      color: var(--purple);
      font-size: 17px;
      font-weight: 900;
    }

    .property-content {
      min-width: 0;
      flex: 1;
    }

    .property-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .property-title {
      font-size: 15px;
      font-weight: 900;
    }

    .badge {
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 900;
    }

    .badge.active {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .badge.archived {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.type {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .property-address {
      margin-top: 6px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.55;
    }

    .property-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-top: 12px;
    }

    .property-stat {
      padding: 8px;
      border-radius: 10px;
      background: var(--surface-soft);
    }

    .property-stat-label {
      color: var(--muted);
      font-size: 7px;
    }

    .property-stat-value {
      margin-top: 3px;
      font-size: 13px;
      font-weight: 900;
    }

    .property-actions {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
      padding-top: 11px;
      border-top: 1px solid var(--border);
    }

    .small-button {
      min-height: 34px;
      padding: 0 11px;
      border-radius: 10px;
      font-size: 9px;
      font-weight: 900;
      cursor: pointer;
    }

    .small-button.primary {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .small-button.secondary {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .small-button.danger {
      border: 1px solid #f0cfcc;
      background: var(--danger-soft);
      color: var(--danger);
    }

    .room-list {
      padding: 0 15px 15px;
    }

    .room-card {
      margin-top: 9px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: var(--surface-soft);
    }

    .room-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .room-name {
      font-size: 12px;
      font-weight: 900;
    }

    .room-status {
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 900;
    }

    .room-status.vacant {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .room-status.occupied {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .room-status.maintenance {
      background: var(--orange-soft);
      color: #9b6200;
    }

    .room-status.unavailable,
    .room-status.archived {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .room-finance {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      margin-top: 10px;
    }

    .room-finance-item {
      padding: 8px;
      border-radius: 9px;
      background: #ffffff;
    }

    .room-finance-label {
      color: var(--muted);
      font-size: 7px;
    }

    .room-finance-value {
      margin-top: 3px;
      font-size: 10px;
      font-weight: 900;
    }

    .room-actions {
      display: flex;
      justify-content: flex-end;
      gap: 7px;
      margin-top: 10px;
    }

    .empty-room {
      margin-top: 9px;
      padding: 17px 12px;
      border: 1px dashed #d8dce2;
      border-radius: 12px;
      color: var(--muted);
      font-size: 9px;
      text-align: center;
    }

    .empty-card,
    .loading-card,
    .error-card {
      padding: 28px 18px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      text-align: center;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 14px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-title,
    .error-title {
      margin-bottom: 7px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .modal-backdrop {
      position: absolute;
      z-index: 1700;
      inset: 0;
      display: none;
      align-items: stretch;
      justify-content: center;
      padding:
        14px
        14px
        calc(
          var(--nav-height) +
          14px +
          env(safe-area-inset-bottom)
        );
      background: rgba(17, 24, 39, 0.55);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-sheet {
      width: 100%;
      max-width: 560px;
      height: 100%;
      overflow-y: auto;
      padding: 18px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 15px;
    }

    .modal-title {
      font-size: 19px;
      font-weight: 900;
    }

    .modal-desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.6;
    }

    .close-button {
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #ffffff;
      color: #666d77;
      font-size: 18px;
      cursor: pointer;
    }

    .field {
      margin-top: 14px;
    }

    .field-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 900;
    }

    .required {
      color: var(--danger);
      font-size: 9px;
    }

    .optional {
      color: var(--muted);
      font-size: 9px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      background: #ffffff;
      color: var(--text);
    }

    .input,
    .select {
      height: 46px;
      padding: 0 13px;
    }

    .textarea {
      min-height: 82px;
      padding: 11px 13px;
      resize: vertical;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .modal-note {
      margin-top: 14px;
      padding: 11px 12px;
      border: 1px solid #f0dfb9;
      border-radius: 11px;
      background: var(--orange-soft);
      color: #74500c;
      font-size: 9px;
      line-height: 1.65;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 18px;
    }

    .modal-cancel,
    .modal-submit {
      min-height: 45px;
      border-radius: 11px;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .modal-cancel {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .modal-submit {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .modal-submit.danger {
      background: var(--danger);
    }

    .modal-submit:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .toast {
      position: absolute;
      z-index: 2000;
      right: 16px;
      bottom:
        calc(
          var(--nav-height) +
          16px +
          env(safe-area-inset-bottom)
        );
      left: 16px;
      max-width: 470px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 13px;
      background: #22252a;
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition:
        opacity 0.18s ease,
        transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--danger);
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    @media (max-width: 430px) {
      .summary-grid,
      .property-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="topbar">
        <div>
          <div class="eyebrow">Properties & Rooms</div>
          <div class="page-title">物件與房間</div>
        </div>

        <button
          class="refresh-button"
          type="button"
          onclick="loadPage()"
        >
          ↻
        </button>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">物件資料載入中</div>
          正在讀取目前管理團隊的物件與房間。
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>

    <div id="editorModal" class="modal-backdrop">
      <div id="editorSheet" class="modal-sheet"></div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(
        location.search
      );

    const TEST_MODE =
      URL_PARAMS.get('test') ===
      '1';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let FILTER = 'active';
    let toastTimer = null;

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      return value === undefined || value === null
        ? ''
        : String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function money(value) {
      return new Intl.NumberFormat(
        'zh-TW'
      ).format(
        Number(value || 0)
      );
    }

    function goPage(page) {
      location.href =
        page +
        '?v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        );
    }

    function goTenantCreate(
      propertyId,
      roomId
    ) {
      let url =
        'landlord-tenant-create.html' +
        '?property_id=' +
        encodeURIComponent(
          propertyId || ''
        ) +
        '&room_id=' +
        encodeURIComponent(
          roomId || ''
        );

      goPage(
        url
      );
    }

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

    function jsonpRequest(
      action,
      params,
      retryCount
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_properties_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;

          const timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished = true;
                cleanup();

                if (
                  Number(
                    retryCount || 0
                  ) < 1
                ) {
                  jsonpRequest(
                    action,
                    params,
                    1
                  ).then(
                    resolve
                  ).catch(
                    reject
                  );

                  return;
                }

                reject(
                  new Error(
                    'API 載入逾時。請確認效能修正版後端已重新部署。'
                  )
                );
              },
              30000
            );

          function cleanup() {
            clearTimeout(timer);

            if (script.parentNode) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (result) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();
              resolve(result);
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params || {}
          ).forEach(
            function (key) {
              url +=
                '&' +
                encodeURIComponent(
                  key
                ) +
                '=' +
                encodeURIComponent(
                  params[key]
                );
            }
          );

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗'
                )
              );
            };

          script.src = url;
          document.body.appendChild(
            script
          );
        }
      );
    }

      if (TEST_MODE) {

    async function saveProperty(propertyId) {
      const values = {
        property_id:
          propertyId,
        property_name:
          inputValue('propertyName'),
        city:
          inputValue('propertyCity'),
        district:
          inputValue('propertyDistrict'),
        property_address:
          inputValue('propertyAddress'),
        property_type:
          inputValue('propertyType'),
        payment_account_id:
          inputValue('propertyPaymentAccount'),
        note:
          inputValue('propertyNote')
      };

      if (
        !values.property_name ||
        !values.city ||
        !values.district ||
        !values.property_address
      ) {
        showToast(
          '請完整填寫物件名稱與地址。',
          true
        );
        return;
      }

      const button =
        document.getElementById(
          'propertySubmit'
        );

      button.disabled = true;
      button.textContent =
        '儲存中...';

      try {
        const result =
          await jsonpRequest(
            'landlord_property_save',
            values
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '物件儲存失敗'
          );
        }

        closeEditor();
        showToast(
          result.message ||
          '物件已儲存'
        );

        await loadPage(false);

      } catch (error) {
        showToast(
          error.message ||
          '物件儲存失敗',
          true
        );

        button.disabled = false;
        button.textContent =
          '儲存物件';
      }
    }

          )}
          ${numberField(
            'roomPaymentDay',
            '每月繳款日',
            room
              ? room.payment_day
              : roomDefaults.default_payment_day,
            '1',
            '1',
            '28'
          )}
          ${numberField(
            'roomDepositAmount',
            '押金金額',
            room
              ? room.deposit_amount
              : '',
            '0',
            '1'
          )}
        </div>

        <div class="modal-note">
          設備耗損費依帳單月份自動套用：${safeHtml(
            roomDefaults.summer_months_label ||
            '6–9 月'
          )}使用夏月費率，其餘月份使用一般費率。新增房間的押金預設為 ${safeHtml(
            roomDefaults.default_deposit_months
          )} 個月租金，可直接修改金額。
        </div>

        <div class="field">
          <div class="field-label">
            <span>目前狀態</span>
            <span class="required">必填</span>
          </div>

          <select
            id="roomStatus"
            class="select"
            ${room && room.has_active_contract ? 'disabled' : ''}
          >
            ${roomStatusOptions(
              room
                ? room.effective_status
                : 'vacant',
              room &&
              room.has_active_contract
            )}
          </select>
        </div>

        ${
          room &&
          room.has_active_contract
            ? `
              <div class="modal-note">
                此房間有有效租約，狀態由租約控制為「已出租」。
              </div>
            `
            : ''
        }

        <div class="field">
          <div class="field-label">
            <span>備註</span>
            <span class="optional">選填</span>
          </div>

          <textarea
            id="roomNote"
            class="textarea"
            maxlength="500"
          >${safeHtml(room ? room.note : '')}</textarea>
        </div>

        <div class="modal-actions">
          <button class="modal-cancel" type="button" onclick="closeEditor()">取消</button>
          <button
            id="roomSubmit"
            class="modal-submit"
            type="button"
            onclick="saveRoom('${safeHtml(roomId)}')"
          >
            儲存房間
          </button>
        </div>
      `;

      document.getElementById(
        'editorModal'
      ).classList.add(
        'show'
      );
    }

    function numberField(id, label, value, min, step, max) {
      return `
        <div class="field">
          <div class="field-label">
            <span>${safeHtml(label)}</span>
            <span class="required">必填</span>
          </div>

          <input
            id="${safeHtml(id)}"
            class="input"
            type="number"
            min="${safeHtml(min)}"
            step="${safeHtml(step)}"
            ${max ? 'max="' + safeHtml(max) + '"' : ''}
            value="${safeHtml(value)}"
          />
        </div>
      `;
    }

    async function saveRoom(roomId) {
      const room =
        roomId
          ? getRoom(roomId)
          : null;

      const values = {
        room_id:
          roomId,
        property_id:
          inputValue('roomPropertyId'),
        room_name:
          inputValue('roomName'),
        rent_amount:
          inputValue('roomRent'),
        management_fee:
          inputValue('roomManagementFee'),
        electricity_fee_rate:
          inputValue('roomElectricityRate'),
        equipment_fee_rate:
          '',
        equipment_fee_rate_summer:
          inputValue(
            'roomEquipmentSummerRate'
          ),
        equipment_fee_rate_regular:
          inputValue(
            'roomEquipmentRegularRate'
          ),
        payment_day:
          inputValue('roomPaymentDay'),
        deposit_months:
          '',
        deposit_amount:
          inputValue('roomDepositAmount'),
        room_status:
          room &&
          room.has_active_contract
            ? 'vacant'
            : inputValue('roomStatus'),
        note:
          inputValue('roomNote')
      };

      if (
        !values.property_id ||
        !values.room_name ||
        Number(values.rent_amount) <= 0
      ) {
        showToast(
          '請完整填寫物件、房號與租金。',
          true
        );
        return;
      }

      const button =
        document.getElementById(
          'roomSubmit'
        );

      button.disabled = true;
      button.textContent =
        '儲存中...';

      try {
        const result =
          await jsonpRequest(
            'landlord_room_save',
            values
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '房間儲存失敗'
          );
        }

        closeEditor();
        showToast(
          result.message ||
          '房間已儲存'
        );

        await loadPage(false);

      } catch (error) {
        showToast(
          error.message ||
          '房間儲存失敗',
          true
        );

        button.disabled = false;
        button.textContent =
          '儲存房間';
      }
    }

    function openArchiveEditor(type, id, name) {
      document.getElementById(
        'editorSheet'
      ).innerHTML = `
        <div class="modal-head">
          <div>
            <div class="modal-title">
              封存${type === 'property' ? '物件' : '房間'}
            </div>

            <div class="modal-desc">
              ${safeHtml(name)}
            </div>
          </div>

          <button class="close-button" type="button" onclick="closeEditor()">×</button>
        </div>

        <div class="modal-note">
          封存會保留歷史帳單、付款、租約與操作紀錄，不會直接刪除資料。
        </div>

        <div class="field">
          <div class="field-label">
            <span>封存原因</span>
            <span class="required">必填</span>
          </div>

          <textarea
            id="archiveReason"
            class="textarea"
            maxlength="300"
          ></textarea>
        </div>

        <div class="modal-actions">
          <button class="modal-cancel" type="button" onclick="closeEditor()">取消</button>
          <button
            id="archiveSubmit"
            class="modal-submit danger"
            type="button"
            onclick="submitArchive('${safeHtml(type)}','${safeHtml(id)}')"
          >
            確認封存
          </button>
        </div>
      `;

      document.getElementById(
        'editorModal'
      ).classList.add(
        'show'
      );
    }

    async function submitArchive(type, id) {
      const reason =
        inputValue(
          'archiveReason'
        );

      if (!reason) {
        showToast(
          '請輸入封存原因。',
          true
        );
        return;
      }

      const button =
        document.getElementById(
          'archiveSubmit'
        );

      button.disabled = true;
      button.textContent =
        '處理中...';

      try {
        const action =
          type === 'property'
            ? 'landlord_property_archive'
            : 'landlord_room_archive';

        const params =
          type === 'property'
            ? {
                property_id:
                  id,
                archive_reason:
                  reason
              }
            : {
                room_id:
                  id,
                archive_reason:
                  reason
              };

        const result =
          await jsonpRequest(
            action,
            params
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '封存失敗'
          );
        }

        closeEditor();
        showToast(
          result.message ||
          '已封存'
        );

        await loadPage(false);

      } catch (error) {
        showToast(
          error.message ||
          '封存失敗',
          true
        );

        button.disabled = false;
        button.textContent =
          '確認封存';
      }
    }

    function renderLoading() {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">物件資料載入中</div>
          正在讀取目前管理團隊的物件與房間。
        </section>
      `;
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">物件資料載入失敗</div>

          ${safeHtml(
            message ||
            '未知錯誤'
          )}

          <button
            class="action-button primary"
            type="button"
            onclick="loadPage()"
            style="width:100%;margin-top:15px;"
          >
            重新整理
          </button>
        </section>
      `;
    }

    async function loadPage(showLoading) {
      if (
        showLoading !==
        false
      ) {
        renderLoading();
      }

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLine();

          if (!ready) {
            return;
          }
        }

        const result =
          await jsonpRequest(
            'landlord_properties_init',
            {
              include_archived:
                '1'
            }
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '物件資料載入失敗'
          );
        }

        PAGE_DATA =
          result.data || {};

        renderPage();

      } catch (error) {
        renderError(
          error &&
          error.message
            ? error.message
            : String(error)
        );
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
