<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 房客首頁</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 66px;

      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #edf9f2;

      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;

      --blue: #1a73e8;
      --blue-soft: #edf4ff;

      --orange: #ef8f00;
      --orange-soft: #fff5df;

      --purple: #7654c4;
      --purple-soft: #f3efff;

      --danger: #d93025;
      --danger-soft: #fff0ef;

      --shadow: 0 6px 22px rgba(25, 35, 55, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background: var(--page-bg);
    }

    .page {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        17px
        15px
        calc(
          var(--nav-height) +
          28px +
          env(safe-area-inset-bottom)
        );
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 17px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero-card {
      overflow: hidden;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #0abb59 0%,
          #06c755 56%,
          #05a947 100%
        );
      box-shadow: 0 9px 26px rgba(6, 199, 85, 0.22);
    }

    .hero-main {
      position: relative;
      padding: 20px;
    }

    .hero-main::after {
      position: absolute;
      top: -58px;
      right: -44px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      content: "";
    }

    .hero-top {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .eyebrow {
      margin-bottom: 5px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 11px;
      font-weight: 800;
    }

    .hero-name {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.45px;
    }

    .hero-room {
      margin-top: 7px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      line-height: 1.55;
    }

    .refresh-button {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
      cursor: pointer;
      backdrop-filter: blur(7px);
    }

    .refresh-button svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .refresh-button.loading svg {
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .hero-stats {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 17px;
    }

    .hero-stat {
      min-width: 0;
      padding: 12px 13px;
      border: 1px solid rgba(255, 255, 255, 0.23);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.13);
    }

    .hero-stat-label {
      margin-bottom: 4px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 10px;
      font-weight: 800;
    }

    .hero-stat-value {
      overflow: hidden;
      font-size: 16px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hero-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 20px;
      background: rgba(0, 0, 0, 0.08);
      color: rgba(255, 255, 255, 0.9);
      font-size: 10px;
    }

    .section-card {
      padding: 17px;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 900;
    }

    .section-hint {
      color: var(--muted);
      font-size: 11px;
    }

    .status-badge {
      display: inline-flex;
      min-height: 24px;
      padding: 4px 9px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-green {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .status-orange {
      background: var(--orange-soft);
      color: #a96700;
    }

    .status-blue {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .status-purple {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .status-red {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .status-gray {
      background: #f0f2f4;
      color: #666c75;
    }

    .bill-hero {
      padding: 15px;
      border-radius: 15px;
      background: var(--primary-soft);
    }

    .bill-hero.unpaid {
      background: var(--danger-soft);
    }

    .bill-label {
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .bill-amount {
      color: var(--primary-dark);
      font-size: 29px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .bill-hero.unpaid .bill-amount {
      color: var(--danger);
    }

    .bill-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      color: #69717b;
      font-size: 11px;
      line-height: 1.45;
    }

    .bill-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 12px;
    }

    .info-box {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #fbfcfd;
    }

    .info-label {
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .info-value {
      overflow: hidden;
      font-size: 13px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 12px;
    }

    .primary-button,
    .secondary-button {
      min-height: 44px;
      padding: 11px 13px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary-button {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .secondary-button {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .primary-button:active,
    .secondary-button:active {
      opacity: 0.7;
    }

    .contract-hero {
      overflow: hidden;
      padding: 16px;
      border-radius: 15px;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #7654c4 0%,
          #6744b8 65%,
          #5835a8 100%
        );
    }

    .contract-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .contract-room {
      font-size: 19px;
      font-weight: 900;
    }

    .contract-sub {
      margin-top: 5px;
      color: rgba(255, 255, 255, 0.84);
      font-size: 11px;
      line-height: 1.5;
    }

    .days-box {
      min-width: 77px;
      padding: 9px 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.16);
      text-align: center;
    }

    .days-value {
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }

    .days-label {
      margin-top: 5px;
      color: rgba(255, 255, 255, 0.84);
      font-size: 10px;
    }

    .contract-progress {
      height: 8px;
      overflow: hidden;
      margin-top: 15px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
    }

    .contract-progress-fill {
      height: 100%;
      border-radius: inherit;
      background: #ffffff;
    }

    .contract-dates {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 7px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 10px;
    }

    .contract-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 12px;
    }

    .contract-summary-box {
      min-width: 0;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fbfcfd;
    }

    .contract-summary-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 10px;
    }

    .contract-summary-value {
      overflow: hidden;
      font-size: 12px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .request-banner {
      margin-top: 12px;
      padding: 12px 13px;
      border: 1px solid #eadffd;
      border-radius: 12px;
      background: var(--purple-soft);
    }

    .request-banner.pending {
      border-color: #f1dfb2;
      background: var(--orange-soft);
    }

    .request-banner.completed {
      border-color: #d5eadc;
      background: var(--primary-soft);
    }

    .request-banner-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .request-banner-desc {
      margin-top: 6px;
      color: #646a74;
      font-size: 11px;
      line-height: 1.55;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .quick-button {
      min-height: 103px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: #ffffff;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .quick-button:active {
      opacity: 0.68;
    }

    .quick-icon {
      width: 37px;
      height: 37px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .quick-icon.blue {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .quick-icon.purple {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .quick-icon.orange {
      background: var(--orange-soft);
      color: var(--orange);
    }

    .quick-icon svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .quick-title {
      font-size: 14px;
      font-weight: 900;
    }

    .quick-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.45;
    }

    .empty-state {
      padding: 19px 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
      text-align: center;
    }

    .loading-card,
    .error-card {
      padding: 30px 18px;
      text-align: center;
    }

    .loading-spinner {
      width: 30px;
      height: 30px;
      margin: 0 auto 13px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .loading-text,
    .error-text {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .error-title {
      margin-bottom: 8px;
      color: var(--danger);
      font-size: 17px;
      font-weight: 900;
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b9098;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    .toast {
      position: absolute;
      z-index: 3000;
      right: 18px;
      bottom: calc(var(--nav-height) + 22px + env(safe-area-inset-bottom));
      left: 18px;
      display: none;
      padding: 13px 15px;
      border-radius: 13px;
      background: rgba(25, 28, 33, 0.94);
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 390px) {
      .hero-stats,
      .bill-grid,
      .contract-summary-grid,
      .quick-grid,
      .button-row {
        grid-template-columns: 1fr;
      }

      .page {
        padding-right: 13px;
        padding-left: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-text">房客首頁載入中...</div>
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item active" type="button" onclick="goPage('tenant-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('tenant-bills.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>帳單</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('tenant-contract.html')">
          <svg viewBox="0 0 24 24">
            <path d="M6 3.5h9l3 3V20H6z"></path>
            <path d="M15 3.5V7h3"></path>
            <path d="M9 11h6"></path>
            <path d="M9 15h6"></path>
          </svg>
          <span>合約</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('tenant-message.html')">
          <svg viewBox="0 0 24 24">
            <path d="M5 5.5h14v10H9l-4 3.5z"></path>
            <path d="M8.5 9.5h7"></path>
            <path d="M8.5 12.5h5"></path>
          </svg>
          <span>聯絡</span>
        </button>
      </div>
    </nav>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-iJB1D6sN';

    const TEST_LINE_USER_ID =
      'U3615a7ed919c1a4a438a246c10784d70';

    const URL_PARAMS =
      new URLSearchParams(location.search);

    const TEST_MODE =
      URL_PARAMS.get('test') === '1';

    let LINE_USER_ID = '';
    let toastTimer = null;

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      if (
        value === undefined ||
        value === null
      ) {
        return '';
      }

      return String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function numberValue(value) {
      return Number(value || 0) || 0;
    }

    function money(value) {
      return (
        'NT$ ' +
        Math.round(
          numberValue(value)
        ).toLocaleString('zh-TW')
      );
    }

    function normalizeStatus(value) {
      return rawText(value)
        .trim()
        .toLowerCase();
    }

    function spreadsheetSerialDate(value) {
      const number =
        Number(value);

      if (
        !Number.isFinite(number) ||
        number < 20000 ||
        number > 90000
      ) {
        return null;
      }

      const milliseconds =
        Date.UTC(1899, 11, 30) +
        Math.round(number) * 86400000;

      return new Date(milliseconds);
    }

    function taipeiDateParts(date) {
      if (
        !(date instanceof Date) ||
        Number.isNaN(date.getTime())
      ) {
        return null;
      }

      const parts =
        new Intl.DateTimeFormat(
          'en-CA',
          {
            timeZone: 'Asia/Taipei',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
          }
        ).formatToParts(date);

      const result = {};

      parts.forEach(function (part) {
        result[part.type] =
          part.value;
      });

      return {
        year:
          result.year || '',
        month:
          result.month || '',
        day:
          result.day || ''
      };
    }

    function dateValue(value) {
      if (
        value instanceof Date
      ) {
        return Number.isNaN(
          value.getTime()
        )
          ? null
          : value;
      }

      const serialDate =
        spreadsheetSerialDate(value);

      if (serialDate) {
        return serialDate;
      }

      const text =
        rawText(value).trim();

      if (!text) {
        return null;
      }

      const exactDate =
        text.match(
          /^(\d{4})-(\d{2})-(\d{2})$/
        );

      if (exactDate) {
        return new Date(
          Number(exactDate[1]),
          Number(exactDate[2]) - 1,
          Number(exactDate[3]),
          0,
          0,
          0,
          0
        );
      }

      const date =
        new Date(text);

      if (
        Number.isNaN(
          date.getTime()
        )
      ) {
        return null;
      }

      return date;
    }

    function formatDate(value) {
      const date =
        dateValue(value);

      if (!date) {
        const text =
          rawText(value).trim();

        return text || '-';
      }

      const parts =
        taipeiDateParts(date);

      if (!parts) {
        return '-';
      }

      return (
        parts.year +
        '-' +
        parts.month +
        '-' +
        parts.day
      );
    }

    function formatBillMonth(value) {
      const text =
        rawText(value).trim();

      if (!text) {
        return '-';
      }

      const monthOnly =
        text.match(
          /^(\d{4})[-/](\d{1,2})$/
        );

      if (monthOnly) {
        return (
          monthOnly[1] +
          '-' +
          String(
            Number(monthOnly[2])
          ).padStart(2, '0')
        );
      }

      const compact =
        text.match(
          /^(\d{4})(\d{2})$/
        );

      if (compact) {
        return (
          compact[1] +
          '-' +
          compact[2]
        );
      }

      const date =
        dateValue(value);

      if (!date) {
        return text;
      }

      const parts =
        taipeiDateParts(date);

      return parts
        ? (
            parts.year +
            '-' +
            parts.month
          )
        : text;
    }

    function daysBetween(
      start,
      end
    ) {
      const startDate =
        dateValue(start);

      const endDate =
        dateValue(end);

      if (
        !startDate ||
        !endDate
      ) {
        return 0;
      }

      return Math.ceil(
        (
          endDate.getTime() -
          startDate.getTime()
        ) /
        86400000
      );
    }

    function clamp(
      value,
      min,
      max
    ) {
      return Math.min(
        Math.max(value, min),
        max
      );
    }

    function goPage(page) {
      const separator =

    function showToast(message) {

    function jsonpRequest(
      action,
      params
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_tenant_home_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() * 1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;

          const timer =
            setTimeout(function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 載入逾時'
                )
              );
            }, 30000);

          function cleanup() {
            clearTimeout(timer);

            if (script.parentNode) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (result) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();
              resolve(result);
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(action) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params || {}
          ).forEach(
            function (key) {
              const value =
                params[key];

              if (
                value === undefined ||
                value === null
              ) {
                return;
              }

              url +=
                '&' +
                encodeURIComponent(key) +
                '=' +
                encodeURIComponent(value);
            }
          );

          script.charset = 'UTF-8';

          script.onerror =
            function () {
              console.warn(
                'JSONP script onerror ignored.'
              );
            };

          script.src = url;

          document.body.appendChild(
            script
          );
        }
      );
    }

    async function initLineUserId() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      if (
        typeof liff ===
        'undefined'
      ) {
        throw new Error(
          'LIFF SDK 載入失敗'
        );
      }

      await liff.init({
        liffId: LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            location.href
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId || '';

      if (!LINE_USER_ID) {
        throw new Error(
          '無法取得房客 LINE User ID'
        );
      }

      return true;
    }

    function unwrapData(result) {
      if (
        result &&
        result.success === true
      ) {
        return (
          result.data !== undefined
            ? result.data
            : result
        );
      }

      throw new Error(
        result && result.message
          ? result.message
          : '查詢失敗'
      );
    }

    function paymentStatusText(value) {
      const status =
        normalizeStatus(value);

      if (status === 'paid') {
        return '已繳清';
      }

      if (status === 'unpaid') {
        return '尚未繳費';
      }

      if (status === 'overdue') {
        return '已逾期';
      }

      return (
        rawText(value) ||
        '待確認'
      );
    }

    function paymentBadgeClass(value) {
      const status =
        normalizeStatus(value);

      if (status === 'paid') {
        return 'status-badge status-green';
      }

      if (
        status === 'unpaid' ||
        status === 'overdue'
      ) {
        return 'status-badge status-red';
      }

      return 'status-badge status-gray';
    }

    function requestStatusText(value) {
      const status =
        normalizeStatus(value);

      const labels = {
        pending: '待房東審核',
        approved: '已核准・待完成',
        completed: '已完成',
        rejected: '已駁回',
        cancelled: '已取消'
      };

      return (
        labels[status] ||
        rawText(value) ||
        '-'
      );
    }

    function requestTypeText(item) {
      const type =
        normalizeStatus(
          item.request_type
        );

      if (type === 'renewal') {
        return '續約申請';
      }

      if (type === 'termination') {
        return (
          normalizeStatus(
            item.termination_type
          ) === 'early_termination'
            ? '提前解約'
            : '到期不續約'
        );
      }

      return (
        rawText(
          item.request_type_label
        ) ||
        '合約申請'
      );
    }

    function getLatestActiveRequest(
      requests
    ) {
      return (
        (requests || [])
          .filter(function (item) {
            const status =
              normalizeStatus(
                item.status
              );

            return (
              status === 'pending' ||
              status === 'approved'
            );
          })
          .sort(function (a, b) {
            const aTime =
              dateValue(
                a.updated_at ||
                a.created_at
              );

            const bTime =
              dateValue(
                b.updated_at ||
                b.created_at
              );

            return (
              (
                bTime
                  ? bTime.getTime()
                  : 0
              ) -
              (
                aTime
                  ? aTime.getTime()
                  : 0
              )
            );
          })[0] ||
        null
      );
    }

    function contractProgress(
      contract
    ) {
      const start =
        dateValue(
          contract.start_date
        );

      const end =
        dateValue(
          contract.end_date
        );

      const now =
        new Date();

      if (!start || !end) {
        return 0;
      }

      const total =
        end.getTime() -
        start.getTime();

      const elapsed =
        now.getTime() -
        start.getTime();

      if (total <= 0) {
        return 100;
      }

      return clamp(
        (elapsed / total) * 100,
        0,
        100
      );
    }

    function requestBannerHtml(
      request
    ) {
      if (!request) {
        return '';
      }

      const status =
        normalizeStatus(
          request.status
        );

      const className =
        status === 'pending'
          ? 'request-banner pending'
          : (
              status === 'completed'
                ? 'request-banner completed'
                : 'request-banner'
            );

      const description =
        status === 'pending'
          ? '申請已送出，房東尚未完成審核。'
          : (
              status === 'approved'
                ? '房東已核准條件，等待完成正式合約或退租程序。'
                : '可進入我的合約查看完整處理結果。'
            );

      return `
        <div class="${className}">
          <div class="request-banner-title">
            <span>
              ${safeHtml(
                requestTypeText(request)
              )}
            </span>

            <span class="${
              status === 'pending'
                ? 'status-badge status-orange'
                : 'status-badge status-purple'
            }">
              ${safeHtml(
                requestStatusText(status)
              )}
            </span>
          </div>

          <div class="request-banner-desc">
            ${safeHtml(description)}
          </div>
        </div>
      `;
    }

        'app'

              message || '未知錯誤'

            class="primary-button"

    function setRefreshLoading(
      loading
    ) {
      const button =
        document.getElementById(
          'refreshButton'
        );

      if (!button) {
        return;
      }

      button.classList.toggle(
        'loading',
        Boolean(loading)
      );
    }

    async function loadPage() {
      setRefreshLoading(true);

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLineUserId();

          if (!ready) {
            return;
          }
        }

        const results =
          await Promise.allSettled([
            jsonpRequest(
              'tenant_home',
              {}
            ),
            jsonpRequest(
              'tenant_contract_init',
              {}
            )
          ]);

        if (
          results[0].status !==
          'fulfilled'
        ) {
          throw results[0].reason;
        }

        const home =
          unwrapData(
            results[0].value
          );

        let contractData = {
          contract: null,
          requests: [],
          permissions: {}
        };

        if (
          results[1].status ===
          'fulfilled'
        ) {
          try {
            contractData =
              unwrapData(
                results[1].value
              );
          } catch (error) {
            console.warn(
              '合約資料讀取失敗：',
              error
            );
          }
        }

        renderPage(
          home,
          contractData
        );
      } catch (error) {
        renderError(
          error && error.message
            ? error.message
            : String(error)
        );
      } finally {
        setRefreshLoading(false);
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    window.addEventListener(
      'orientationchange',
      function () {
        setTimeout(
          setAppHeight,
          250
        );
      }
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
