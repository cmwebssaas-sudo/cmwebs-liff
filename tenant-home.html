<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMWebs 房客首頁</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .sub {
      color: #666;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 15px;
    }

    .row:last-child {
      border-bottom: none;
    }

    .label {
      color: #666;
    }

    .value {
      font-weight: 700;
      text-align: right;
      word-break: break-word;
    }

    .amount {
      font-size: 30px;
      font-weight: 800;
      color: #d93025;
      margin: 12px 0;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .btn-green {
      background: #06c755;
      color: white;
    }

    .btn-dark {
      background: #222;
      color: white;
    }

    .btn-light {
      background: #f1f3f4;
      color: #222;
    }

    .loading,
    .error,
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .error-title {
      color: #d93025;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }

.quick-actions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 12px;
}

.quick-action {
  appearance: none;
  -webkit-appearance: none;
  border: 1px solid #edf0f4;
  background: #fff;
  border-radius: 14px;
  padding: 14px 10px;
  text-align: left;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
}

.quick-action:active {
  opacity: 0.7;
}

.quick-icon {
  width: 34px;
  height: 34px;
  border-radius: 999px;
  background: #e8f7ee;
  color: #06c755;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
}

.quick-icon svg {
  width: 21px;
  height: 21px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.quick-title {
  font-size: 15px;
  font-weight: 800;
  color: #222;
  margin-bottom: 4px;
}

.quick-desc {
  font-size: 12px;
  color: #777;
  line-height: 1.5;
}


    
    .bill-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .status-paid {
      color: #188038;
      font-weight: 800;
    }

    .status-unpaid {
      color: #d93025;
      font-weight: 800;
    }

    .small {
      font-size: 13px;
      color: #888;
      margin-top: 8px;
      line-height: 1.5;
    }

    .debug {
      margin-top: 12px;
      padding: 10px;
      background: #f1f3f4;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      word-break: break-all;
      display: none;
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="app" class="loading">資料載入中...</div>
  </div>

  <script>
    // =========================================================
    // 1. 基本設定
    // =========================================================

    // Apps Script Web App URL，結尾必須是 /exec
   const API_URL = 'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    // 房客首頁 LIFF ID
    const LIFF_ID = '2010314940-iJB1D6sN';

    // 測試用 LINE UID：非 LINE LIFF 環境時使用
    // 目前這個是「測試人員 / 603」
    const TEST_LINE_USER_ID = 'U3615a7ed919c1a4a438a246c10784d70';

    let LINE_USER_ID = '';
    let HOME_DATA = null;
    let BILL_LIST = [];

    const app = document.getElementById('app');

    // =========================================================
    // 2. 工具函式
    // =========================================================

    function safeText(v) {
      if (v === undefined || v === null || v === '') return '-';
      return String(v);
    }

    function money(n) {
      const num = Number(n || 0);
      return 'NT$ ' + Math.round(num).toLocaleString('zh-TW');
    }

    function num(n) {
      const value = Number(n || 0);
      return Math.round(value).toLocaleString('zh-TW');
    }

    function statusText(status) {
      if (status === 'paid') return '已繳';
      if (status === 'unpaid') return '未繳';
      if (status === 'issued') return '已建立';
      if (status === 'not_sent') return '未發送';
      return safeText(status);
    }

    function statusClass(status) {
      if (status === 'paid') return 'status-paid';
      if (status === 'unpaid') return 'status-unpaid';
      return '';
    }

    function setLoading(text) {
      app.className = 'loading';
      app.innerHTML = safeText(text);
    }

    function showError(message, detail) {
      app.className = '';
      app.innerHTML = `
        <div class="card">
          <div class="error-title">資料讀取失敗</div>
          <div>${safeText(message)}</div>
          ${detail ? `<div class="small">${safeText(detail)}</div>` : ''}
          <button class="btn btn-dark" onclick="initPage()">重新整理</button>
          <div class="debug" id="debugBox"></div>
        </div>
      `;
    }

    <div class="card">
  <div class="section-title">常用功能</div>

  <div class="quick-actions">
    <button class="quick-action" onclick="goPaymentReport()">
      <div class="quick-icon">
        <svg viewBox="0 0 24 24">
          <path d="M6 4.5h12v15H6z"></path>
          <path d="M8.5 8.5h7"></path>
          <path d="M8.5 12h7"></path>
          <path d="M8.5 15.5h4"></path>
        </svg>
      </div>
      <div class="quick-title">回報付款</div>
      <div class="quick-desc">選擇帳單並填寫匯款後 5 碼</div>
    </button>

    <button class="quick-action" onclick="location.href='tenant-bills.html?v=' + Date.now()">
      <div class="quick-icon">
        <svg viewBox="0 0 24 24">
          <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
          <path d="M8.5 9h7"></path>
          <path d="M8.5 13h7"></path>
          <path d="M8.5 17h4"></path>
        </svg>
      </div>
      <div class="quick-title">查帳單</div>
      <div class="quick-desc">查看租金、電費與繳款狀態</div>
    </button>
  </div>
</div>
    // =========================================================
    // 3. JSONP API，重點：不用 fetch()
    // =========================================================

    function callApi(action) {
  return new Promise((resolve, reject) => {
    if (!LINE_USER_ID) {
      reject(new Error('缺少 LINE User ID'));
      return;
    }

    const callbackName =
      'cmwebsCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

    const script = document.createElement('script');

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('API 載入逾時'));
    }, 15000);

    function cleanup() {
      clearTimeout(timer);
      if (script.parentNode) {
        script.parentNode.removeChild(script);
      }
      try {
        delete window[callbackName];
      } catch (e) {
        window[callbackName] = undefined;
      }
    }

    window[callbackName] = function (json) {
      cleanup();

      if (!json || json.success !== true) {
        reject(new Error((json && json.message) ? json.message : '查詢失敗'));
        return;
      }

      resolve(json.data);
    };

    script.onerror = function () {
      cleanup();
      reject(new Error('API 載入失敗'));
    };

    script.src =
      API_URL +
      '?v2_action=' + encodeURIComponent(action) +
      '&line_user_id=' + encodeURIComponent(LINE_USER_ID) +
      '&callback=' + encodeURIComponent(callbackName) +
      '&_=' + Date.now();

    document.body.appendChild(script);
  });
}

    // =========================================================
    // 4. 取得 LINE User ID
    // =========================================================

    async function initLineUserId() {
      // 非 LINE 瀏覽器測試時，直接用測試 UID
      if (typeof liff === 'undefined') {
        LINE_USER_ID = TEST_LINE_USER_ID;
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        LINE_USER_ID = profile.userId || TEST_LINE_USER_ID;
      } catch (error) {
        // 如果 LIFF 初始化失敗，先用測試 UID，方便你在瀏覽器測試
        LINE_USER_ID = TEST_LINE_USER_ID;
      }
    }

    // =========================================================
    // 5. 畫面渲染
    // =========================================================

    function renderHome() {
      const home = HOME_DATA || {};
      const bills = Array.isArray(BILL_LIST) ? BILL_LIST : [];

      const tenantName = safeText(home.tenant_name);
      const roomList = safeText(home.room_list);
      const accountStatus = safeText(home.account_status);
      const latestBillMonth = safeText(home.latest_bill_month);
      const latestDueDate = safeText(home.latest_due_date).slice(0, 10);
      const unpaidTotal = Number(home.unpaid_total_amount || 0);
      const unpaidCount = Number(home.unpaid_bill_count || 0);
      const latestPaymentStatus = safeText(home.latest_payment_status);

      app.className = '';
      app.innerHTML = `
        <div class="card">
          <div class="title">您好，${tenantName}</div>
          <div class="sub">房號：${roomList}</div>

          <div class="row">
            <div class="label">帳號狀態</div>
            <div class="value">${accountStatus}</div>
          </div>

          <div class="row">
            <div class="label">最新帳單月份</div>
            <div class="value">${latestBillMonth}</div>
          </div>

          <div class="row">
            <div class="label">繳款期限</div>
            <div class="value">${latestDueDate}</div>
          </div>
        </div>

        <div class="card">
          <div class="sub">目前未繳總額</div>
          <div class="amount">${money(unpaidTotal)}</div>

          <div class="row">
            <div class="label">未繳帳單數</div>
            <div class="value">${unpaidCount}</div>
          </div>

          <div class="row">
            <div class="label">最新付款狀態</div>
            <div class="value ${statusClass(latestPaymentStatus)}">${statusText(latestPaymentStatus)}</div>
          </div>
        </div>

        <button class="btn btn-green" onclick="scrollToBills()">查看帳單明細</button>
        <button class="btn btn-dark" onclick="initPage()">重新整理</button>

        <div id="billSection">
          ${renderBills(bills)}
        </div>

        <div class="small">
          更新時間：${safeText(home.updated_at)}
        </div>
      `;
    }

    function renderBills(bills) {
      if (!Array.isArray(bills) || bills.length === 0) {
        return `
          <div class="card empty">
            目前沒有帳單資料
          </div>
        `;
      }

      return bills.map((bill) => {
        const paymentStatus = safeText(bill.payment_status);

        return `
          <div class="card">
            <div class="bill-title">${safeText(bill.bill_month)} 帳單</div>
            <div class="sub">房號：${safeText(bill.room_name)}｜帳單ID：${safeText(bill.bill_id)}</div>

            <div class="row">
              <div class="label">繳款期限</div>
              <div class="value">${safeText(bill.due_date).slice(0, 10)}</div>
            </div>

            <div class="row">
              <div class="label">租金</div>
              <div class="value">${money(bill.rent_amount)}</div>
            </div>

            <div class="row">
              <div class="label">管理費</div>
              <div class="value">${money(bill.management_fee)}</div>
            </div>

            <div class="row">
              <div class="label">上期電表度數</div>
              <div class="value">${safeText(bill.previous_meter)}</div>
            </div>

            <div class="row">
              <div class="label">本期電表度數</div>
              <div class="value">${safeText(bill.current_meter_reading)}</div>
            </div>

            <div class="row">
              <div class="label">本月用電</div>
              <div class="value">${safeText(bill.electricity_usage)} 度</div>
            </div>

            <div class="row">
              <div class="label">每度電費</div>
              <div class="value">${safeText(bill.electricity_fee_rate)}</div>
            </div>

            <div class="row">
              <div class="label">每度設備耗損費</div>
              <div class="value">${safeText(bill.equipment_fee_rate)}</div>
            </div>

            <div class="row">
              <div class="label">本月電費</div>
              <div class="value">${money(bill.electricity_amount)}</div>
            </div>

            <div class="row">
              <div class="label">本月設備耗損費</div>
              <div class="value">${money(bill.equipment_amount)}</div>
            </div>

            <div class="row">
              <div class="label">其他費用</div>
              <div class="value">${money(bill.other_amount)}</div>
            </div>

            <div class="row">
              <div class="label">折扣</div>
              <div class="value">${money(bill.discount_amount)}</div>
            </div>

            <div class="row">
              <div class="label">應繳總額</div>
              <div class="value">${money(bill.total_amount)}</div>
            </div>

            <div class="row">
              <div class="label">帳單狀態</div>
              <div class="value">${statusText(bill.bill_status)}</div>
            </div>

            <div class="row">
              <div class="label">付款狀態</div>
              <div class="value ${statusClass(paymentStatus)}">${statusText(paymentStatus)}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function scrollToBills() {
      const el = document.getElementById('billSection');
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // =========================================================
    // 6. 初始化頁面
    // =========================================================

    async function initPage() {
      try {
        setLoading('資料載入中...');

        await initLineUserId();

        if (!LINE_USER_ID) {
          throw new Error('無法取得 LINE User ID');
        }

        const home = await callApi('tenant_home');
        const bills = await callApi('tenant_bills');

        HOME_DATA = home || {};
        BILL_LIST = Array.isArray(bills) ? bills : [];

        renderHome();
      } catch (error) {
        showError(error.message || 'Load failed');
      }
    }

    initPage();

    function goPaymentReport() {
  location.href = 'tenant-payment-report.html?v=' + Date.now();
}
    
  </script>
</body>
</html>
