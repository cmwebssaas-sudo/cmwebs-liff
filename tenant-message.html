<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 聯絡房東</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 66px;
      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #edf9f2;
      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --surface-soft: #fbfcfd;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;
      --blue: #1a73e8;
      --blue-soft: #edf4ff;
      --orange: #ef8f00;
      --orange-soft: #fff5df;
      --purple: #7654c4;
      --purple-soft: #f3efff;
      --danger: #d93025;
      --danger-soft: #fff0ef;
      --shadow: 0 6px 22px rgba(25, 35, 55, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background: var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        16px
        15px
        calc(var(--nav-height) + 28px + env(safe-area-inset-bottom));
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 17px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .header-card {
      padding: 19px;
      background:
        linear-gradient(
          145deg,
          rgba(6, 199, 85, 0.11),
          rgba(255, 255, 255, 0.99) 64%
        );
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .eyebrow {
      margin-bottom: 5px;
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 900;
    }

    .page-title {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.45px;
    }

    .page-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .refresh-button {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #626975;
      cursor: pointer;
    }

    .refresh-button svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .refresh-button.loading svg {
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .tenant-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 15px;
    }

    .info-box {
      min-width: 0;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.86);
    }

    .info-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 10px;
    }

    .info-value {
      overflow: hidden;
      font-size: 13px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .section-card {
      padding: 17px;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 900;
    }

    .section-hint {
      color: var(--muted);
      font-size: 11px;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .category-button,
    .priority-button {
      min-height: 42px;
      padding: 9px 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      color: #626975;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .category-button.active,
    .priority-button.active {
      border-color: rgba(6, 199, 85, 0.3);
      background: var(--primary-soft);
      color: var(--primary-dark);
      box-shadow: 0 0 0 2px rgba(6, 199, 85, 0.08);
    }

    .priority-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .priority-button.urgent.active {
      border-color: rgba(217, 48, 37, 0.25);
      background: var(--danger-soft);
      color: var(--danger);
      box-shadow: 0 0 0 2px rgba(217, 48, 37, 0.07);
    }

    .field {
      margin-top: 15px;
    }

    .field-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 900;
    }

    .required {
      color: var(--danger);
      font-size: 10px;
    }

    .input,
    .textarea,
    .select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 13px;
      outline: none;
      background: #ffffff;
      color: var(--text);
    }

    .input,
    .select {
      height: 46px;
      padding: 0 13px;
    }

    .textarea {
      min-height: 132px;
      padding: 12px 13px;
      resize: vertical;
      line-height: 1.65;
    }

    .input:focus,
    .textarea:focus,
    .select:focus {
      border-color: rgba(6, 199, 85, 0.55);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.1);
    }

    .field-help {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.5;
    }

    .submit-button {
      width: 100%;
      min-height: 48px;
      margin-top: 17px;
      border: 0;
      border-radius: 13px;
      background: var(--primary);
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .submit-button:disabled {
      cursor: default;
      opacity: 0.55;
    }

    .message-card {
      margin-top: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: var(--surface-soft);
    }

    .message-card:first-of-type {
      margin-top: 0;
    }

    .message-card.pending {
      border-color: #f0dfb9;
      background: var(--orange-soft);
    }

    .message-card.replied {
      border-color: #d9e5fb;
      background: var(--blue-soft);
    }

    .message-card.completed {
      border-color: #d4eadc;
      background: var(--primary-soft);
    }

    .message-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
    }

    .message-title {
      font-size: 14px;
      font-weight: 900;
      line-height: 1.45;
    }

    .message-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.5;
    }

    .badge {
      display: inline-flex;
      min-height: 23px;
      padding: 3px 8px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #f0f2f4;
      color: #666c75;
      font-size: 9px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.orange {
      background: #fff0cc;
      color: #a96700;
    }

    .badge.red {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.blue {
      background: #e7f0ff;
      color: var(--blue);
    }

    .badge.green {
      background: #e1f5e8;
      color: var(--primary-dark);
    }

    .message-body {
      padding: 11px 12px;
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.74);
      color: #4f5661;
      font-size: 11px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .reply-box {
      margin-top: 9px;
      padding: 11px 12px;
      border-left: 3px solid var(--blue);
      border-radius: 10px;
      background: #ffffff;
    }

    .reply-label {
      margin-bottom: 5px;
      color: var(--blue);
      font-size: 10px;
      font-weight: 900;
    }

    .reply-text {
      color: #4f5661;
      font-size: 11px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty-state,
    .loading-card,
    .error-card {
      padding: 29px 18px;
      text-align: center;
    }

    .empty-title,
    .error-title {
      margin-bottom: 8px;
      font-size: 17px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .empty-text,
    .loading-text,
    .error-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .loading-spinner {
      width: 30px;
      height: 30px;
      margin: 0 auto 13px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .primary-button,
    .secondary-button {
      min-height: 45px;
      padding: 11px 14px;
      border-radius: 13px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary-button {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .secondary-button {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b9098;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    .modal-backdrop {
      position: absolute;
      z-index: 1600;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding:
        18px
        16px
        calc(var(--nav-height) + 18px + env(safe-area-inset-bottom));
      background: rgba(17, 24, 39, 0.48);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 430px;
      padding: 18px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.2);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 900;
    }

    .modal-message {
      margin-top: 9px;
      color: #5e646e;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-line;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 16px;
    }

    .modal-actions.single {
      grid-template-columns: 1fr;
    }

    .modal-confirm,
    .modal-cancel {
      min-height: 44px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .modal-confirm {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .modal-cancel {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    @media (max-width: 390px) {
      .tenant-grid,
      .category-grid,
      .button-row,
      .modal-actions {
        grid-template-columns: 1fr;
      }

      .page {
        padding-right: 13px;
        padding-left: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-text">聯絡資料載入中...</div>
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('tenant-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('tenant-bills.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>帳單</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('tenant-contract.html')">
          <svg viewBox="0 0 24 24">
            <path d="M6 3.5h9l3 3V20H6z"></path>
            <path d="M15 3.5V7h3"></path>
            <path d="M9 11h6"></path>
            <path d="M9 15h6"></path>
          </svg>
          <span>合約</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('tenant-message.html')">
          <svg viewBox="0 0 24 24">
            <path d="M5 5.5h14v10H9l-4 3.5z"></path>
            <path d="M8.5 9.5h7"></path>
            <path d="M8.5 12.5h5"></path>
          </svg>
          <span>聯絡</span>
        </button>
      </div>
    </nav>

    <div id="customModal" class="modal-backdrop">
      <div class="modal-box">
        <div id="modalTitle" class="modal-title">提示</div>
        <div id="modalMessage" class="modal-message"></div>
        <div id="modalActions" class="modal-actions"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-iJB1D6sN';

    const URL_PARAMS =
      new URLSearchParams(location.search);

    const TEST_MODE =
      URL_PARAMS.get('test') === '1';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let SELECTED_CATEGORY = 'general';
    let SELECTED_PRIORITY = 'normal';

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      if (
        value === undefined ||
        value === null
      ) {
        return '';
      }

      return String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeStatus(value) {
      return rawText(value)
        .trim()
        .toLowerCase();
    }

    function formatDateTime(value) {
      if (!value) {
        return '-';
      }

      const date =
        new Date(value);

      if (
        Number.isNaN(
          date.getTime()
        )
      ) {
        return rawText(value);
      }

      return new Intl.DateTimeFormat(
        'zh-TW',
        {
          timeZone: 'Asia/Taipei',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        }
      ).format(date);
    }

    function goPage(page) {
      const separator =
        page.indexOf('?') >= 0
          ? '&'
          : '?';

      location.href =
        page +
        separator +
        'v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        );
    }

    function categoryText(value) {
      const map = {
        general: '一般詢問',
        repair: '報修',
        payment: '繳費問題',
        contract: '合約問題',
        other: '其他'
      };

      return (
        map[normalizeStatus(value)] ||
        rawText(value) ||
        '-'
      );
    }

    function statusText(value) {
      const map = {
        pending: '待處理',
        processing: '處理中',
        replied: '已回覆',
        completed: '已完成',
        closed: '已結案',
        rejected: '已駁回'
      };

      return (
        map[normalizeStatus(value)] ||
        rawText(value) ||
        '-'
      );
    }

    function statusBadgeClass(value) {
      const status =
        normalizeStatus(value);

      if (
        status === 'completed' ||
        status === 'closed'
      ) {
        return 'badge green';
      }

      if (
        status === 'replied' ||
        status === 'processing'
      ) {
        return 'badge blue';
      }

      if (status === 'pending') {
        return 'badge orange';
      }

      if (status === 'rejected') {
        return 'badge red';
      }

      return 'badge';
    }

    function messageCardClass(value) {
      const status =
        normalizeStatus(value);

      if (
        status === 'completed' ||
        status === 'closed'
      ) {
        return 'message-card completed';
      }

      if (
        status === 'replied' ||
        status === 'processing'
      ) {
        return 'message-card replied';
      }

      if (status === 'pending') {
        return 'message-card pending';
      }

      return 'message-card';
    }

    function showModal(options) {
      const modal =
        document.getElementById(
          'customModal'
        );

      document.getElementById(
        'modalTitle'
      ).textContent =
        options.title || '提示';

      document.getElementById(
        'modalMessage'
      ).textContent =
        options.message || '';

      const actions =
        document.getElementById(
          'modalActions'
        );

      actions.innerHTML = '';

      if (options.type === 'confirm') {
        actions.className =
          'modal-actions';

        const cancel =
          document.createElement(
            'button'
          );

        cancel.className =
          'modal-cancel';

        cancel.textContent =
          '返回修改';

        cancel.onclick =
          hideModal;

        const confirm =
          document.createElement(
            'button'
          );

        confirm.className =
          'modal-confirm';

        confirm.textContent =
          '確認送出';

        confirm.onclick =
          function () {
            hideModal();

            if (
              typeof options.onConfirm ===
              'function'
            ) {
              options.onConfirm();
            }
          };

        actions.appendChild(cancel);
        actions.appendChild(confirm);
      } else {
        actions.className =
          'modal-actions single';

        const confirm =
          document.createElement(
            'button'
          );

        confirm.className =
          'modal-confirm';

        confirm.textContent =
          options.confirmText || '確定';

        confirm.onclick =
          function () {
            hideModal();

            if (
              typeof options.onConfirm ===
              'function'
            ) {
              options.onConfirm();
            }
          };

        actions.appendChild(confirm);
      }

      modal.classList.add('show');
    }

    function hideModal() {
      document.getElementById(
        'customModal'
      ).classList.remove('show');
    }

    function appAlert(
      message,
      onConfirm
    ) {
      showModal({
        title: '提示',
        message: message,
        type: 'alert',
        onConfirm: onConfirm || null
      });
    }

    function jsonpRequest(
      action,
      params
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_tenant_message_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() * 1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;

          const timer =
            setTimeout(function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 無回應，請確認 V2_TENANT_MESSAGES.gs 已加入並重新部署'
                )
              );
            }, 20000);

          function cleanup() {
            clearTimeout(timer);

            if (script.parentNode) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (result) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              if (
                !result ||
                result.success !== true
              ) {
                reject(
                  new Error(
                    result &&
                    result.message
                      ? result.message
                      : '資料查詢失敗'
                  )
                );

                return;
              }

              resolve(
                result.data !== undefined
                  ? result.data
                  : result
              );
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(action) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          if (TEST_MODE) {
            url += '&test=1';
          }

          Object.keys(
            params || {}
          ).forEach(
            function (key) {
              const value =
                params[key];

              if (
                value === undefined ||
                value === null
              ) {
                return;
              }

              url +=
                '&' +
                encodeURIComponent(key) +
                '=' +
                encodeURIComponent(value);
            }
          );

          script.charset =
            'UTF-8';

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗，請重新部署 Apps Script'
                )
              );
            };

          script.src = url;

          document.body.appendChild(
            script
          );
        }
      );
    }

    async function initLineUserId() {
      if (
        typeof liff === 'undefined'
      ) {
        throw new Error(
          'LIFF SDK 載入失敗'
        );
      }

      await liff.init({
        liffId: LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            location.href
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId || '';

      if (!LINE_USER_ID) {
        throw new Error(
          '無法取得房客 LINE User ID'
        );
      }

      return true;
    }

    function selectCategory(value) {
      SELECTED_CATEGORY = value;

      document
        .querySelectorAll(
          '.category-button'
        )
        .forEach(function (button) {
          button.classList.toggle(
            'active',
            button.dataset.value ===
              value
          );
        });
    }

    function selectPriority(value) {
      SELECTED_PRIORITY = value;

      document
        .querySelectorAll(
          '.priority-button'
        )
        .forEach(function (button) {
          button.classList.toggle(
            'active',
            button.dataset.value ===
              value
          );
        });
    }

    function updateTitleCount() {
      const input =
        document.getElementById(
          'messageTitle'
        );

      const count =
        document.getElementById(
          'titleCount'
        );

      if (
        input &&
        count
      ) {
        count.textContent =
          input.value.length +
          ' / 60';
      }
    }

    function updateBodyCount() {
      const input =
        document.getElementById(
          'messageBody'
        );

      const count =
        document.getElementById(
          'bodyCount'
        );

      if (
        input &&
        count
      ) {
        count.textContent =
          input.value.length +
          ' / 500';
      }
    }

    function renderMessage(item) {
      const status =
        normalizeStatus(
          item.status
        );

      return `
        <div class="${messageCardClass(status)}">
          <div class="message-head">
            <div>
              <div class="message-title">
                ${safeHtml(
                  item.message_title ||
                  '未命名訊息'
                )}
              </div>

              <div class="message-meta">
                ${safeHtml(
                  categoryText(
                    item.message_category
                  )
                )}
                ・${safeHtml(
                  formatDateTime(
                    item.created_at
                  )
                )}
                ・${safeHtml(
                  item.message_id || '-'
                )}
              </div>
            </div>

            <div>
              <span class="${statusBadgeClass(status)}">
                ${safeHtml(
                  statusText(status)
                )}
              </span>

              ${
                normalizeStatus(
                  item.priority
                ) === 'urgent'
                  ? `
                    <span class="badge red">
                      急件
                    </span>
                  `
                  : ''
              }
            </div>
          </div>

          <div class="message-body">
            ${safeHtml(
              item.message_body || '-'
            )}
          </div>

          ${
            rawText(
              item.preferred_contact_time
            ).trim()
              ? `
                <div class="message-meta" style="margin-top:8px;">
                  方便聯絡時間：
                  ${safeHtml(
                    item.preferred_contact_time
                  )}
                </div>
              `
              : ''
          }

          ${
            rawText(
              item.landlord_reply
            ).trim()
              ? `
                <div class="reply-box">
                  <div class="reply-label">
                    房東回覆
                  </div>

                  <div class="reply-text">
                    ${safeHtml(
                      item.landlord_reply
                    )}
                  </div>
                </div>
              `
              : ''
          }
        </div>
      `;
    }

    function renderPage(data) {
      PAGE_DATA =
        data || {};

      const tenant =
        PAGE_DATA.tenant || {};

      const messages =
        Array.isArray(
          PAGE_DATA.messages
        )
          ? PAGE_DATA.messages
          : [];

      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card header-card">
          <div class="header-row">
            <div>
              <div class="eyebrow">
                CMWebs 智慧租管
              </div>

              <h1 class="page-title">
                聯絡房東
              </h1>

              <div class="page-subtitle">
                可提交報修、繳費、合約或其他問題；送出後可在下方查看處理進度與房東回覆。
              </div>
            </div>

            <button
              id="refreshButton"
              class="refresh-button"
              type="button"
              onclick="loadPage()"
              aria-label="重新整理"
            >
              <svg viewBox="0 0 24 24">
                <path d="M20 11a8 8 0 1 0-2.34 5.66"></path>
                <path d="M20 5v6h-6"></path>
              </svg>
            </button>
          </div>

          <div class="tenant-grid">
            <div class="info-box">
              <div class="info-label">
                房客／房號
              </div>

              <div class="info-value">
                ${safeHtml(
                  tenant.tenant_name ||
                  '-'
                )}
                ・${safeHtml(
                  tenant.room_list ||
                  '-'
                )}
              </div>
            </div>

            <div class="info-box">
              <div class="info-label">
                房東
              </div>

              <div class="info-value">
                ${safeHtml(
                  tenant.landlord_name ||
                  '房東'
                )}
              </div>
            </div>
          </div>
        </section>

        <section class="card section-card">
          <div class="section-title-row">
            <div class="section-title">
              新增訊息
            </div>

            <div class="section-hint">
              必填項目請完整填寫
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <span>問題類型</span>
              <span class="required">必填</span>
            </div>

            <div class="category-grid">
              <button
                class="category-button active"
                data-value="general"
                type="button"
                onclick="selectCategory('general')"
              >
                一般詢問
              </button>

              <button
                class="category-button"
                data-value="repair"
                type="button"
                onclick="selectCategory('repair')"
              >
                報修
              </button>

              <button
                class="category-button"
                data-value="payment"
                type="button"
                onclick="selectCategory('payment')"
              >
                繳費問題
              </button>

              <button
                class="category-button"
                data-value="contract"
                type="button"
                onclick="selectCategory('contract')"
              >
                合約問題
              </button>

              <button
                class="category-button"
                data-value="other"
                type="button"
                onclick="selectCategory('other')"
              >
                其他
              </button>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <span>優先程度</span>
              <span class="required">必填</span>
            </div>

            <div class="priority-row">
              <button
                class="priority-button active"
                data-value="normal"
                type="button"
                onclick="selectPriority('normal')"
              >
                一般
              </button>

              <button
                class="priority-button urgent"
                data-value="urgent"
                type="button"
                onclick="selectPriority('urgent')"
              >
                急件
              </button>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <span>標題</span>
              <span id="titleCount">0 / 60</span>
            </div>

            <input
              id="messageTitle"
              class="input"
              type="text"
              maxlength="60"
              placeholder="例如：浴室熱水器無法使用"
              oninput="updateTitleCount()"
            />
          </div>

          <div class="field">
            <div class="field-label">
              <span>詳細內容</span>
              <span id="bodyCount">0 / 500</span>
            </div>

            <textarea
              id="messageBody"
              class="textarea"
              maxlength="500"
              placeholder="請描述問題位置、發生時間及目前狀況。"
              oninput="updateBodyCount()"
            ></textarea>
          </div>

          <div class="field">
            <div class="field-label">
              <span>方便聯絡時間</span>
              <span>選填</span>
            </div>

            <input
              id="contactTime"
              class="input"
              type="text"
              maxlength="60"
              placeholder="例如：平日 18:00 後"
            />
          </div>

          <button
            id="submitButton"
            class="submit-button"
            type="button"
            onclick="submitMessage()"
          >
            送出給房東
          </button>
        </section>

        <section class="card section-card">
          <div class="section-title-row">
            <div class="section-title">
              我的訊息紀錄
            </div>

            <div class="section-hint">
              ${messages.length} 筆
            </div>
          </div>

          ${
            messages.length > 0
              ? messages
                  .map(renderMessage)
                  .join('')
              : `
                <div class="empty-state">
                  <div class="empty-title">
                    尚無訊息紀錄
                  </div>

                  <div class="empty-text">
                    提交訊息後，處理狀態與房東回覆會顯示在這裡。
                  </div>
                </div>
              `
          }
        </section>
      `;
    }

    function submitMessage() {
      const title =
        rawText(
          document.getElementById(
            'messageTitle'
          ).value
        ).trim();

      const body =
        rawText(
          document.getElementById(
            'messageBody'
          ).value
        ).trim();

      const contactTime =
        rawText(
          document.getElementById(
            'contactTime'
          ).value
        ).trim();

      if (!title) {
        appAlert(
          '請輸入訊息標題。'
        );

        return;
      }

      if (!body) {
        appAlert(
          '請輸入詳細內容。'
        );

        return;
      }

      const message =
        '請確認送出內容：\n\n' +
        '類型：' +
        categoryText(
          SELECTED_CATEGORY
        ) +
        '\n優先程度：' +
        (
          SELECTED_PRIORITY ===
          'urgent'
            ? '急件'
            : '一般'
        ) +
        '\n標題：' +
        title +
        '\n\n送出後房東會收到 LINE 通知。';

      showModal({
        title: '確認送出',
        message: message,
        type: 'confirm',
        onConfirm:
          function () {
            doSubmitMessage(
              title,
              body,
              contactTime
            );
          }
      });
    }

    async function doSubmitMessage(
      title,
      body,
      contactTime
    ) {
      const button =
        document.getElementById(
          'submitButton'
        );

      button.disabled = true;
      button.textContent =
        '送出中...';

      try {
        await jsonpRequest(
          'tenant_message_submit',
          {
            message_category:
              SELECTED_CATEGORY,
            message_title:
              title,
            message_body:
              body,
            priority:
              SELECTED_PRIORITY,
            contact_time:
              contactTime
          }
        );

        appAlert(
          '訊息已送出，房東會收到通知。',
          function () {
            loadPage();
          }
        );
      } catch (error) {
        appAlert(
          error &&
          error.message
            ? error.message
            : '訊息送出失敗'
        );
      } finally {
        button.disabled = false;
        button.textContent =
          '送出給房東';
      }
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">
            聯絡資料讀取失敗
          </div>

          <div class="error-text">
            ${safeHtml(
              message || '未知錯誤'
            )}
          </div>

          <div class="button-row">
            <button
              class="secondary-button"
              type="button"
              onclick="goPage('tenant-home.html')"
            >
              返回首頁
            </button>

            <button
              class="primary-button"
              type="button"
              onclick="loadPage()"
            >
              重新整理
            </button>
          </div>
        </section>
      `;
    }

    function setRefreshLoading(
      loading
    ) {
      const button =
        document.getElementById(
          'refreshButton'
        );

      if (!button) {
        return;
      }

      button.classList.toggle(
        'loading',
        Boolean(loading)
      );
    }

    async function loadPage() {
      setRefreshLoading(true);

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLineUserId();

          if (!ready) {
            return;
          }
        }

        const data =
          await jsonpRequest(
            'tenant_message_init',
            {}
          );

        renderPage(data);
      } catch (error) {
        renderError(
          error &&
          error.message
            ? error.message
            : String(error)
        );
      } finally {
        setRefreshLoading(false);
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    window.addEventListener(
      'orientationchange',
      function () {
        setTimeout(
          setAppHeight,
          250
        );
      }
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
