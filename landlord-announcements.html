<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 公告發送</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 68px;
      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #edf9f2;
      --purple: #7654c4;
      --purple-soft: #f3efff;
      --blue: #1a73e8;
      --blue-soft: #edf4ff;
      --orange: #ef8f00;
      --orange-soft: #fff5df;
      --danger: #d93025;
      --danger-soft: #fff0ef;
      --gray-soft: #f0f2f5;
      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;
      --shadow: 0 10px 34px rgba(25, 35, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 650px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(
          circle at 100% 0%,
          rgba(239, 143, 0, 0.11),
          transparent 28%
        ),
        var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(16px, env(safe-area-inset-top))
        15px
        calc(
          var(--nav-height) +
          22px +
          env(safe-area-inset-bottom)
        );
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .eyebrow {
      color: var(--orange);
      font-size: 10px;
      font-weight: 900;
    }

    .page-title {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.35px;
    }

    .refresh-button {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #5f6670;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #cf7500 0%,
          #ef8f00 58%,
          #c66e00 100%
        );
    }

    .hero::after {
      position: absolute;
      top: -65px;
      right: -45px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.13);
      content: "";
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 9px;
      font-weight: 900;
    }

    .workspace-name {
      margin-top: 5px;
      font-size: 21px;
      font-weight: 900;
    }

    .hero-desc {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 10px;
      line-height: 1.65;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
      margin-top: 15px;
    }

    .summary-item {
      min-width: 0;
      padding: 9px 7px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.1);
    }

    .summary-label {
      overflow: hidden;
      color: rgba(255, 255, 255, 0.72);
      font-size: 7px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-value {
      margin-top: 4px;
      font-size: 16px;
      font-weight: 900;
    }

    .compose-card {
      padding: 15px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 900;
    }

    .card-desc {
      margin-top: 5px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.6;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .form-field {
      min-width: 0;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    .field-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 10px;
      font-weight: 900;
    }

    .field-hint {
      color: var(--muted);
      font-size: 8px;
      font-weight: 700;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 11px;
      outline: none;
      background: #ffffff;
      color: var(--text);
    }

    .input,
    .select {
      height: 43px;
      padding: 0 11px;
    }

    .textarea {
      min-height: 130px;
      padding: 11px;
      resize: vertical;
      line-height: 1.65;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: rgba(239, 143, 0, 0.55);
      box-shadow: 0 0 0 3px rgba(239, 143, 0, 0.08);
    }

    .recipient-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-top: 11px;
    }

    .recipient-summary-item {
      padding: 9px 8px;
      border-radius: 10px;
      background: var(--surface-soft);
    }

    .recipient-summary-label {
      color: var(--muted);
      font-size: 7px;
    }

    .recipient-summary-value {
      margin-top: 3px;
      font-size: 13px;
      font-weight: 900;
    }

    .audience-note {
      margin-top: 10px;
      padding: 10px 11px;
      border: 1px solid #f3d7a9;
      border-radius: 11px;
      background: var(--orange-soft);
      color: #8a5a12;
      font-size: 9px;
      line-height: 1.65;
    }

    .tenant-selector {
      display: none;
      max-height: 330px;
      margin-top: 10px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
    }

    .tenant-selector.show {
      display: block;
    }

    .tenant-toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.97);
    }

    .tenant-search {
      min-width: 0;
      flex: 1;
      height: 38px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
    }

    .small-button {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      color: var(--text);
      font-size: 8px;
      font-weight: 900;
      cursor: pointer;
    }

    .tenant-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px;
      border-bottom: 1px solid var(--border);
    }

    .tenant-row:last-child {
      border-bottom: 0;
    }

    .tenant-check {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--orange);
    }

    .tenant-main {
      min-width: 0;
      flex: 1;
    }

    .tenant-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tenant-name {
      font-size: 11px;
      font-weight: 900;
    }

    .tenant-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 8px;
      line-height: 1.5;
    }

    .badge {
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 900;
    }

    .badge.bound,
    .badge.sent {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .badge.unbound,
    .badge.partial {
      background: var(--orange-soft);
      color: #9b6200;
    }

    .badge.conflict,
    .badge.failed {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.general {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge.maintenance {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .badge.utility {
      background: var(--orange-soft);
      color: #9b6200;
    }

    .badge.payment {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .badge.emergency {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .preview-box {
      margin-top: 11px;
      padding: 12px;
      border: 1px solid #f3d7a9;
      border-radius: 12px;
      background: var(--orange-soft);
      color: #664710;
      font-size: 9px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .compose-actions {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 9px;
      margin-top: 13px;
    }

    .compose-button {
      min-height: 47px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      color: var(--text);
      font-size: 10px;
      font-weight: 900;
      cursor: pointer;
    }

    .compose-button.primary {
      border-color: var(--orange);
      background: var(--orange);
      color: #ffffff;
      box-shadow: 0 8px 20px rgba(239, 143, 0, 0.18);
    }

    .compose-button:disabled {
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
    }

    .history-filter-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
    }

    .history-filter-select {
      width: 150px;
      height: 39px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      background: #ffffff;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 9px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 900;
    }

    .section-count {
      color: var(--muted);
      font-size: 10px;
    }

    .history-card {
      padding: 14px;
    }

    .history-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .history-main {
      min-width: 0;
      flex: 1;
    }

    .history-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .history-title {
      font-size: 13px;
      font-weight: 900;
    }

    .history-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 8px;
      line-height: 1.55;
    }

    .history-body {
      margin-top: 11px;
      padding: 10px 11px;
      border-radius: 10px;
      background: var(--surface-soft);
      color: #4f5660;
      font-size: 9px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .delivery-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
      margin-top: 11px;
    }

    .delivery-item {
      min-width: 0;
      padding: 8px;
      border-radius: 9px;
      background: var(--surface-soft);
    }

    .delivery-label {
      color: var(--muted);
      font-size: 7px;
    }

    .delivery-value {
      margin-top: 3px;
      font-size: 11px;
      font-weight: 900;
    }

    .history-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 11px;
      padding-top: 11px;
      border-top: 1px solid var(--border);
    }

    .history-button {
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      color: var(--text);
      font-size: 9px;
      font-weight: 900;
      cursor: pointer;
    }

    .history-button.primary {
      border-color: var(--orange);
      background: var(--orange);
      color: #ffffff;
    }

    .recipient-detail {
      display: none;
      margin-top: 9px;
      border: 1px solid var(--border);
      border-radius: 11px;
      overflow: hidden;
    }

    .recipient-detail.show {
      display: block;
    }

    .recipient-detail-row {
      display: grid;
      grid-template-columns: 1.3fr 1fr 0.9fr;
      gap: 8px;
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 8px;
      line-height: 1.5;
    }

    .recipient-detail-row:last-child {
      border-bottom: 0;
    }

    .recipient-error {
      grid-column: 1 / -1;
      color: var(--danger);
      word-break: break-word;
    }

    .loading-card,
    .error-card,
    .empty-card {
      padding: 30px 18px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      text-align: center;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 14px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-title,
    .error-title {
      margin-bottom: 7px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .retry-button {
      width: 100%;
      min-height: 44px;
      margin-top: 15px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .toast {
      position: absolute;
      z-index: 2600;
      right: 16px;
      bottom:
        calc(
          var(--nav-height) +
          18px +
          env(safe-area-inset-bottom)
        );
      left: 16px;
      max-width: 470px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 13px;
      background: #22252a;
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      line-height: 1.55;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition:
        opacity 0.18s ease,
        transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--danger);
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    @media (max-width: 520px) {
      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-field.full {
        grid-column: auto;
      }

      .recipient-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .delivery-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .recipient-detail-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="topbar">
        <div>
          <div class="eyebrow">Tenant Announcement</div>
          <div class="page-title">公告發送</div>
        </div>

        <button
          class="refresh-button"
          type="button"
          onclick="loadPage()"
        >
          ↻
        </button>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">公告資料載入中</div>
          正在讀取房客、租約與 LINE 綁定狀態。
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(
        location.search
      );

    const TEST_MODE =
      URL_PARAMS.get('test') ===
      '1';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let toastTimer = null;
    let sending = false;

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      return value === undefined || value === null
        ? ''
        : String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function inputValue(id) {
      const element =
        document.getElementById(
          id
        );

      return element
        ? rawText(
            element.value
          ).trim()
        : '';
    }

    function goPage(page) {
      const separator =
        page.indexOf('?') >= 0
          ? '&'
          : '?';

      location.href =
        page +
        separator +
        'v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

      entryUrl.searchParams.set(
        'return_to',
        returnTo
      );

      return entryUrl.href;
    }

    async function initLine() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      await liff.init({
        liffId:
          LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            buildLandlordLoginRedirectUri()
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId ||
        '';

      return true;
    }

      message,

    ) {
      const toast =

      toast.textContent =

        );

    function jsonpRequest(
      action,
      params,
      retryCount
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_announcement_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished =
            false;

          const timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished =
                  true;

                cleanup();

                if (
                  Number(
                    retryCount ||
                    0
                  ) <
                  1
                ) {
                  jsonpRequest(
                    action,
                    params,
                    1
                  ).then(
                    resolve
                  ).catch(
                    reject
                  );

                  return;
                }

                reject(
                  new Error(
                    'API 載入逾時，請確認公告後端已部署。'
                  )
                );
              },
              50000
            );

          function cleanup() {
            clearTimeout(
              timer
            );

            if (
              script.parentNode
            ) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[
                callbackName
              ] =
                undefined;
            }
          }

          window[
            callbackName
          ] =
            function (result) {
              if (finished) {
                return;
              }

              finished =
                true;

              cleanup();

              resolve(
                result
              );
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params ||
            {}
          ).forEach(
            function (key) {
              url +=
                '&' +
                encodeURIComponent(
                  key
                ) +
                '=' +
                encodeURIComponent(
                  params[
                    key
                  ]
                );
            }
          );

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished =
                true;

              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗'
                )
              );
            };

          script.src =
            url;

          document.body.appendChild(
            script
          );
        }
      );
    }

    function priorityPrefix(value) {
      if (
        value ===
        'emergency'

    function currentAudienceRecipients() {
      const recipients =
        PAGE_DATA.recipients ||
        [];

      const audienceType =
        inputValue(
          'audienceType'
        ) ||
        'all';

      if (
        audienceType ===
        'property'
      ) {
        const propertyId =
          inputValue(
            'audienceProperty'
          );

        return recipients.filter(
          function (recipient) {
            return (
              recipient.property_ids ||
              []
            ).indexOf(
              propertyId
            ) >= 0;
          }
        );
      }

      if (
        audienceType ===
        'selected'
      ) {
        const selected =
          selectedTenantIds();

        const selectedMap =
          {};

        selected.forEach(
          function (tenantId) {
            selectedMap[
              tenantId
            ] = true;
          }
        );

        return recipients.filter(
          function (recipient) {
            return Boolean(
              selectedMap[
                recipient.tenant_id
              ]
            );
          }
        );
      }

      return recipients;
    }

    function selectedTenantIds() {
      return (
        PAGE_DATA.recipients ||
        []
      ).map(
        function (recipient, index) {
          const checkbox =
            document.getElementById(
              'tenantSelect_' +
              index
            );

          return (
            checkbox &&
            checkbox.checked
          )
            ? recipient.tenant_id
            : '';
        }
      ).filter(Boolean);

        )
      ).filter(
        function (row) {
          return (
            row.style.display !==
            'none'
          );
        }
      );

      const shouldCheck =
        visible.some(
          function (row) {
            const checkbox =
              row.querySelector(
                '.tenant-check'
              );

            return (
              checkbox &&
              !checkbox.checked
            );
          }
        );

      visible.forEach(
        function (row) {
          const checkbox =
            row.querySelector(
              '.tenant-check'
            );

          if (checkbox) {
            checkbox.checked =
              shouldCheck;
          }
        }
      );

      updateAudienceSummary();
    }

    function clearCompose() {
      document.getElementById(
        'title'
      ).value =
        '';

      document.getElementById(
        'body'
      ).value =
        '';

      document.getElementById(
        'category'
      ).value =
        'general';

      document.getElementById(
        'priority'
      ).value =
        'normal';

      document.getElementById(
        'audienceType'
      ).value =
        'all';

      document.getElementById(
        'audienceProperty'
      ).value =
        '';

      document.querySelectorAll(
        '.tenant-check'
      ).forEach(
        function (checkbox) {
          checkbox.checked =
            false;
        }
      );

      handleAudienceChange();
    }

    async function sendAnnouncement() {
      if (sending) {
        return;
      }

      const title =
        inputValue(
          'title'
        );

      const body =
        inputValue(
          'body'
        );

      const audienceType =
        inputValue(
          'audienceType'
        ) ||
        'all';

      const propertyId =
        inputValue(
          'audienceProperty'
        );

      const tenantIds =
        selectedTenantIds();

      const recipients =
        currentAudienceRecipients();

      if (
        title.length < 2
      ) {
        showToast(
          '請輸入至少 2 個字的公告標題。',
          true
        );

        return;
      }

      if (
        body.length < 2
      ) {
        showToast(
          '請輸入至少 2 個字的公告內容。',
          true
        );

        return;
      }

      if (
        audienceType ===
          'property' &&
        !propertyId
      ) {
        showToast(
          '請選擇公告物件。',
          true
        );

        return;
      }

      if (
        audienceType ===
          'selected' &&
        tenantIds.length ===
          0
      ) {
        showToast(
          '請至少選擇一位房客。',
          true
        );

        return;
      }

      if (
        recipients.length ===
        0
      ) {
        showToast(
          '目前發送條件沒有房客。',
          true
        );

        return;
      }

      const boundCount =
        recipients.filter(
          function (recipient) {
            return (
              recipient.binding_status ===
              'bound'
            );
          }
        ).length;

      const confirmed =
        window.confirm(
          '確定立即發送此公告？\n\n' +
          '目標房客：' +
          recipients.length +
          ' 位\n' +
          '目前可送達：' +
          boundCount +
          ' 位\n' +
          '未綁定或衝突：' +
          (
            recipients.length -
            boundCount
          ) +
          ' 位'
        );

      if (!confirmed) {
        return;
      }

      const button =
        document.getElementById(
          'sendButton'
        );

      sending =
        true;

      button.disabled =
        true;

      button.textContent =
        '公告發送中...';

      try {
        const result =
          await jsonpRequest(
            'landlord_announcement_send',
            {
              title:
                title,
              body:
                body,
              category:
                inputValue(
                  'category'
                ) ||
                'general',
              priority:
                inputValue(
                  'priority'
                ) ||
                'normal',
              audience_type:
                audienceType,
              property_id:
                propertyId,
              tenant_ids_json:
                JSON.stringify(
                  tenantIds
                )
            }
          );

        const data =
          result &&
          result.data
            ? result.data
            : {};

        if (
          !result ||
          (
            result.success !==
              true &&
            Number(
              data.sent_count ||
              0
            ) ===
              0
          )
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '公告發送失敗'
          );
        }

        showToast(
          '公告已送達 ' +
          Number(
            data.sent_count ||
            0
          ) +
          ' 位' +
          (
            Number(
              data.failed_count ||
              0
            ) > 0
              ? '，失敗 ' +
                data.failed_count +
                ' 位'
              : ''
          ) +
          (
            Number(
              data.unbound_count ||
              0
            ) > 0
              ? '，未綁定 ' +
                data.unbound_count +
                ' 位'
              : ''
          )
        );

        clearCompose();

        await loadPage(
          false
        );

      } catch (error) {
        showToast(
          error &&
          error.message
            ? error.message
            : '公告發送失敗',
          true
        );

      } finally {
        sending =
          false;

        button.disabled =
          !PAGE_DATA.can_send;

        button.textContent =
          '立即發送公告';
      }
    }

    async function retryAnnouncement(index) {
      const item =
        PAGE_DATA.announcements[
          index
        ];

      if (
        Number(
          item.pending_retry_count ||
          0
        ) ===
        0
      ) {
        showToast(
          '此公告沒有需要重試的房客。'
        );

        return;
      }

      const confirmed =
        window.confirm(
          '確定重試此公告的未送達房客？\n\n' +
          '待重試：' +
          Number(
            item.pending_retry_count ||
            0
          ) +
          ' 位'
        );

      if (!confirmed) {
        return;
      }

      try {
        showToast(
          '正在重試公告送達...'
        );

        const result =
          await jsonpRequest(
            'landlord_announcement_retry',
            {
              announcement_id:
                item.announcement_id
            }
          );

        const data =
          result &&
          result.data
            ? result.data
            : {};

        if (
          !result ||
          (
            result.success !==
              true &&
            Number(
              data.sent_now ||
              0
            ) ===
              0
          )
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '公告重試失敗'
          );
        }

        showToast(
          '本次送達 ' +
          Number(
            data.sent_now ||
            0
          ) +
          ' 位' +
          (
            Number(
              data.still_blocked_count ||
              0
            ) > 0
              ? '，仍有 ' +
                data.still_blocked_count +
                ' 位未完成綁定'
              : ''
          )
        );

        await loadPage(
          false
        );

      } catch (error) {
        showToast(
          error &&
          error.message
            ? error.message
            : '公告重試失敗',
          true
        );
      }
    }

    function toggleRecipientDetail(index) {
      document.getElementById(
        'recipientDetail_' +
        index
      ).classList.toggle(
        'show'
      );
    }

    function renderLoading() {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">公告資料載入中</div>
          正在讀取房客、租約與 LINE 綁定狀態。
        </section>
      `;
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">
            公告資料載入失敗
          </div>

          ${safeHtml(
            message ||
            '未知錯誤'
          )}

          <button
            class="retry-button"
            type="button"
            onclick="loadPage()"
          >
            重新整理
          </button>
        </section>
      `;
    }

    async function loadPage(showLoading) {
      const historyFilter =
        inputValue(
          'historyFilter'
        ) ||
        (
          PAGE_DATA
            ? PAGE_DATA.history_filter
            : 'all'
        );

      if (
        showLoading !==
        false
      ) {
        renderLoading();
      }

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLine();

          if (!ready) {
            return;
          }
        }

        const result =
          await jsonpRequest(
            'landlord_announcements_init',
            {
              history_filter:
                historyFilter
            }
          );

        if (
          !result ||
          result.success !==
            true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '公告資料載入失敗'
          );
        }

        PAGE_DATA =
          result.data ||
          {};

        renderPage();

      } catch (error) {
        renderError(
          error &&
          error.message
            ? error.message
            : String(
                error
              )
        );
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    if (
      window.visualViewport
    ) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
