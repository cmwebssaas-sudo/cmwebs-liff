<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 房客詳細資料</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 64px;
      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #effcf4;
      --page-bg: #f4f6fa;
      --card-bg: #ffffff;
      --text-main: #171a1f;
      --text-muted: #747b85;
      --border: #e7ebf0;
      --danger: #e5484d;
      --danger-soft: #fff1f2;
      --warning: #e69b00;
      --warning-soft: #fff7df;
      --blue: #246bfd;
      --blue-soft: #eef4ff;
      --purple: #7c3aed;
      --purple-soft: #f4efff;
      --shadow: 0 7px 24px rgba(30, 40, 60, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text-main);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    body.modal-open {
      overflow: hidden;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background: var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        16px
        16px
        calc(var(--nav-height) + 28px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .back-button,
    .refresh-button {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #606773;
      box-shadow: 0 4px 14px rgba(30, 40, 60, 0.05);
      cursor: pointer;
    }

    .back-button svg,
    .refresh-button svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .refresh-button.loading svg {
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .topbar-title-wrap {
      min-width: 0;
      flex: 1;
      text-align: center;
    }

    .topbar-title {
      overflow: hidden;
      font-size: 18px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topbar-subtitle {
      margin-top: 3px;
      color: var(--text-muted);
      font-size: 11px;
    }

    .card {
      margin-bottom: 14px;
      border: 1px solid rgba(231, 235, 240, 0.92);
      border-radius: 18px;
      background: var(--card-bg);
      box-shadow: var(--shadow);
    }

    .profile-card {
      overflow: hidden;
    }

    .profile-head {
      padding: 19px;
      background:
        linear-gradient(145deg, rgba(6, 199, 85, 0.1), rgba(255, 255, 255, 0.98) 64%);
    }

    .profile-main {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      flex: 0 0 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 17px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 22px;
      font-weight: 900;
    }

    .profile-text {
      min-width: 0;
      flex: 1;
    }

    .profile-name {
      overflow: hidden;
      margin-bottom: 5px;
      font-size: 20px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-meta {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #f0f2f5;
      color: #6c727c;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.green {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .badge.warning {
      background: var(--warning-soft);
      color: #b87500;
    }

    .badge.danger {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.blue {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge.purple {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .profile-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 0 19px 19px;
    }

    .summary-box {
      min-width: 0;
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fbfcfd;
    }

    .summary-label {
      margin-bottom: 5px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
    }

    .summary-value {
      overflow: hidden;
      font-size: 15px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-value.green {
      color: var(--primary-dark);
    }

    .summary-value.red {
      color: var(--danger);
    }

    .section-card {
      padding: 17px;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 900;
    }

    .section-hint {
      color: var(--text-muted);
      font-size: 11px;
    }

    .detail-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }

    .detail-row:first-of-type {
      border-top: 0;
    }

    .detail-label {
      flex: 0 0 auto;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .detail-value {
      min-width: 0;
      flex: 1;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.5;
      text-align: right;
      word-break: break-word;
    }

    .detail-value a {
      color: var(--blue);
      text-decoration: none;
    }

    .amount-block {
      margin-bottom: 13px;
      padding: 15px;
      border-radius: 15px;
      background: var(--primary-soft);
    }

    .amount-block.unpaid {
      background: var(--danger-soft);
    }

    .amount-label {
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 800;
    }

    .amount-value {
      color: var(--primary-dark);
      font-size: 28px;
      font-weight: 900;
    }

    .amount-block.unpaid .amount-value {
      color: var(--danger);
    }

    .request-card {
      margin-top: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: #fbfcfd;
    }

    .request-card:first-of-type {
      margin-top: 0;
    }

    .request-card.active {
      border-color: rgba(124, 58, 237, 0.23);
      background: var(--purple-soft);
    }

    .request-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .request-title {
      font-size: 14px;
      font-weight: 900;
    }

    .request-id {
      margin-top: 3px;
      color: var(--text-muted);
      font-size: 10px;
    }

    .request-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .request-box {
      min-width: 0;
      padding: 10px;
      border: 1px solid rgba(225, 229, 235, 0.9);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
    }

    .request-label {
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: 10px;
    }

    .request-value {
      overflow: hidden;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.45;
      text-overflow: ellipsis;
    }

    .request-note {
      margin-top: 9px;
      padding: 10px 11px;
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.75);
      color: #5d6470;
      font-size: 11px;
      line-height: 1.55;
    }

    .empty-state {
      padding: 18px 10px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .action-button {
      min-height: 84px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-direction: column;
      gap: 9px;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: #ffffff;
      color: var(--text-main);
      text-align: left;
      cursor: pointer;
    }

    .action-button:active {
      opacity: 0.67;
    }

    .action-button.disabled {
      cursor: default;
      opacity: 0.45;
    }

    .action-icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 11px;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .action-icon.blue {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .action-icon.orange {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .action-icon.purple {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .action-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-title {
      font-size: 13px;
      font-weight: 900;
    }

    .action-desc {
      margin-top: 3px;
      color: var(--text-muted);
      font-size: 10px;
      line-height: 1.4;
    }

    .loading-card,
    .error-card {
      padding: 30px 18px;
      text-align: center;
    }

    .loading-spinner {
      width: 30px;
      height: 30px;
      margin: 0 auto 13px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .loading-text,
    .error-text {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .error-title {
      margin-bottom: 8px;
      color: var(--danger);
      font-size: 17px;
      font-weight: 900;
    }

    .primary-button,
    .secondary-button,
    .danger-button {
      min-height: 46px;
      padding: 12px 16px;
      border-radius: 13px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary-button {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .secondary-button {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text-main);
    }

    .danger-button {
      border: 0;
      background: var(--danger);
      color: #ffffff;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    .modal-backdrop {
      position: absolute;
      z-index: 1500;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(17, 24, 39, 0.48);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-sheet {
      width: 100%;
      max-height:
        calc(
          var(--app-height) -
          var(--nav-height) -
          env(safe-area-inset-bottom) -
          18px
        );
      overflow-y: auto;
      padding: 18px 16px 22px;
      border-radius: 22px 22px 0 0;
      background: #ffffff;
      box-shadow: 0 -10px 35px rgba(0, 0, 0, 0.16);
      transform: translateY(12px);
      animation: sheet-in 0.2s ease forwards;
    }

    @keyframes sheet-in {
      to {
        transform: translateY(0);
      }
    }

    .modal-handle {
      width: 42px;
      height: 4px;
      margin: 0 auto 15px;
      border-radius: 999px;
      background: #d9dde3;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 900;
    }

    .modal-subtitle {
      margin-top: 5px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .field-label {
      display: block;
      margin: 16px 0 7px;
      font-size: 13px;
      font-weight: 900;
    }

    .textarea {
      width: 100%;
      min-height: 145px;
      resize: vertical;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 13px;
      outline: none;
      color: var(--text-main);
      background: #ffffff;
      line-height: 1.6;
    }

    .textarea:focus {
      border-color: rgba(6, 199, 85, 0.55);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.1);
    }

    .field-hint {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 7px;
      color: var(--text-muted);
      font-size: 11px;
    }

    .toast {
      position: absolute;
      z-index: 3000;
      right: 18px;
      bottom: calc(var(--nav-height) + 22px + env(safe-area-inset-bottom));
      left: 18px;
      display: none;
      padding: 13px 15px;
      border-radius: 13px;
      background: rgba(25, 28, 33, 0.94);
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 390px) {
      .profile-summary,
      .request-grid,
      .action-grid,
      .button-row {
        grid-template-columns: 1fr;
      }

      .page {
        padding-right: 13px;
        padding-left: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="topbar">
        <button class="back-button" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>

        <div class="topbar-title-wrap">
          <div class="topbar-title">房客詳細資料</div>
          <div class="topbar-subtitle">聯絡、帳款與合約申請</div>
        </div>

        <button id="refreshButton" class="refresh-button" type="button" onclick="loadPage()">
          <svg viewBox="0 0 24 24">
            <path d="M20 11a8 8 0 1 0-2.34 5.66"></path>
            <path d="M20 5v6h-6"></path>
          </svg>
        </button>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-text">房客資料載入中...</div>
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>

    <div id="messageModal" class="modal-backdrop" onclick="closeMessageModalFromBackdrop(event)">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">傳送自訂 LINE 訊息</div>
        <div id="messageModalSubtitle" class="modal-subtitle">房客</div>

        <label class="field-label" for="customLineMessage">訊息內容</label>
        <textarea
          id="customLineMessage"
          class="textarea"
          maxlength="500"
          placeholder="請輸入要傳送給房客的內容"
          oninput="updateMessageCount()"
        ></textarea>

        <div class="field-hint">
          <span>最多 500 字</span>
          <span id="messageCount">0 / 500</span>
        </div>

        <div class="button-row">
          <button class="secondary-button" type="button" onclick="closeMessageModal()">取消</button>
          <button id="sendMessageButton" class="primary-button" type="button" onclick="submitCustomMessage()">傳送訊息</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(location.search);

    const TEST_MODE =
      URL_PARAMS.get('test') === '1';

    const TENANT_ID =
      String(
        URL_PARAMS.get('tenant_id') || ''
      ).trim();

    let LINE_USER_ID = '';
    let CURRENT_TENANT = null;
    let CURRENT_REQUESTS = [];
    let toastTimer = null;

    function setAppHeight() {
      const height =
        window.visualViewport && window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      if (
        value === undefined ||
        value === null ||
        value === ''
      ) {
        return '';
      }

      return String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function money(value) {
      const number =
        Number(value || 0);

      return (
        'NT$ ' +
        Math.round(number).toLocaleString(
          'zh-TW'
        )
      );
    }

    function formatDate(value) {
      const text =
        rawText(value).trim();

      if (!text) {
        return '-';
      }

      const match =
        text.match(
          /^(\d{4})-(\d{2})-(\d{2})/
        );

      if (match) {
        return (
          match[1] +
          '-' +
          match[2] +
          '-' +
          match[3]
        );
      }

      const date =
        new Date(text);

      if (
        Number.isNaN(
          date.getTime()
        )
      ) {
        return text;
      }

      return date.toLocaleDateString(
        'zh-TW',
        {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        }
      );
    }

    function jsonpRequest(action, params) {
      return new Promise(function (resolve, reject) {
        const callbackName =
          '__cmwebs_tenant_detail_' +
          Date.now() +
          '_' +
          Math.floor(
            Math.random() * 1000000
          );

        const script =
          document.createElement('script');

        let finished = false;

        const timer =
          setTimeout(function () {
            if (finished) {
              return;
            }

            finished = true;
            cleanup();

            reject(
              new Error('API 載入逾時')
            );
          }, 30000);

        function cleanup() {
          clearTimeout(timer);

          if (script.parentNode) {
            script.parentNode.removeChild(
              script
            );
          }

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] =
              undefined;
          }
        }

        window[callbackName] =
          function (result) {
            if (finished) {
              return;
            }

            finished = true;
            cleanup();
            resolve(result);
          };

        let url =
          API_URL +
          '?v2_action=' +
          encodeURIComponent(action) +
          '&line_user_id=' +
          encodeURIComponent(
            LINE_USER_ID
          ) +
          '&callback=' +
          encodeURIComponent(
            callbackName
          ) +
          '&_=' +
          Date.now();

        Object.keys(
          params || {}
        ).forEach(function (key) {
          const value =
            params[key];

          if (
            value === undefined ||
            value === null
          ) {
            return;
          }

          url +=
            '&' +
            encodeURIComponent(key) +
            '=' +
            encodeURIComponent(value);
        });

        script.charset = 'UTF-8';

        script.onerror =
          function () {
            console.warn(
              'JSONP script onerror ignored.'
            );
          };

        script.src = url;
        document.body.appendChild(script);
      });
    }

    async function initLineUserId() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      if (
        typeof liff ===
        'undefined'
      ) {
        throw new Error(
          'LIFF SDK 載入失敗'
        );
      }

      await liff.init({
        liffId: LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            location.href
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId || '';

      if (!LINE_USER_ID) {
        throw new Error(
          '無法取得房東 LINE User ID'
        );
      }

      return true;
    }

    function unwrapData(result) {
      if (
        result &&
        result.success === true
      ) {
        return (
          result.data !== undefined
            ? result.data
            : result
        );
      }

      throw new Error(
        result && result.message
          ? result.message
          : '查詢失敗'
      );
    }

    function normalizedStatus(value) {
      return rawText(value)
        .trim()
        .toLowerCase();
    }

    function statusLabel(value) {
      const status =
        normalizedStatus(value);

      const labels = {
        active: '有效',
        enabled: '啟用',
        bound: '已綁定',
        checked_in: '已報到',
        pending: '待審核',
        approved: '已核准・待完成',
        completed: '已完成',
        rejected: '已駁回',
        cancelled: '已取消',
        paid: '已繳',
        unpaid: '未繳',
        overdue: '逾期',
        processing: '處理中',
        charged: '收取違約金',
        waived: '免收違約金',
        not_applicable: '不適用'
      };

      return (
        labels[status] ||
        rawText(value) ||
        '-'
      );
    }

    function statusBadgeClass(value) {
      const status =
        normalizedStatus(value);

      if (
        [
          'active',
          'enabled',
          'bound',
          'checked_in',
          'paid',
          'completed'
        ].indexOf(status) >= 0
      ) {
        return 'badge green';
      }

      if (
        [
          'pending',
          'processing'
        ].indexOf(status) >= 0
      ) {
        return 'badge warning';
      }

      if (
        [
          'unpaid',
          'overdue',
          'rejected'
        ].indexOf(status) >= 0
      ) {
        return 'badge danger';
      }

      if (status === 'approved') {
        return 'badge purple';
      }

      return 'badge';
    }

    function requestTypeLabel(item) {
      const type =
        normalizedStatus(
          item.request_type
        );

      if (type === 'renewal') {
        return '續約申請';
      }

      if (type === 'termination') {
        return (
          normalizedStatus(
            item.termination_type
          ) === 'early_termination'
            ? '提前解約'
            : '到期不續約'
        );
      }

      return (
        item.request_type_label ||
        item.request_type ||
        '合約申請'
      );
    }

    function penaltyLabel(item) {
      const status =
        normalizedStatus(
          item.penalty_status
        );

      if (!status) {
        return '-';
      }

      if (status === 'charged') {
        return (
          '收取 ' +
          money(
            item.penalty_amount
          )
        );
      }

      return statusLabel(status);
    }

    function renderRequestCard(item) {
      const status =
        normalizedStatus(
          item.status

        status === 'pending' ||
        status === 'approved';

        normalizedStatus(
          item.request_type

      const primaryLeftLabel =
        isRenewal
          ? '希望續約期間'
          : '預計退租日';

        isRenewal

      const primaryRightLabel =
        isRenewal

          ? (
              money(
                item.requested_rent_amount

              '／' +

      const secondLeftLabel =
        isRenewal

        isRenewal

              formatDate(
                item.preferred_end_date

              item.approved_move_out_date

      const secondRightLabel =

          ? '核准租金／管理費'

      const approvedRent =
        rawText(
          item.approved_rent_amount

      const approvedFee =
        rawText(

        );

      const secondRightValue =
        isRenewal

                    money(
                      item.approved_management_fee
                    )

      const note =

      return `

                  item.request_id || '-'

              ${safeHtml(
                statusLabel(status)
              )}
            </span>
          </div>

          <div class="request-grid">
            <div class="request-box">
              <div class="request-label">
                ${safeHtml(primaryLeftLabel)}
              </div>
              <div class="request-value">
                ${safeHtml(primaryLeftValue)}
              </div>
            </div>

            <div class="request-box">
              <div class="request-label">
                ${safeHtml(primaryRightLabel)}
              </div>
              <div class="request-value">
                ${safeHtml(primaryRightValue)}
              </div>
            </div>

            <div class="request-box">
              <div class="request-label">
                ${safeHtml(secondLeftLabel)}
              </div>
              <div class="request-value">
                ${safeHtml(secondLeftValue)}
              </div>

            <div class="request-box">

    async function loadPage() {
      setRefreshLoading(true);

      try {
        if (!TENANT_ID) {
          throw new Error(
            '網址缺少 tenant_id'
          );
        }

        if (!LINE_USER_ID) {
          const ready =
            await initLineUserId();

          if (!ready) {
            return;
          }
        }

        const results =
          await Promise.allSettled([
            jsonpRequest(
              'landlord_tenants',
              {}
            ),
            jsonpRequest(
              'landlord_contract_requests_init',
              {}
            )
          ]);

        if (
          results[0].status !==
          'fulfilled'
        ) {
          throw results[0].reason;
        }

        const tenantData =
          unwrapData(
            results[0].value
          );

        let requests = [];

        if (
          results[1].status ===
          'fulfilled'
        ) {
          try {
            const contractData =
              unwrapData(
                results[1].value
              );

            requests =
              Array.isArray(
                contractData.requests
              )
                ? contractData.requests
                    .filter(
                      function (request) {
                        return (
                          rawText(
                            request.tenant_id
                          ).trim() ===
                          TENANT_ID
                        );
                      }
                    )
                    .sort(
                      function (a, b) {
                        const aTime =
                          new Date(
                            a.updated_at ||
                            a.created_at ||
                            0
                          ).getTime();

                        const bTime =
                          new Date(
                            b.updated_at ||
                            b.created_at ||
                            0
                          ).getTime();

                        return bTime - aTime;
                      }
                    )
                : [];
          } catch (error) {
            console.warn(
              '合約申請資料讀取失敗：',
              error
            );
          }
        }

        renderPage(
          tenantData,
          requests
        );
      } catch (error) {
        renderError(
          error && error.message
            ? error.message
            : String(error)
        );
      } finally {
        setRefreshLoading(false);
      }
    }

    function openMessageModal() {
      if (!CURRENT_TENANT) {
        showToast(
          '找不到房客資料'
        );

        return;
      }

      document.getElementById(
        'messageModalSubtitle'
      ).textContent =
        (
          CURRENT_TENANT.tenant_name ||
          '房客'
        ) +
        '・房號 ' +
        (
          CURRENT_TENANT.room_list ||
          '-'
        );

      document.getElementById(
        'customLineMessage'
      ).value = '';

      updateMessageCount();

      document.getElementById(
        'messageModal'
      ).classList.add('show');

      document.body.classList.add(
        'modal-open'
      );
    }

    function closeMessageModal() {
      document.getElementById(
        'messageModal'
      ).classList.remove('show');

      document.body.classList.remove(
        'modal-open'
      );
    }

    function closeMessageModalFromBackdrop(
      event
    ) {
      if (
        event.target &&
        event.target.id ===
        'messageModal'
      ) {
        closeMessageModal();
      }
    }

    function updateMessageCount() {
      const textarea =
        document.getElementById(
          'customLineMessage'
        );

      document.getElementById(
        'messageCount'
      ).textContent =
        (
          textarea
            ? textarea.value.length
            : 0
        ) +
        ' / 500';
    }

    async function sendTenantLineMessage(
      messageType,
      messageText
    ) {
      if (!CURRENT_TENANT) {
        throw new Error(
          '找不到房客資料'
        );
      }

      const result =
        await jsonpRequest(
          'landlord_send_tenant_message',
          {
            tenant_id:
              CURRENT_TENANT.tenant_id || '',
            tenant_user_id:
              CURRENT_TENANT.tenant_user_id || '',
            message_type:
              messageType,
            message_text:
              messageText || ''
          }
        );

      if (
        !result ||
        result.success !== true
      ) {
        throw new Error(
          result && result.message
            ? result.message
            : 'LINE 訊息發送失敗'
        );
      }

      return result;
    }

    async function sendPaymentReminder() {
      if (!CURRENT_TENANT) {
        showToast(
          '找不到房客資料'
        );

        return;
      }

      const confirmed =
        window.confirm(
          '確定要傳送 LINE 繳費提醒給「' +
          (
            CURRENT_TENANT.tenant_name ||
            '房客'
          ) +
          '」嗎？'
        );

      if (!confirmed) {
        return;
      }

      try {
        showToast(
          'LINE 訊息傳送中...'
        );

        await sendTenantLineMessage(
          'payment_reminder',
          ''
        );

        showToast(
          '繳費提醒已送出'
        );
      } catch (error) {
        showToast(
          error && error.message
            ? error.message
            : '發送失敗'
        );
      }
    }

    async function submitCustomMessage() {
      const textarea =
        document.getElementById(
          'customLineMessage'
        );

      const message =
        textarea
          ? textarea.value.trim()
          : '';

      if (!message) {
        showToast(
          '請輸入訊息內容'
        );

        return;
      }

      if (message.length > 500) {
        showToast(
          '自訂訊息最多 500 字'
        );

        return;
      }

      const button =
        document.getElementById(
          'sendMessageButton'
        );

      button.disabled = true;
      button.textContent =
        '傳送中...';

      try {
        await sendTenantLineMessage(
          'custom',
          message
        );

        closeMessageModal();

        showToast(
          'LINE 訊息已送出'
        );
      } catch (error) {
        showToast(
          error && error.message
            ? error.message
            : '發送失敗'
        );
      } finally {
        button.disabled = false;
        button.textContent =
          '傳送訊息';
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    window.addEventListener(
      'orientationchange',
      function () {
        setTimeout(
          setAppHeight,
          250
        );
      }
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
