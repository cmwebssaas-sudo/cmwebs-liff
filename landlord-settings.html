<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 系統設定</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 68px;
      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #edf9f2;
      --purple: #7654c4;
      --purple-soft: #f3efff;
      --blue: #1a73e8;
      --blue-soft: #edf4ff;
      --orange: #ef8f00;
      --orange-soft: #fff5df;
      --danger: #d93025;
      --danger-soft: #fff0ef;
      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;
      --shadow: 0 10px 34px rgba(25, 35, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 650px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(
          circle at 100% 0%,
          rgba(26, 115, 232, 0.09),
          transparent 28%
        ),
        var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(16px, env(safe-area-inset-top))
        15px
        calc(
          var(--nav-height) +
          22px +
          env(safe-area-inset-bottom)
        );
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .eyebrow {
      color: var(--blue);
      font-size: 10px;
      font-weight: 900;
    }

    .page-title {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.35px;
    }

    .refresh-button {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #5f6670;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #155fc5 0%,
          #1a73e8 58%,
          #125ab8 100%
        );
    }

    .hero::after {
      position: absolute;
      top: -65px;
      right: -45px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.13);
      content: "";
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 9px;
      font-weight: 900;
    }

    .workspace-name {
      margin-top: 5px;
      font-size: 21px;
      font-weight: 900;
    }

    .hero-desc {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 10px;
      line-height: 1.65;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 13px;
    }

    .hero-chip {
      padding: 6px 9px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.92);
      font-size: 8px;
      font-weight: 900;
    }

    .tabs {
      position: sticky;
      z-index: 20;
      top: -1px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 5px;
      margin-bottom: 13px;
      padding: 7px;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 7px 20px rgba(25, 35, 55, 0.07);
      backdrop-filter: blur(12px);
    }

    .tab-button {
      min-width: 0;
      min-height: 39px;
      padding: 5px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 8px;
      font-weight: 900;
      cursor: pointer;
    }

    .tab-button.active {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .settings-panel {
      display: none;
    }

    .settings-panel.active {
      display: block;
    }

    .section-card {
      padding: 16px;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 900;
    }

    .section-desc {
      margin-top: 5px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.6;
    }

    .permission-badge {
      flex: 0 0 auto;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 8px;
      font-weight: 900;
    }

    .permission-badge.readonly {
      background: #f0f2f5;
      color: #727983;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 11px;
    }

    .form-field {
      min-width: 0;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    .field-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 10px;
      font-weight: 900;
    }

    .field-hint {
      color: var(--muted);
      font-size: 8px;
      font-weight: 700;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 11px;
      outline: none;
      background: #ffffff;
      color: var(--text);
    }

    .input,
    .select {
      height: 43px;
      padding: 0 11px;
    }

    .textarea {
      min-height: 88px;
      padding: 10px 11px;
      resize: vertical;
      line-height: 1.6;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: rgba(26, 115, 232, 0.55);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.08);
    }

    .input:disabled,
    .select:disabled,
    .textarea:disabled {
      background: #f4f5f7;
      color: #8b919a;
    }

    .inline-note {
      margin-top: 12px;
      padding: 10px 11px;
      border: 1px solid #d7e4f8;
      border-radius: 11px;
      background: var(--blue-soft);
      color: #3b5f92;
      font-size: 9px;
      line-height: 1.65;
    }

    .inline-note.warning {
      border-color: #f3d7a9;
      background: var(--orange-soft);
      color: #8a5a12;
    }

    .save-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 15px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .save-button {
      min-width: 150px;
      min-height: 45px;
      padding: 0 16px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 10px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(6, 199, 85, 0.17);
    }

    .save-button:disabled {
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
    }

    .subsection {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }

    .subsection:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .subsection-title {
      margin-bottom: 11px;
      font-size: 12px;
      font-weight: 900;
    }

    .toggle-list {
      display: grid;
      gap: 9px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 13px;
      min-height: 55px;
      padding: 10px 11px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-soft);
    }

    .toggle-main {
      min-width: 0;
      flex: 1;
    }

    .toggle-title {
      font-size: 10px;
      font-weight: 900;
    }

    .toggle-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 8px;
      line-height: 1.5;
    }

    .toggle {
      position: relative;
      width: 45px;
      height: 25px;
      flex: 0 0 45px;
    }

    .toggle input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #c9ced5;
      cursor: pointer;
      transition: background 0.18s ease;
    }

    .toggle-track::after {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 19px;
      height: 19px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      content: "";
      transition: transform 0.18s ease;
    }

    .toggle input:checked + .toggle-track {
      background: var(--primary);
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(20px);
    }

    .toggle input:disabled + .toggle-track {
      opacity: 0.5;
      cursor: default;
    }

    .readonly-box {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: var(--surface-soft);
    }

    .readonly-label {
      color: var(--muted);
      font-size: 8px;
    }

    .readonly-value {
      margin-top: 5px;
      overflow-wrap: anywhere;
      font-size: 11px;
      font-weight: 900;
    }

    .loading-card,
    .error-card {
      padding: 30px 18px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      text-align: center;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 14px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-title,
    .error-title {
      margin-bottom: 7px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .retry-button {
      width: 100%;
      min-height: 44px;
      margin-top: 15px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .toast {
      position: absolute;
      z-index: 2600;
      right: 16px;
      bottom:
        calc(
          var(--nav-height) +
          18px +
          env(safe-area-inset-bottom)
        );
      left: 16px;
      max-width: 470px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 13px;
      background: #22252a;
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      line-height: 1.55;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition:
        opacity 0.18s ease,
        transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--danger);
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    @media (max-width: 520px) {
      .tabs {
        grid-template-columns: repeat(5, minmax(58px, 1fr));
        overflow-x: auto;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-field.full {
        grid-column: auto;
      }

      .save-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="topbar">
        <div>
          <div class="eyebrow">System Settings</div>
          <div class="page-title">系統設定</div>
        </div>

        <button
          class="refresh-button"
          type="button"
          onclick="loadPage()"
        >
          ↻
        </button>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">設定資料載入中</div>
          正在讀取管理團隊、收款帳號與通知偏好。
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(
        location.search
      );

    const TEST_MODE =
      URL_PARAMS.get('test') ===
      '1';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let ACTIVE_TAB = 'profile';
    let toastTimer = null;
    let saving = false;

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      return value === undefined || value === null
        ? ''
        : String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function inputValue(id) {
      const element =
        document.getElementById(
          id
        );

      return element
        ? rawText(
            element.value
          ).trim()
        : '';
    }

    function inputChecked(id) {
      const element =
        document.getElementById(
          id
        );

      return Boolean(
        element &&
        element.checked
      );
    }

    function goPage(page) {
      const separator =
        page.indexOf('?') >= 0
          ? '&'
          : '?';

      location.href =
        page +
        separator +
        'v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        );
    }

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

      entryUrl.searchParams.set(
        'return_to',
        returnTo
      );

      return entryUrl.href;
    }

    async function initLine() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      await liff.init({
        liffId:
          LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            buildLandlordLoginRedirectUri()
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId ||
        '';

      return true;
    }

    function showToast(
      message,
      isError
    ) {
      const toast =
        document.getElementById(
          'toast'
        );

      clearTimeout(
        toastTimer
      );

      toast.textContent =
        message ||
        '';

      toast.className =
        isError
          ? 'toast error show'
          : 'toast show';

      toastTimer =
        setTimeout(
          function () {
            toast.className =
              'toast';
          },
          3200
        );
    }

    function jsonpRequest(
      action,
      params,
      retryCount
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_settings_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished =
            false;

          const timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished =
                  true;

                cleanup();

                if (
                  Number(
                    retryCount ||
                    0
                  ) <
                  1
                ) {
                  jsonpRequest(
                    action,
                    params,
                    1
                  ).then(
                    resolve
                  ).catch(
                    reject
                  );

                  return;
                }

                reject(
                  new Error(
                    'API 載入逾時，請確認系統設定後端已部署。'
                  )
                );
              },
              45000
            );

          function cleanup() {
            clearTimeout(
              timer
            );

            if (
              script.parentNode
            ) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[
                callbackName
              ] =
                undefined;
            }
          }

          window[
            callbackName
          ] =
            function (result) {
              if (finished) {
                return;
              }

              finished =
                true;

              cleanup();

              resolve(
                result
              );
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params ||
            {}
          ).forEach(
            function (key) {
              url +=
                '&' +
                encodeURIComponent(
                  key
                ) +
                '=' +
                encodeURIComponent(
                  params[
                    key
                  ]
                );
            }
          );

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished =
                true;

              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗'
                )
              );
            };

          script.src =
            url;

          document.body.appendChild(
            script
          );
        }
      );
    }

              'bankAccountName'
            ),
          payment_note:
            inputValue(
              'paymentNote'
            )
        },
        '收款帳號已更新'
      );
    }

    function collectPreferencePayload() {
      const previous =
        PAGE_DATA.preferences ||
        {};

      return {
        locale:
          previous.locale ||
          'zh-TW',

        timezone:
          inputValue(
            'workspaceTimezone'
          ) ||
          previous.timezone ||
          'Asia/Taipei',

        currency:
          inputValue(
            'workspaceCurrency'
          ) ||
          previous.currency ||
          'TWD',

        default_payment_day:
          inputValue(
            'defaultPaymentDay'
          ),

        default_electricity_fee_rate:
          inputValue(
            'defaultElectricityRate'
          ),

        summer_month_start:
          inputValue(
            'summerMonthStart'
          ),

        summer_month_end:
          inputValue(
            'summerMonthEnd'
          ),

        summer_equipment_fee_rate:
          inputValue(
            'summerEquipmentRate'
          ),

        regular_equipment_fee_rate:
          inputValue(
            'regularEquipmentRate'
          ),

        default_management_fee:
          inputValue(
            'defaultManagementFee'
          ),

        default_deposit_months:
          inputValue(
            'defaultDepositMonths'
          ),

        late_fee_type:
          inputValue(
            'lateFeeType'
          ),

        late_fee_value:
          inputValue(
            'lateFeeValue'
          ),

        late_fee_grace_days:
          inputValue(
            'lateFeeGraceDays'
          ),

        auto_overdue_reminder:
          inputChecked(
            'autoOverdueReminder'
          ),

        overdue_reminder_hour:
          inputValue(
            'overdueReminderHour'
          ),

        overdue_reminder_days:
          inputValue(
            'overdueReminderDays'
          ),

        notify_bill_created:
          inputChecked(
            'notifyBillCreated'
          ),

        notify_payment_report:
          inputChecked(
            'notifyPaymentReport'
          ),

        notify_overdue:
          inputChecked(
            'notifyOverdue'
          ),

        notify_contract:
          inputChecked(
            'notifyContract'
          ),

        notify_checkin:
          inputChecked(
            'notifyCheckin'
          ),

        notify_announcement_result:
          inputChecked(
            'notifyAnnouncementResult'
          ),

        notify_line_failure:
          inputChecked(
            'notifyLineFailure'
          ),

        announcement_signature:
          inputValue(
            'announcementSignature'
          ),

        bill_message_footer:
          inputValue(
            'billMessageFooter'
          )
      };
    }

    async function savePreferences(source) {
      await runSave(
        source ===
          'billing'
          ? 'billingSaveButton'
          : 'notificationSaveButton',
        'landlord_settings_save_preferences',
        {
          payload_json:
            JSON.stringify(
              collectPreferencePayload()
            )
        },
        source ===
          'billing'
          ? '帳務預設已更新'
          : '通知偏好已更新'
      );
    }

    async function runSave(
      buttonId,
      action,
      params,
      fallbackMessage
    ) {
      if (saving) {
        return;
      }

      const button =
        document.getElementById(
          buttonId
        );

      const originalText =
        button
          ? button.textContent
          : '';

      saving =
        true;

      if (button) {
        button.disabled =
          true;
        button.textContent =
          '儲存中...';
      }

      try {
        const result =
          await jsonpRequest(
            action,
            params
          );

        if (
          !result ||
          result.success !==
          true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '設定儲存失敗'
          );
        }

        showToast(
          result.message ||
          fallbackMessage
        );

        await loadPage(
          false,
          ACTIVE_TAB
        );

      } catch (error) {
        showToast(
          error &&
          error.message
            ? error.message
            : '設定儲存失敗',
          true
        );

      } finally {
        saving =
          false;

        if (button) {
          button.disabled =
            false;
          button.textContent =
            originalText;
        }
      }
    }

    function renderLoading() {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">設定資料載入中</div>
          正在讀取管理團隊、收款帳號與通知偏好。
        </section>
      `;
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">
            系統設定載入失敗
          </div>

          ${safeHtml(
            message ||
            '未知錯誤'
          )}

          <button
            class="retry-button"
            type="button"
            onclick="loadPage()"
          >
            重新整理
          </button>
        </section>
      `;
    }

    async function loadPage(
      showLoading,
      restoreTab
    ) {
      if (
        restoreTab
      ) {
        ACTIVE_TAB =
          restoreTab;
      }

      if (
        showLoading !==
        false
      ) {
        renderLoading();
      }

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLine();

          if (!ready) {
            return;
          }
        }

        const result =
          await jsonpRequest(
            'landlord_settings_init',
            {}
          );

        if (
          !result ||
          result.success !==
          true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '系統設定載入失敗'
          );
        }

        PAGE_DATA =
          result.data ||
          {};

        renderPage();

      } catch (error) {
        renderError(
          error &&
          error.message
            ? error.message
            : String(
                error
              )
        );
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    if (
      window.visualViewport
    ) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
