<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>CMWebs 申請續約</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 66px;

      --primary: #06c755;
      --primary-dark: #05a847;
      --primary-soft: #eaf9f0;

      --background: #f4f6f9;
      --surface: #ffffff;
      --text: #222222;
      --muted: #747981;
      --border: #e7eaee;

      --blue: #1a73e8;
      --blue-soft: #eaf2ff;

      --orange: #ef8f00;
      --orange-soft: #fff4dc;

      --danger: #d93025;
      --danger-soft: #fff0ef;

      --shadow: 0 4px 16px rgba(0, 0, 0, 0.065);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--background);
      color: var(--text);
      font-family: Arial, "Noto Sans TC", sans-serif;
    }

    body.modal-open {
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background: var(--background);
    }

    .page {
      width: 100%;
      height: 100%;
      padding:
        16px
        15px
        calc(
          var(--nav-height) +
          28px +
          env(safe-area-inset-bottom)
        );
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .back-btn {
      display: flex;
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      color: #333333;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .back-btn svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-content {
      min-width: 0;
      flex: 1;
    }

    .page-title {
      margin: 0;
      font-size: 23px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .page-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .card {
      padding: 17px;
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .section-title {
      margin-bottom: 12px;
      font-size: 17px;
      font-weight: 900;
    }

    .contract-card {
      position: relative;
      overflow: hidden;
      padding: 18px;
      margin-bottom: 13px;
      border-radius: 18px;
      background:
        linear-gradient(
          145deg,
          #0bb95a 0%,
          #06c755 56%,
          #05aa49 100%
        );
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(6, 199, 85, 0.22);
    }

    .contract-card::after {
      position: absolute;
      top: -50px;
      right: -38px;
      width: 155px;
      height: 155px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      content: "";
    }

    .contract-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .contract-room {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.3;
    }

    .contract-landlord {
      margin-top: 5px;
      font-size: 12px;
      opacity: 0.92;
    }

    .days-box {
      display: flex;
      min-width: 78px;
      min-height: 63px;
      padding: 10px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.2);
      text-align: center;
    }

    .days-value {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .days-label {
      margin-top: 5px;
      font-size: 10px;
      font-weight: 700;
      opacity: 0.92;
    }

    .contract-dates {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      padding-top: 13px;
      border-top: 1px solid rgba(255, 255, 255, 0.27);
      font-size: 12px;
      font-weight: 800;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 0;
      border-top: 1px solid #eeeeee;
      font-size: 13px;
      line-height: 1.55;
    }

    .detail-row:first-child {
      border-top: none;
    }

    .detail-label {
      flex: 0 0 auto;
      color: var(--muted);
    }

    .detail-value {
      min-width: 0;
      font-weight: 800;
      text-align: right;
      word-break: break-word;
    }

    .detail-value.primary {
      color: #10893e;
    }

    .term-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .term-option {
      min-height: 64px;
      padding: 10px 7px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      color: #333333;
      text-align: center;
      cursor: pointer;
    }

    .term-option:active {
      opacity: 0.7;
    }

    .term-option.active {
      border-color: #79dba1;
      background: var(--primary-soft);
      color: #10893e;
      box-shadow: inset 0 0 0 1px rgba(6, 199, 85, 0.12);
    }

    .term-months {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.2;
    }

    .term-label {
      margin-top: 4px;
      font-size: 10px;
      font-weight: 800;
    }

    .custom-term-wrap {
      display: none;
      margin-top: 11px;
    }

    .custom-term-wrap.show {
      display: block;
    }

    .field {
      margin-top: 14px;
    }

    .field:first-child {
      margin-top: 0;
    }

    .field-label {
      display: block;
      margin-bottom: 7px;
      color: #333333;
      font-size: 13px;
      font-weight: 900;
    }

    .field-hint {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.55;
    }

    .field-input,
    .field-select,
    .field-textarea {
      width: 100%;
      border: 1px solid #dfe3e8;
      border-radius: 11px;
      outline: none;
      background: #ffffff;
      color: #222222;
      transition: border-color 0.15s ease;
    }

    .field-input,
    .field-select {
      min-height: 46px;
      padding: 11px 12px;
    }

    .field-textarea {
      min-height: 118px;
      padding: 12px;
      resize: vertical;
      line-height: 1.65;
    }

    .field-input:focus,
    .field-select:focus,
    .field-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.1);
    }

    .field-input[readonly] {
      background: #f6f8fa;
      color: #555555;
    }

    .amount-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .amount-box {
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #fafbfc;
    }

    .amount-box-label {
      color: #555555;
      font-size: 12px;
      font-weight: 900;
    }

    .amount-current {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .currency-input-wrap {
      position: relative;
      margin-top: 9px;
    }

    .currency-prefix {
      position: absolute;
      top: 50%;
      left: 12px;
      z-index: 1;
      color: #5f6368;
      font-size: 13px;
      font-weight: 900;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .currency-input-wrap .field-input {
      padding-left: 46px;
      font-weight: 900;
    }

    .amount-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .small-action-btn {
      padding: 8px 11px;
      border: 1px solid #cfe8d8;
      border-radius: 999px;
      background: #ffffff;
      color: #10893e;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .small-action-btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .amount-preview-lines {
      display: grid;
      gap: 7px;
      margin-top: 8px;
    }

    .amount-preview-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #334039;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.55;
    }

    .amount-preview-line strong {
      color: #111111;
      text-align: right;
    }

    .amount-delta {
      margin-left: 5px;
      color: #6b7470;
      font-size: 10px;
      font-weight: 800;
    }

    .amount-delta.increase {
      color: #b25f00;
    }

    .amount-delta.decrease {
      color: #137333;
    }

    @media (max-width: 390px) {
      .amount-grid {
        grid-template-columns: 1fr;
      }
    }

    .quick-reasons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 9px;
    }

    .reason-chip {
      padding: 8px 10px;
      border: 1px solid #dfe3e8;
      border-radius: 999px;
      background: #ffffff;
      color: #555555;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .reason-chip:active {
      opacity: 0.65;
    }

    .char-count {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      text-align: right;
    }

    .renewal-preview {
      padding: 14px;
      margin-top: 14px;
      border: 1px solid #ccefd9;
      border-radius: 13px;
      background: #f1fbf5;
    }

    .preview-title {
      color: #10893e;
      font-size: 13px;
      font-weight: 900;
    }

    .preview-range {
      margin-top: 8px;
      color: #222222;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.5;
    }

    .preview-note {
      margin-top: 6px;
      color: #5e7467;
      font-size: 11px;
      line-height: 1.55;
    }

    .notice-box {
      padding: 13px;
      margin-top: 13px;
      border-radius: 12px;
      background: var(--orange-soft);
      color: #7d5100;
      font-size: 12px;
      line-height: 1.65;
    }

    .pending-box {
      padding: 14px;
      margin-bottom: 13px;
      border: 1px solid #ffd88f;
      border-radius: 14px;
      background: #fff9ed;
    }

    .pending-title {
      color: #9b6200;
      font-size: 15px;
      font-weight: 900;
    }

    .pending-message {
      margin-top: 7px;
      color: #725c35;
      font-size: 12px;
      line-height: 1.65;
    }

    .page-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      width: 100%;
      min-height: 47px;
      padding: 12px 14px;
      border: 0;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn:active {
      opacity: 0.72;
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-light {
      border: 1px solid #dfe3e8;
      background: #ffffff;
      color: #333333;
    }

    .loading,
    .error-box {
      padding: 42px 20px;
      text-align: center;
    }

    .loading {
      color: var(--muted);
    }

    .error-card {
      padding: 18px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .error-title {
      color: var(--danger);
      font-size: 19px;
      font-weight: 900;
      text-align: left;
    }

    .error-message {
      margin-top: 9px;
      color: #555555;
      font-size: 14px;
      line-height: 1.7;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bottom-nav {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 9999;
      width: 100%;
      padding-bottom: env(safe-area-inset-bottom);
      border-top: 1px solid #eceff3;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      height: var(--nav-height);
    }

    .nav-item {
      position: relative;
      display: flex;
      appearance: none;
      -webkit-appearance: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b9098;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    .modal-mask,
    .alert-mask {
      position: fixed;
      inset: 0;
      z-index: 100000;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
      background: rgba(0, 0, 0, 0.45);
    }

    .modal-mask.show,
    .alert-mask.show {
      display: flex;
    }

    .modal-sheet {
      width: 100%;
      max-width: 530px;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      border-radius: 20px 20px 16px 16px;
      background: #ffffff;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
    }

    .modal-handle {
      width: 42px;
      height: 4px;
      margin: 0 auto 14px;
      border-radius: 999px;
      background: #d8dce1;
    }

    .modal-title {
      font-size: 19px;
      font-weight: 900;
    }

    .modal-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .confirm-summary {
      margin-top: 14px;
      padding: 13px;
      border-radius: 12px;
      background: #f6f8fa;
    }

    .confirm-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid #e8ebef;
      font-size: 12px;
      line-height: 1.55;
    }

    .confirm-row:first-child {
      border-top: 0;
    }

    .confirm-label {
      color: var(--muted);
    }

    .confirm-value {
      max-width: 65%;
      font-weight: 800;
      text-align: right;
      word-break: break-word;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .alert-mask {
      align-items: center;
    }

    .alert-box {
      width: 100%;
      max-width: 420px;
      padding: 18px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.2);
    }

    .alert-title {
      font-size: 19px;
      font-weight: 900;
    }

    .alert-message {
      margin: 11px 0 16px;
      color: #555555;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div id="app" class="loading">
        續約資料載入中...
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" onclick="goPage('tenant-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" onclick="goPage('tenant-bills.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>帳單</span>
        </button>

        <button class="nav-item active" onclick="goPage('tenant-contract.html')">
          <svg viewBox="0 0 24 24">
            <path d="M6 3.5h9l3 3V20H6z"></path>
            <path d="M15 3.5V7h3"></path>
            <path d="M9 11h6"></path>
            <path d="M9 15h6"></path>
          </svg>
          <span>合約</span>
        </button>

        <button class="nav-item" onclick="goPage('tenant-message.html')">
          <svg viewBox="0 0 24 24">
            <path d="M5 5h14v11H9l-4 3z"></path>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 12h5"></path>
          </svg>
          <span>聯絡</span>
        </button>
      </div>
    </nav>
  </div>

  <div id="confirmModal" class="modal-mask">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">確認送出續約申請</div>
      <div class="modal-subtitle">
        送出後將通知房東審核。核准前不會直接變更目前合約。
      </div>
      <div id="confirmSummary" class="confirm-summary"></div>
      <div class="modal-actions">
        <button class="btn btn-light" onclick="closeConfirmModal()">
          返回修改
        </button>
        <button id="confirmSubmitBtn" class="btn btn-primary" onclick="submitRenewal()">
          確認送出
        </button>
      </div>
    </div>
  </div>

  <div id="alertModal" class="alert-mask">
    <div class="alert-box">
      <div id="alertTitle" class="alert-title">提示</div>
      <div id="alertMessage" class="alert-message"></div>
      <button class="btn btn-primary" onclick="closeAlertModal()">
        確定
      </button>
    </div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-iJB1D6sN';

    const TEST_LINE_USER_ID =
      'U3615a7ed919c1a4a438a246c10784d70';

    const QUERY_PARAMS =
      new URLSearchParams(location.search);

    const TEST_MODE =
      QUERY_PARAMS.get('test') === '1';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let CONTRACT = null;
    let SELECTED_TERM = 12;
    let CUSTOM_TERM_ACTIVE = false;
    let ALERT_CALLBACK = null;
    let IS_SUBMITTING = false;

    const app =
      document.getElementById('app');

    function updateAppHeight() {
      const height =
        window.visualViewport
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement
        .style
        .setProperty('--app-height', height + 'px');
    }

    updateAppHeight();
    window.addEventListener('resize', updateAppHeight);

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        updateAppHeight
      );
    }

    function rawText(value) {
      if (value === undefined || value === null) {
        return '';
      }

      return String(value);
    }

    function escapeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeText(value) {
      const text = rawText(value).trim();
      return text ? escapeHtml(text) : '-';
    }

    function money(value) {
      const number = Number(value || 0);
      return 'NT$ ' + Math.round(
        isFinite(number) ? number : 0
      ).toLocaleString('zh-TW');
    }

    function optionalMoney(value) {
      if (
        value === undefined ||
        value === null ||
        rawText(value).trim() === ''
      ) {
        return '未設定';
      }

      return money(value);
    }

    function dateFromValue(value) {
      if (value === undefined || value === null || value === '') {
        return null;
      }

      if (
        typeof value === 'number' ||
        /^\d{5}(\.\d+)?$/.test(rawText(value).trim())
      ) {
        const serial = Number(value);

        if (isFinite(serial) && serial > 20000 && serial < 100000) {
          return new Date(
            Date.UTC(1899, 11, 30) + serial * 86400000
          );
        }
      }

      const text = rawText(value).trim();

      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
        return new Date(text + 'T12:00:00+08:00');
      }

      const parsed = new Date(text);
      return isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatDateOnly(value) {
      const date = dateFromValue(value);

      if (!date) {
        return safeText(value);
      }

      return new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(date);
    }

    function todayDateText() {
      return new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(new Date());
    }

    function addDays(value, days) {
      const date = dateFromValue(value);
      if (!date) return null;

      const result = new Date(date.getTime());
      result.setDate(result.getDate() + Number(days || 0));
      return result;
    }

    function addMonthsClamped(value, months) {
      const date = dateFromValue(value);
      const count = Number(months || 0);

      if (!date || !isFinite(count)) {
        return null;
      }

      const year = date.getFullYear();
      const month = date.getMonth();
      const day = date.getDate();

      const targetFirst = new Date(
        year,
        month + count,
        1,
        12,
        0,
        0
      );

      const lastDay = new Date(
        targetFirst.getFullYear(),
        targetFirst.getMonth() + 1,
        0
      ).getDate();

      targetFirst.setDate(Math.min(day, lastDay));
      return targetFirst;
    }

    function formatDateObject(date) {
      if (!date || isNaN(date.getTime())) {
        return '';
      }

      return new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(date);
    }

    function callApi(action, params) {
      return new Promise(function (resolve, reject) {
        if (!LINE_USER_ID) {
          reject(new Error('缺少房客 LINE User ID'));
          return;
        }

        params = params || {};

        const callbackName =
          'cmwebsJsonp_' +
          Date.now() +
          '_' +
          Math.floor(Math.random() * 1000000);

        const script = document.createElement('script');
        let finished = false;
        let timer = null;

        function cleanup() {
          if (timer) clearTimeout(timer);
          if (script.parentNode) script.parentNode.removeChild(script);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }
        }

        window[callbackName] = function (json) {
          if (finished) return;

          finished = true;
          cleanup();

          if (!json || json.success !== true) {
            const message = json && json.message
              ? json.message
              : 'API 查詢失敗';

            const code = json && json.code
              ? json.code
              : '';

            const error = new Error(
              code ? message + '\n錯誤代碼：' + code : message
            );

            error.code = code;
            error.data = json && json.data ? json.data : null;
            reject(error);
            return;
          }

          resolve(json.data || {});
        };

        timer = setTimeout(function () {
          if (finished) return;

          finished = true;
          cleanup();
          reject(new Error('API 載入逾時'));
        }, 30000);

        let url =
          API_URL +
          '?v2_action=' + encodeURIComponent(action) +
          '&line_user_id=' + encodeURIComponent(LINE_USER_ID) +
          '&callback=' + encodeURIComponent(callbackName) +
          '&_=' + Date.now();

        Object.keys(params).forEach(function (key) {
          const value = params[key];

          if (value === undefined || value === null) return;

          url +=
            '&' + encodeURIComponent(key) +
            '=' + encodeURIComponent(value);
        });

        script.charset = 'UTF-8';
        script.onerror = function () {
          console.warn('JSONP script onerror ignored.');
        };
        script.src = url;
        document.body.appendChild(script);
      });
    }

    async function initLineUserId() {
      if (TEST_MODE) {
        LINE_USER_ID = TEST_LINE_USER_ID;
        return true;
      }

      if (typeof liff === 'undefined') {

      }

      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: location.href });
        return false;
      }

      const profile = await liff.getProfile();
      LINE_USER_ID = profile.userId || '';

      if (!LINE_USER_ID) {
        throw new Error('無法取得房客 LINE User ID');
      }

      return true;
    }

    function selectTerm(months) {
      CUSTOM_TERM_ACTIVE = false;
      SELECTED_TERM = Number(months || 0);

      if (wrap) wrap.classList.remove('show');

      updateTermButtons();
      updateRenewalPreview();

    function selectCustomTerm() {
      CUSTOM_TERM_ACTIVE = true;

      const wrap = document.getElementById('customTermWrap');
      if (wrap) wrap.classList.add('show');

      const input = document.getElementById('customTerm');
      const current = Number(input && input.value ? input.value : 0);
      SELECTED_TERM = current >= 1 && current <= 36 ? current : 0;

      updateTermButtons();
      updateRenewalPreview();

      if (input) input.focus();
    }

    function updateCustomTerm() {
      const input = document.getElementById('customTerm');
      const value = Number(input ? input.value : 0);

      SELECTED_TERM = value >= 1 && value <= 36 ? value : 0;
      updateRenewalPreview();
    }

    function updateTermButtons() {
      document.querySelectorAll('.term-option').forEach(function (button) {
        const value = button.getAttribute('data-term');
        const active = CUSTOM_TERM_ACTIVE
          ? value === 'custom'
          : Number(value) === Number(SELECTED_TERM);

        button.classList.toggle('active', active);
      });
    }

    function getRenewalDates() {
      const endDate = CONTRACT ? CONTRACT.end_date : '';
      const startDate = addDays(endDate, 1);
      const preferredEnd = addMonthsClamped(endDate, SELECTED_TERM);

      return {
        start_date: formatDateObject(startDate),
        preferred_end_date: formatDateObject(preferredEnd)
      };
    }

    function updateRenewalPreview() {
      const preview = document.getElementById('previewRange');
      if (!preview) return;

      if (!SELECTED_TERM || SELECTED_TERM < 1 || SELECTED_TERM > 36) {
        preview.textContent = '請輸入 1 至 36 個月';
        return;
      }

      const dates = getRenewalDates();
      preview.textContent =
        dates.start_date +
        ' ～ ' +
        dates.preferred_end_date +
        '（' + SELECTED_TERM + ' 個月）';
    }

    function readAmountInput(id) {
      const input = document.getElementById(id);
      const value = Number(input ? input.value : NaN);

      return isFinite(value) ? value : NaN;
    }

    function amountDeltaHtml(currentValue, requestedValue) {
      const current = Math.round(Number(currentValue || 0));
      const requested = Math.round(Number(requestedValue || 0));
      const difference = requested - current;

      if (difference === 0) {
        return '<span class="amount-delta">維持原金額</span>';
      }

      if (difference > 0) {
        return '<span class="amount-delta increase">增加 ' + money(difference) + '</span>';
      }

      return '<span class="amount-delta decrease">減少 ' + money(Math.abs(difference)) + '</span>';
    }

    function updateAmountPreview() {
      const preview = document.getElementById('amountPreview');
      if (!preview || !CONTRACT) return;

      const requestedRent = readAmountInput('requestedRentAmount');
      const requestedManagement = readAmountInput('requestedManagementFee');

      const rentText = isFinite(requestedRent)
        ? money(requestedRent)
        : '尚未輸入';

      const managementText = isFinite(requestedManagement)
        ? money(requestedManagement)
        : '尚未輸入';

      preview.innerHTML = `
        <div class="amount-preview-line">
          <span>每月租金</span>
          <strong>
            ${rentText}
            ${isFinite(requestedRent)
              ? amountDeltaHtml(CONTRACT.rent_amount, requestedRent)
              : ''}
          </strong>
        </div>
        <div class="amount-preview-line">
          <span>每月管理費</span>
          <strong>
            ${managementText}
            ${isFinite(requestedManagement)
              ? amountDeltaHtml(CONTRACT.management_fee, requestedManagement)
              : ''}

    function resetRequestedAmounts() {
      if (!CONTRACT) return;

      const rentInput = document.getElementById('requestedRentAmount');

    function updateReasonCount() {

    function collectFormData() {
      const reason = rawText(
        document.getElementById('reason')
          ? document.getElementById('reason').value
          : ''
      ).trim();

      const note = rawText(
        document.getElementById('note')
          ? document.getElementById('note').value
          : ''
      ).trim();

      const requestedRentAmount =
        readAmountInput('requestedRentAmount');

      const requestedManagementFee =
        readAmountInput('requestedManagementFee');

      const dates = getRenewalDates();

      return {
        request_type: 'renewal',
        requested_date: todayDateText(),
        requested_start_date: dates.start_date,
        requested_term_months: SELECTED_TERM,
        requested_rent_amount: requestedRentAmount,
        requested_management_fee: requestedManagementFee,
        preferred_end_date: dates.preferred_end_date,
        reason: reason,
        note: note
      };
    }

    function validateForm(data) {
      if (
        !data.requested_term_months ||
        data.requested_term_months < 1 ||
        data.requested_term_months > 36
      ) {
        return '續約期間請輸入 1 至 36 個月。';
      }

      if (!data.requested_start_date) {
        return '無法計算新租期起日，請確認目前合約到期日。';
      }

      if (!data.preferred_end_date) {
        return '無法計算續約到期日，請確認目前合約到期日。';
      }

      if (
        !isFinite(data.requested_rent_amount) ||
        data.requested_rent_amount <= 0
      ) {
        return '希望續約租金必須大於 0。';
      }

      if (!Number.isInteger(data.requested_rent_amount)) {
        return '希望續約租金請輸入整數金額。';
      }

      if (
        !isFinite(data.requested_management_fee) ||
        data.requested_management_fee < 0
      ) {
        return '希望管理費不可小於 0。';
      }

      if (!Number.isInteger(data.requested_management_fee)) {
        return '希望管理費請輸入整數金額。';
      }

      if (!data.reason) {
        return '請填寫續約原因。';
      }

      if (data.reason.length > 500) {
        return '續約原因最多 500 字。';
      }

      if (data.note.length > 300) {
        return '補充說明最多 300 字。';
      }

      return '';
    }

        <div class="confirm-row">
          <div class="confirm-label">房號</div>
          <div class="confirm-value">${safeText(CONTRACT.room_name)}</div>
        </div>
        <div class="confirm-row">
          <div class="confirm-label">目前到期日</div>
          <div class="confirm-value">${formatDateOnly(CONTRACT.end_date)}</div>
        </div>
        <div class="confirm-row">
          <div class="confirm-label">續約期間</div>
          <div class="confirm-value">${safeText(data.requested_term_months)} 個月</div>
        </div>
        <div class="confirm-row">
          <div class="confirm-label">預計新租期</div>
          <div class="confirm-value">${safeText(data.requested_start_date)} ～ ${safeText(data.preferred_end_date)}</div>
        </div>
        <div class="confirm-row">
          <div class="confirm-label">希望每月租金</div>
          <div class="confirm-value">
            ${money(data.requested_rent_amount)}
            ${amountDeltaHtml(CONTRACT.rent_amount, data.requested_rent_amount)}
          </div>
        </div>
        <div class="confirm-row">
          <div class="confirm-label">希望每月管理費</div>
          <div class="confirm-value">
            ${money(data.requested_management_fee)}
            ${amountDeltaHtml(CONTRACT.management_fee, data.requested_management_fee)}
          </div>
        </div>
        <div class="confirm-row">
          <div class="confirm-label">續約原因</div>
          <div class="confirm-value">${safeText(data.reason)}</div>
        </div>
      `;

      document.getElementById('confirmModal').classList.add('show');
      document.body.classList.add('modal-open');
    }

    function closeConfirmModal() {
      if (IS_SUBMITTING) return;

      document.getElementById('confirmModal').classList.remove('show');
      document.body.classList.remove('modal-open');
    }

    async function submitRenewal() {
      if (IS_SUBMITTING) return;

      const data = collectFormData();
      const error = validateForm(data);

      if (error) {
        closeConfirmModal();
        showAlert('資料尚未完成', error);
        return;
      }

      IS_SUBMITTING = true;

      const button = document.getElementById('confirmSubmitBtn');
      if (button) {
        button.disabled = true;
        button.textContent = '送出中...';
      }

      try {
        const result = await callApi(
          'tenant_contract_request_submit',
          {
            request_type: data.request_type,
            requested_date: data.requested_date,
            requested_start_date: data.requested_start_date,
            requested_term_months: data.requested_term_months,
            requested_rent_amount: data.requested_rent_amount,
            requested_management_fee: data.requested_management_fee,
            preferred_end_date: data.preferred_end_date,
            reason: data.reason,
            note: data.note
          }
        );

        document.getElementById('confirmModal').classList.remove('show');
        document.body.classList.remove('modal-open');

        showAlert(
          '續約申請已送出',
          '申請編號：' + safeAlertText(
            result.request && result.request.request_id
              ? result.request.request_id
              : ''
          ) +
          '\n\n房東已收到申請通知，請至「我的合約」查看審核進度。',
          function () {
            goPage('tenant-contract.html');
          }
        );

      } catch (errorObject) {
        document.getElementById('confirmModal').classList.remove('show');
        document.body.classList.remove('modal-open');

        const message = errorObject && errorObject.message
          ? errorObject.message
          : String(errorObject);

        showAlert('申請送出失敗', message);

      } finally {
        IS_SUBMITTING = false;

        if (button) {
          button.disabled = false;
          button.textContent = '確認送出';
        }
      }
    }

    function safeAlertText(value) {
      const text = rawText(value).trim();
      return text || '-';
    }

    function showAlert(title, message, callback) {
      ALERT_CALLBACK = typeof callback === 'function'
        ? callback
        : null;

      document.getElementById('alertTitle').textContent = title || '提示';
      document.getElementById('alertMessage').textContent = message || '';
      document.getElementById('alertModal').classList.add('show');
      document.body.classList.add('modal-open');
    }

    function closeAlertModal() {
      document.getElementById('alertModal').classList.remove('show');
      document.body.classList.remove('modal-open');

      const callback = ALERT_CALLBACK;
      ALERT_CALLBACK = null;

      if (callback) callback();
    }

    async function loadPage() {
      try {
        renderLoading();
        const data = await callApi('tenant_contract_init');
        renderPage(data);
      } catch (error) {
        renderError(error.message || String(error));
      }
    }

    async function main() {
      try {
        renderLoading();
        const ready = await initLineUserId();

        if (!ready) return;
        await loadPage();
      } catch (error) {
        renderError(error.message || String(error));
      }
    }

    main();
  </script>
</body>
</html>
