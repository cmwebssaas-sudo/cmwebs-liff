<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMWebs LINE 對話紀錄</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 62px;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: var(--app-height);
      margin: 0 auto;
      background: #f5f7fb;
      overflow: hidden;
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 18px 14px calc(var(--nav-height) + 26px + env(safe-area-inset-bottom));
      box-sizing: border-box;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .sub {
      color: #666;
      font-size: 13px;
      line-height: 1.6;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .summary-box {
      background: #f7f8fa;
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
    }

    .summary-number {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 3px;
    }

    .summary-label {
      font-size: 11px;
      color: #777;
    }

    .chat-list {
      padding: 4px 0 8px;
    }

    .date-divider {
      display: flex;
      justify-content: center;
      margin: 18px 0 12px;
    }

    .date-divider span {
      background: rgba(0, 0, 0, 0.08);
      color: #666;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .message-row {
      display: flex;
      margin-bottom: 12px;
      align-items: flex-end;
      gap: 8px;
    }

    .message-row.incoming {
      justify-content: flex-start;
    }

    .message-row.outgoing {
      justify-content: flex-end;
    }

    .bubble-wrap {
      max-width: 82%;
    }

    .bubble-meta {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      line-height: 1.4;
      word-break: break-word;
    }

    .message-row.outgoing .bubble-meta {
      text-align: right;
    }

    .bubble {
      border-radius: 18px;
      padding: 11px 13px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .message-row.incoming .bubble {
      background: #fff;
      color: #222;
      border-bottom-left-radius: 5px;
    }

    .message-row.outgoing .bubble {
      background: #06c755;
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .bubble-time {
      font-size: 10px;
      opacity: 0.72;
      margin-top: 5px;
      text-align: right;
    }

    .message-row.incoming .bubble-time {
      color: #777;
    }

    .message-row.outgoing .bubble-time {
      color: rgba(255,255,255,0.9);
    }

    .system-row {
      display: flex;
      justify-content: center;
      margin: 12px 0;
    }

    .system-message {
      max-width: 90%;
      background: #fff4e5;
      color: #9a5b00;
      border-radius: 12px;
      padding: 9px 12px;
      font-size: 12px;
      line-height: 1.6;
      word-break: break-word;
      text-align: center;
    }

    .system-message.error {
      background: #ffe8e6;
      color: #d93025;
    }

    .empty {
      text-align: center;
      padding: 36px 20px;
      color: #666;
    }

    .loading {
      text-align: center;
      padding: 36px 20px;
      color: #666;
    }

    .error-title {
      color: #d93025;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: left;
    }

    .error-text {
      font-size: 14px;
      line-height: 1.6;
      text-align: left;
      word-break: break-word;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-black {
      background: #222;
      color: #fff;
    }

    .btn-green {
      background: #06c755;
      color: #fff;
    }

    .btn-light {
      background: #eef1f5;
      color: #333;
    }

    .small {
      font-size: 12px;
      color: #777;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      vertical-align: middle;
    }

    .badge-green {
      background: #e8f7ee;
      color: #10893e;
    }

    .badge-red {
      background: #ffe8e6;
      color: #d93025;
    }

    .badge-gray {
      background: #f1f3f5;
      color: #666;
    }

    /* ===== Fixed Bottom Navigation ===== */
    .bottom-nav {
      position: absolute !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      z-index: 99999 !important;
      background: rgba(255, 255, 255, 0.98);
      border-top: 1px solid #eceff3;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      background: transparent;
      color: #8b9098;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      position: relative;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      stroke: currentColor;
      stroke-width: 1.9;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: #06c755;
      font-weight: 800;
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: #06c755;
    }

    .nav-item:active {
      opacity: 0.65;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <div class="page">
      <div id="app" class="loading">資料載入中...</div>
    </div>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" onclick="location.href='landlord-home.html?v=' + Date.now()">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <div>首頁</div>
        </button>

        <button class="nav-item" onclick="location.href='landlord-arrears.html?v=' + Date.now()">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <div>欠款</div>
        </button>

        <button class="nav-item" onclick="location.href='landlord-tenants.html?v=' + Date.now()">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8.5" r="3"></circle>
            <path d="M4 19c.8-3.3 2.7-5 5-5s4.2 1.7 5 5"></path>
            <circle cx="16.5" cy="9.5" r="2.3"></circle>
            <path d="M14.5 14.5c2.3.4 3.8 1.9 4.5 4.5"></path>
          </svg>
          <div>房客</div>
        </button>

        <button class="nav-item active" onclick="location.href='landlord-more.html?v=' + Date.now()">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <div>更多</div>
        </button>
      </div>
    </nav>
  </div>

  <script>
    function setAppHeight() {
      document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
    }

    setAppHeight();

    window.addEventListener('resize', setAppHeight);
    window.addEventListener('orientationchange', function () {
      setTimeout(setAppHeight, 300);
    });

    const API_URL = 'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';
    const LIFF_ID = '2010314940-EjX1qbb8';
    const TEST_LINE_USER_ID = 'Uf708ece75c9c985cfe1dbda48d123511';

    let LINE_USER_ID = '';

    const app = document.getElementById('app');

    function escapeHtml(v) {
      return String(v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeText(v) {
      if (v === undefined || v === null || v === '') return '-';
      return escapeHtml(v);
    }

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || '';
    }

    function getTenantIdParam() {
      return String(getQueryParam('tenant_id') || '').trim();
    }

    function getTenantUserIdParam() {
      return String(getQueryParam('tenant_user_id') || '').trim();
    }

    function normalizeDirection(item) {
      const direction = String(item.direction || '').toLowerCase();
      const source = String(item.source || '').toLowerCase();
      const messageType = String(item.message_type || '').toLowerCase();

      if (direction === 'incoming' || direction === 'outgoing') {
        return direction;
      }

      if (source === 'tenant_line') {
        return 'incoming';
      }

      if (messageType.indexOf('incoming_') === 0) {
        return 'incoming';
      }

      return 'outgoing';
    }

    function statusText(v) {
      const s = String(v || '').toLowerCase();

      if (s === 'success') return '成功';
      if (s === 'received') return '已收到';
      if (s === 'failed') return '失敗';
      if (s === 'error') return '錯誤';
      if (s === 'unmatched') return '未匹配';

      return safeText(v);
    }

    function messageTypeText(v) {
      const s = String(v || '').toLowerCase();

      if (s === 'payment_reminder') return '繳費提醒';
      if (s === 'custom') return '自訂訊息';
      if (s === 'incoming_text') return '房客回覆';
      if (s.indexOf('incoming_') === 0) return '房客回覆';
      if (s.indexOf('event_') === 0) return 'LINE 事件';

      return safeText(v);
    }

    function parseTime(v) {
      if (!v) return 0;

      const d = new Date(v);
      if (!isNaN(d.getTime())) return d.getTime();

      return 0;
    }

    function formatDateLabel(v) {
      if (!v) return '-';

      const d = new Date(v);

      if (!isNaN(d.getTime())) {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');

        return yyyy + '-' + mm + '-' + dd;
      }

      const text = String(v);
      return text.split(' ')[0] || text;
    }

    function formatTimeOnly(v) {
      if (!v) return '-';

      const d = new Date(v);

      if (!isNaN(d.getTime())) {
        const hh = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');

        return hh + ':' + mi;
      }

      const text = String(v);
      const match = text.match(/(\d{1,2}):(\d{2})/);

      if (match) {
        return match[1].padStart(2, '0') + ':' + match[2];
      }

      return text;
    }

    function getMessageText(item) {
      const text = String(item.message_text || '').trim();
      const messageType = String(item.message_type || '').toLowerCase();

      if (text) {
        return text;
      }

      if (messageType === 'payment_reminder') {
        return '已發送繳費提醒。';
      }

      if (messageType === 'custom') {
        return '已發送自訂訊息。';
      }

      if (messageType.indexOf('incoming_') === 0) {
        return '已收到房客訊息。';
      }

      return item.note || '無訊息內容';
    }

    function isSystemLog(item) {
      const status = String(item.status || '').toLowerCase();
      const messageType = String(item.message_type || '').toLowerCase();

      return (
        status === 'failed' ||
        status === 'error' ||
        status === 'unmatched' ||
        messageType === 'webhook_error' ||
        messageType === 'event_error' ||
        messageType.indexOf('event_') === 0
      );
    }

    function getDisplayName(item, direction) {
      const tenantName = String(item.tenant_name || '').trim();
      const roomList = String(item.room_list || '').trim();
      const tenantId = String(item.tenant_id || '').trim();

      if (direction === 'outgoing') {
        if (tenantName) {
          return '房東 → ' + tenantName + (roomList ? '｜' + roomList : '');
        }

        return '房東發送';
      }

      if (tenantName) {
        return tenantName + (roomList ? '｜' + roomList : '');
      }

      if (tenantId) {
        return '房客 ' + tenantId;
      }

      return '房客回覆';
    }

    function renderError(message) {
      app.className = 'card';
      app.innerHTML = `
        <div class="error-title">資料讀取失敗</div>
        <div class="error-text">${safeText(message)}</div>

        <button class="btn btn-black" onclick="location.reload()">
          重新整理
        </button>

        <button class="btn btn-green" onclick="location.href='landlord-more.html?v=' + Date.now()">
          返回更多功能
        </button>
      `;
    }

    function callApi(action) {
      return new Promise((resolve, reject) => {
        if (!LINE_USER_ID) {
          reject(new Error('缺少 LINE User ID'));
          return;
        }

        const callbackName =
          'cmwebsJsonp_' + Date.now() + '_' + Math.floor(Math.random() * 1000000);

        const tenantId = getTenantIdParam();
        const tenantUserId = getTenantUserIdParam();

        let finished = false;
        const script = document.createElement('script');

        function cleanup() {
          clearTimeout(timer);

          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }

          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }
        }

        window[callbackName] = function (json) {
          if (finished) return;
          finished = true;

          cleanup();

          if (!json || json.success !== true) {
            reject(new Error((json && json.message) ? json.message : '查詢失敗'));
            return;
          }

          resolve(json.data);
        };

        const timer = setTimeout(() => {
          if (finished) return;
          finished = true;

          cleanup();
          reject(new Error('API 載入逾時'));
        }, 30000);

        script.charset = 'UTF-8';

        script.onerror = function () {
          console.log('JSONP script onerror ignored');
        };

        script.src =
          API_URL +
          '?v2_action=' + encodeURIComponent(action) +
          '&line_user_id=' + encodeURIComponent(LINE_USER_ID) +
          '&tenant_id=' + encodeURIComponent(tenantId) +
          '&tenant_user_id=' + encodeURIComponent(tenantUserId) +
          '&callback=' + encodeURIComponent(callbackName) +
          '&_=' + Date.now();

        document.body.appendChild(script);
      });
    }

    async function initLineUserId() {
      if (typeof liff === 'undefined') {
        LINE_USER_ID = TEST_LINE_USER_ID;
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        LINE_USER_ID = profile.userId || '';

        if (!LINE_USER_ID) {
          throw new Error('無法取得 LINE User ID');
        }
      } catch (error) {
        LINE_USER_ID = TEST_LINE_USER_ID;
      }
    }

    function goBackToTenantDetail() {
      const tenantId = getTenantIdParam();
      const tenantUserId = getTenantUserIdParam();

      if (!tenantId && !tenantUserId) {
        location.href = 'landlord-tenants.html?v=' + Date.now();
        return;
      }

      location.href =
        'landlord-tenant-detail.html' +
        '?tenant_id=' + encodeURIComponent(tenantId) +
        '&tenant_user_id=' + encodeURIComponent(tenantUserId) +
        '&v=' + Date.now();
    }

    function renderSystemLog(item) {
      const status = String(item.status || '').toLowerCase();
      const text = [
        messageTypeText(item.message_type),
        statusText(item.status),
        item.tenant_name ? '房客：' + item.tenant_name : '',
        item.room_list ? '房號：' + item.room_list : '',
        item.note ? '備註：' + item.note : ''
      ].filter(Boolean).join('｜');

      return `
        <div class="system-row">
          <div class="system-message ${status === 'failed' || status === 'error' ? 'error' : ''}">
            ${safeText(text)}
          </div>
        </div>
      `;
    }

    function renderBubble(item) {
      const direction = normalizeDirection(item);
      const text = getMessageText(item);
      const name = getDisplayName(item, direction);
      const time = formatTimeOnly(item.created_at);
      const status = statusText(item.status);
      const type = messageTypeText(item.message_type);

      return `
        <div class="message-row ${direction}">
          <div class="bubble-wrap">
            <div class="bubble-meta">
              ${safeText(name)}
            </div>

            <div class="bubble">
              ${safeText(text)}
              <div class="bubble-time">
                ${safeText(time)}｜${safeText(type)}｜${safeText(status)}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPage(data) {
      let logs = Array.isArray(data.logs) ? data.logs : [];

      logs = logs.slice().sort((a, b) => {
        return parseTime(a.created_at) - parseTime(b.created_at);
      });

      const tenantId = getTenantIdParam();
      const tenantUserId = getTenantUserIdParam();
      const isTenantOnly = !!(tenantId || tenantUserId);

      const incomingCount = logs.filter(item => normalizeDirection(item) === 'incoming' && !isSystemLog(item)).length;
      const outgoingCount = logs.filter(item => normalizeDirection(item) === 'outgoing' && !isSystemLog(item)).length;
      const errorCount = logs.filter(item => isSystemLog(item)).length;

      let html = '';

      html += `
        <div class="card">
          <div class="title">${isTenantOnly ? '此房客 LINE 對話紀錄' : 'LINE 對話紀錄'}</div>
          <div class="sub">
            ${isTenantOnly ? '顯示指定房客的 LINE 發送與回覆紀錄。' : '顯示房東端發送與房客回覆的 LINE 紀錄。'}
          </div>

          <div class="summary-grid">
            <div class="summary-box">
              <div class="summary-number">${incomingCount}</div>
              <div class="summary-label">房客回覆</div>
            </div>

            <div class="summary-box">
              <div class="summary-number">${outgoingCount}</div>
              <div class="summary-label">房東發送</div>
            </div>

            <div class="summary-box">
              <div class="summary-number">${errorCount}</div>
              <div class="summary-label">異常紀錄</div>
            </div>
          </div>
        </div>
      `;

      if (logs.length === 0) {
        html += `
          <div class="card empty">
            目前沒有 LINE 對話紀錄
          </div>
        `;
      } else {
        html += `<div class="chat-list">`;

        let lastDateLabel = '';

        logs.forEach(item => {
          const dateLabel = formatDateLabel(item.created_at);

          if (dateLabel !== lastDateLabel) {
            lastDateLabel = dateLabel;

            html += `
              <div class="date-divider">
                <span>${safeText(dateLabel)}</span>
              </div>
            `;
          }

          if (isSystemLog(item)) {
            html += renderSystemLog(item);
          } else {
            html += renderBubble(item);
          }
        });

        html += `</div>`;
      }

      html += `
        <button class="btn btn-black" onclick="location.reload()">
          重新整理
        </button>

        ${
          isTenantOnly
            ? `
              <button class="btn btn-light" onclick="goBackToTenantDetail()">
                返回房客詳細資料
              </button>
            `
            : ''
        }

        <button class="btn btn-green" onclick="location.href='landlord-more.html?v=' + Date.now()">
          返回更多功能
        </button>
      `;

      app.className = '';
      app.innerHTML = html;

      setTimeout(() => {
        const page = document.querySelector('.page');
        if (page) {
          page.scrollTop = page.scrollHeight;
        }
      }, 120);
    }

    async function main() {
      try {
        app.className = 'loading';
        app.innerHTML = '資料載入中...';

        await initLineUserId();

        const data = await callApi('landlord_line_logs');

        renderPage(data);
      } catch (error) {
        renderError(error.message || error);
      }
    }

    main();
  </script>
</body>
</html>
