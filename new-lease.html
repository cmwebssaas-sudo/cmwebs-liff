<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMWebs 智能租管</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f4f5f7;
      color: #222;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      max-width: 420px;
      background: #fff;
      border-radius: 12px;
      padding: 28px 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    h1 { font-size: 22px; margin: 0 0 12px; }
    p { font-size: 16px; line-height: 1.6; margin: 8px 0; }
    .small {
      color: #666;
      font-size: 13px;
      word-break: break-all;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>CMWebs 智能租管</h1>
    <p id="status">正在確認 LINE 身分，請稍候...</p>
    <p class="small" id="debug"></p>
  </div>

  <script>
    const LIFF_ID = "2010314940-hsmAUnNw";
    const CHECK_WEBHOOK_URL = "https://hook.us2.make.com/bke3eglwyf2xnhbqougyaiv37w0fdkd4";

    function showStatus(message, detail) {
      document.getElementById("status").textContent = message;
      document.getElementById("debug").textContent = detail || "";
    }

    function showError(message, detail) {
      showStatus(message, detail);
      alert(message + (detail ? "\n\n" + detail : ""));
    }

    async function main() {
      try {
        const params = new URLSearchParams(window.location.search);
        const mode = params.get("mode") || "";
        const contractId = params.get("contract_id") || "";

        showStatus("正在初始化 LINE 身分驗證...", "LIFF ID: " + LIFF_ID);

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({
            redirectUri: window.location.href
          });
          return;
        }

        showStatus("正在取得 LINE UID...");

        const profile = await liff.getProfile();
        const userId = profile.userId;

        if (!userId) {
          showError("無法取得 LINE UID", "profile.userId 是空的");
          return;
        }

        showStatus("正在判斷入口...", "UID: " + userId + " / mode: " + mode + " / contract_id: " + contractId);

        const webhookUrl =
          CHECK_WEBHOOK_URL +
          "?uid=" + encodeURIComponent(userId) +
          "&mode=" + encodeURIComponent(mode) +
          "&contract_id=" + encodeURIComponent(contractId);

        const response = await fetch(webhookUrl, {
          method: "GET",
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("Make webhook 回應失敗，HTTP " + response.status);
        }

        const data = await response.json();

        if (!data.redirectUrl) {
          throw new Error("Make 沒有回傳 redirectUrl：" + JSON.stringify(data));
        }

        showStatus("確認完成，正在前往表單...", data.redirectUrl);

        window.location.replace(data.redirectUrl);
      } catch (err) {
        console.error("流程失敗:", err);
        const detail = err && err.message ? err.message : JSON.stringify(err);
        showError("系統檢查失敗", detail);
      }
    }

    main();
  </script>
</body>
</html>
