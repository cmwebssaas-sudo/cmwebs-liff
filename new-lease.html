<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMWebs 智能租管</title>

  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f4f5f7;
      color: #222;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .box {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 16px;
      padding: 30px 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      box-sizing: border-box;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 16px;
      font-weight: 700;
    }

    p {
      font-size: 16px;
      line-height: 1.7;
      margin: 10px 0;
    }

    .hint {
      color: #666;
      font-size: 14px;
      line-height: 1.7;
      background: #f7f7f7;
      border-radius: 10px;
      padding: 12px;
      margin-top: 16px;
      text-align: left;
      word-break: break-all;
      display: none;
    }

    .loading {
      margin-top: 16px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>CMWebs 智能租管</h1>
    <p id="status">正在確認 LINE 身分，請稍候...</p>
    <p class="loading" id="loading">系統處理中，請勿關閉畫面。</p>
    <div class="hint" id="debug"></div>
  </div>

  <script>
    /************************************************************
     * 基本設定
     ************************************************************/

    const LIFF_ID = "2010314940-hsmAUnNw";

    // 房客身份判斷 Make Webhook
    const CHECK_WEBHOOK_URL = "https://hook.us2.make.com/bke3eglwyf2xnhbqougyaiv37w0fdkd4";

    // 房東發起新租約 A 表單
    const LANDLORD_NEW_LEASE_FORM_URL = "https://tally.so/r/ODEWKa";


    /************************************************************
     * 畫面顯示
     ************************************************************/

    function showStatus(message, detail) {
      document.getElementById("status").textContent = message;

      const debugEl = document.getElementById("debug");

      if (detail) {
        debugEl.style.display = "block";
        debugEl.textContent = detail;
      } else {
        debugEl.style.display = "none";
        debugEl.textContent = "";
      }
    }

    function showError(message, detail) {
      document.getElementById("loading").style.display = "none";
      showStatus(message, detail || "");
      alert(message + (detail ? "\n\n" + detail : ""));
    }

    function redirectTo(url) {
      showStatus("確認完成，正在前往表單...", url);
      window.location.replace(url);
    }


    /************************************************************
     * 安全解碼
     ************************************************************/

    function safeDecode(value) {
      if (!value) return "";

      let result = value;

      for (let i = 0; i < 3; i++) {
        try {
          const decoded = decodeURIComponent(result);
          if (decoded === result) break;
          result = decoded;
        } catch (e) {
          break;
        }
      }

      return result;
    }


    /************************************************************
     * 從字串抓 query parameters
     ************************************************************/

    function mergeParamsFromString(targetParams, rawText) {
      if (!rawText) return;

      let text = safeDecode(rawText);

      // 只取 ? 後面的部分
      if (text.includes("?")) {
        text = text.substring(text.indexOf("?") + 1);
      }

      // 去掉 # 後面內容
      if (text.includes("#")) {
        text = text.substring(0, text.indexOf("#"));
      }

      if (!text) return;

      try {
        const tempParams = new URLSearchParams(text);

        tempParams.forEach((value, key) => {
          if (key && value && !targetParams.has(key)) {
            targetParams.set(key, value);
          }
        });
      } catch (e) {
        console.warn("參數解析失敗：", rawText, e);
      }
    }


    /************************************************************
     * 取得所有參數
     *
     * 會同時讀：
     * 1. window.location.search
     * 2. liff.state
     * 3. window.location.hash
     ************************************************************/

    function getAllParams() {
      const result = new URLSearchParams();

      const currentUrl = window.location.href;
      const urlObj = new URL(currentUrl);

      // 一般 query
      urlObj.searchParams.forEach((value, key) => {
        if (key !== "liff.state") {
          result.set(key, value);
        }
      });

      // liff.state
      const rawLiffState = urlObj.searchParams.get("liff.state");
      if (rawLiffState) {
        mergeParamsFromString(result, rawLiffState);
      }

      // hash 內的 query
      if (window.location.hash) {
        mergeParamsFromString(result, window.location.hash);
      }

      return result;
    }


    /************************************************************
     * 取得第一個有值的參數
     ************************************************************/

    function getFirstParam(params, keys) {
      for (const key of keys) {
        const value = params.get(key);
        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return value;
        }
      }
      return "";
    }


    /************************************************************
     * 組網址
     ************************************************************/

    function appendParams(baseUrl, paramsObj) {
      const url = new URL(baseUrl);

      Object.keys(paramsObj).forEach((key) => {
        const value = paramsObj[key];

        if (value !== undefined && value !== null && String(value).trim() !== "") {
          url.searchParams.set(key, value);
        }
      });

      return url.toString();
    }


    /************************************************************
     * 主流程
     ************************************************************/

    async function main() {
      try {
        showStatus("正在初始化 LINE 身分驗證...", "LIFF ID: " + LIFF_ID);

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({
            redirectUri: window.location.href
          });
          return;
        }

        showStatus("正在取得 LINE UID...");

        const profile = await liff.getProfile();

        const userId = profile && profile.userId ? profile.userId : "";
        const displayName = profile && profile.displayName ? profile.displayName : "";

        if (!userId) {
          showError("無法取得 LINE UID", "請確認 LIFF Scope 有開啟 profile。");
          return;
        }

        const params = getAllParams();

        const mode = params.get("mode") || "";
        const role = params.get("role") || "";
        const contractId = params.get("contract_id") || params.get("contractId") || "";

        const rawAllText = safeDecode(window.location.href);

        const isStartContract =
          mode === "start_contract" ||
          rawAllText.includes("mode=start_contract");

        const isTenantCheckin =
          mode === "tenant_checkin" ||
          role === "tenant" ||
          rawAllText.includes("mode=tenant_checkin") ||
          rawAllText.includes("role=tenant");

        showStatus(
          "正在判斷入口...",
          "UID: " + userId +
          "\nDisplayName: " + displayName +
          "\nmode: " + mode +
          "\nrole: " + role +
          "\ncontract_id: " + contractId +
          "\nURL: " + window.location.href
        );


        /********************************************************
         * A. 房東發起新租約
         *
         * 重要：
         * 這裡不能把 landlord_id 寫成 LINE UID。
         * landlord_id 要吃 Make 傳進來的房東代碼。
         ********************************************************/

        if (isStartContract) {
          const landlordId = getFirstParam(params, [
            "landlord_id",
            "landlordId"
          ]);

          const buildingId = getFirstParam(params, [
            "building_id",
            "buildingId"
          ]);

          const propertyAddress = getFirstParam(params, [
            "property_address",
            "propertyAddress",
            "landlord_address",
            "address"
          ]);

          const landlordName = getFirstParam(params, [
            "landlord_name",
            "landlordName",
            "name"
          ]);

          const landlordPhone = getFirstParam(params, [
            "landlord_phone",
            "landlordPhone",
            "phone"
          ]);

          const landlordBankAccount = getFirstParam(params, [
            "landlord_bank_account",
            "landlordBankAccount",
            "bank_account",
            "bankAccount"
          ]);

          const landlordUid = getFirstParam(params, [
            "landlord_uid",
            "landlordUid",
            "uid",
            "line_uid"
          ]) || userId;

          const landlordFormUrl = appendParams(LANDLORD_NEW_LEASE_FORM_URL, {
            // Tally hidden fields
            uid: userId,
            line_uid: userId,
            landlord_uid: landlordUid,
            role: role || "房東",

            // 房東資料：從 Make 連結帶進來
            landlord_id: landlordId,
            building_id: buildingId,
            property_address: propertyAddress,
            landlord_name: landlordName,
            landlord_phone: landlordPhone,
            landlord_bank_account: landlordBankAccount,

            // 可選
            contract_id: contractId,
            display_name: displayName,
            mode: "start_contract"
          });

          redirectTo(landlordFormUrl);
          return;
        }


        /********************************************************
         * B. 房客合約簽署入口
         *
         * 連結：
         * https://liff.line.me/2010314940-hsmAUnNw?mode=tenant_checkin&contract_id=xxxx&role=tenant
         ********************************************************/

        if (isTenantCheckin) {
          if (!contractId) {
            showError(
              "缺少合約 ID",
              "網址沒有帶入 contract_id，請重新從房東轉發的合約連結進入。"
            );
            return;
          }

          const webhookUrl = appendParams(CHECK_WEBHOOK_URL, {
            uid: userId,
            line_uid: userId,
            display_name: displayName,
            mode: "tenant_checkin",
            contract_id: contractId,
            role: "tenant"
          });

          showStatus("正在向系統確認合約與身分...", webhookUrl);

          const response = await fetch(webhookUrl, {
            method: "GET",
            cache: "no-store"
          });

          if (!response.ok) {
            throw new Error("Make webhook 回應失敗，HTTP " + response.status);
          }

          const responseText = await response.text();

          let data = null;

          try {
            data = JSON.parse(responseText);
          } catch (e) {
            data = null;
          }

          if (data && data.redirectUrl) {
            redirectTo(data.redirectUrl);
            return;
          }

          if (responseText && responseText.trim().startsWith("http")) {
            redirectTo(responseText.trim());
            return;
          }

          throw new Error("Make 沒有回傳 redirectUrl：" + responseText);
        }


        /********************************************************
         * C. 沒有任何參數
         *
         * 沒有 Make 傳入資料時，只能帶入 LINE UID。
         * 房東代碼、物件代碼、地址等會是空白。
         ********************************************************/

        const fallbackLandlordFormUrl = appendParams(LANDLORD_NEW_LEASE_FORM_URL, {
          uid: userId,
          line_uid: userId,
          landlord_uid: userId,
          role: "房東",
          display_name: displayName,
          mode: "start_contract"
        });

        redirectTo(fallbackLandlordFormUrl);
        return;

      } catch (err) {
        console.error("流程失敗:", err);

        const detail = err && err.message ? err.message : JSON.stringify(err);

        showError("系統檢查失敗", detail);
      }
    }

    main();
  </script>
</body>
</html>
