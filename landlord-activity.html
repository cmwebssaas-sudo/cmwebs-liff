<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 團隊操作紀錄</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 68px;
      --primary: #06c755;
      --primary-soft: #edf9f2;
      --blue: #1a73e8;
      --blue-soft: #edf4ff;
      --purple: #7654c4;
      --purple-soft: #f3efff;
      --orange: #ef8f00;
      --orange-soft: #fff5df;
      --danger: #d93025;
      --danger-soft: #fff0ef;
      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;
      --shadow: 0 10px 34px rgba(25, 35, 55, 0.08);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 620px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(
          circle at 100% 0%,
          rgba(26, 115, 232, 0.1),
          transparent 28%
        ),
        var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(16px, env(safe-area-inset-top))
        15px
        calc(
          var(--nav-height) +
          22px +
          env(safe-area-inset-bottom)
        );
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .eyebrow {
      color: var(--blue);
      font-size: 10px;
      font-weight: 900;
    }

    .page-title {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 900;
    }

    .refresh-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #5f6670;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #1769c8 0%,
          #1a73e8 58%,
          #1559a8 100%
        );
    }

    .hero::after {
      position: absolute;
      top: -65px;
      right: -45px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      content: "";
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 9px;
      font-weight: 900;
    }

    .workspace-name {
      margin-top: 5px;
      font-size: 21px;
      font-weight: 900;
    }

    .hero-desc {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 10px;
      line-height: 1.6;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 15px;
    }

    .summary-item {
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.1);
    }

    .summary-label {
      color: rgba(255, 255, 255, 0.72);
      font-size: 8px;
    }

    .summary-value {
      margin-top: 4px;
      font-size: 17px;
      font-weight: 900;
    }

    .filter-card {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px;
      scrollbar-width: none;
    }

    .filter-card::-webkit-scrollbar {
      display: none;
    }

    .filter-button {
      min-height: 36px;
      flex: 0 0 auto;
      padding: 0 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #ffffff;
      color: #656c76;
      font-size: 10px;
      font-weight: 900;
      cursor: pointer;
    }

    .filter-button.active {
      border-color: #bfd5f4;
      background: var(--blue-soft);
      color: var(--blue);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 9px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 900;
    }

    .section-count {
      color: var(--muted);
      font-size: 10px;
    }

    .activity-card {
      padding: 15px;
    }

    .activity-main {
      display: flex;
      align-items: flex-start;
      gap: 11px;
    }

    .activity-icon {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 13px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 17px;
      font-weight: 900;
    }

    .activity-icon.payment {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .activity-icon.message {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .activity-icon.contract {
      background: var(--orange-soft);
      color: var(--orange);
    }

    .activity-content {
      min-width: 0;
      flex: 1;
    }

    .activity-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .activity-title {
      font-size: 13px;
      font-weight: 900;
    }

    .result-badge,
    .delegated-badge {
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 900;
    }

    .result-badge.success {
      background: var(--primary-soft);
      color: #079641;
    }

    .result-badge.failed {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .delegated-badge {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .actor-line {
      margin-top: 6px;
      color: #555d67;
      font-size: 10px;
      line-height: 1.55;
    }

    .actor-name {
      color: var(--text);
      font-weight: 900;
    }

    .activity-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 11px;
      padding-top: 11px;
      border-top: 1px solid var(--border);
    }

    .meta-item {
      min-width: 0;
      padding: 9px 10px;
      border-radius: 10px;
      background: var(--surface-soft);
    }

    .meta-label {
      color: var(--muted);
      font-size: 8px;
    }

    .meta-value {
      margin-top: 4px;
      overflow: hidden;
      font-size: 9px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .activity-message {
      margin-top: 10px;
      padding: 10px 11px;
      border-radius: 10px;
      background: var(--surface-soft);
      color: #606772;
      font-size: 9px;
      line-height: 1.6;
      word-break: break-word;
    }

    .empty-card,
    .loading-card,
    .error-card {
      padding: 28px 18px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      text-align: center;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 14px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-title,
    .error-title {
      margin-bottom: 7px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .primary-button {
      width: 100%;
      min-height: 45px;
      margin-top: 15px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    @media (max-width: 430px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="topbar">
        <div>
          <div class="eyebrow">Workspace Audit</div>
          <div class="page-title">團隊操作紀錄</div>
        </div>

        <button
          class="refresh-button"
          type="button"
          onclick="loadPage()"
        >
          ↻
        </button>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">操作紀錄載入中</div>
          正在讀取團隊成員的付款、訊息與合約操作。
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(
        location.search
      );

    const TEST_MODE =
      URL_PARAMS.get('test') ===
      '1';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let CURRENT_FILTER = '';

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      return value === undefined || value === null
        ? ''
        : String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function goPage(page) {
      location.href =
        page +
        '?v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        );
    }

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

      entryUrl.searchParams.set(
        'return_to',
        returnTo
      );

      return entryUrl.href;
    }

    function formatDateTime(value) {
      const date =
        new Date(value);

      if (
        Number.isNaN(
          date.getTime()
        )
      ) {
        return rawText(value) || '-';
      }

      return new Intl.DateTimeFormat(
        'zh-TW',
        {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        }
      ).format(date);
    }

    function jsonpRequest(
      action,
      params
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_activity_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;

          const timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished = true;
                cleanup();

                reject(
                  new Error(
                    'API 載入逾時'
                  )
                );
              },
              25000
            );

          function cleanup() {
            clearTimeout(timer);

            if (script.parentNode) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (result) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();
              resolve(result);
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params || {}
          ).forEach(
            function (key) {
              url +=
                '&' +
                encodeURIComponent(
                  key
                ) +
                '=' +
                encodeURIComponent(
                  params[key]
                );
            }
          );

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗'
                )
              );
            };

          script.src = url;
          document.body.appendChild(
            script
          );
        }
      );
    }

    async function initLine() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      await liff.init({
        liffId: LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            buildLandlordLoginRedirectUri()
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId || '';

      return true;
    }

    function categoryIcon(category) {
      const map = {
        payment: '$',
        message: '✉',
        contract: '✓',
        property: '⌂'
      };

      return map[category] || '•';
    }

    function targetLabel(item) {
      const map = {
        payment_report: '付款回報',
        bill: '帳單',
        tenant_message: '房客訊息',
        contract_request: '合約申請',
        property: '物件',
        room: '房間',
        tenant: '房客'
      };

      return map[item.target_type] ||
        item.target_type ||
        '操作';
    }

    function renderPage() {
      const workspace =
        PAGE_DATA.workspace || {};

      const summary =
        PAGE_DATA.summary || {};

      const activities =
        PAGE_DATA.activities || [];

      const filters =
        PAGE_DATA.filters || [];

      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card hero">
          <div class="hero-content">
            <div class="hero-label">目前管理團隊</div>

            <div class="workspace-name">
              ${safeHtml(
                workspace.workspace_name ||
                '-'
              )}
            </div>

            <div class="hero-desc">
              每次付款、銷帳、訊息與合約操作都記錄實際執行成員。
            </div>

            <div class="summary-grid">
              <div class="summary-item">
                <div class="summary-label">顯示筆數</div>
                <div class="summary-value">${Number(summary.total || 0)}</div>
              </div>

              <div class="summary-item">
                <div class="summary-label">成功</div>
                <div class="summary-value">${Number(summary.success || 0)}</div>
              </div>

              <div class="summary-item">
                <div class="summary-label">失敗</div>
                <div class="summary-value">${Number(summary.failed || 0)}</div>
              </div>

              <div class="summary-item">
                <div class="summary-label">代理操作</div>
                <div class="summary-value">${Number(summary.delegated || 0)}</div>
              </div>
            </div>
          </div>
        </section>

        <section class="card filter-card">
          ${
            filters.map(
              function (filter) {
                return `
                  <button
                    class="filter-button ${
                      filter.value ===
                      CURRENT_FILTER
                        ? 'active'
                        : ''
                    }"
                    type="button"
                    onclick="setFilter('${
                      safeHtml(
                        filter.value
                      )
                    }')"
                  >
                    ${safeHtml(
                      filter.label
                    )}
                  </button>
                `;
              }
            ).join('')
          }
        </section>

        <div class="section-head">
          <div class="section-title">操作紀錄</div>
          <div class="section-count">${activities.length} 筆</div>
        </div>

        ${
          activities.length
            ? activities.map(
                activityCard
              ).join('')
            : `
              <section class="card empty-card">
                目前尚無符合條件的操作紀錄。<br>
                完成付款、訊息或合約操作後會自動出現在此處。
              </section>
            `
        }
      `;
    }

    function activityCard(item) {
      const result =
        item.result ===
          'success'
          ? 'success'
          : 'failed';

      return `
        <section class="card activity-card">
          <div class="activity-main">
            <div class="activity-icon ${
              safeHtml(
                item.category ||
                ''
              )
            }">
              ${safeHtml(
                categoryIcon(
                  item.category
                )
              )}
            </div>

            <div class="activity-content">
              <div class="activity-title-row">
                <span class="activity-title">
                  ${safeHtml(
                    item.action_label ||
                    item.action ||
                    '-'
                  )}
                </span>

                <span class="result-badge ${result}">
                  ${
                    result ===
                      'success'
                      ? '成功'
                      : '失敗'
                  }
                </span>

                ${
                  item.delegated
                    ? `
                      <span class="delegated-badge">
                        團隊代理操作
                      </span>
                    `
                    : ''
                }
              </div>

              <div class="actor-line">
                操作人：
                <span class="actor-name">
                  ${safeHtml(
                    item.actor_name ||
                    '未命名成員'
                  )}
                </span>
                ・
                ${safeHtml(
                  item.actor_role_label ||
                  item.actor_role ||
                  '-'
                )}
              </div>

              <div class="activity-meta">
                <div class="meta-item">
                  <div class="meta-label">操作時間</div>
                  <div class="meta-value">
                    ${safeHtml(
                      formatDateTime(
                        item.created_at
                      )
                    )}
                  </div>
                </div>

                <div class="meta-item">
                  <div class="meta-label">操作目標</div>
                  <div class="meta-value">
                    ${safeHtml(
                      targetLabel(
                        item
                      )
                    )}
                    ${
                      item.target_id
                        ? '・' +
                          safeHtml(
                            item.target_id
                          )
                        : ''
                    }
                  </div>
                </div>
              </div>

              ${
                item.result_message ||
                item.detail
                  ? `
                    <div class="activity-message">
                      ${
                        item.result_message
                          ? safeHtml(
                              item.result_message
                            )
                          : ''
                      }

                      ${
                        item.result_message &&
                        item.detail
                          ? '<br>'
                          : ''
                      }

                      ${
                        item.detail
                          ? safeHtml(
                              item.detail
                            )
                          : ''
                      }
                    </div>
                  `
                  : ''
              }
            </div>
          </div>
        </section>
      `;
    }

    function setFilter(value) {
      CURRENT_FILTER =
        value || '';

      loadPage(
        false
      );
    }

    function renderLoading() {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">操作紀錄載入中</div>
          正在讀取團隊成員的付款、訊息與合約操作。
        </section>
      `;
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">操作紀錄載入失敗</div>

          ${safeHtml(
            message ||
            '未知錯誤'
          )}

          <button
            class="primary-button"
            type="button"
            onclick="loadPage()"
          >
            重新整理
          </button>
        </section>
      `;
    }

    async function loadPage(showLoading) {
      if (
        showLoading !==
        false
      ) {
        renderLoading();
      }

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLine();

          if (!ready) {
            return;
          }
        }

        const result =
          await jsonpRequest(
            'landlord_workspace_activity_init',
            {
              limit:
                150,
              action_filter:
                CURRENT_FILTER
            }
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '操作紀錄載入失敗'
          );
        }

        PAGE_DATA =
          result.data || {};

        renderPage();

      } catch (error) {
        renderError(
          error &&
          error.message
            ? error.message
            : String(error)
        );
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
