<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMWebs 房東首頁</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 14px 32px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid #eee;
      font-size: 15px;
    }

    .row:first-of-type {
      border-top: none;
    }

    .label {
      color: #666;
      flex: 1;
    }

    .value {
      font-weight: 700;
      text-align: right;
      word-break: break-all;
    }

    .money-main {
      font-size: 32px;
      font-weight: 800;
      color: #d93025;
      margin: 10px 0 16px;
    }

    .money-green {
      color: #08a045;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .mini-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .mini-label {
      font-size: 13px;
      color: #777;
      margin-bottom: 8px;
    }

    .mini-value {
      font-size: 24px;
      font-weight: 800;
    }

    .btn {
      display: block;
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: #06c755;
      color: white;
    }

    .btn-dark {
      background: #222;
      color: white;
    }

    .btn-gray {
      background: #e9eef5;
      color: #222;
    }

    .loading {
      text-align: center;
      color: #666;
      padding: 40px 20px;
    }

    .error-title {
      color: #d93025;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .error-message {
      font-size: 15px;
      margin-bottom: 14px;
    }

    .hint {
      color: #777;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 12px;
    }

    .debug {
      margin-top: 12px;
      padding: 10px;
      background: #f1f3f4;
      border-radius: 8px;
      font-size: 12px;
      color: #555;
      word-break: break-all;
      display: none;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e8f5e9;
      color: #0b8043;
      font-size: 13px;
      font-weight: 700;
    }

    .badge-red {
      background: #fdecea;
      color: #d93025;
    }

    .section-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="app" class="loading">資料載入中...</div>
  </div>

  <script>
    // ======================================================
    // 1. 基本設定
    // ======================================================

    // Apps Script Web App URL，結尾必須是 /exec
    const API_URL = 'https://script.google.com/macros/s/AKfycyb5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    // 房東首頁 LIFF ID
    const LIFF_ID = '2010314940-EjX1qbb8';

    // 測試用 LINE UID：目前 V2_landlords A2
    // 在 LINE LIFF 裡會自動改用真正登入者 UID
    const TEST_LINE_USER_ID = 'Uf708ece75c9c985cfe1dbda48d123511';

    let LINE_USER_ID = '';
    let HOME_DATA = null;

    const app = document.getElementById('app');

    // ======================================================
    // 2. 工具函式
    // ======================================================

    function safeText(v) {
      if (v === undefined || v === null || v === '') return '-';
      return String(v);
    }

    function money(n) {
      const num = Number(n || 0);
      return 'NT$ ' + Math.round(num).toLocaleString('zh-TW');
    }

    function numberText(n) {
      const num = Number(n || 0);
      return Math.round(num).toLocaleString('zh-TW');
    }

    function statusText(status) {
      if (status === 'active') return '啟用';
      if (status === 'inactive') return '停用';
      if (status === 'bound') return '已綁定';
      if (status === 'unbound') return '未綁定';
      return safeText(status);
    }

    function showLoading() {
      app.className = 'loading';
      app.innerHTML = '資料載入中...';
    }

    function showError(title, message, debugText) {
      app.className = '';
      app.innerHTML = `
        <div class="card">
          <div class="error-title">${safeText(title)}</div>
          <div class="error-message">${safeText(message)}</div>
          <button class="btn btn-dark" onclick="location.reload()">重新整理</button>

          <div class="hint">
            若持續失敗，請確認：<br>
            1. 房東 LINE UID 是否已存在 V2_landlords<br>
            2. V2_landlord_home_view 是否有產生資料<br>
            3. Apps Script 是否已重新部署新版<br>
            4. LIFF Endpoint URL 是否為 landlord-home.html
          </div>

          <div id="debugBox" class="debug">${safeText(debugText)}</div>
        </div>
      `;
    }

    // ======================================================
    // 3. JSONP API：重點，不使用 fetch()
    // ======================================================

    function callApi(action) {
      return new Promise((resolve, reject) => {
        if (!LINE_USER_ID) {
          reject(new Error('缺少 LINE User ID'));
          return;
        }

        const callbackName =
          'cmwebsCallback' + Date.now() + Math.floor(Math.random() * 100000);

        const script = document.createElement('script');

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('API 載入逾時'));
        }, 15000);

        function cleanup() {
          clearTimeout(timer);

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }

          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }
        }

        window[callbackName] = function (json) {
          cleanup();

          console.log('API 回傳：', json);

          if (!json || json.success !== true) {
            reject(new Error((json && json.message) ? json.message : '查詢失敗'));
            return;
          }

          resolve(json.data);
        };

        script.onerror = function () {
          cleanup();
          reject(new Error('API 載入失敗'));
        };

        const url =
          API_URL +
          '?v2_action=' + encodeURIComponent(action) +
          '&line_user_id=' + encodeURIComponent(LINE_USER_ID) +
          '&callback=' + encodeURIComponent(callbackName) +
          '&_=' + Date.now();

        console.log('API URL：', url);

        script.src = url;
        document.body.appendChild(script);
      });
    }

    // ======================================================
    // 4. 取得 LINE User ID
    // ======================================================

    async function initLineUserId() {
      // 非 LINE 瀏覽器，例如 Chrome 測試時，直接使用測試 UID
      if (typeof liff === 'undefined') {
        LINE_USER_ID = TEST_LINE_USER_ID;
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        LINE_USER_ID = profile.userId || '';

        if (!LINE_USER_ID) {
          LINE_USER_ID = TEST_LINE_USER_ID;
        }
      } catch (error) {
        console.warn('LIFF 初始化失敗，改用測試 UID：', error);
        LINE_USER_ID = TEST_LINE_USER_ID;
      }
    }

    // ======================================================
    // 5. 畫面渲染
    // ======================================================

    function renderHome(data) {
      HOME_DATA = data || {};

      const unpaidAmount = Number(HOME_DATA.unpaid_total_amount || 0);
      const paidAmount = Number(HOME_DATA.paid_total_amount || 0);
      const latestTotal = Number(HOME_DATA.latest_total_amount || 0);

      app.className = '';
      app.innerHTML = `
        <div class="card">
          <div class="title">您好，${safeText(HOME_DATA.landlord_name)}</div>
          <div class="sub">房東代碼：${safeText(HOME_DATA.landlord_id)}</div>

          <div class="row">
            <div class="label">帳號狀態</div>
            <div class="value">
              <span class="badge">${statusText(HOME_DATA.account_status)}</span>
            </div>
          </div>

          <div class="row">
            <div class="label">最新帳單月份</div>
            <div class="value">${safeText(HOME_DATA.latest_bill_month)}</div>
          </div>

          <div class="row">
            <div class="label">管理房間數</div>
            <div class="value">${numberText(HOME_DATA.room_count)}</div>
          </div>

          <div class="row">
            <div class="label">房客數</div>
            <div class="value">${numberText(HOME_DATA.tenant_count)}</div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">收款總覽</div>

          <div class="sub">目前未收總額</div>
          <div class="money-main">${money(unpaidAmount)}</div>

          <div class="row">
            <div class="label">未繳帳單數</div>
            <div class="value">${numberText(HOME_DATA.unpaid_bill_count)}</div>
          </div>

          <div class="row">
            <div class="label">已付款帳單數</div>
            <div class="value">${numberText(HOME_DATA.paid_bill_count)}</div>
          </div>

          <div class="row">
            <div class="label">已收金額</div>
            <div class="value money-green">${money(paidAmount)}</div>
          </div>
        </div>

        <div class="grid">
          <div class="mini-card">
            <div class="mini-label">本月帳單數</div>
            <div class="mini-value">${numberText(HOME_DATA.latest_bill_count)}</div>
          </div>

          <div class="mini-card">
            <div class="mini-label">本月應收</div>
            <div class="mini-value">${money(latestTotal)}</div>
          </div>
        </div>

        <div style="height: 16px;"></div>

        <button class="btn btn-primary" onclick="goBillList()">查看帳單總覽</button>
        <button class="btn btn-gray" onclick="location.reload()">重新整理</button>

        <div class="card">
          <div class="section-title">系統資訊</div>

          <div class="row">
            <div class="label">LINE UID</div>
            <div class="value">${safeText(HOME_DATA.line_user_id)}</div>
          </div>

          <div class="row">
            <div class="label">User ID</div>
            <div class="value">${safeText(HOME_DATA.user_id)}</div>
          </div>

          <div class="row">
            <div class="label">更新時間</div>
            <div class="value">${safeText(HOME_DATA.updated_at)}</div>
          </div>
        </div>
      `;
    }

    function goBillList() {
      alert('下一步再接房東帳單總覽頁');
    }

    // ======================================================
    // 6. 啟動
    // ======================================================

    async function main() {
      showLoading();

      try {
        await initLineUserId();

        console.log('LINE_USER_ID：', LINE_USER_ID);

        const data = await callApi('landlord_home');

        renderHome(data);
      } catch (error) {
        console.error(error);
        showError('資料讀取失敗', error.message || 'API 載入失敗', String(error && error.stack ? error.stack : error));
      }
    }

    main();
  </script>
</body>
</html>
