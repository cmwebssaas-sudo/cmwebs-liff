<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMWebs 房東首頁</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 14px;
    }

    .label {
      color: #777;
      font-size: 14px;
    }

    .value {
      font-weight: 700;
      text-align: right;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid #eee;
      align-items: center;
    }

    .row:first-child {
      border-top: none;
    }

    .money-red {
      color: #d93025;
      font-size: 30px;
      font-weight: 800;
      margin: 8px 0 12px;
    }

    .money-green {
      color: #00b050;
      font-size: 26px;
      font-weight: 800;
      margin: 8px 0 12px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      margin-top: 10px;
      cursor: pointer;
    }

    .btn-black {
      background: #222;
      color: #fff;
    }

    .btn-green {
      background: #06c755;
      color: #fff;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .error-title {
      color: #d93025;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .error-msg {
      font-size: 14px;
      line-height: 1.5;
      word-break: break-all;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #777;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #eef7ee;
      color: #10893e;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .small {
      font-size: 12px;
      color: #777;
      line-height: 1.5;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="app" class="loading">資料載入中...</div>
  </div>

  <script>
    // ==================================================
    // 1. 基本設定
    // ==================================================

    const API_URL = 'https://script.google.com/macros/s/AKfycyb5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    // 房東首頁 LIFF ID
    const LIFF_ID = '2010314940-EjX1qbb8';

    // 測試用房東 LINE UID
    // 正式上線後仍可保留，不在 LIFF 環境才會使用
    const TEST_LINE_USER_ID = 'Uf708ece75c9c985cfe1dbda48d123511';

    let LINE_USER_ID = '';
    let LANDLORD_HOME = null;

    const app = document.getElementById('app');

    // ==================================================
    // 2. 工具函式
    // ==================================================

    function safeText(v) {
      if (v === undefined || v === null || v === '') return '-';
      return String(v);
    }

    function money(n) {
      const num = Number(n || 0);
      return 'NT$ ' + Math.round(num).toLocaleString('zh-TW');
    }

    function renderLoading() {
      app.className = 'loading';
      app.innerHTML = '資料載入中...';
    }

    function renderError(message, detail) {
      app.className = '';
      app.innerHTML = `
        <div class="card">
          <div class="error-title">資料讀取失敗</div>
          <div class="error-msg">${safeText(message)}</div>
          ${detail ? `<div class="small" style="margin-top:8px;">${safeText(detail)}</div>` : ''}
          <button class="btn btn-black" onclick="location.reload()">重新整理</button>

          <div class="hint">
            若持續失敗，請確認：<br>
            1. 房東 LINE UID 是否存在在 V2_landlords<br>
            2. V2_landlord_home_view 是否有產生資料<br>
            3. Apps Script 是否已重新部署新版<br>
            4. LIFF Endpoint URL 是否為 landlord-home.html
          </div>
        </div>
      `;
    }

    // ==================================================
    // 3. JSONP API，不使用 fetch
    // ==================================================

  function callApi(action) {
    return new Promise((resolve, reject) => {
      if (!LINE_USER_ID) {
        reject(new Error('缺少 LINE User ID'));
        return;
      }

      const callbackName =
        'cmwebsJsonp_' + Date.now() + '_' + Math.floor(Math.random() * 1000000);

      let finished = false;
      const script = document.createElement('script');

      function cleanup() {
        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }

        try {
          delete window[callbackName];
        } catch (e) {
          window[callbackName] = undefined;
        }
      }

      const timer = setTimeout(() => {
        if (finished) return;
        finished = true;
        cleanup();
        reject(new Error('API 載入逾時'));
      }, 20000);

      window[callbackName] = function (json) {
        if (finished) return;
        finished = true;

        clearTimeout(timer);
        cleanup();

        if (!json || json.success !== true) {
          reject(new Error((json && json.message) ? json.message : '查詢失敗'));
          return;
        }

        resolve(json.data);
      };

      script.charset = 'UTF-8';

      script.onerror = function () {
        // 重要：
        // Apps Script 會從 script.google.com 轉到 script.googleusercontent.com
        // 某些 LINE WebView 會誤觸 onerror。
        // 所以這裡不要立刻 reject，讓 callback 或 timeout 決定結果。
        console.warn('JSONP script onerror ignored, waiting callback...');
      };

      script.src =
        API_URL +
        '?v2_action=' + encodeURIComponent(action) +
        '&line_user_id=' + encodeURIComponent(LINE_USER_ID) +
        '&callback=' + encodeURIComponent(callbackName) +
        '&_=' + Date.now();

      document.body.appendChild(script);
    });
  }

    // ==================================================
    // 4. 取得 LINE User ID
    // ==================================================

    async function initLineUserId() {
      // 非 LINE LIFF 環境：用測試 UID
      if (typeof liff === 'undefined') {
        LINE_USER_ID = TEST_LINE_USER_ID;
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        LINE_USER_ID = profile.userId || '';

        if (!LINE_USER_ID) {
          throw new Error('無法取得 LINE User ID');
        }

      } catch (error) {
        // 如果是在一般瀏覽器測試，允許使用測試 UID
        LINE_USER_ID = TEST_LINE_USER_ID;
      }
    }

    // ==================================================
    // 5. 畫面渲染
    // ==================================================

    function renderHome(data) {
      LANDLORD_HOME = data;

      const unpaidTotal = Number(data.unpaid_total_amount || 0);
      const paidTotal = Number(data.paid_total_amount || 0);

      app.className = '';
      app.innerHTML = `
        <div class="card">
          <div class="title">您好，${safeText(data.landlord_name)}</div>
          <div class="sub">房東編號：${safeText(data.landlord_id)}</div>

          <div class="row">
            <div class="label">帳號狀態</div>
            <div class="value"><span class="badge">${safeText(data.account_status)}</span></div>
          </div>

          <div class="row">
            <div class="label">管理房間數</div>
            <div class="value">${safeText(data.room_count)}</div>
          </div>

          <div class="row">
            <div class="label">房客數</div>
            <div class="value">${safeText(data.tenant_count)}</div>
          </div>

          <div class="row">
            <div class="label">最新帳單月份</div>
            <div class="value">${safeText(data.latest_bill_month)}</div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">本月收款總覽</div>

          <div class="label">目前未繳總額</div>
          <div class="money-red">${money(unpaidTotal)}</div>

          <div class="row">
            <div class="label">未繳帳單數</div>
            <div class="value">${safeText(data.unpaid_bill_count)}</div>
          </div>

          <div class="row">
            <div class="label">已繳帳單數</div>
            <div class="value">${safeText(data.paid_bill_count)}</div>
          </div>

          <div class="row">
            <div class="label">本月帳單總數</div>
            <div class="value">${safeText(data.latest_bill_count)}</div>
          </div>

          <div class="row">
            <div class="label">本月帳單總額</div>
            <div class="value">${money(data.latest_total_amount)}</div>
          </div>
        </div>

        <div class="card">
          <div class="label">目前已收總額</div>
          <div class="money-green">${money(paidTotal)}</div>

          <div class="row">
            <div class="label">最後更新</div>
            <div class="value">${safeText(data.updated_at)}</div>
          </div>
        </div>

        <button class="btn btn-green" onclick="alert('下一步可接房東帳單列表')">
          查看房客帳款
        </button>

        <button class="btn btn-black" onclick="location.reload()">
          重新整理
        </button>
      `;
    }

    // ==================================================
    // 6. 啟動
    // ==================================================

    async function main() {
      try {
        renderLoading();

        await initLineUserId();

        const data = await callApi('landlord_home');

        renderHome(data);

      } catch (error) {
        renderError(error.message || '讀取失敗', 'LINE UID：' + safeText(LINE_USER_ID));
      }
    }

    main();
  </script>
</body>
</html>
