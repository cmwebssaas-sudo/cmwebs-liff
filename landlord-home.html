<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 房東首頁</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 64px;
      --primary: #06c755;
      --primary-dark: #05a948;
      --primary-soft: #effcf4;
      --page-bg: #f4f6fa;
      --card-bg: #ffffff;
      --text-main: #171a1f;
      --text-muted: #747b85;
      --border: #e7ebf0;
      --danger: #e5484d;
      --danger-soft: #fff1f2;
      --warning: #e69b00;
      --warning-soft: #fff7df;
      --blue: #246bfd;
      --blue-soft: #eef4ff;
      --purple: #7c3aed;
      --purple-soft: #f4efff;
      --shadow: 0 7px 24px rgba(30, 40, 60, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text-main);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background: var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        18px
        16px
        calc(var(--nav-height) + 28px + env(safe-area-inset-bottom));
    }

    .card {
      margin-bottom: 14px;
      border: 1px solid rgba(231, 235, 240, 0.92);
      border-radius: 18px;
      background: var(--card-bg);
      box-shadow: var(--shadow);
    }

    .hero-card {
      overflow: hidden;
      background:
        linear-gradient(145deg, #07c95a 0%, #05b64f 58%, #039f44 100%);
      color: #ffffff;
    }

    .hero-main {
      padding: 20px;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .eyebrow {
      margin-bottom: 5px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 700;
    }

    .hero-title {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .hero-meta {
      margin-top: 7px;
      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      line-height: 1.5;
    }

    .refresh-button {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }

    .refresh-button svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .refresh-button.loading svg {
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .hero-stat {
      min-width: 0;
      padding: 12px 13px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.13);
    }

    .hero-stat-label {
      margin-bottom: 4px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 11px;
      font-weight: 700;
    }

    .hero-stat-value {
      overflow: hidden;
      font-size: 18px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hero-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.08);
      color: rgba(255, 255, 255, 0.9);
      font-size: 11px;
    }

    .section-card {
      padding: 17px;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 900;
    }

    .section-hint {
      color: var(--text-muted);
      font-size: 11px;
    }

    .collection-amount {
      margin-bottom: 12px;
      padding: 15px;
      border-radius: 15px;
      background: var(--danger-soft);
    }

    .collection-label {
      margin-bottom: 5px;
      color: #a13a40;
      font-size: 12px;
      font-weight: 800;
    }

    .collection-value {
      color: var(--danger);
      font-size: 29px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .progress-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf0f3;
    }

    .progress-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, var(--primary), #55d98c);
      transition: width 0.35s ease;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 9px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .progress-value {
      color: var(--text-main);
      font-weight: 900;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 13px;
    }

    .summary-box {
      min-width: 0;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fbfcfd;
    }

    .summary-label {
      margin-bottom: 5px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
    }

    .summary-value {
      overflow: hidden;
      font-size: 16px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-value.green {
      color: var(--primary-dark);
    }

    .action-list {
      overflow: hidden;
      border-radius: 14px;
    }

    .action-item {
      width: 100%;
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 14px 2px;
      border: 0;
      border-top: 1px solid var(--border);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .action-item:first-child {
      border-top: 0;
    }

    .action-item:active {
      opacity: 0.67;
    }

    .action-icon {
      width: 43px;
      height: 43px;
      flex: 0 0 43px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: var(--warning-soft);
      color: var(--warning);
    }

    .action-icon.blue {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .action-icon.purple {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .action-icon.green {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .action-icon svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-main {
      min-width: 0;
      flex: 1;
    }

    .action-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 4px;
    }

    .action-title {
      font-size: 15px;
      font-weight: 900;
    }

    .action-desc {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .action-arrow {
      flex: 0 0 auto;
      color: #b4bac2;
      font-size: 22px;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 23px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f0f2f5;
      color: #6c727c;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.warning {
      background: var(--warning-soft);
      color: #b87500;
    }

    .badge.danger {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.green {
      background: var(--primary-soft);
      color: #079641;
    }

    .badge.purple {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .quick-button {
      min-height: 93px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: #ffffff;
      color: var(--text-main);
      text-align: left;
      cursor: pointer;
    }

    .quick-button:active {
      opacity: 0.67;
    }

    .quick-icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 11px;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .quick-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .quick-title {
      font-size: 14px;
      font-weight: 900;
    }

    .quick-desc {
      margin-top: 3px;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .loading-card,
    .error-card {
      padding: 28px 18px;
      text-align: center;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 12px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .loading-text,
    .error-text {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .error-title {
      margin-bottom: 8px;
      color: var(--danger);
      font-size: 17px;
      font-weight: 900;
    }

    .primary-button {
      width: 100%;
      margin-top: 15px;
      padding: 13px;
      border: 0;
      border-radius: 13px;
      background: var(--primary);
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    .toast {
      position: absolute;
      z-index: 3000;
      right: 18px;
      bottom: calc(var(--nav-height) + 22px + env(safe-area-inset-bottom));
      left: 18px;
      display: none;
      padding: 13px 15px;
      border-radius: 13px;
      background: rgba(25, 28, 33, 0.94);
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 390px) {
      .summary-grid,
      .quick-grid {
        grid-template-columns: 1fr;
      }

      .page {
        padding-right: 13px;
        padding-left: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-text">房東首頁資料載入中...</div>
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item active" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(location.search);

    const TEST_MODE =
      URL_PARAMS.get('test') === '1';

    let LINE_USER_ID = '';
    let toastTimer = null;

    function setAppHeight() {
      const height =
        window.visualViewport && window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      if (
        value === undefined ||
        value === null
      ) {
        return '';
      }

      return String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function money(value) {
      const number =
        Number(value || 0);

      return (
        'NT$ ' +
        Math.round(number).toLocaleString(
          'zh-TW'
        )
      );
    }

    function numberValue(value) {
      return Number(value || 0) || 0;
    }

    function clamp(value, min, max) {
      return Math.min(
        Math.max(value, min),
        max
      );
    }

    function goPage(page) {
      const separator =
        page.indexOf('?') >= 0
          ? '&'
          : '?';

      location.href =
        page +
        separator +
        'v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        );
    }

    function showToast(message) {
      const toast =
        document.getElementById('toast');

      toast.textContent =
        rawText(message) || '提示';

      toast.classList.add('show');

      clearTimeout(toastTimer);

      toastTimer =
        setTimeout(function () {
          toast.classList.remove('show');
        }, 2300);
    }

    function jsonpRequest(action, params) {
      return new Promise(function (resolve, reject) {
        if (!LINE_USER_ID) {
          reject(
            new Error('缺少 LINE User ID')
          );

          return;
        }

        const callbackName =
          '__cmwebs_home_' +
          Date.now() +
          '_' +
          Math.floor(
            Math.random() * 1000000
          );

        const script =
          document.createElement('script');

        let finished = false;

        const timer =
          setTimeout(function () {
            if (finished) {
              return;
            }

            finished = true;
            cleanup();
            reject(
              new Error('API 載入逾時')
            );
          }, 30000);

        function cleanup() {
          clearTimeout(timer);

          if (script.parentNode) {
            script.parentNode.removeChild(
              script
            );
          }

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] =
              undefined;
          }
        }

        window[callbackName] =
          function (result) {
            if (finished) {
              return;
            }

            finished = true;
            cleanup();
            resolve(result);
          };

        let url =
          API_URL +
          '?v2_action=' +
          encodeURIComponent(action) +
          '&line_user_id=' +
          encodeURIComponent(
            LINE_USER_ID
          ) +
          '&callback=' +
          encodeURIComponent(
            callbackName
          ) +
          '&_=' +
          Date.now();

        Object.keys(
          params || {}
        ).forEach(function (key) {
          const value =
            params[key];

          if (
            value === undefined ||
            value === null
          ) {
            return;
          }

          url +=
            '&' +
            encodeURIComponent(key) +
            '=' +
            encodeURIComponent(value);
        });

        script.charset =
          'UTF-8';

        script.onerror =
          function () {
            console.warn(
              'JSONP script onerror ignored.'
            );
          };

        script.src = url;
        document.body.appendChild(script);
      });
    }

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

      entryUrl.searchParams.set(
        'return_to',
        returnTo
      );

      return entryUrl.href;
    }

    async function initLineUserId() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      if (
        typeof liff ===
        'undefined'
      ) {
        throw new Error(
          'LIFF SDK 載入失敗'
        );
      }

      await liff.init({
        liffId: LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            buildLandlordLoginRedirectUri()
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId || '';

      if (!LINE_USER_ID) {
        throw new Error(
          '無法取得房東 LINE User ID'
        );
      }

      return true;
    }

    function unwrapData(result) {
      if (
        result &&
        result.success === true
      ) {
        return (
          result.data !== undefined
            ? result.data
            : result
        );
      }

      throw new Error(
        result && result.message
          ? result.message
          : '查詢失敗'
      );
    }

    function findSummaryNumber(
      summary,
      keys
    ) {
      summary =
        summary || {};

      for (
        let index = 0;
        index < keys.length;
        index += 1
      ) {
        const key =
          keys[index];

        if (
          summary[key] !== undefined &&
          summary[key] !== null &&
          summary[key] !== ''
        ) {
          return numberValue(
            summary[key]
          );
        }
      }

      return 0;
    }

    function buildActionSummary(
      contractData,
      paymentData,
      messageData
    ) {
      const contractSummary =
        contractData &&
        contractData.summary
          ? contractData.summary
          : {};

      const paymentSummary =
        paymentData &&
        paymentData.summary
          ? paymentData.summary
          : {};

      const messageSummary =
        messageData &&
        messageData.summary
          ? messageData.summary
          : {};

      return {
        contractPending:
          findSummaryNumber(
            contractSummary,
            [
              'pending_count',
              'pending'
            ]
          ),

        contractApproved:
          findSummaryNumber(
            contractSummary,
            [
              'approved_count',
              'approved'
            ]
          ),

        paymentPending:
          findSummaryNumber(
            paymentSummary,
            [
              'pending_count',
              'pending'
            ]
          ),

        messagePending:
          findSummaryNumber(
            messageSummary,
            [
              'pending_count',
              'pending'
            ]
          ),

        messageProcessing:
          findSummaryNumber(
            messageSummary,
            [
              'processing_count',
              'processing'
            ]
          ),

        messageUrgent:
          findSummaryNumber(
            messageSummary,
            [
              'urgent_count',
              'urgent'
            ]
          )
      };
    }

    function badgeHtml(
      count,
      emptyText,
      className
    ) {
      if (count > 0) {
        return (
          '<span class="badge ' +
          className +
          '">' +
          count +
          ' 筆</span>'
        );
      }

      return (
        '<span class="badge green">' +
        safeHtml(
          emptyText || '無待處理'
        ) +
        '</span>'
      );
    }

              </div>

              <div class="action-arrow">›</div>

            <button

                  ${

                      ? (

                          actionSummary.messageUrgent +

                      : badgeHtml(

                          '無待處理',
                          'warning'
                        )

                </div>
                <div class="action-desc">
                  待處理 ${actionSummary.messagePending} 筆・處理中 ${actionSummary.messageProcessing} 筆

              <div class="action-arrow">›</div>

              <div class="action-main">

                  ${

                      ? (

                </div>

              <div class="action-arrow">›</div>
            </button>
          </div>
        </section>

        <section class="card section-card">
          <div class="section-title-row">
            <div class="section-title">快速功能</div>
          </div>

          <div class="quick-grid">
            <button
              class="quick-button"

            >
              <div class="quick-icon">
                <svg viewBox="0 0 24 24">
                  <circle cx="9" cy="8.5" r="3"></circle>
                  <path d="M4 19c.8-3.3 2.7-5 5-5s4.2 1.7 5 5"></path>
                  <circle cx="16.5" cy="9.5" r="2.3"></circle>

                </svg>
              </div>

              <div>

            <button

            >
              <div class="quick-icon">
                <svg viewBox="0 0 24 24">
                  <path d="M6 3.5h12v17l-2-1.2-2 1.2-2-1.2-2 1.2-2-1.2-2 1.2v-17z"></path>
                  <path d="M8.5 10.5l2 2 4.5-5"></path>
                </svg>
              </div>

              <div>
                <div class="quick-title">已繳帳單</div>
                <div class="quick-desc">查詢及恢復誤銷帳</div>
              </div>
            </button>

            <button
              class="quick-button"
              type="button"
              onclick="goPage('landlord-line-logs.html')"
            >
              <div class="quick-icon">
                <svg viewBox="0 0 24 24">
                  <path d="M5 6.5h14V16H8l-3 3z"></path>
                  <path d="M8.5 10h7"></path>
                  <path d="M8.5 13h5"></path>
                </svg>
              </div>

              <div>

              </div>
            </button>

            <button
              class="quick-button"

              onclick="goPage('landlord-more.html')"
            >
              <div class="quick-icon">
                <svg viewBox="0 0 24 24">
                  <circle cx="6" cy="12" r="1.5"></circle>
                  <circle cx="12" cy="12" r="1.5"></circle>
                  <circle cx="18" cy="12" r="1.5"></circle>
                </svg>
              </div>

                <div class="quick-title">更多功能</div>
                <div class="quick-desc">開啟完整管理入口</div>
              </div>
            </button>
          </div>
        </section>

        <section class="card section-card">
          <div class="section-title-row">
            <div class="section-title">系統資訊</div>
          </div>

          <div class="summary-grid">
            <div class="summary-box">
              <div class="summary-label">最後更新</div>
              <div class="summary-value">
                ${safeHtml(
                  home.updated_at || '-'
                )}
              </div>
            </div>

            <div class="summary-box">
              <div class="summary-label">目前模式</div>
              <div class="summary-value">
                ${TEST_MODE ? '測試' : '正式'}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderError(message) {
      const app =
        document.getElementById('app');

      app.innerHTML = `
        <section class="card error-card">
          <div class="error-title">首頁資料讀取失敗</div>
          <div class="error-text">
            ${safeHtml(
              message || '未知錯誤'
            )}
          </div>

          <button
            class="primary-button"
            type="button"
            onclick="loadPage()"
          >
            重新整理
          </button>
        </section>
      `;
    }

    function setRefreshLoading(
      loading
    ) {
      const button =
        document.getElementById(
          'refreshButton'
        );

      if (!button) {
        return;
      }

      button.classList.toggle(
        'loading',
        Boolean(loading)
      );
    }

    async function loadPage() {
      setRefreshLoading(true);

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLineUserId();

          if (!ready) {
            return;
          }
        }

        const homeResult =
          await jsonpRequest(
            'landlord_home',
            {}
          );

        const home =
          unwrapData(homeResult);

        const optionalResults =
          await Promise.allSettled([
            jsonpRequest(
              'landlord_contract_requests_init',
              {}
            ),
            jsonpRequest(
              'landlord_payment_reports_init',
              {}
            ),
            jsonpRequest(
              'landlord_messages_init',
              {}
            )
          ]);

        let contractData = {};
        let paymentData = {};
        let messageData = {};

        if (
          optionalResults[0].status ===
          'fulfilled'
        ) {
          try {
            contractData =
              unwrapData(
                optionalResults[0].value
              );
          } catch (error) {
            console.warn(error);
          }
        }

        if (
          optionalResults[1].status ===
          'fulfilled'
        ) {
          try {
            paymentData =
              unwrapData(
                optionalResults[1].value
              );
          } catch (error) {
            console.warn(error);
          }
        }

        if (
          optionalResults[2].status ===
          'fulfilled'
        ) {
          try {
            messageData =
              unwrapData(
                optionalResults[2].value
              );
          } catch (error) {
            console.warn(error);
          }
        }

        const actionSummary =
          buildActionSummary(
            contractData,
            paymentData,
            messageData
          );

        renderHome(
          home,
          actionSummary
        );
      } catch (error) {
        renderError(
          error && error.message
            ? error.message
            : String(error)
        );
      } finally {
        setRefreshLoading(false);
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    window.addEventListener(
      'orientationchange',
      function () {
        setTimeout(
          setAppHeight,
          250
        );
      }
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
