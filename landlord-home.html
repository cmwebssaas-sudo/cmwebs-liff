<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMWebs 房東首頁</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 62px;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: var(--app-height);
      margin: 0 auto;
      background: #f5f7fb;
      overflow: hidden;
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 18px 18px calc(var(--nav-height) + 30px + env(safe-area-inset-bottom));
      box-sizing: border-box;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .label {
      color: #777;
      font-size: 14px;
      flex: 1;
    }

    .value {
      font-weight: 700;
      text-align: right;
      word-break: break-word;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid #eee;
      align-items: center;
    }

    .row:first-child {
      border-top: none;
    }

    .money-red {
      color: #d93025;
      font-size: 30px;
      font-weight: 800;
      margin: 8px 0 12px;
    }

    .money-green {
      color: #00b050;
      font-size: 26px;
      font-weight: 800;
      margin: 8px 0 12px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      margin-top: 10px;
      cursor: pointer;
    }

    .btn-black {
      background: #222;
      color: #fff;
    }

    .btn-green {
      background: #06c755;
      color: #fff;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .error-title {
      color: #d93025;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .error-msg {
      font-size: 14px;
      line-height: 1.5;
      word-break: break-all;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #777;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #eef7ee;
      color: #10893e;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .small {
      font-size: 12px;
      color: #777;
      line-height: 1.5;
      word-break: break-all;
    }

    /* ===== Fixed Bottom Navigation ===== */
    .bottom-nav {
      position: absolute !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      z-index: 99999 !important;
      background: rgba(255, 255, 255, 0.98);
      border-top: 1px solid #eceff3;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      background: transparent;
      color: #8b9098;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      position: relative;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      stroke: currentColor;
      stroke-width: 1.9;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: #06c755;
      font-weight: 800;
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: #06c755;
    }

    .nav-item:active {
      opacity: 0.65;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <div class="page">
      <div id="app" class="loading">資料載入中...</div>
    </div>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item active" onclick="location.href='landlord-home.html?v=' + Date.now()">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <div>首頁</div>
        </button>

        <button class="nav-item" onclick="location.href='landlord-arrears.html?v=' + Date.now()">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <div>欠款</div>
        </button>

        <button class="nav-item" onclick="location.href='landlord-tenants.html?v=' + Date.now()">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8.5" r="3"></circle>
            <path d="M4 19c.8-3.3 2.7-5 5-5s4.2 1.7 5 5"></path>
            <circle cx="16.5" cy="9.5" r="2.3"></circle>
            <path d="M14.5 14.5c2.3.4 3.8 1.9 4.5 4.5"></path>
          </svg>
          <div>房客</div>
        </button>

        <button class="nav-item" onclick="location.href='landlord-more.html?v=' + Date.now()">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <div>更多</div>
        </button>
      </div>
    </nav>
  </div>

  <script>
    function setAppHeight() {
      document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
    }

    setAppHeight();

    window.addEventListener('resize', setAppHeight);
    window.addEventListener('orientationchange', function () {
      setTimeout(setAppHeight, 300);
    });

    const API_URL = 'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID = '2010314940-EjX1qbb8';

    const TEST_LINE_USER_ID = 'Uf708ece75c9c985cfe1dbda48d123511';

    let LINE_USER_ID = '';
    let LANDLORD_HOME = null;

    const app = document.getElementById('app');

    function safeText(v) {
      if (v === undefined || v === null || v === '') return '-';
      return String(v);
    }

    function money(n) {
      const num = Number(n || 0);
      return 'NT$ ' + Math.round(num).toLocaleString('zh-TW');
    }

    function renderLoading() {
      app.className = 'loading';
      app.innerHTML = '資料載入中...';
    }

    function renderError(message, detail) {
      app.className = '';
      app.innerHTML = `
        <div class="card">
          <div class="error-title">資料讀取失敗</div>
          <div class="error-msg">${safeText(message)}</div>
          ${detail ? `<div class="small" style="margin-top:8px;">${safeText(detail)}</div>` : ''}
          <button class="btn btn-black" onclick="location.reload()">重新整理</button>

          <div class="hint">
            若持續失敗，請確認：<br>
            1. 房東 LINE UID 是否存在在 V2_landlords<br>
            2. V2_landlord_home_view 是否有產生資料<br>
            3. Apps Script 是否已重新部署新版<br>
            4. LIFF Endpoint URL 是否為 landlord-home.html
          </div>
        </div>
      `;
    }

    function callApi(action) {
      return new Promise((resolve, reject) => {
        if (!LINE_USER_ID) {
          reject(new Error('缺少 LINE User ID'));
          return;
        }

        const callbackName =
          'cmwebsJsonp_' + Date.now() + '_' + Math.floor(Math.random() * 1000000);

        let finished = false;
        const script = document.createElement('script');

        function cleanup() {
          clearTimeout(timer);

          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }

          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }
        }

        window[callbackName] = function (json) {
          if (finished) return;
          finished = true;

          cleanup();

          if (!json || json.success !== true) {
            reject(new Error((json && json.message) ? json.message : '查詢失敗'));
            return;
          }

          resolve(json.data);
        };

        const timer = setTimeout(() => {
          if (finished) return;
          finished = true;

          cleanup();
          reject(new Error('API 載入逾時'));
        }, 30000);

        script.charset = 'UTF-8';

        script.onerror = function () {
          console.log('JSONP script onerror ignored');
        };

        script.src =
          API_URL +
          '?v2_action=' + encodeURIComponent(action) +
          '&line_user_id=' + encodeURIComponent(LINE_USER_ID) +
          '&callback=' + encodeURIComponent(callbackName) +
          '&_=' + Date.now();

        document.body.appendChild(script);
      });
    }

    async function initLineUserId() {
      if (typeof liff === 'undefined') {
        LINE_USER_ID = TEST_LINE_USER_ID;
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        LINE_USER_ID = profile.userId || '';

        if (!LINE_USER_ID) {
          throw new Error('無法取得 LINE User ID');
        }

      } catch (error) {
        LINE_USER_ID = TEST_LINE_USER_ID;
      }
    }

    function renderHome(data) {
      LANDLORD_HOME = data;

      const unpaidTotal = Number(data.unpaid_total_amount || 0);
      const paidTotal = Number(data.paid_total_amount || 0);

      app.className = '';
      app.innerHTML = `
        <div class="card">
          <div class="title">您好，${safeText(data.landlord_name)}</div>
          <div class="sub">房東編號：${safeText(data.landlord_id)}</div>

          <div class="row">
            <div class="label">帳號狀態</div>
            <div class="value"><span class="badge">${safeText(data.account_status)}</span></div>
          </div>

          <div class="row">
            <div class="label">管理房間數</div>
            <div class="value">${safeText(data.room_count)}</div>
          </div>

          <div class="row">
            <div class="label">房客數</div>
            <div class="value">${safeText(data.tenant_count)}</div>
          </div>

          <div class="row">
            <div class="label">最新帳單月份</div>
            <div class="value">${safeText(data.latest_bill_month)}</div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">本月收款總覽</div>

          <div class="label">目前未繳總額</div>
          <div class="money-red">${money(unpaidTotal)}</div>

          <div class="row">
            <div class="label">未繳帳單數</div>
            <div class="value">${safeText(data.unpaid_bill_count)}</div>
          </div>

          <div class="row">
            <div class="label">已繳帳單數</div>
            <div class="value">${safeText(data.paid_bill_count)}</div>
          </div>

          <div class="row">
            <div class="label">本月帳單總數</div>
            <div class="value">${safeText(data.latest_bill_count)}</div>
          </div>

          <div class="row">
            <div class="label">本月帳單總額</div>
            <div class="value">${money(data.latest_total_amount)}</div>
          </div>
        </div>

        <div class="card">
          <div class="label">目前已收總額</div>
          <div class="money-green">${money(paidTotal)}</div>

          <div class="row">
            <div class="label">最後更新</div>
            <div class="value">${safeText(data.updated_at)}</div>
          </div>
        </div>

       <button
  class="btn btn-green"
  onclick="location.href='landlord-arrears.html?v=' + Date.now()"
>
  查看房客帳款
</button>

<button
  class="btn btn-green"
  onclick="location.href='landlord-payment-reports.html?v=' + Date.now()"
>
  付款回報管理
</button>

<button
  class="paid-bills-entry"
  onclick="location.href='landlord-paid-bills.html?v=' + Date.now()"
>
  <div class="paid-bills-entry-icon">
    <svg viewBox="0 0 24 24">
      <rect
        x="5"
        y="3.5"
        width="14"
        height="17"
        rx="2"
      ></rect>

      <path d="M8.5 8.5h7"></path>
      <path d="M8.5 12.5h4"></path>
      <path d="M9 16l2 2 4-4"></path>
    </svg>
  </div>

  <div class="paid-bills-entry-content">
    <div class="paid-bills-entry-title">
      已繳帳單管理
    </div>

    <div class="paid-bills-entry-desc">
      查看所有已繳帳單，撤銷誤銷帳並恢復欠款
    </div>
  </div>

  <div class="paid-bills-entry-arrow">
    ›
  </div>
</button>

<button
  class="btn btn-green"
  onclick="location.href='landlord-messages.html?v=' + Date.now()"
>
  房客訊息與報修管理
</button>

<button
  class="btn btn-green"
  onclick="location.href='landlord-tenants.html?v=' + Date.now()"
>
  查看房客名單
</button>

<button
  class="btn btn-black"
  onclick="location.reload()"
>
  重新整理
</button>
      `;
    }

    async function main() {
      try {
        renderLoading();

        await initLineUserId();

        const data = await callApi('landlord_home');

        renderHome(data);

      } catch (error) {
        renderError(error.message || '讀取失敗', 'LINE UID：' + safeText(LINE_USER_ID));
      }
    }

    main();

    /* ===== 已繳帳單管理入口 ===== */

.paid-bills-entry {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 12px;
  padding: 16px;
  border: 1px solid #dfe7e2;
  border-radius: 14px;
  background: #ffffff;
  color: #222222;
  text-align: left;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(0, 0, 0, 0.05);
}

.paid-bills-entry:active {
  opacity: 0.72;
}

.paid-bills-entry-icon {
  width: 46px;
  height: 46px;
  flex: 0 0 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 13px;
  background: #e9f8ef;
  color: #06c755;
}

.paid-bills-entry-icon svg {
  width: 25px;
  height: 25px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.9;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.paid-bills-entry-content {
  min-width: 0;
  flex: 1;
}

.paid-bills-entry-title {
  font-size: 15px;
  font-weight: 900;
}

.paid-bills-entry-desc {
  margin-top: 4px;
  color: #777777;
  font-size: 12px;
  line-height: 1.55;
}

.paid-bills-entry-arrow {
  flex: 0 0 auto;
  color: #a0a5ab;
  font-size: 22px;
}
    
  </script>
</body>
</html>
