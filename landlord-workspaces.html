<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 切換管理團隊</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 68px;
      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #edf9f2;
      --purple: #7654c4;
      --purple-soft: #f3efff;
      --blue: #1a73e8;
      --blue-soft: #edf4ff;
      --orange: #ef8f00;
      --orange-soft: #fff5df;
      --danger: #d93025;
      --danger-soft: #fff0ef;
      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;
      --shadow: 0 10px 34px rgba(25, 35, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 620px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(
          circle at 100% 0%,
          rgba(118, 84, 196, 0.12),
          transparent 28%
        ),
        var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(16px, env(safe-area-inset-top))
        15px
        calc(
          var(--nav-height) +
          22px +
          env(safe-area-inset-bottom)
        );
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .eyebrow {
      color: var(--purple);
      font-size: 10px;
      font-weight: 900;
    }

    .page-title {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .refresh-button {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #5f6670;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #6342ad 0%,
          #7654c4 58%,
          #5e3ca9 100%
        );
    }

    .hero::after {
      position: absolute;
      top: -65px;
      right: -45px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      content: "";
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 9px;
      font-weight: 900;
    }

    .hero-name {
      margin-top: 5px;
      font-size: 21px;
      font-weight: 900;
    }

    .hero-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 9px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 10px;
    }

    .hero-pill {
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      font-weight: 900;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 15px;
    }

    .summary-item {
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.1);
    }

    .summary-label {
      color: rgba(255, 255, 255, 0.72);
      font-size: 8px;
    }

    .summary-value {
      margin-top: 4px;
      font-size: 17px;
      font-weight: 900;
    }

    .create-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px;
    }

    .create-title {
      font-size: 14px;
      font-weight: 900;
    }

    .create-desc {
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.55;
    }

    .create-button {
      min-height: 42px;
      flex: 0 0 auto;
      padding: 0 14px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .notice {
      padding: 14px 15px;
      color: #5f6670;
      font-size: 10px;
      line-height: 1.7;
    }

    .notice strong {
      color: var(--text);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 9px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 900;
    }

    .section-count {
      color: var(--muted);
      font-size: 10px;
    }

    .workspace-card {
      position: relative;
      overflow: hidden;
      padding: 15px;
    }

    .workspace-card.current {
      border-color: rgba(6, 199, 85, 0.35);
      box-shadow:
        0 10px 34px rgba(6, 199, 85, 0.08),
        inset 4px 0 0 var(--primary);
    }

    .workspace-card.inactive {
      opacity: 0.72;
    }

    .workspace-main {
      display: flex;
      align-items: flex-start;
      gap: 11px;
    }

    .workspace-icon {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: var(--purple-soft);
      color: var(--purple);
      font-size: 15px;
      font-weight: 900;
    }

    .workspace-card.current .workspace-icon {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .workspace-content {
      min-width: 0;
      flex: 1;
    }

    .workspace-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .workspace-title {
      font-size: 14px;
      font-weight: 900;
    }

    .badge {
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 900;
    }

    .badge.current {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .badge.role {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .badge.primary {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge.warning {
      background: var(--orange-soft);
      color: #9b6200;
    }

    .badge.inactive {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .workspace-id {
      margin-top: 6px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.5;
      word-break: break-all;
    }

    .workspace-info {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .info-item {
      min-width: 0;
      padding: 9px 10px;
      border-radius: 10px;
      background: var(--surface-soft);
    }

    .info-label {
      color: var(--muted);
      font-size: 8px;
    }

    .info-value {
      margin-top: 4px;
      overflow: hidden;
      font-size: 9px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workspace-actions {
      margin-top: 12px;
      padding-top: 11px;
      border-top: 1px solid var(--border);
    }

    .switch-button,
    .current-button {
      width: 100%;
      min-height: 42px;
      border-radius: 11px;
      font-size: 11px;
      font-weight: 900;
    }

    .switch-button {
      border: 0;
      background: var(--primary);
      color: #ffffff;
      cursor: pointer;
    }

    .current-button {
      border: 1px solid #cdeed9;
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .switch-button:disabled {
      border: 1px solid var(--border);
      background: #f0f2f5;
      color: #969ca4;
      cursor: default;
    }

    .empty-card,
    .loading-card,
    .error-card {
      padding: 28px 18px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      text-align: center;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 14px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-title,
    .error-title {
      margin-bottom: 7px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .primary-button {
      width: 100%;
      min-height: 45px;
      margin-top: 15px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .editor-backdrop {
      position: absolute;
      z-index: 1700;
      inset: 0;
      display: none;
      align-items: stretch;
      justify-content: center;
      padding:
        14px
        14px
        calc(
          var(--nav-height) +
          14px +
          env(safe-area-inset-bottom)
        );
      background: rgba(17, 24, 39, 0.55);
    }

    .editor-backdrop.show {
      display: flex;
    }

    .editor-sheet {
      width: 100%;
      max-width: 560px;
      height: 100%;
      overflow-y: auto;
      padding: 18px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
    }

    .editor-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 15px;
    }

    .editor-title {
      font-size: 19px;
      font-weight: 900;
    }

    .editor-desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.6;
    }

    .close-button {
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #ffffff;
      color: #666d77;
      font-size: 18px;
      cursor: pointer;
    }

    .field {
      margin-top: 14px;
    }

    .field-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 900;
    }

    .required {
      color: var(--danger);
      font-size: 9px;
    }

    .optional {
      color: var(--muted);
      font-size: 9px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      background: #ffffff;
      color: var(--text);
    }

    .input,
    .select {
      height: 46px;
      padding: 0 13px;
    }

    .textarea {
      min-height: 82px;
      padding: 11px 13px;
      resize: vertical;
    }

    .type-info {
      margin-top: 10px;
      padding: 11px 12px;
      border: 1px solid #ddd5f5;
      border-radius: 11px;
      background: var(--purple-soft);
      color: #5d4794;
      font-size: 9px;
      line-height: 1.65;
    }

    .editor-warning {
      margin-top: 14px;
      padding: 11px 12px;
      border: 1px solid #f0dfb9;
      border-radius: 11px;
      background: var(--orange-soft);
      color: #74500c;
      font-size: 9px;
      line-height: 1.65;
    }

    .editor-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 18px;
    }

    .editor-cancel,
    .editor-submit {
      min-height: 45px;
      border-radius: 11px;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .editor-cancel {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .editor-submit {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .editor-submit:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .confirm-backdrop {
      position: absolute;
      z-index: 1800;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding:
        18px
        16px
        calc(
          var(--nav-height) +
          18px +
          env(safe-area-inset-bottom)
        );
      background: rgba(17, 24, 39, 0.55);
    }

    .confirm-backdrop.show {
      display: flex;
    }

    .confirm-box {
      width: 100%;
      max-width: 420px;
      padding: 19px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
    }

    .confirm-title {
      font-size: 18px;
      font-weight: 900;
    }

    .confirm-message {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      white-space: pre-line;
    }

    .confirm-details {
      margin-top: 13px;
      padding: 11px 12px;
      border: 1px solid #ddd5f5;
      border-radius: 11px;
      background: var(--purple-soft);
      color: #5d4794;
      font-size: 10px;
      line-height: 1.6;
    }

    .confirm-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 17px;
    }

    .confirm-cancel,
    .confirm-submit {
      min-height: 44px;
      border-radius: 11px;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .confirm-cancel {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .confirm-submit {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .confirm-submit:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .toast {
      position: absolute;
      z-index: 2000;
      right: 16px;
      bottom:
        calc(
          var(--nav-height) +
          16px +
          env(safe-area-inset-bottom)
        );
      left: 16px;
      max-width: 470px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 13px;
      background: #22252a;
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      line-height: 1.55;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition:
        opacity 0.18s ease,
        transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--danger);
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    @media (max-width: 430px) {
      .create-card {
        align-items: flex-start;
        flex-direction: column;
      }

      .create-button {
        width: 100%;
      }

      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="topbar">
        <div>
          <div class="eyebrow">Workspace Switcher</div>
          <div class="page-title">切換管理團隊</div>
        </div>

        <button
          class="refresh-button"
          type="button"
          onclick="loadPage()"
          aria-label="重新整理"
        >
          ↻
        </button>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">管理團隊載入中</div>
          正在讀取您已建立或受邀加入的管理團隊。
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>

    <div id="createModal" class="editor-backdrop">
      <div class="editor-sheet">
        <div class="editor-head">
          <div>
            <div class="editor-title">
              建立新的管理團隊
            </div>

            <div class="editor-desc">
              新團隊會使用完全獨立的物件、房客、帳務與合約資料。
            </div>
          </div>

          <button
            class="close-button"
            type="button"
            onclick="closeCreateEditor()"
          >
            ×
          </button>
        </div>

        <div class="field">
          <div class="field-label">
            <span>管理團隊名稱</span>
            <span class="required">必填</span>
          </div>

          <input
            id="createWorkspaceName"
            class="input"
            maxlength="80"
            placeholder="例如：台中自有房產管理"
          />
        </div>

        <div class="field">
          <div class="field-label">
            <span>管理類型</span>
            <span class="required">必填</span>
          </div>

          <select
            id="createWorkspaceType"
            class="select"
            onchange="updateWorkspaceTypeInfo()"
          >
            <option value="rental_management">
              自有長租房源管理
            </option>

            <option value="property_management">
              包租代管／團隊代管
            </option>

            <option value="co_ownership">
              共同持有／共同管理
            </option>
          </select>

          <div
            id="workspaceTypeInfo"
            class="type-info"
          ></div>
        </div>

        <div class="field">
          <div class="field-label">
            <span>備註</span>
            <span class="optional">選填</span>
          </div>

          <textarea
            id="createWorkspaceNote"
            class="textarea"
            maxlength="300"
            placeholder="例如：專門管理台中地區的自有房源"
          ></textarea>
        </div>

        <div class="editor-warning">
          建立後會立即切換至新團隊，接著進入初始設定，建立收款帳號、第一個物件與第一個房間。
        </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(
        location.search
      );

    const TEST_MODE =
      URL_PARAMS.get('test') ===
      '1';

    const RETURN_TO =
      sanitizeReturnTo(
        URL_PARAMS.get(
          'return_to'
        ) || ''
      );

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let PENDING_WORKSPACE = null;
    let toastTimer = null;

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      return value === undefined || value === null
        ? ''
        : String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function sanitizeReturnTo(value) {
      if (!value) {
        return '';
      }

      try {
        const url =
          new URL(
            value,
            location.href
          );

        const file =
          url.pathname
            .split('/')
            .pop();

        if (
          url.origin !==
            location.origin ||
          !file.startsWith(
            'landlord-'
          ) ||
          file ===
            'landlord-workspaces.html'
        ) {
          return '';
        }

        [
          'code',
          'state',
          'liff.state',
          'friendship_status_changed',
          'error',
          'error_description'
        ].forEach(
          function (key) {
            url.searchParams.delete(
              key
            );
          }
        );

        return (
          file +
          (
            url.searchParams
              .toString()
              ? '?' +
                url.searchParams
                  .toString()
              : ''
          )
        );

      } catch (error) {
        return '';
      }
    }

    function goPage(page) {
      location.href =
        page +
        '?v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        );
    }

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

      entryUrl.searchParams.set(
        'return_to',
        returnTo
      );

      return entryUrl.href;
    }

    function showToast(
      message,
      isError
    ) {
      const toast =
        document.getElementById(
          'toast'
        );

      clearTimeout(
        toastTimer
      );

      toast.textContent =
        message || '';

      toast.className =
        isError
          ? 'toast error show'
          : 'toast show';

      toastTimer =
        setTimeout(
          function () {
            toast.className =
              'toast';
          },
          2800
        );
    }

    function jsonpRequest(
      action,
      params
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_workspace_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;

          const timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished = true;
                cleanup();

                reject(
                  new Error(
                    'API 載入逾時'
                  )
                );
              },
              25000
            );

          function cleanup() {
            clearTimeout(timer);

            if (script.parentNode) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (result) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();
              resolve(result);
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params || {}
          ).forEach(
            function (key) {
              url +=
                '&' +
                encodeURIComponent(
                  key
                ) +
                '=' +
                encodeURIComponent(
                  params[key]
                );
            }
          );

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗'
                )
              );
            };

          script.src = url;
          document.body.appendChild(
            script
          );
        }
      );
    }

    async function initLine() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      await liff.init({
        liffId: LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            buildLandlordLoginRedirectUri()
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId || '';

      if (!LINE_USER_ID) {
        throw new Error(
          '無法取得 LINE User ID'
        );
      }

      return true;
    }

    function roleLabel(role) {
      const map = {
        owner: '擁有者',
        admin: '管理員',
        manager: '營運管理',
        accountant: '帳務人員',
        maintenance: '維修人員',
        viewer: '唯讀成員'
      };

      return (
        map[
          rawText(role)
            .toLowerCase()
        ] ||
        rawText(role) ||
        '-'
      );
    }

    function onboardingLabel(status) {
      const map = {
        completed: '已完成設定',
        complete: '已完成設定',
        ready: '已完成設定',
        active: '已完成設定',
        pending: '尚未完成設定',
        draft: '尚未完成設定'
      };

      return (
        map[
          rawText(status)
            .toLowerCase()
        ] ||
        rawText(status) ||
        '-'
      );
    }

    function accountLabel(status) {
      return (
        rawText(status)
          .toLowerCase() ===
          'active'
          ? '啟用'
          : (
              rawText(status) ||
              '-'
            )
      );
    }

    function isActiveStatus(status) {
      return [
        'active',
        'enabled',
        '1',
        'true',
        'yes'
      ].indexOf(
        rawText(status)
          .toLowerCase()
      ) >= 0;
    }

    function isOnboardingComplete(status) {
      return [
        'completed',
        'complete',
        'ready',
        'active',
        'done'
      ].indexOf(
        rawText(status)
          .toLowerCase()
      ) >= 0;
    }

    function renderPage() {
      const user =
        PAGE_DATA.user || {};

      const current =
        PAGE_DATA.active_workspace || {};

      const membership =
        PAGE_DATA.active_membership || {};

      const workspaces =
        Array.isArray(
          PAGE_DATA.workspaces
        )
          ? PAGE_DATA.workspaces
          : [];

      const activeCount =
        workspaces.filter(
          function (item) {
            return (
              isActiveStatus(
                item.account_status
              ) &&
              isActiveStatus(
                item.member_status
              )
            );
          }
        ).length;

      const ownerCount =
        workspaces.filter(
          function (item) {
            return (
              rawText(
                item.role
              ).toLowerCase() ===
              'owner'
            );
          }
        ).length;

      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card hero">
          <div class="hero-content">
            <div class="hero-label">
              目前管理團隊
            </div>

            <div class="hero-name">
              ${safeHtml(
                current.workspace_name ||
                '-'
              )}
            </div>

            <div class="hero-meta">
              <span class="hero-pill">
                ${safeHtml(
                  roleLabel(
                    membership.role
                  )
                )}
              </span>

              <span>
                ${safeHtml(
                  user.name ||
                  '目前使用者'
                )}
              </span>
            </div>

            <div class="summary-grid">
              <div class="summary-item">
                <div class="summary-label">全部團隊</div>
                <div class="summary-value">${workspaces.length}</div>
              </div>

              <div class="summary-item">
                <div class="summary-label">可使用</div>
                <div class="summary-value">${activeCount}</div>
              </div>

              <div class="summary-item">
                <div class="summary-label">擁有團隊</div>
                <div class="summary-value">${ownerCount}</div>
              </div>
            </div>
          </div>
        </section>

        <section class="card create-card">
          <div>
            <div class="create-title">
              建立新的管理團隊
            </div>

            <div class="create-desc">
              建立獨立的物件、房客、帳務、合約與團隊權限空間。
            </div>
          </div>

          <button
            class="create-button"
            type="button"
            onclick="openCreateEditor()"
          >
            ＋ 建立團隊
          </button>
        </section>

        <section class="card notice">
          <strong>切換後，房東首頁、房客、帳單、付款、訊息與合約資料會改為新團隊內容。</strong>
          每個管理團隊的角色與權限分開計算。
        </section>

        <div class="section-head">
          <div class="section-title">
            我的管理團隊
          </div>

          <div class="section-count">
            ${workspaces.length} 個
          </div>
        </div>

        ${
          workspaces.length
            ? workspaces.map(
                workspaceCard
              ).join('')
            : `
              <section class="card empty-card">
                目前沒有可使用的管理團隊。
              </section>
            `
        }
      `;
    }

    function workspaceCard(item) {
      const current =
        item.is_active ===
        true;

      const available =
        isActiveStatus(
          item.account_status
        ) &&
        isActiveStatus(
          item.member_status
        );

      const onboardingComplete =
        isOnboardingComplete(
          item.onboarding_status
        );

      return `
        <section class="card workspace-card ${
          current
            ? 'current'
            : ''
        } ${
          available
            ? ''
            : 'inactive'
        }">
          <div class="workspace-main">
            <div class="workspace-icon">
              ${safeHtml(
                rawText(
                  item.workspace_name ||
                  'W'
                ).slice(0, 1)
              )}
            </div>

            <div class="workspace-content">
              <div class="workspace-title-row">
                <span class="workspace-title">
                  ${safeHtml(
                    item.workspace_name ||
                    item.workspace_id ||
                    '未命名團隊'
                  )}
                </span>

                ${
                  current
                    ? `
                      <span class="badge current">
                        目前使用
                      </span>
                    `
                    : ''
                }

                <span class="badge role">
                  ${safeHtml(
                    roleLabel(
                      item.role
                    )
                  )}
                </span>

                ${
                  item.is_primary
                    ? `
                      <span class="badge primary">
                        主要團隊
                      </span>
                    `
                    : ''
                }

                ${
                  !onboardingComplete
                    ? `
                      <span class="badge warning">
                        待完成設定
                      </span>
                    `
                    : ''
                }

                ${
                  !available
                    ? `
                      <span class="badge inactive">
                        無法使用
                      </span>
                    `
                    : ''
                }
              </div>

              <div class="workspace-id">
                ${safeHtml(
                  item.workspace_id ||
                  '-'
                )}
              </div>
            </div>
          </div>

          <div class="workspace-info">
            <div class="info-item">
              <div class="info-label">
                團隊狀態
              </div>

              <div class="info-value">
                ${safeHtml(
                  accountLabel(
                    item.account_status
                  )
                )}
              </div>
            </div>

            <div class="info-item">
              <div class="info-label">
                成員狀態
              </div>

              <div class="info-value">
                ${safeHtml(
                  accountLabel(
                    item.member_status
                  )
                )}
              </div>
            </div>

            <div class="info-item">
              <div class="info-label">
                初始設定
              </div>

              <div class="info-value">
                ${safeHtml(
                  onboardingLabel(
                    item.onboarding_status
                  )
                )}
              </div>
            </div>

            <div class="info-item">
              <div class="info-label">
                團隊角色
              </div>

              <div class="info-value">
                ${safeHtml(
                  roleLabel(
                    item.role
                  )
                )}
              </div>
            </div>
          </div>

          <div class="workspace-actions">
            ${
              current
                ? `
                  <button
                    class="current-button"
                    type="button"
                    disabled
                  >
                    ✓ 目前正在使用
                  </button>
                `
                : `
                  <button
                    class="switch-button"
                    type="button"
                    ${
                      available
                        ? ''
                        : 'disabled'
                    }
                    onclick="openSwitchConfirm('${
                      safeHtml(
                        item.workspace_id
                      )
                    }')"
                  >
                    ${
                      available
                        ? '切換至此管理團隊'
                        : '目前無法切換'
                    }
                  </button>
                `
            }
          </div>
        </section>
      `;
    }

    function openCreateEditor() {
      document.getElementById(
        'createWorkspaceName'
      ).value =
        '';

      document.getElementById(
        'createWorkspaceType'
      ).value =
        'rental_management';

      document.getElementById(
        'createWorkspaceNote'
      ).value =
        '';

      updateWorkspaceTypeInfo();

      document.getElementById(
        'createModal'
      ).classList.add(
        'show'
      );
    }

    function closeCreateEditor() {
      document.getElementById(
        'createModal'
      ).classList.remove(
        'show'
      );
    }

    function updateWorkspaceTypeInfo() {
      const type =
        document.getElementById(
          'createWorkspaceType'
        ).value;

      const descriptions = {
        rental_management:
          '適合管理自己持有的長租套房、公寓、住宅或店面。',
        property_management:
          '適合包租代管公司、房東團隊或替其他屋主管理房源。',
        co_ownership:
          '適合家族、共同投資人或多位房東共同持有與管理。'
      };

      document.getElementById(
        'workspaceTypeInfo'
      ).textContent =
        descriptions[type] ||
        '';
    }

    async function submitCreateWorkspace() {
      const workspaceName =
        rawText(
          document.getElementById(
            'createWorkspaceName'
          ).value
        ).trim();

      const workspaceType =
        rawText(
          document.getElementById(
            'createWorkspaceType'
          ).value
        ).trim();

      const note =
        rawText(
          document.getElementById(
            'createWorkspaceNote'
          ).value
        ).trim();

      if (!workspaceName) {
        showToast(
          '請輸入管理團隊名稱。',
          true
        );

        return;
      }

      if (workspaceName.length > 80) {
        showToast(
          '管理團隊名稱最多 80 字。',
          true
        );

        return;
      }

      const submit =
        document.getElementById(
          'createWorkspaceSubmit'
        );

      submit.disabled =
        true;

      submit.textContent =
        '建立中...';

      try {
        const result =
          await jsonpRequest(
            'landlord_workspace_create',
            {
              workspace_name:
                workspaceName,
              workspace_type:
                workspaceType,
              note:
                note
            }
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '管理團隊建立失敗'
          );
        }

        closeCreateEditor();

        showToast(
          '管理團隊已建立，正在進入初始設定。'
        );

        setTimeout(
          function () {
            location.replace(
              'landlord-onboarding.html?v=' +
              Date.now() +
              (
                TEST_MODE
                  ? '&test=1'
                  : ''
              )
            );
          },
          650
        );

      } catch (error) {
        showToast(
          error &&
          error.message
            ? error.message
            : '管理團隊建立失敗',
          true
        );

        submit.disabled =
          false;

        submit.textContent =
          '建立並開始設定';
      }
    }

    function openSwitchConfirm(
      workspaceId
    ) {
      const workspace =
        (
          PAGE_DATA.workspaces ||
          []
        ).find(
          function (item) {
            return (
              item.workspace_id ===
              workspaceId
            );
          }
        );

      if (!workspace) {
        showToast(
          '找不到管理團隊資料。',
          true
        );

        return;
      }

      PENDING_WORKSPACE =
        workspace;

      document.getElementById(
        'confirmMessage'
      ).textContent =
        '確定切換至「' +
        (
          workspace.workspace_name ||
          workspace.workspace_id
        ) +
        '」？';

      document.getElementById(
        'confirmDetails'
      ).textContent =
        '角色：' +
        roleLabel(
          workspace.role
        ) +
        '｜初始設定：' +
        onboardingLabel(
          workspace.onboarding_status
        );

      const submit =
        document.getElementById(
          'confirmSubmit'
        );

      submit.disabled = false;
      submit.textContent =
        '確認切換';

      submit.onclick =
        switchWorkspace;

      document.getElementById(
        'confirmModal'
      ).classList.add(
        'show'
      );
    }

    function closeConfirm() {
      document.getElementById(
        'confirmModal'
      ).classList.remove(
        'show'
      );

      PENDING_WORKSPACE =
        null;
    }

    async function switchWorkspace() {
      if (!PENDING_WORKSPACE) {
        return;
      }

      const selected =
        PENDING_WORKSPACE;

      const submit =
        document.getElementById(
          'confirmSubmit'
        );

      submit.disabled = true;
      submit.textContent =
        '切換中...';

      try {
        const result =
          await jsonpRequest(
            'landlord_workspace_switch',
            {
              workspace_id:
                selected.workspace_id
            }
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '管理團隊切換失敗'
          );
        }

        closeConfirm();

        showToast(
          '已切換至「' +
          (
            selected.workspace_name ||
            selected.workspace_id
          ) +
          '」'
        );

        const data =
          result.data || {};

        const activeWorkspace =
          data.active_workspace ||
          selected;

        const destination =
          RETURN_TO ||
          (
            isOnboardingComplete(
              activeWorkspace.onboarding_status
            )
              ? 'landlord-home.html'
              : 'landlord-onboarding.html'
          );

        setTimeout(
          function () {
            location.replace(
              destination +
              (
                destination.indexOf('?') >= 0
                  ? '&'
                  : '?'
              ) +
              'v=' +
              Date.now() +
              (
                TEST_MODE
                  ? '&test=1'
                  : ''
              )
            );
          },
          550
        );

      } catch (error) {
        showToast(
          error &&
          error.message
            ? error.message
            : '管理團隊切換失敗',
          true
        );

        submit.disabled = false;
        submit.textContent =
          '確認切換';
      }
    }

    function renderLoading() {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">管理團隊載入中</div>
          正在讀取您已建立或受邀加入的管理團隊。
        </section>
      `;
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">
            管理團隊載入失敗
          </div>

          ${safeHtml(
            message ||
            '未知錯誤'
          )}

          <button
            class="primary-button"
            type="button"
            onclick="loadPage()"
          >
            重新整理
          </button>
        </section>
      `;
    }

    async function loadPage() {
      renderLoading();

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLine();

          if (!ready) {
            return;
          }
        }

        const result =
          await jsonpRequest(
            'landlord_workspace_context',
            {}
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '管理團隊載入失敗'
          );
        }

        PAGE_DATA =
          result.data || {};

        renderPage();

      } catch (error) {
        renderError(
          error &&
          error.message
            ? error.message
            : String(error)
        );
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    window.addEventListener(
      'orientationchange',
      function () {
        setTimeout(
          setAppHeight,
          250
        );
      }
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
