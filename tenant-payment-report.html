<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 付款回報</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 66px;

      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #edf9f2;

      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --surface-soft: #fbfcfd;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;

      --blue: #1a73e8;
      --blue-soft: #edf4ff;

      --orange: #ef8f00;
      --orange-soft: #fff5df;

      --purple: #7654c4;
      --purple-soft: #f3efff;

      --danger: #d93025;
      --danger-soft: #fff0ef;

      --shadow: 0 6px 22px rgba(25, 35, 55, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    body.modal-open {
      overflow: hidden;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background: var(--page-bg);
    }

    .page {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        16px
        15px
        calc(
          var(--nav-height) +
          28px +
          env(safe-area-inset-bottom)
        );
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .back-button,
    .refresh-button {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #626975;
      box-shadow: 0 4px 14px rgba(25, 35, 55, 0.05);
      cursor: pointer;
    }

    .back-button svg,
    .refresh-button svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .refresh-button.loading svg {
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .topbar-title-wrap {
      min-width: 0;
      flex: 1;
      text-align: center;
    }

    .topbar-title {
      overflow: hidden;
      font-size: 18px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topbar-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 17px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .intro-card {
      padding: 18px;
      background:
        linear-gradient(
          145deg,
          rgba(6, 199, 85, 0.1),
          rgba(255, 255, 255, 0.99) 64%
        );
    }

    .eyebrow {
      margin-bottom: 5px;
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 900;
    }

    .intro-title {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .intro-desc {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .tenant-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 14px;
    }

    .info-box {
      min-width: 0;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.86);
    }

    .info-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .info-value {
      overflow: hidden;
      font-size: 13px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .notice-card {
      padding: 13px 14px;
      border-color: #f0dfb9;
      background: var(--orange-soft);
      color: #74500c;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.6;
    }

    .notice-card.success {
      border-color: #d4eadc;
      background: var(--primary-soft);
      color: #27613c;
    }

    .notice-card.danger {
      border-color: #f0d0cd;
      background: var(--danger-soft);
      color: #84332d;
    }

    .section-card {
      padding: 17px;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 900;
    }

    .section-hint {
      color: var(--muted);
      font-size: 11px;
    }

    .bill-card {
      position: relative;
      margin-top: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: #ffffff;
      cursor: pointer;
      transition:
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        transform 0.16s ease;
    }

    .bill-card:first-of-type {
      margin-top: 0;
    }

    .bill-card:active {
      transform: scale(0.992);
    }

    .bill-card.active {
      border-color: rgba(6, 199, 85, 0.55);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.1);
    }

    .bill-card.disabled {
      cursor: default;
      opacity: 0.66;
    }

    .selected-ribbon {
      position: absolute;
      top: 0;
      right: 0;
      display: none;
      padding: 5px 10px;
      border-radius: 0 14px 0 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 9px;
      font-weight: 900;
    }

    .bill-card.active .selected-ribbon {
      display: block;
    }

    .bill-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 13px;
      padding: 15px;
    }

    .bill-main {
      min-width: 0;
      flex: 1;
    }

    .bill-month-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 5px;
    }

    .bill-month {
      font-size: 16px;
      font-weight: 900;
    }

    .bill-meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.55;
    }

    .bill-amount-wrap {
      flex: 0 0 auto;
      padding-top: 3px;
      text-align: right;
    }

    .bill-amount-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 9px;
    }

    .bill-amount {
      color: var(--danger);
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
    }

    .bill-footer {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-top: 1px solid var(--border);
      background: var(--surface-soft);
    }

    .bill-footer-box {
      min-width: 0;
      padding: 10px 13px;
    }

    .bill-footer-box + .bill-footer-box {
      border-left: 1px solid var(--border);
    }

    .bill-footer-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 9px;
    }

    .bill-footer-value {
      overflow: hidden;
      font-size: 11px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      min-height: 23px;
      padding: 3px 8px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #f0f2f4;
      color: #666c75;
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.green {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .badge.orange {
      background: var(--orange-soft);
      color: #a96700;
    }

    .badge.red {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.purple {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .form-card {
      padding: 17px;
    }

    .selected-summary {
      margin-bottom: 14px;
      padding: 14px;
      border-radius: 14px;
      background: var(--primary-soft);
    }

    .selected-summary-label {
      margin-bottom: 4px;
      color: var(--primary-dark);
      font-size: 10px;
      font-weight: 900;
    }

    .selected-summary-title {
      font-size: 15px;
      font-weight: 900;
    }

    .selected-summary-meta {
      margin-top: 5px;
      color: #557063;
      font-size: 11px;
      line-height: 1.5;
    }

    .field {
      margin-top: 15px;
    }

    .field:first-of-type {
      margin-top: 0;
    }

    .field-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 900;
    }

    .required {
      color: var(--danger);
      font-size: 11px;
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 13px;
      outline: none;
      background: #ffffff;
      color: var(--text);
    }

    .input {
      height: 46px;
      padding: 0 13px;
    }

    .input.last5 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 4px;
      text-align: center;
    }

    .textarea {
      min-height: 112px;
      resize: vertical;
      padding: 12px 13px;
      line-height: 1.6;
    }

    .input:focus,
    .textarea:focus {
      border-color: rgba(6, 199, 85, 0.55);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.1);
    }

    .field-help {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.5;
    }

    .submit-button {
      width: 100%;
      min-height: 48px;
      margin-top: 17px;
      padding: 12px 15px;
      border: 0;
      border-radius: 13px;
      background: var(--primary);
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .submit-button:disabled {
      cursor: default;
      opacity: 0.55;
    }

    .form-note {
      margin-top: 9px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.55;
      text-align: center;
    }

    .report-card {
      margin-top: 10px;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface-soft);
    }

    .report-card:first-of-type {
      margin-top: 0;
    }

    .report-card.pending {
      border-color: #e7dcfb;
      background: var(--purple-soft);
    }

    .report-card.rejected {
      border-color: #f0d0cd;
      background: var(--danger-soft);
    }

    .report-card.approved {
      border-color: #d4eadc;
      background: var(--primary-soft);
    }

    .report-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .report-title {
      font-size: 13px;
      font-weight: 900;
    }

    .report-id {
      margin-top: 3px;
      color: var(--muted);
      font-size: 9px;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .report-box {
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid rgba(225, 229, 235, 0.9);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.72);
    }

    .report-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 9px;
    }

    .report-value {
      overflow: hidden;
      font-size: 11px;
      font-weight: 900;
      line-height: 1.45;
      text-overflow: ellipsis;
    }

    .report-note {
      margin-top: 8px;
      padding: 9px 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.7);
      color: #656b74;
      font-size: 10px;
      line-height: 1.55;
    }

    .empty-state,
    .loading-card,
    .error-card {
      padding: 28px 18px;
      text-align: center;
    }

    .empty-title,
    .error-title {
      margin-bottom: 8px;
      font-size: 17px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .empty-text,
    .loading-text,
    .error-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .loading-spinner {
      width: 30px;
      height: 30px;
      margin: 0 auto 13px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .primary-button,
    .secondary-button {
      min-height: 45px;
      padding: 11px 14px;
      border-radius: 13px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary-button {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .secondary-button {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b9098;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    .modal-backdrop {
      position: absolute;
      z-index: 1600;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding:
        18px
        16px
        calc(
          var(--nav-height) +
          18px +
          env(safe-area-inset-bottom)
        );
      background: rgba(17, 24, 39, 0.48);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 430px;
      padding: 18px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.2);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 900;
    }

    .modal-message {
      margin-top: 9px;
      color: #5e646e;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-line;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 16px;
    }

    .modal-actions.single {
      grid-template-columns: 1fr;
    }

    .modal-confirm,
    .modal-cancel {
      min-height: 44px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .modal-confirm {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .modal-cancel {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .toast {
      position: absolute;
      z-index: 3000;
      right: 18px;
      bottom:
        calc(
          var(--nav-height) +
          22px +
          env(safe-area-inset-bottom)
        );
      left: 18px;
      display: none;
      padding: 13px 15px;
      border-radius: 13px;
      background: rgba(25, 28, 33, 0.94);
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 390px) {
      .tenant-grid,
      .bill-footer,
      .report-grid,
      .button-row,
      .modal-actions {
        grid-template-columns: 1fr;
      }

      .bill-footer-box + .bill-footer-box {
        border-top: 1px solid var(--border);
        border-left: 0;
      }

      .bill-head {
        flex-direction: column;
      }

      .bill-amount-wrap {
        width: 100%;
        text-align: left;
      }

      .page {
        padding-right: 13px;
        padding-left: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="topbar">
        <button
          class="back-button"
          type="button"
          onclick="goPage('tenant-bills.html')"
          aria-label="返回帳單"
        >
          <svg viewBox="0 0 24 24">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>

        <div class="topbar-title-wrap">
          <div class="topbar-title">付款回報</div>
          <div class="topbar-subtitle">提交匯款資料給房東確認</div>
        </div>

        <button
          id="refreshButton"
          class="refresh-button"
          type="button"
          onclick="loadPage()"
          aria-label="重新整理"
        >
          <svg viewBox="0 0 24 24">
            <path d="M20 11a8 8 0 1 0-2.34 5.66"></path>
            <path d="M20 5v6h-6"></path>
          </svg>
        </button>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-text">付款回報資料載入中...</div>
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('tenant-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('tenant-bills.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>帳單</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('tenant-contract.html')">
          <svg viewBox="0 0 24 24">
            <path d="M6 3.5h9l3 3V20H6z"></path>
            <path d="M15 3.5V7h3"></path>
            <path d="M9 11h6"></path>
            <path d="M9 15h6"></path>
          </svg>
          <span>合約</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('tenant-message.html')">
          <svg viewBox="0 0 24 24">
            <path d="M5 5.5h14v10H9l-4 3.5z"></path>
            <path d="M8.5 9.5h7"></path>
            <path d="M8.5 12.5h5"></path>
          </svg>
          <span>聯絡</span>
        </button>
      </div>
    </nav>

    <div id="confirmModal" class="modal-backdrop">
      <div class="modal-box">
        <div id="modalTitle" class="modal-title">提示</div>
        <div id="modalMessage" class="modal-message"></div>
        <div id="modalActions" class="modal-actions"></div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =

    function rawText(value) {
      if (
        value === undefined ||
        value === null
      ) {
        return '';
      }

      return String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function numberValue(value) {
      if (
        value === undefined ||
        value === null ||
        value === ''
      ) {
        return 0;
      }

      const normalized =
        String(value)
          .replace(/,/g, '')
          .replace(/[^\d.-]/g, '');

      const number =
        Number(normalized);

      return (
        Number.isFinite(number)
          ? number
          : 0
      );
    }

    function money(value) {
      return (
        'NT$ ' +
        Math.round(
          numberValue(value)
        ).toLocaleString('zh-TW')
      );
    }

    function normalizeStatus(value) {
      return rawText(value)
        .trim()
        .toLowerCase();
    }

    function formatDate(value) {
      const text =
        rawText(value).trim();

      if (!text) {
        return '-';
      }

      const match =
        text.match(
          /^(\d{4})-(\d{2})-(\d{2})/
        );

      if (match) {
        return (
          match[1] +
          '-' +
          match[2] +
          '-' +
          match[3]
        );
      }

      const date =
        new Date(text);

      if (
        Number.isNaN(
          date.getTime()
        )
      ) {
        return text;
      }

      return date.toLocaleDateString(
        'zh-TW',
        {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        }
      );
    }

    function todayText() {

        String(
          date.getMonth() + 1
        ).padStart(2, '0');

      const day =
        String(
          date.getDate()
        ).padStart(2, '0');

      return (
        year +
        '-' +
        month +
        '-' +
        day
      );
    }

    function jsonpRequest(
      action,
      params
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_payment_report_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() * 1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;

          const timer =
            setTimeout(function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 載入逾時'
                )
              );
            }, 30000);

          function cleanup() {
            clearTimeout(timer);

            if (script.parentNode) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (result) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();
              resolve(result);
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(action) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params || {}
          ).forEach(
            function (key) {
              const value =
                params[key];

              if (
                value === undefined ||
                value === null
              ) {
                return;
              }

              url +=
                '&' +
                encodeURIComponent(key) +
                '=' +
                encodeURIComponent(value);
            }
          );

          script.charset = 'UTF-8';

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗，請確認付款回報後端已加入並重新部署'
                )
              );
            };

          script.src = url;

          document.body.appendChild(
            script
          );
        }
      );
    }

    function buildReportMap(
      reports
    ) {
      const map = {};

      (reports || []).forEach(
        function (report) {
          const billId =
            rawText(
              report.bill_id
            ).trim();

          if (!billId) {
            return;
          }

          if (!map[billId]) {
            map[billId] = [];
          }

          map[billId].push(
            report
          );
        }
      );

      Object.keys(map).forEach(
        function (billId) {
          map[billId].sort(
            function (a, b) {
              const aTime =
                new Date(
                  a.updated_at ||
                  a.created_at ||
                  a.reported_at ||
                  0
                ).getTime();

              const bTime =
                new Date(
                  b.updated_at ||
                  b.created_at ||
                  b.reported_at ||
                  0
                ).getTime();

              return bTime - aTime;
            }
          );
        }
      );

      return map;
    }

            function (bill) {

                billIdOf(bill) ===
                REQUESTED_BILL_ID

            }
          );

        if (matched) {
          SELECTED_BILL_ID =
            REQUESTED_BILL_ID;

          REQUESTED_BILL_FOUND = true;

          return;
        }
      }

      if (
        SELECTED_BILL_ID &&
        ALL_BILLS.some(
          function (bill) {
            return (
              billIdOf(bill) ===
              SELECTED_BILL_ID
            );
          }
        )
      ) {
        return;
      }

      const selectable =
        ALL_BILLS.find(
          function (bill) {
            return !reportBlocksSubmission(
              billIdOf(bill)
            );
          }
        );

      if (selectable) {
        SELECTED_BILL_ID =
          billIdOf(selectable);

        return;
      }

      SELECTED_BILL_ID =
        ALL_BILLS.length > 0
          ? billIdOf(
              ALL_BILLS[0]
            )
          : '';
    }

          'noteCount'
        );

      if (
        note &&
        count
      ) {
        count.textContent =
          note.value.length +
          ' / 200';
      }
    }

    function renderReportCard(report) {
      const status =
        reportStatusOf(report);

      const className =
        status === 'pending'
          ? 'report-card pending'
          : (
              status === 'rejected'
                ? 'report-card rejected'
                : (
                    status === 'approved' ||
                    status === 'confirmed' ||
                    status === 'settled'
                      ? 'report-card approved'
                      : 'report-card'
                  )
            );

      const bill =
        ALL_BILLS.find(
          function (item) {
            return (
              billIdOf(item) ===
              rawText(
                report.bill_id
              ).trim()
            );
          }
        );

      return `
        <div class="${className}">
          <div class="report-head">
            <div>
              <div class="report-title">
                ${safeHtml(
                  report.bill_month ||
                  (
                    bill
                      ? billMonthOf(bill)
                      : '付款回報'
                  )
                )}
              </div>

              <div class="report-id">
                ${safeHtml(
                  report.report_id ||
                  report.payment_report_id ||
                  '-'
                )}
              </div>
            </div>

            <span class="${reportBadgeClass(status)}">
              ${safeHtml(
                reportStatusText(status)
              )}
            </span>
          </div>

          <div class="report-grid">
            <div class="report-box">
              <div class="report-label">
                回報金額
              </div>
              <div class="report-value">
                ${money(
                  report.reported_amount ||
                  (
                    bill
                      ? billAmountOf(bill)
                      : 0
                  )
                )}
              </div>
            </div>

            <div class="report-box">
              <div class="report-label">
                匯款後五碼
              </div>
              <div class="report-value">
                ${safeHtml(
                  report.reported_last5 ||
                  report.bank_last5 ||
                  '-'
                )}
              </div>
            </div>

            <div class="report-box">
              <div class="report-label">
                付款日期
              </div>
              <div class="report-value">
                ${safeHtml(
                  formatDate(
                    report.reported_paid_date ||
                    report.paid_date
                  )
                )}
              </div>
            </div>

            <div class="report-box">
              <div class="report-label">
                回報時間
              </div>
              <div class="report-value">
                ${safeHtml(
                  formatDate(
                    report.created_at ||
                    report.reported_at
                  )
                )}
              </div>
            </div>
          </div>

          ${
            rawText(
              report.reject_reason ||
              report.landlord_note ||
              report.note
            ).trim()
              ? `
                <div class="report-note">
                  ${status === 'rejected' ? '駁回原因／' : '說明／'}
                  ${safeHtml(
                    report.reject_reason ||
                    report.landlord_note ||
                    report.note
                  )}
                </div>
              `
              : ''
          }
        </div>
      `;
    }

    function renderReports() {
      const container =
        document.getElementById(
          'reportHistory'
        );

      if (!container) {
        return;
      }

      container.innerHTML =
        REPORTS.length > 0
          ? REPORTS
              .slice()
              .sort(
                function (a, b) {
                  const aTime =
                    new Date(
                      a.updated_at ||
                      a.created_at ||
                      a.reported_at ||
                      0
                    ).getTime();

                  const bTime =
                    new Date(
                      b.updated_at ||
                      b.created_at ||
                      b.reported_at ||
                      0
                    ).getTime();

                  return bTime - aTime;
                }
              )
              .map(renderReportCard)
              .join('')
          : `
            <div class="empty-state">
              <div class="empty-title">
                尚無付款回報紀錄
              </div>
              <div class="empty-text">
                送出付款回報後，處理進度會顯示在這裡。
              </div>
            </div>
          `;
    }

    function renderPage(data) {
      PAGE_DATA =
        data || {};

      const tenant =
        PAGE_DATA.tenant || {};

      ALL_BILLS =
        Array.isArray(
          PAGE_DATA.bills
        )
          ? PAGE_DATA.bills.slice()
          : [];

      REPORTS =
        Array.isArray(
          PAGE_DATA.reports
        )
          ? PAGE_DATA.reports.slice()
          : [];

      REPORTS_BY_BILL =
        buildReportMap(
          REPORTS
        );

      ALL_BILLS.sort(
        function (a, b) {
          return rawText(
            billMonthOf(b)
          ).localeCompare(
            rawText(
              billMonthOf(a)
            )
          );
        }
      );

      initializeSelection();

      const requestedWarning =
        REQUESTED_BILL_ID &&
        !REQUESTED_BILL_FOUND;

      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card intro-card">
          <div class="eyebrow">
            CMWebs 智慧租管
          </div>

          <h1 class="intro-title">
            回報付款
          </h1>

          <div class="intro-desc">
            選擇已完成匯款的帳單，填寫匯款帳號後 5 碼與付款日期，送出後由房東確認入帳。
          </div>

          <div class="tenant-grid">
            <div class="info-box">
              <div class="info-label">
                房客
              </div>
              <div class="info-value">
                ${safeHtml(
                  tenant.tenant_name ||
                  '-'
                )}
              </div>
            </div>

            <div class="info-box">
              <div class="info-label">
                房號
              </div>
              <div class="info-value">
                ${safeHtml(
                  tenant.room_list ||
                  tenant.room_name ||
                  '-'
                )}
              </div>
            </div>
          </div>
        </section>

        ${
          !PAYMENT_REPORT_BACKEND_READY
            ? `
              <section class="card notice-card danger">
                ${safeHtml(
                  PAYMENT_REPORT_BACKEND_MESSAGE ||
                  '付款回報後端尚未完成部署，目前可查看與選擇帳單，但暫時無法送出付款回報。'
                )}
              </section>
            `
            : ''
        }

        ${
          REQUESTED_BILL_ID &&
          REQUESTED_BILL_FOUND
            ? `
              <section class="card notice-card success">
                已從帳單頁自動帶入帳單：
                ${safeHtml(
                  REQUESTED_BILL_ID
                )}。
              </section>
            `
            : ''
        }

        ${
          requestedWarning
            ? `
              <section class="card notice-card danger">
                網址指定的帳單
                ${safeHtml(
                  REQUESTED_BILL_ID
                )}
                目前不在可回報清單中。可能已繳清、已被銷帳或帳單不存在；系統已改選其他可回報帳單。
              </section>
            `
            : ''
        }

        <section class="card section-card">
          <div class="section-title-row">
            <div class="section-title">
              選擇未繳帳單
            </div>

            <div class="section-hint">
              ${ALL_BILLS.length} 筆
            </div>
          </div>

          <div id="billSelection"></div>
        </section>

        <div id="paymentFormContainer"></div>

        <section class="card section-card">
          <div class="section-title-row">
            <div class="section-title">
              付款回報紀錄
            </div>

            <div class="section-hint">
              ${REPORTS.length} 筆
            </div>
          </div>

          <div id="reportHistory"></div>
        </section>
      `;

      renderBillSelection();
      renderForm();
      renderReports();

      if (
        REQUESTED_BILL_FOUND
      ) {
        setTimeout(
          function () {
            const form =
              document.getElementById(
                'paymentFormCard'
              );

            if (form) {
              form.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
              });
            }
          },
          220
        );
      }
    }

    function submitPaymentReport() {
      if (!PAYMENT_REPORT_BACKEND_READY) {
        appAlert(
          PAYMENT_REPORT_BACKEND_MESSAGE ||
          '付款回報後端尚未完成部署，請先加入 V2_TENANT_PAYMENT_REPORTS.gs 並重新部署 Apps Script。'
        );

        return;
      }

      const bill =
        getSelectedBill();

      if (!bill) {
        appAlert(
          '請先選擇要回報的帳單。'
        );

        return;
      }

      const billId =
        billIdOf(bill);

      if (
        reportBlocksSubmission(
          billId
        )
      ) {
        appAlert(
          '此帳單已有處理中的付款回報，請勿重複送出。'
        );

        return;
      }

      const last5Input =
        document.getElementById(
          'reportedLast5'
        );

      const dateInput =
        document.getElementById(
          'reportedPaidDate'
        );

      const noteInput =
        document.getElementById(
          'reportNote'
        );

      const reportedLast5 =
        last5Input
          ? last5Input.value.trim()
          : '';

      const reportedPaidDate =
        dateInput
          ? dateInput.value.trim()
          : '';

      const note =
        noteInput
          ? noteInput.value.trim()
          : '';

      if (
        !/^\d{5}$/.test(
          reportedLast5
        )
      ) {
        appAlert(
          '請輸入完整的 5 碼匯款帳號後五碼。'
        );

        return;
      }

      if (!reportedPaidDate) {
        appAlert(
          '請選擇付款日期。'
        );

        return;
      }

      if (
        reportedPaidDate >
        todayText()
      ) {
        appAlert(
          '付款日期不可晚於今天。'
        );

        return;
      }

      const confirmText =
        '請確認付款回報資料：\n\n' +
        '帳單月份：' +
        billMonthOf(bill) +
        '\n' +
        '帳單金額：' +
        money(
          billAmountOf(bill)
        ) +
        '\n' +
        '匯款後五碼：' +
        reportedLast5 +
        '\n' +
        '付款日期：' +
        reportedPaidDate +
        (
          note
            ? '\n備註：' + note
            : ''
        ) +
        '\n\n送出後會通知房東確認。';

      appConfirm(
        confirmText,
        function () {
          doSubmitPaymentReport(
            billId,
            reportedLast5,
            reportedPaidDate,
            note
          );
        }
      );
    }

    async function doSubmitPaymentReport(
      billId,
      reportedLast5,
      reportedPaidDate,
      note
    ) {
      const button =
        document.getElementById(
          'submitButton'
        );

      if (button) {
        button.disabled = true;
        button.textContent =
          '送出中...';
      }

      try {
        const result =
          await jsonpRequest(
            'tenant_payment_report_submit',
            {
              bill_id:
                billId,
              reported_last5:
                reportedLast5,
              reported_paid_date:
                reportedPaidDate,
              note:
                note
            }
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result && result.message
              ? result.message
              : '付款回報送出失敗'
          );
        }

        showModal({
          title: '回報已送出',
          message:
            '付款回報已送交房東確認。\n\n帳單月份：' +
            billMonthOf(
              getSelectedBill() || {}
            ) +
            '\n狀態：待房東確認',
          type: 'alert',
          confirmText: '查看回報紀錄',
          onConfirm:
            function () {
              const params =
                new URLSearchParams();

              params.set(
                'v',
                Date.now()
              );

              params.set(
                'bill_id',
                billId
              );

              if (TEST_MODE) {
                params.set(
                  'test',
                  '1'
                );
              }

              location.href =
                'tenant-payment-report.html?' +
                params.toString();
            }
        });
      } catch (error) {
        appAlert(
          error && error.message
            ? error.message
            : '付款回報送出失敗'
        );
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent =
            '送出付款回報';
        }
      }
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">
            付款回報資料讀取失敗
          </div>

          <div class="error-text">
            ${safeHtml(
              message || '未知錯誤'
            )}
          </div>

          <div class="button-row">
            <button
              class="secondary-button"
              type="button"
              onclick="goPage('tenant-bills.html')"
            >
              返回帳單
            </button>

            <button
              class="primary-button"
              type="button"
              onclick="loadPage()"
            >
              重新整理
            </button>
          </div>
        </section>
      `;
    }

    function setRefreshLoading(
      loading
    ) {
      const button =
        document.getElementById(
          'refreshButton'
        );

      if (!button) {
        return;
      }

      button.classList.toggle(
        'loading',
        Boolean(loading)
      );
    }

    async function loadPage() {
      setRefreshLoading(true);

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLineUserId();

          if (!ready) {
            return;
          }
        }

        try {
          const result =
            await jsonpRequest(
              'tenant_payment_report_init',
              {}
            );

          const data =
            unwrapData(result);

          PAYMENT_REPORT_BACKEND_READY = true;
          PAYMENT_REPORT_BACKEND_MESSAGE = '';

          renderPage(data);
        } catch (paymentReportError) {
          const fallbackResults =
            await Promise.all([
              jsonpRequest(
                'tenant_bills',
                {}
              ),
              jsonpRequest(
                'tenant_home',
                {}
              )
            ]);

          const fallbackBills =
            unwrapData(
              fallbackResults[0]
            );

          const fallbackTenant =
            unwrapData(
              fallbackResults[1]
            );

          PAYMENT_REPORT_BACKEND_READY = false;
          PAYMENT_REPORT_BACKEND_MESSAGE =
            '付款回報 API 尚未部署完成：' +
            (
              paymentReportError &&
              paymentReportError.message
                ? paymentReportError.message
                : '未知錯誤'
            );

          renderPage({
            tenant:
              fallbackTenant || {},
            bills:
              Array.isArray(
                fallbackBills
              )
                ? fallbackBills
                : [],
            reports: []
          });
        }
      } catch (error) {
        renderError(
          error && error.message
            ? error.message
            : String(error)
        );
      } finally {
        setRefreshLoading(false);
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    window.addEventListener(
      'orientationchange',
      function () {
        setTimeout(
          setAppHeight,
          250
        );
      }
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
