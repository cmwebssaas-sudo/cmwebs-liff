<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 團隊管理</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 68px;
      --primary: #06c755;
      --primary-soft: #edf9f2;
      --purple: #7654c4;
      --purple-soft: #f3efff;
      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;
      --danger: #d93025;
      --danger-soft: #fff0ef;
      --orange-soft: #fff5df;
      --shadow: 0 10px 34px rgba(25, 35, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 620px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(
          circle at 100% 0%,
          rgba(118, 84, 196, 0.12),
          transparent 28%
        ),
        var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(16px, env(safe-area-inset-top))
        15px
        calc(
          var(--nav-height) +
          22px +
          env(safe-area-inset-bottom)
        );
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .eyebrow {
      color: var(--purple);
      font-size: 10px;
      font-weight: 900;
    }

    .page-title {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 900;
    }

    .refresh-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #5f6670;
      font-size: 19px;
      cursor: pointer;
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #6342ad 0%,
          #7654c4 55%,
          #5e3ca9 100%
        );
    }

    .hero::after {
      position: absolute;
      top: -67px;
      right: -50px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      content: "";
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 9px;
      font-weight: 900;
    }

    .workspace-name {
      margin-top: 5px;
      font-size: 21px;
      font-weight: 900;
    }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 10px;
    }

    .hero-pill {
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      font-weight: 900;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      margin-top: 15px;
    }

    .summary-item {
      padding: 11px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
    }

    .summary-label {
      color: rgba(255, 255, 255, 0.72);
      font-size: 8px;
    }

    .summary-value {
      margin-top: 4px;
      font-size: 18px;
      font-weight: 900;
    }

    .action-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px;
    }

    .action-title {
      font-size: 14px;
      font-weight: 900;
    }

    .action-desc {
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.55;
    }

    .invite-button {
      min-height: 42px;
      flex: 0 0 auto;
      padding: 0 14px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 9px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 900;
    }

    .section-count {
      color: var(--muted);
      font-size: 10px;
    }

    .member-card,
    .invite-card {
      padding: 15px;
    }

    .member-main {
      display: flex;
      align-items: flex-start;
      gap: 11px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: var(--purple-soft);
      color: var(--purple);
      font-size: 15px;
      font-weight: 900;
    }

    .member-content {
      min-width: 0;
      flex: 1;
    }

    .member-name-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .member-name {
      font-size: 14px;
      font-weight: 900;
    }

    .you-badge,
    .role-badge,
    .status-badge {
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 900;
    }

    .you-badge {
      background: #edf4ff;
      color: #1a73e8;
    }

    .role-badge {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .status-badge {
      background: var(--primary-soft);
      color: #079641;
    }

    .status-badge.suspended {
      background: var(--orange-soft);
      color: #9b6200;
    }

    .member-contact,
    .invite-contact {
      margin-top: 6px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.55;
      word-break: break-word;
    }

    .member-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
      padding-top: 11px;
      border-top: 1px solid var(--border);
    }

    .small-button {
      min-height: 34px;
      padding: 0 11px;
      border-radius: 10px;
      font-size: 9px;
      font-weight: 900;
      cursor: pointer;
    }

    .small-button.secondary {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .small-button.danger {
      border: 1px solid #f0cfcc;
      background: var(--danger-soft);
      color: var(--danger);
    }

    .invite-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .invite-name {
      font-size: 13px;
      font-weight: 900;
    }

    .invite-meta {
      margin-top: 11px;
      padding: 10px 11px;
      border-radius: 11px;
      background: #fafbfc;
      color: #636a75;
      font-size: 9px;
      line-height: 1.6;
    }

    .invite-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 11px;
    }

    .empty-card,
    .loading-card,
    .error-card {
      padding: 25px 18px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      text-align: center;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 14px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-title,
    .error-title {
      margin-bottom: 7px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .primary-button,
    .secondary-button,
    .danger-button {
      min-height: 46px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary-button {
      border: 0;
      background: var(--primary);
      color: #ffffff;
    }

    .secondary-button {
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
    }

    .danger-button {
      border: 0;
      background: var(--danger);
      color: #ffffff;
    }

    .modal-backdrop {
      position: absolute;
      z-index: 1600;
      inset: 0;
      display: none;
      align-items: stretch;
      justify-content: center;
      padding:
        14px
        14px
        calc(
          var(--nav-height) +
          14px +
          env(safe-area-inset-bottom)
        );
      background: rgba(17, 24, 39, 0.52);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-sheet {
      width: 100%;
      max-width: 560px;
      height: 100%;
      overflow-y: auto;
      padding: 18px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 15px;
    }

    .modal-title {
      font-size: 19px;
      font-weight: 900;
    }

    .modal-desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.6;
    }

    .close-button {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #ffffff;
      color: #666d77;
      font-size: 18px;
      cursor: pointer;
    }

    .field {
      margin-top: 14px;
    }

    .field-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 900;
    }

    .required {
      color: var(--danger);
      font-size: 9px;
    }

    .optional {
      color: var(--muted);
      font-size: 9px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      background: #ffffff;
      color: var(--text);
    }

    .input,
    .select {
      height: 46px;
      padding: 0 13px;
    }

    .textarea {
      min-height: 78px;
      padding: 11px 13px;
      resize: vertical;
    }

    .role-info {
      margin-top: 10px;
      padding: 11px 12px;
      border: 1px solid #ddd5f5;
      border-radius: 11px;
      background: var(--purple-soft);
      color: #5d4794;
      font-size: 9px;
      line-height: 1.6;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 18px;
    }

    .confirm-backdrop {
      position: absolute;
      z-index: 1800;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px 16px;
      background: rgba(17, 24, 39, 0.55);
    }

    .confirm-backdrop.show {
      display: flex;
    }

    .confirm-box {
      width: 100%;
      max-width: 410px;
      padding: 19px;
      border-radius: 18px;
      background: #ffffff;
    }

    .confirm-title {
      font-size: 18px;
      font-weight: 900;
    }

    .confirm-message {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      white-space: pre-line;
    }

    .toast {
      position: absolute;
      z-index: 2000;
      right: 16px;
      bottom:
        calc(
          var(--nav-height) +
          16px +
          env(safe-area-inset-bottom)
        );
      left: 16px;
      max-width: 470px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 13px;
      background: #22252a;
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition:
        opacity 0.18s ease,
        transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--danger);
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    .nav-item:active {
      opacity: 0.65;
    }

    @media (max-width: 430px) {
      .action-card {
        align-items: flex-start;
        flex-direction: column;
      }

      .invite-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="topbar">
        <div>
          <div class="eyebrow">Workspace Team</div>
          <div class="page-title">團隊與權限</div>
        </div>

        <button
          class="refresh-button"
          type="button"
          onclick="loadPage()"
        >
          ↻
        </button>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">團隊資料載入中</div>
          正在讀取工作區、成員與邀請紀錄。
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>

    <div id="editorModal" class="modal-backdrop">
      <div id="editorSheet" class="modal-sheet"></div>
    </div>

    <div id="confirmModal" class="confirm-backdrop">
      <div class="confirm-box">
        <div id="confirmTitle" class="confirm-title">確認操作</div>
        <div id="confirmMessage" class="confirm-message"></div>

        <div class="modal-actions">
          <button
            class="secondary-button"
            type="button"
            onclick="hideConfirm()"
          >
            返回
          </button>

          <button
            id="confirmButton"
            class="danger-button"
            type="button"
          >
            確認
          </button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(
        location.search
      );

    const TEST_MODE =
      URL_PARAMS.get('test') ===
      '1';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let toastTimer = null;

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      return value === undefined || value === null
        ? ''
        : String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function goPage(page) {
      location.href =
        page +
        '?v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        );
    }

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        ) +
        (
          currentUrl.hash || ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

      entryUrl.searchParams.set(
        'return_to',
        returnTo
      );

      return entryUrl.href;
    }

    function formatDate(value) {
      const date =
        new Date(value);

      if (
        Number.isNaN(
          date.getTime()
        )
      ) {
        return rawText(value) || '-';
      }

      return new Intl.DateTimeFormat(
        'zh-TW',
        {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        }
      ).format(date);
    }

    function showToast(
      message,
      isError
    ) {
      const toast =
        document.getElementById(
          'toast'
        );

      clearTimeout(
        toastTimer
      );

      toast.textContent =
        message || '';

      toast.className =
        isError
          ? 'toast error show'
          : 'toast show';

      toastTimer =
        setTimeout(
          function () {
            toast.className =
              'toast';
          },
          2800
        );
    }

    function showConfirm(
      title,
      message,
      buttonText,
      callback
    ) {
      document.getElementById(
        'confirmTitle'
      ).textContent =
        title;

      document.getElementById(
        'confirmMessage'
      ).textContent =
        message;

      const button =
        document.getElementById(
          'confirmButton'
        );

      button.textContent =
        buttonText;

      button.onclick =
        function () {
          hideConfirm();
          callback();
        };

      document.getElementById(
        'confirmModal'
      ).classList.add(
        'show'
      );
    }

    function hideConfirm() {
      document.getElementById(
        'confirmModal'
      ).classList.remove(
        'show'
      );
    }

    function closeEditor() {
      document.getElementById(
        'editorModal'
      ).classList.remove(
        'show'
      );
    }

    function jsonpRequest(
      action,
      params
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_team_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;

          const timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished = true;
                cleanup();

                reject(
                  new Error(
                    'API 載入逾時'
                  )
                );
              },
              25000
            );

          function cleanup() {
            clearTimeout(timer);

            if (script.parentNode) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (result) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();
              resolve(result);
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params || {}
          ).forEach(
            function (key) {
              url +=
                '&' +
                encodeURIComponent(
                  key
                ) +
                '=' +
                encodeURIComponent(
                  params[key]
                );
            }
          );

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗'
                )
              );
            };

          script.src = url;
          document.body.appendChild(
            script
          );
        }
      );
    }

    async function initLine() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      await liff.init({
        liffId: LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            buildLandlordLoginRedirectUri()
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId || '';

      return true;
    }

    function roleLabel(role) {
      const map = {
        owner: '擁有者',
        admin: '管理員',
        manager: '營運管理',
        accountant: '帳務人員',
        maintenance: '維修人員',
        viewer: '唯讀成員'
      };

      return map[role] || role || '-';
    }

    function statusText(status) {
      const map = {
        active: '啟用',
        suspended: '暫停',
        pending: '待接受',
        accepted: '已接受',
        expired: '已過期',
        cancelled: '已取消'
      };

      return map[status] || status || '-';
    }

                  '?'

            </div>

            <div class="member-content">
              <div class="member-name-row">
                <span class="member-name">

                    member.name ||
                    '未命名成員'

                  member.is_self
                    ? `
                      <span class="you-badge">
                        目前使用者

                    `
                    : ''

                  ${safeHtml(
                    member.role_label ||
                    roleLabel(
                      member.role
                    )

                </span>

                <span class="status-badge ${
                  active

                }">

                    statusText(
                      member.member_status

                    member.email

      const contact =

          item.invite_email

      return `
        <section class="card invite-card">
          <div class="invite-head">
            <div>
              <div class="invite-name">
                ${safeHtml(
                  item.invite_name ||
                  contact ||
                  '未命名邀請'
                )}
              </div>

              <div class="invite-contact">
                ${safeHtml(
                  contact ||
                  '未填寫聯絡資料'
                )}
              </div>
            </div>

            <span class="role-badge">
              ${safeHtml(
                item.role_label ||
                roleLabel(
                  item.invite_role
                )

            邀請期限：

    function roleOptions(selected) {
      return (
        PAGE_DATA.role_options ||
        []
      ).map(
        function (item) {
          return `
            <option
              value="${safeHtml(
                item.value
              )}"
              ${
                item.value ===
                selected
                  ? 'selected'
                  : ''
              }
            >
              ${safeHtml(
                item.label
              )}
            </option>
          `;
        }
      ).join('');
    }

    function roleDescription(role) {
      const item =
        (
          PAGE_DATA.role_options ||
          []
        ).find(
          function (option) {
            return option.value === role;
          }
        );

      return item
        ? item.description || ''
        : '';
    }

        'editorSheet'

        <div class="modal-head">
          <div>
            <div class="modal-title">
              建立團隊邀請
            </div>

            <div class="modal-desc">
              受邀者以 LINE 開啟連結後即可加入目前工作區。
            </div>
          </div>

          <button class="close-button" type="button" onclick="closeEditor()">×</button>
        </div>

        <div class="field">
          <div class="field-label">
            <span>成員姓名</span>
            <span class="optional">選填</span>
          </div>

          </div>

            class="input"

            maxlength="120"

      updateRoleInfo(
        'inviteRole',
        'inviteRoleInfo'

      document.getElementById(

        'show'
      );

    function updateRoleInfo(
      selectId,
      infoId
    ) {
      const select =
        document.getElementById(
          selectId
        );

      const info =
        document.getElementById(
          infoId
        );

      if (select && info) {
        info.textContent =
          roleDescription(
            select.value
          );
      }
    }

    function getInput(id) {
      const element =
        document.getElementById(
          id
        );

      return element
        ? rawText(
            element.value
          ).trim()
        : '';
    }

    function normalizePhone(value) {
      let digits =
        rawText(value)
          .replace(/\D/g, '');

      if (
        digits.indexOf('886') ===
          0 &&
        digits.length ===
          12
      ) {
        digits =
          '0' +
          digits.slice(3);
      }

      if (
        digits.length ===
          9 &&
        digits.charAt(0) ===
          '9'
      ) {
        digits =
          '0' +
          digits;
      }

      return digits;
    }

    async function submitInvitation() {
      const phone =
        normalizePhone(
          getInput(
            'invitePhone'
          )
        );

      const email =
        getInput(
          'inviteEmail'
        ).toLowerCase();

      if (!phone && !email) {
        showToast(
          '請至少輸入手機號碼或 Email。',
          true
        );

        return;
      }

      const button =
        document.getElementById(
          'inviteSubmitButton'
        );

      button.disabled = true;
      button.textContent =
        '建立中...';

      try {
        const result =
          await jsonpRequest(
            'landlord_team_invite_create',
            {
              invite_name:
                getInput(
                  'inviteName'
                ),
              invite_role:
                getInput(
                  'inviteRole'
                ),
              invite_phone:
                phone,
              invite_email:
                email,
              expires_days:
                getInput(
                  'expiresDays'
                ),
              note:
                getInput(
                  'inviteNote'
                )
            }
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '邀請建立失敗'
          );
        }

        const invitation =
          result.data.invitation;

        PAGE_DATA =
          result.data.team;

        closeEditor();
        renderPage();

        showConfirm(
          '邀請已建立',
          '邀請連結已產生。',
          '分享連結',
          function () {
            shareInvitation(
              invitation.invitation_url
            );
          }
        );
      } catch (error) {
        showToast(
          error.message ||
          '邀請建立失敗',
          true
        );

        button.disabled = false;
        button.textContent =
          '建立邀請';
      }
    }

    function openMemberEditor(
      membershipId
    ) {
      const member =
        PAGE_DATA.members.find(
          function (item) {
            return item.membership_id ===
              membershipId;
          }
        );

      document.getElementById(
        'editorSheet'
      ).innerHTML = `
        <div class="modal-head">
          <div>
            <div class="modal-title">
              角色與狀態
            </div>

            <div class="modal-desc">
              ${safeHtml(
                member.name
              )}
            </div>
          </div>

          <button class="close-button" type="button" onclick="closeEditor()">×</button>
        </div>

        <div class="field">
          <div class="field-label">
            <span>團隊角色</span>
            <span class="required">必填</span>
          </div>

          <select
            id="memberRole"
            class="select"
            onchange="updateRoleInfo('memberRole','memberRoleInfo')"
          >
            ${roleOptions(
              member.role
            )}
          </select>

          <div id="memberRoleInfo" class="role-info"></div>
        </div>

        <div class="field">
          <div class="field-label">
            <span>成員狀態</span>
            <span class="required">必填</span>
          </div>

          <select id="memberStatus" class="select">
            <option value="active" ${
              member.member_status ===
                'active'
                ? 'selected'
                : ''
            }>啟用</option>

            <option value="suspended" ${
              member.member_status ===
                'suspended'
                ? 'selected'
                : ''
            }>暫停存取</option>
          </select>
        </div>

        <div class="modal-actions">
          <button class="secondary-button" type="button" onclick="closeEditor()">取消</button>
          <button id="memberSaveButton" class="primary-button" type="button" onclick="saveMember('${safeHtml(membershipId)}')">儲存變更</button>
        </div>
      `;

      updateRoleInfo(
        'memberRole',
        'memberRoleInfo'
      );

      document.getElementById(
        'editorModal'
      ).classList.add(
        'show'
      );
    }

    async function saveMember(
      membershipId
    ) {
      const result =
        await jsonpRequest(
          'landlord_team_member_update',
          {
            membership_id:
              membershipId,
            role:
              getInput(
                'memberRole'
              ),
            member_status:
              getInput(
                'memberStatus'
              )
          }
        );

      if (
        !result ||
        result.success !== true
      ) {
        showToast(
          result &&
          result.message
            ? result.message
            : '成員更新失敗',
          true
        );

        return;
      }

      PAGE_DATA =
        result.data;

      closeEditor();
      renderPage();
      showToast(
        '成員資料已更新。'
      );
    }

    function confirmRemoveMember(
      membershipId
    ) {
      showConfirm(
        '移出團隊',
        '移出後，此成員將無法再存取目前工作區。',
        '確認移出',
        function () {
          removeMember(
            membershipId
          );
        }
      );
    }

    async function removeMember(
      membershipId
    ) {
      const result =
        await jsonpRequest(
          'landlord_team_member_remove',
          {
            membership_id:
              membershipId
          }
        );

      if (
        !result ||
        result.success !== true
      ) {
        showToast(
          result &&
          result.message
            ? result.message
            : '移出成員失敗',
          true
        );

        return;
      }

      PAGE_DATA =
        result.data;

      renderPage();
      showToast(
        '成員已移出團隊。'
      );
    }

    function confirmCancelInvitation(
      invitationId
    ) {
      showConfirm(
        '取消邀請',
        '取消後，原邀請連結將立即失效。',
        '確認取消',
        function () {
          cancelInvitation(
            invitationId
          );
        }
      );
    }

    async function cancelInvitation(
      invitationId
    ) {
      const result =
        await jsonpRequest(
          'landlord_team_invite_cancel',
          {
            invitation_id:
              invitationId
          }
        );

      if (
        !result ||
        result.success !== true
      ) {
        showToast(
          result &&
          result.message
            ? result.message
            : '取消邀請失敗',
          true
        );

        return;
      }

      PAGE_DATA =
        result.data;

      renderPage();
      showToast(
        '邀請已取消。'
      );
    }

    async function shareInvitation(
      url
    ) {
      try {
        if (navigator.share) {
          await navigator.share({
            title:
              'CMWebs 團隊邀請',
            text:
              '請開啟連結加入租務管理團隊。',
            url:
              url
          });

          return;
        }
      } catch (error) {
        if (
          error.name ===
          'AbortError'
        ) {
          return;
        }
      }

      try {
        await navigator.clipboard.writeText(
          url
        );

        showToast(
          '邀請連結已複製。'
        );
      } catch (error) {
        window.prompt(
          '請複製邀請連結：',
          url
        );
      }
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">
            團隊資料載入失敗
          </div>

          ${safeHtml(message)}

          <button
            class="primary-button"
            type="button"
            onclick="loadPage()"
            style="width:100%;margin-top:16px;"
          >
            重新整理
          </button>
        </section>
      `;
    }

    async function loadPage() {
      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLine();

          if (!ready) {
            return;
          }
        }

        const result =
          await jsonpRequest(
            'landlord_team_init',
            {}
          );

        if (
          !result ||
          result.success !== true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '團隊資料載入失敗'
          );
        }

        PAGE_DATA =
          result.data || {};

        renderPage();
      } catch (error) {
        renderError(
          error.message ||
          String(error)
        );
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
