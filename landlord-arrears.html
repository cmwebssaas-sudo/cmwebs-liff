<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>CMWebs 房客欠款</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --nav-height: 64px;
      --primary: #06c755;
      --primary-dark: #05a847;
      --background: #f5f7fb;
      --surface: #ffffff;
      --text: #222222;
      --muted: #70757d;
      --border: #e8ebef;
      --danger: #d93025;
      --danger-soft: #ffe8e6;
      --warning: #9a6b00;
      --warning-soft: #fff4d7;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
      --success: #10893e;
      --success-soft: #eaf9f0;
      --purple: #7654c4;
      --purple-soft: #f2edff;
      --orange: #a55a00;
      --orange-soft: #fff1df;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--background);
      color: var(--text);
      font-family: Arial, "Noto Sans TC", sans-serif;
    }

    body.modal-open {
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: 100vh;
      height: 100dvh;
      margin: 0 auto;
      overflow: hidden;
      background: var(--background);
    }

    .page {
      width: 100%;
      height: 100%;
      padding:
        18px
        16px
        calc(
          var(--nav-height) +
          30px +
          env(safe-area-inset-bottom)
        );

      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    .page-header {
      margin-bottom: 16px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .card {
      padding: 17px;
      margin-bottom: 14px;
      border: 1px solid rgba(232, 235, 239, 0.8);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
    }

    .section-title {
      margin-bottom: 12px;
      font-size: 17px;
      font-weight: 900;
    }

    .landlord-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      display: flex;
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #e8f7ee;
      color: var(--primary);
      font-size: 19px;
      font-weight: 900;
    }

    .landlord-name {
      font-size: 16px;
      font-weight: 900;
    }

    .landlord-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .summary-amount-label {
      color: var(--muted);
      font-size: 13px;
    }

    .summary-amount {
      margin: 7px 0 14px;
      color: var(--danger);
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.6px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .summary-item {
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #fafbfc;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
    }

    .summary-value {
      margin-top: 5px;
      font-size: 20px;
      font-weight: 900;
    }

    .summary-value.danger {
      color: var(--danger);
    }

    .summary-value.success {
      color: var(--success);
    }

    .summary-value.purple {
      color: var(--purple);
    }

    .reminder-schedule-note {
      padding: 12px 13px;
      margin-top: 12px;
      border: 1px solid #dfe8ff;
      border-radius: 12px;
      background: #f5f8ff;
      color: #48627f;
      font-size: 12px;
      line-height: 1.7;
    }

    .arrears-card {
      position: relative;
      overflow: hidden;
    }

    .arrears-card::before {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 4px;
      background: var(--danger);
      content: "";
    }

    .arrears-card.manual-required::before {
      background: var(--orange);
    }

    .arrears-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .tenant-block {
      min-width: 0;
    }

    .tenant-name {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.45;
      word-break: break-word;
    }

    .tenant-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      min-height: 24px;
      padding: 4px 8px;
      align-items: center;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .badge-danger {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge-warning {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .days-box {
      flex: 0 0 auto;
      padding: 8px 10px;
      border-radius: 11px;
      background: var(--warning-soft);
      color: var(--warning);
      text-align: center;
    }

    .days-value {
      font-size: 18px;
      font-weight: 900;
    }

    .days-label {
      margin-top: 2px;
      font-size: 10px;
      font-weight: 800;
    }

    .amount {
      margin: 13px 0;
      color: var(--danger);
      font-size: 24px;
      font-weight: 900;
    }

    .detail-list {
      margin-top: 4px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid #eeeeee;
      font-size: 13px;
      line-height: 1.55;
    }

    .detail-label {
      flex: 0 0 auto;
      color: var(--muted);
    }

    .detail-value {
      min-width: 0;
      font-weight: 800;
      text-align: right;
      word-break: break-word;
    }

    .bill-id {
      color: #555;
      font-size: 11px;
    }

    .reminder-panel {
      padding: 13px;
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #f8f9fb;
    }

    .reminder-panel.manual {
      border-color: #f1c995;
      background: #fff8ef;
    }

    .reminder-panel.final {
      border-color: #d9cef8;
      background: #faf8ff;
    }

    .reminder-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .reminder-title {
      font-size: 14px;
      font-weight: 900;
    }

    .reminder-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.55;
    }

    .reminder-badge {
      display: inline-flex;
      flex: 0 0 auto;
      min-height: 24px;
      padding: 4px 8px;
      align-items: center;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .reminder-badge.manual {
      background: var(--orange-soft);
      color: var(--orange);
    }

    .reminder-badge.final {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .reminder-progress {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 12px;
    }

    /* 催繳里程碑下方進度條：節點與上方三個階段卡片置中對齊 */
    .reminder-track-wrap {
      position: relative;
      height: 30px;
      margin: 7px calc(16.6667% - 3px) 0;
    }

    .reminder-track-base,
    .reminder-track-fill {
      position: absolute;
      top: 9px;
      left: 0;
      height: 4px;
      border-radius: 999px;
    }

    .reminder-track-base {
      right: 0;
      background: #e3e7ec;
    }

    .reminder-track-fill {
      width: 0;
      background: var(--success);
      transition: width 0.35s ease;
    }

    .reminder-track-fill.current {
      background: linear-gradient(
        90deg,
        var(--success) 0%,
        var(--blue) 100%
      );
    }

    .reminder-track-node {
      position: absolute;
      top: 2px;
      z-index: 2;
      width: 18px;
      height: 18px;
      border: 3px solid #d9dde3;
      border-radius: 50%;
      background: #ffffff;
      transform: translateX(-50%);
    }

    .reminder-track-node.first {
      left: 0;
    }

    .reminder-track-node.second {
      left: 50%;
    }

    .reminder-track-node.third {
      left: 100%;
    }

    .reminder-track-node.done {
      border-color: var(--success);
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(18, 142, 66, 0.10);
    }

    .reminder-track-node.current {
      border-color: var(--blue);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.12);
    }

    .reminder-track-node.pending {
      border-color: #d9dde3;
      background: #ffffff;
    }

    .reminder-track-node::after {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #c3c8cf;
      content: "";
      transform: translate(-50%, -50%);
    }

    .reminder-track-node.done::after {
      background: #ffffff;
    }

    .reminder-track-node.current::after {
      background: var(--blue);
    }

    .reminder-track-caption {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: -2px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      line-height: 1.4;
    }

    .reminder-track-caption strong {
      color: var(--text);
      font-size: 11px;
    }

    .reminder-step {
      padding: 9px 6px;
      border: 1px solid #e2e5e9;
      border-radius: 10px;
      background: #ffffff;
      color: #92979e;
      text-align: center;
    }

    .reminder-step.done {
      border-color: #bfe8cf;
      background: var(--success-soft);
      color: var(--success);
    }

    .reminder-step.current {
      border-color: #bfd4ff;
      background: var(--blue-soft);
      color: var(--blue);
    }

    .reminder-step-day {
      font-size: 13px;
      font-weight: 900;
    }

    .reminder-step-label {
      margin-top: 3px;
      font-size: 9px;
      font-weight: 800;
    }

    .reminder-detail-list {
      margin-top: 10px;
    }

    .reminder-detail-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 0;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      font-size: 11px;
      line-height: 1.5;
    }

    .reminder-detail-row:first-child {
      border-top: 0;
    }

    .reminder-detail-label {
      color: var(--muted);
    }

    .reminder-detail-value {
      min-width: 0;
      font-weight: 900;
      text-align: right;
      word-break: break-word;
    }

    .manual-followup-box {
      padding: 11px 12px;
      margin-top: 11px;
      border: 1px solid #efc17f;
      border-radius: 11px;
      background: #fff3df;
      color: #775000;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.7;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 14px;
    }

    .btn {
      width: 100%;
      min-height: 44px;
      padding: 11px 13px;
      border: 0;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn:active {
      opacity: 0.72;
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-black {
      background: #222222;
      color: #ffffff;
    }

    .btn-light {
      background: #eef1f5;
      color: #333333;
    }

    .btn-outline {
      border: 1px solid #dfe3e8;
      background: #ffffff;
      color: #444444;
    }

    .btn-blue-soft {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .btn-warning {
      background: #f59e0b;
      color: #ffffff;
    }

    .btn-warning:hover {
      background: #d98600;
    }

    .btn-danger-soft {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .full-action {
      grid-column: 1 / -1;
    }

    .page-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .loading,
    .empty {
      padding: 42px 20px;
      color: var(--muted);
      text-align: center;
    }

    .empty-icon {
      margin-bottom: 10px;
      font-size: 36px;
    }

    .empty-title {
      color: #444444;
      font-size: 17px;
      font-weight: 900;
    }

    .empty-desc {
      margin-top: 7px;
      font-size: 13px;
      line-height: 1.65;
    }

    .error-title {
      margin-bottom: 8px;
      color: var(--danger);
      font-size: 19px;
      font-weight: 900;
    }

    .error-text {
      color: #555555;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    /* ==================================================
       手動銷帳 Modal
       ================================================== */

    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      background: rgba(0, 0, 0, 0.48);
    }

    .modal-mask.show {
      display: flex;
    }

    .modal-sheet {
      width: 100%;
      max-width: 560px;
      max-height: 94vh;
      max-height: 94dvh;

      padding:
        18px
        18px
        calc(18px + env(safe-area-inset-bottom));

      overflow-y: auto;
      overscroll-behavior: contain;
      border-radius: 22px 22px 0 0;
      background: #ffffff;
      box-shadow: 0 -12px 36px rgba(0, 0, 0, 0.22);
    }

    .modal-handle {
      width: 40px;
      height: 5px;
      margin: 0 auto 15px;
      border-radius: 999px;
      background: #d9dde2;
    }

    .modal-title {
      font-size: 21px;
      font-weight: 900;
    }

    .modal-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .settlement-preview {
      padding: 13px;
      margin-top: 14px;
      border-radius: 13px;
      background: #f7f8fa;
    }

    .preview-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid #e8ebef;
      font-size: 13px;
      line-height: 1.5;
    }

    .preview-row:first-child {
      border-top: none;
    }

    .preview-label {
      color: var(--muted);
    }

    .preview-value {
      font-weight: 900;
      text-align: right;
      word-break: break-word;
    }

    .field {
      margin-top: 16px;
    }

    .field.hidden {
      display: none;
    }

    .field-label {
      display: block;
      margin-bottom: 7px;
      color: #444444;
      font-size: 13px;
      font-weight: 900;
    }

    .required-mark {
      color: var(--danger);
    }

    .field-input,
    .field-select,
    .field-textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #dfe3e8;
      border-radius: 12px;
      outline: none;
      background: #ffffff;
      color: #222222;
      font-size: 15px;
    }

    .field-input:focus,
    .field-select:focus,
    .field-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.12);
    }

    .field-input[readonly] {
      background: #f4f5f7;
      color: #555555;
      font-weight: 900;
    }

    .field-textarea {
      min-height: 105px;
      resize: vertical;
      line-height: 1.7;
    }

    .field-help {
      margin-top: 6px;
      color: #888888;
      font-size: 11px;
      line-height: 1.55;
    }

    .char-count {
      margin-top: 6px;
      color: #999999;
      font-size: 12px;
      text-align: right;
    }

    .notify-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px;
      margin-top: 16px;
      border: 1px solid #d6ebdf;
      border-radius: 12px;
      background: #f2fff7;
      cursor: pointer;
    }

    .notify-row input {
      width: 19px;
      height: 19px;
      flex: 0 0 19px;
      accent-color: var(--primary);
    }

    .notify-title {
      font-size: 14px;
      font-weight: 900;
    }

    .notify-desc {
      margin-top: 3px;
      color: #607067;
      font-size: 11px;
      line-height: 1.5;
    }

    .settlement-warning {
      padding: 12px 13px;
      margin-top: 16px;
      border: 1px solid #f0dda6;
      border-radius: 11px;
      background: #fffaf0;
      color: #7e5b00;
      font-size: 12px;
      line-height: 1.7;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .manual-reminder-title {
      color: var(--orange);
    }

    .manual-reminder-message {
      padding: 14px;
      margin-top: 16px;
      border: 1px solid #f0d2ad;
      border-radius: 12px;
      background: #fffaf3;
    }

    .manual-reminder-message-title {
      margin-bottom: 8px;
      color: #7a4700;
      font-size: 13px;
      font-weight: 900;
    }

    .manual-reminder-message-text {
      color: #4f463d;
      font-size: 13px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .manual-reminder-note {
      padding: 12px 13px;
      margin-top: 14px;
      border: 1px solid #f0dda6;
      border-radius: 11px;
      background: #fffaf0;
      color: #7e5b00;
      font-size: 12px;
      line-height: 1.7;
    }

    /* ==================================================
       提示 Modal
       ================================================== */

    .alert-mask {
      position: fixed;
      inset: 0;
      z-index: 1000000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.48);
    }

    .alert-mask.show {
      display: flex;
    }

    .alert-box {
      width: 100%;
      max-width: 350px;
      padding: 22px 18px 16px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22);
      text-align: center;
    }

    .alert-title {
      margin-bottom: 10px;
      font-size: 20px;
      font-weight: 900;
    }

    .alert-message {
      margin-bottom: 18px;
      color: #555555;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ==================================================
       底部導覽列
       ================================================== */

    .bottom-nav {
      position: fixed;
      right: auto;
      bottom: 0;
      left: 50%;
      z-index: 99999;

      width: 100%;
      max-width: 560px;

      transform: translateX(-50%);
      padding-bottom: env(safe-area-inset-bottom);

      border-top: 1px solid #eceff3;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.05);

      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      height: var(--nav-height);
    }

    .nav-item {
      position: relative;
      display: flex;
      appearance: none;
      -webkit-appearance: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b9098;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;

</head>

  <!-- 提示 Modal -->

  <script>
    // ==================================================
    // 基本設定
    // ==================================================

    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    /*
     * 直接在瀏覽器測試時，可使用：
     * landlord-arrears.html?test=1
     *
     * 正式 LINE LIFF 使用時不會啟用測試 UID。
     */
    const TEST_MODE =
      new URLSearchParams(
        location.search
      ).get('test') === '1';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let ARREARS = [];
    let ACTIVE_BILL_ID = '';
    let ACTIVE_REMINDER_BILL_ID = '';
    let ALERT_CALLBACK = null;

    const app =
      document.getElementById('app');

    // ==================================================
    // 工具函式
    // ==================================================

    function goPage(filename) {
      const testSuffix =
        TEST_MODE
          ? '&test=1'
          : '';

      location.href =
        filename +
        '?v=' +
        Date.now() +
        testSuffix;
    }

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        ) +
        (
          currentUrl.hash || ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

      entryUrl.searchParams.set(
        'return_to',
        returnTo
      );

      return entryUrl.href;
    }

    function rawText(value) {
      if (
        value === undefined ||
        value === null
      ) {
        return '';
      }

      return String(value);
    }

    function escapeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeText(value) {
      const text =
        rawText(value).trim();

      return text
        ? escapeHtml(text)
        : '-';
    }

    function money(value) {
      const amount =
        Number(value || 0);

      return (
        'NT$ ' +
        Math.round(amount)
          .toLocaleString('zh-TW')
      );
    }

    function statusText(value) {
      const status =
        rawText(value)
          .trim()
          .toLowerCase();

      const map = {
        unpaid: '未繳',
        paid: '已繳',
        issued: '已建立',
        draft: '草稿',
        not_sent: '未發送',
        sent: '已發送',
        active: '啟用中',
        inactive: '未啟用'
      };

      return (
        map[status] ||
        safeText(value)
      );
    }

    function dateFromSheetValue(value) {
      if (
        value === undefined ||
        value === null ||
        value === ''
      ) {
        return null;
      }

      if (
        typeof value === 'number' ||
        /^\d{5}(\.\d+)?$/.test(
          rawText(value).trim()
        )
      ) {
        const serial =
          Number(value);

        if (
          isFinite(serial) &&
          serial > 20000 &&
          serial < 100000
        ) {
          return new Date(
            Date.UTC(
              1899,
              11,
              30
            ) +
            serial * 86400000
          );
        }
      }

      const text =
        rawText(value).trim();

      if (
        /^\d{4}-\d{2}$/.test(text)
      ) {
        return new Date(
          text + '-01T12:00:00+08:00'
        );
      }

      if (
        /^\d{4}[\/-]\d{1,2}[\/-]\d{1,2}$/.test(
          text
        )
      ) {
        return new Date(
          text.replace(/\//g, '-') +
          'T12:00:00+08:00'
        );
      }

      const parsed =
        new Date(text);

      return isNaN(
        parsed.getTime()
      )
        ? null
        : parsed;
    }

    function taipeiDateParts(value) {
      const date =
        dateFromSheetValue(value);

      if (!date) {
        return null;
      }

      const parts =
        new Intl.DateTimeFormat(
          'en-CA',
          {
            timeZone:
              'Asia/Taipei',
            year:
              'numeric',
            month:
              '2-digit',
            day:
              '2-digit'
          }
        ).formatToParts(date);

      const result = {};

      parts.forEach(function (part) {
        if (
          part.type !== 'literal'
        ) {
          result[part.type] =
            part.value;
        }
      });

      return result;
    }

    function formatDateOnly(value) {
      const parts =
        taipeiDateParts(value);

      if (!parts) {
        return safeText(value);
      }

      return (
        parts.year +
        '-' +
        parts.month +
        '-' +
        parts.day
      );
    }

    function formatDateTime(value) {
      const date =
        dateFromSheetValue(value);

      if (!date) {
        return safeText(value);
      }

      return new Intl.DateTimeFormat(
        'zh-TW',
        {
          timeZone: 'Asia/Taipei',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        }
      ).format(date);
    }

    function toBoolean(value) {
      if (value === true) {
        return true;
      }

      const text =
        rawText(value)
          .trim()
          .toLowerCase();

      return [
        'true',
        '1',
        'yes',
        'y',
        '是',
        '需人工處理'
      ].indexOf(text) !== -1;
    }

    function reminderStageText(stage) {
      const number = Number(stage || 0);

      if (number >= 15) {
        return '第 15 天最終提醒';
      }

      if (number >= 6) {
        return '第 6 天第二次提醒';
      }

      if (number >= 2) {
        return '第 2 天第一次提醒';
      }

      return '尚未發送';
    }

    function nextReminderText(item) {
      if (
        toBoolean(
          item.manual_follow_up_required
        )
      ) {
        return '已停止自動催繳';
      }

      const apiLabel =
        rawText(
          item.next_reminder_label
        ).trim();

      if (apiLabel) {
        return apiLabel;
      }

      const apiDay =
        Number(
          item.next_reminder_day ||
          0
        );

      if (apiDay > 0) {
        return '逾期第 ' + apiDay + ' 天';
      }

      const stage =
        Number(
          item.last_reminder_stage ||
          0
        );

      if (stage < 2) {
        return '逾期第 2 天';
      }

      if (stage < 6) {
        return '逾期第 6 天';
      }

      if (stage < 15) {
        return '逾期第 15 天';
      }

      return '等待轉人工處理';
    }

    function reminderStatusLabel(item) {
      if (
        toBoolean(
          item.manual_follow_up_required
        )
      ) {
        return '需人工處理';
      }

      const apiStatus =
        rawText(
          item.reminder_status
        )
          .trim()
          .toLowerCase();

      const statusMap = {
        pending: '等待自動催繳',
        active: '自動催繳中',
        scheduled: '等待排程',
        final_sent: '最終提醒已送出',
        completed: '自動流程完成',
        manual_required: '需人工處理'
      };

      if (
        apiStatus &&
        statusMap[apiStatus]
      ) {
        return statusMap[apiStatus];
      }

      const stage =
        Number(
          item.last_reminder_stage ||
          0
        );

      if (stage >= 15) {
        return '最終提醒已送出';
      }

      if (
        Number(
          item.reminder_count ||
          0
        ) > 0
      ) {
        return '自動催繳中';
      }

      return '等待自動催繳';
    }

    function renderReminderPanel(item) {
      const reminderCount =
        Number(
          item.reminder_count ||
          0
        );

      const lastStage =
        Number(
          item.last_reminder_stage ||
          0
        );

      const manualRequired =
        toBoolean(
          item.manual_follow_up_required
        );

      const panelClass =
        manualRequired
          ? 'manual'
          : lastStage >= 15
            ? 'final'
            : '';

      const badgeClass =
        manualRequired
          ? 'manual'
          : lastStage >= 15
            ? 'final'
            : '';

      const stages = [2, 6, 15];

      const nextReminderDay =
        Number(
          item.next_reminder_day ||
          0
        );

      const stepsHtml =
        stages.map(
          function (stage) {
            let stateClass = '';

            if (lastStage >= stage) {
              stateClass = 'done';
            } else if (
              !manualRequired &&
              nextReminderDay === stage
            ) {
              stateClass = 'current';
            }

            return `
              <div class="reminder-step ${stateClass}">
                <div class="reminder-step-day">
                  第 ${stage} 天
                </div>

                <div class="reminder-step-label">
                  ${
                    stage === 2
                      ? '第一次'
                      : stage === 6
                        ? '第二次'
                        : '最終提醒'
                  }
                </div>
              </div>
            `;
          }
        ).join('');

      const progressPercent =
        lastStage >= 15
          ? 100
          : lastStage >= 6
            ? 50
            : 0;

      const progressStageCount =
        lastStage >= 15
          ? 3
          : lastStage >= 6
            ? 2
            : lastStage >= 2
              ? 1
              : 0;

      const trackNodeClasses =
        stages.map(
          function (stage) {
            if (lastStage >= stage) {
              return 'done';
            }

            if (
              !manualRequired &&
              nextReminderDay === stage
            ) {
              return 'current';
            }

            return 'pending';
          }
        );

      const trackFillClass =
        !manualRequired &&
        nextReminderDay > lastStage
          ? 'current'
          : '';

      const trackHtml = `
        <div
          class="reminder-track-wrap"
          role="progressbar"
          aria-label="自動催繳里程碑進度"
          aria-valuemin="0"
          aria-valuemax="3"
          aria-valuenow="${progressStageCount}"
        >
          <div class="reminder-track-base"></div>

          <div
            class="reminder-track-fill ${trackFillClass}"
            style="width: ${progressPercent}%"
          ></div>

          <span
            class="reminder-track-node first ${trackNodeClasses[0]}"
            title="逾期第 2 天"
          ></span>

          <span
            class="reminder-track-node second ${trackNodeClasses[1]}"
            title="逾期第 6 天"
          ></span>

          <span
            class="reminder-track-node third ${trackNodeClasses[2]}"
            title="逾期第 15 天"
          ></span>
        </div>

        <div class="reminder-track-caption">
          <span>
            綠色：已通過｜藍色：下一階段
          </span>

          <strong>
            里程碑 ${progressStageCount} / 3
          </strong>
        </div>
      `;

      return `
        <div class="reminder-panel ${panelClass}">
          <div class="reminder-head">
            <div>
              <div class="reminder-title">
                自動催繳進度
              </div>

              <div class="reminder-subtitle">
                系統於逾期第 2、6、15 天自動發送提醒
              </div>
            </div>

            <span class="reminder-badge ${badgeClass}">
              ${safeText(
                reminderStatusLabel(item)
              )}
            </span>
          </div>

          <div class="reminder-progress">
            ${stepsHtml}
          </div>

          ${trackHtml}

          <div class="reminder-detail-list">
            <div class="reminder-detail-row">
              <div class="reminder-detail-label">
                已成功催繳
              </div>

              <div class="reminder-detail-value">
                ${reminderCount} 次
              </div>
            </div>

            <div class="reminder-detail-row">
              <div class="reminder-detail-label">
                最後催繳階段
              </div>

              <div class="reminder-detail-value">
                ${safeText(
                  reminderStageText(
                    lastStage
                  )
                )}
              </div>
            </div>

            <div class="reminder-detail-row">
              <div class="reminder-detail-label">
                最後催繳時間
              </div>

              <div class="reminder-detail-value">
                ${
                  item.last_reminder_at
                    ? formatDateTime(
                        item.last_reminder_at
                      )
                    : '-'
                }
              </div>
            </div>

            <div class="reminder-detail-row">
              <div class="reminder-detail-label">
                下一步
              </div>

              <div class="reminder-detail-value">
                ${safeText(
                  nextReminderText(item)
                )}
              </div>
            </div>
          </div>

          ${
            manualRequired
              ? `
                <div class="manual-followup-box">
                  此帳單已完成自動催繳流程，系統不再自動發送。請由房東聯絡房客，確認付款狀況或安排後續處理。
                  ${
                    item.manual_follow_up_at
                      ? '<br>轉人工時間：' +
                        formatDateTime(
                          item.manual_follow_up_at
                        )
                      : ''
                  }
                </div>
              `
              : ''
          }
        </div>
      `;

    function formatBillMonth(value) {
      const text =
        rawText(value).trim();

      if (
        /^\d{4}-\d{2}$/.test(text)
      ) {
        return text;
      }

      const parts =
        taipeiDateParts(value);

      if (!parts) {
        return safeText(value);
      }

      return (
        parts.year +
        '-' +
        parts.month
      );
    }

    function todayTaipei() {
      const parts =
        new Intl.DateTimeFormat(
          'en-CA',
          {
            timeZone:
              'Asia/Taipei',
            year:
              'numeric',
            month:
              '2-digit',
            day:
              '2-digit'
          }
        ).formatToParts(
          new Date()
        );

      const result = {};

      parts.forEach(function (part) {
        if (
          part.type !== 'literal'
        ) {
          result[part.type] =
            part.value;
        }
      });

      return (
        result.year +
        '-' +
        result.month +
        '-' +
        result.day
      );
    }

    function getInitial(name) {
      const text =
        rawText(name).trim();

      return text
        ? text.slice(0, 1)
        : '房';
    }

    function updateNoteCount() {

    function normalizeBankLast5() {

    // ==================================================
    // JSONP API
    // ==================================================

    function callApi(
      action,
      params
    ) {
      return new Promise(
        function (
          resolve,
          reject
        ) {
          if (!LINE_USER_ID) {
            reject(
              new Error(
                '缺少房東 LINE User ID'
              )
            );

            return;
          }

          params =
            params || {};

          const callbackName =
            'cmwebsJsonp_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;
          let timer = null;

          function cleanup() {
            if (timer) {
              clearTimeout(timer);
            }

            if (
              script.parentNode
            ) {
              script.parentNode
                .removeChild(script);
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[
                callbackName
              ] = undefined;
            }
          }

          window[callbackName] =
            function (json) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              if (
                !json ||
                json.success !== true
              ) {
                const message =
                  json &&
                  json.message
                    ? json.message
                    : 'API 操作失敗';

                const code =
                  json &&
                  json.code
                    ? json.code
                    : '';

                reject(
                  new Error(
                    code
                      ? message +
                        '\n錯誤代碼：' +
                        code
                      : message
                  )
                );

                return;
              }

              resolve(json);
            };

          timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished = true;
                cleanup();

                reject(
                  new Error(
                    'API 載入逾時'
                  )
                );
              },
              30000
            );

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(params)
            .forEach(
              function (key) {
                const value =
                  params[key];

                if (
                  value ===
                    undefined ||
                  value === null
                ) {
                  return;
                }

                url +=
                  '&' +
                  encodeURIComponent(
                    key
                  ) +
                  '=' +
                  encodeURIComponent(
                    value
                  );
              }
            );

          script.charset =
            'UTF-8';

          script.onerror =
            function () {
              /*
               * Apps Script 可能重新導向至
               * script.googleusercontent.com。
               * 部分 LINE WebView 會誤觸 onerror，
               * 因此由 JSONP callback 或 timeout 判定。
               */
              console.warn(
                'JSONP script onerror ignored.'
              );
            };

          script.src = url;

          document.body
            .appendChild(
              script
            );
        }
      );
    }

    async function initLineUserId() {
      if (
        typeof liff ===
        'undefined'
      ) {
        if (TEST_MODE) {
          LINE_USER_ID =
            TEST_LINE_USER_ID;

          return true;
        }

        throw new Error(
          'LIFF SDK 載入失敗'
        );
      }

      try {
        await liff.init({
          liffId:
            LIFF_ID
        });

        if (
          !liff.isLoggedIn()
        ) {
          liff.login({
            redirectUri:
              buildLandlordLoginRedirectUri()
          });

          return false;
        }

        const profile =
          await liff.getProfile();

        LINE_USER_ID =
          profile.userId ||
          '';

        if (!LINE_USER_ID) {
          throw new Error(
            '無法取得房東 LINE User ID'
          );
        }

        return true;

      } catch (error) {
        if (TEST_MODE) {
          LINE_USER_ID =
            TEST_LINE_USER_ID;

          return true;
        }

        throw error;
      }
    }

            'landlord_send_tenant_message',

                item.user_id || '',

        showAlert(
          response.message ||

          error.message ||
          String(error)
        );

        button.disabled = false;
        button.textContent =
          '確認傳送 LINE';

        .getElementById(
          'confirmationSource'
        )
        .value =
          'private_message';

      document
        .getElementById(
          'landlordNote'
        )
        .value = '';

      document
        .getElementById(
          'notifyTenant'
        )
        .checked = true;

      updateNoteCount();
      handlePaymentMethodChange();

      document
        .getElementById(
          'settlementModal'
        )
        .classList
        .add('show');

      document.body
        .classList
        .add('modal-open');
    }

    function closeSettlementModal() {
      document
        .getElementById(
          'settlementModal'
        )
        .classList
        .remove('show');

      document.body
        .classList
        .remove('modal-open');

      ACTIVE_BILL_ID = '';
    }

    function handlePaymentMethodChange() {
      const method =
        document
          .getElementById(
            'paymentMethod'
          )
          .value;

      const bankField =
        document.getElementById(
          'bankLast5Field'
        );

      const bankInput =
        document.getElementById(
          'bankLast5'
        );

      if (
        method ===
        'bank_transfer'
      ) {
        bankField
          .classList
          .remove('hidden');

        bankInput.disabled =
          false;
      } else {
        bankField
          .classList
          .add('hidden');

        bankInput.value = '';
        bankInput.disabled =
          true;
      }
    }

    async function submitManualSettlement() {
      if (!ACTIVE_BILL_ID) {
        showAlert(
          '缺少帳單 ID'
        );

        return;
      }

      const item =
        findArrearByBillId(
          ACTIVE_BILL_ID
        );

      if (!item) {
        showAlert(
          '找不到指定帳單'
        );

        return;
      }

      const paymentDate =
        document
          .getElementById(
            'paymentDate'
          )
          .value
          .trim();

      const paymentMethod =
        document
          .getElementById(
            'paymentMethod'
          )
          .value
          .trim();

      const paymentAmount =
        document
          .getElementById(
            'paymentAmount'
          )
          .value
          .trim();

      const bankLast5 =
        document
          .getElementById(
            'bankLast5'
          )
          .value
          .trim();

      const confirmationSource =
        document
          .getElementById(
            'confirmationSource'
          )
          .value
          .trim();

      const landlordNote =
        document
          .getElementById(
            'landlordNote'
          )
          .value
          .trim();

      const notifyTenant =
        document
          .getElementById(
            'notifyTenant'
          )
          .checked;

      if (!paymentDate) {
        showAlert(
          '請選擇付款日期'
        );

        return;
      }

      if (!paymentMethod) {
        showAlert(
          '請選擇付款方式'
        );

        return;
      }

      if (
        Number(paymentAmount) !==
        Math.round(
          Number(
            item.total_amount ||
            0
          )
        )
      ) {
        showAlert(
          '付款金額必須等於帳單總額'
        );

        return;
      }

      if (
        bankLast5 &&
        !/^\d{5}$/.test(
          bankLast5
        )
      ) {
        showAlert(
          '匯款後 5 碼必須是 5 位數字'
        );

        return;
      }

      if (
        landlordNote.length >
        300
      ) {
        showAlert(
          '房東備註最多 300 字'
        );

        return;
      }

      const button =
        document.getElementById(
          'submitSettlementBtn'
        );

      try {
        button.disabled = true;

        button.textContent =
          '銷帳處理中...';

        const response =
          await callApi(
            'landlord_bill_manual_settle',
            {
              bill_id:
                ACTIVE_BILL_ID,

              payment_date:
                paymentDate,

              payment_method:
                paymentMethod,

              payment_amount:
                paymentAmount,

              bank_last5:
                bankLast5,

              confirmation_source:
                confirmationSource,

              landlord_note:
                landlordNote,

              notify_tenant:
                notifyTenant
                  ? 'true'
                  : 'false'
            }
          );

        const result =
          response.data ||
          {};

        closeSettlementModal();

        const legacySync =
          result.legacy_sync ||
          {};

        const monthlyStatus =
          legacySync.monthly &&
          legacySync.monthly.status
            ? legacySync.monthly.status
            : '未回傳';

        const historyStatus =
          legacySync.history &&
          legacySync.history.status
            ? legacySync.history.status
            : '未回傳';

        let message =
          response.message ||
          '帳單已完成銷帳';

        message +=
          '\n\n付款紀錄：' +
          (
            result.payment_id ||
            '-'
          );

        message +=
          '\nV1 每月帳單：' +
          monthlyStatus;

        message +=
          '\nV1 歷史帳單：' +
          historyStatus;

        showAlert(
          message,
          function () {
            setTimeout(
              loadPage,
              1200
            );
          }
        );

      } catch (error) {
        showAlert(
          error.message ||
          String(error)
        );

      } finally {
        button.disabled =
          false;

        button.textContent =
          '確認已繳並銷帳';
      }
    }

    // ==================================================
    // 提示視窗
    // ==================================================

    function showAlert(
      message,
      callback
    ) {
      ALERT_CALLBACK =
        typeof callback ===
        'function'
          ? callback
          : null;

      document
        .getElementById(
          'alertMessage'
        )
        .textContent =
          message || '';

      document
        .getElementById(
          'alertModal'
        )
        .classList
        .add('show');
    }

    function closeAlertModal() {
      document
        .getElementById(
          'alertModal'
        )
        .classList
        .remove('show');

      const callback =
        ALERT_CALLBACK;

      ALERT_CALLBACK = null;

      if (callback) {
        callback();
      }
    }

    document
      .getElementById(
        'manualReminderModal'
      )
      .addEventListener(
        'click',
        function (event) {
          if (
            event.target === this
          ) {
            closeManualReminderModal();
          }
        }
      );

    document
      .getElementById(
        'settlementModal'
      )
      .addEventListener(
        'click',
        function (event) {
          if (
            event.target === this
          ) {
            closeSettlementModal();
          }
        }
      );

    document
      .getElementById(
        'alertModal'
      )
      .addEventListener(
        'click',
        function (event) {
          if (
            event.target === this
          ) {
            closeAlertModal();
          }
        }
      );

    // ==================================================
    // 載入資料
    // ==================================================

    async function loadPage() {
      try {
        app.className =
          'loading';

        app.innerHTML =
          '資料載入中...';

        const response =
          await callApi(
            'landlord_arrears'
          );

        renderPage(
          response.data ||
          {}
        );

      } catch (error) {
        renderError(
          error.message ||
          String(error)
        );
      }
    }

    async function main() {
      try {
        app.className =
          'loading';

        app.innerHTML =
          '資料載入中...';

        const ready =
          await initLineUserId();

        if (!ready) {
          return;
        }

        await loadPage();

      } catch (error) {
        renderError(
          error.message ||
          String(error)
        );
      }
    }

    main();
  </script>
</body>
</html>
