<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMWebs 房客首頁</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .sub {
      color: #666;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 15px;
    }

    .row:last-child {
      border-bottom: none;
    }

    .label {
      color: #666;
    }

    .value {
      font-weight: 600;
      text-align: right;
    }

    .amount {
      font-size: 30px;
      font-weight: 800;
      color: #d93025;
      margin: 10px 0;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      background: #06c755;
      color: white;
      cursor: pointer;
    }

    .btn.secondary {
      background: #222;
      margin-top: 10px;
    }

    .loading,
    .error {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .error {
      color: #d93025;
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="app" class="loading">資料載入中...</div>
  </div>

  <script>
    // 1. 換成你的 Apps Script Web App URL，結尾要是 /exec
    const API_URL = 'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    // 2. 測試階段先寫死 LINE UID
    const TEST_LINE_USER_ID = 'U3615a7ed919c1a4a438a246c10784d70';

    const app = document.getElementById('app');

    function money(n) {
      const num = Number(n || 0);
      return num.toLocaleString('zh-TW');
    }

    function safeText(v) {
      return v === undefined || v === null || v === '' ? '-' : v;
    }

    async function fetchTenantHome() {
      const url = API_URL
        + '?v2_action=tenant_home'
        + '&line_user_id=' + encodeURIComponent(TEST_LINE_USER_ID);

      const res = await fetch(url);
      const json = await res.json();

      if (!json.success) {
        throw new Error(json.message || '查詢失敗');
      }

      return json.data;
    }

    function render(data) {
      app.className = '';

      app.innerHTML = `
        <div class="card">
          <div class="title">您好，${safeText(data.tenant_name)}</div>
          <div class="sub">房號：${safeText(data.room_list)}</div>

          <div class="row">
            <div class="label">帳號狀態</div>
            <div class="value">${safeText(data.account_status)}</div>
          </div>

          <div class="row">
            <div class="label">最新帳單月份</div>
            <div class="value">${safeText(data.latest_bill_month)}</div>
          </div>

          <div class="row">
            <div class="label">繳款期限</div>
            <div class="value">${safeText(data.latest_due_date).slice(0, 10)}</div>
          </div>
        </div>

        <div class="card">
          <div class="sub">目前未繳總額</div>
          <div class="amount">NT$ ${money(data.unpaid_total_amount)}</div>

          <div class="row">
            <div class="label">未繳帳單數</div>
            <div class="value">${money(data.unpaid_bill_count)}</div>
          </div>

          <div class="row">
            <div class="label">最新付款狀態</div>
            <div class="value">${safeText(data.latest_payment_status)}</div>
          </div>
        </div>

        <button class="btn" onclick="location.href='tenant-bills.html'">
          查看帳單明細
        </button>

        <button class="btn secondary" onclick="location.reload()">
          重新整理
        </button>
      `;
    }

    async function main() {
      try {
        const data = await fetchTenantHome();
        render(data);
      } catch (err) {
        app.className = 'error';
        app.innerHTML = `
          <div>資料載入失敗</div>
          <div style="font-size:13px;margin-top:10px;">${err.message}</div>
        `;
      }
    }

    main();
  </script>
</body>
</html>
