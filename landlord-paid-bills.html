<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>CMWebs 已繳帳單管理</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 66px;

      --primary: #06c755;
      --primary-dark: #05a847;

      --background: #f4f6f9;
      --surface: #ffffff;

      --text: #222222;
      --muted: #72777f;
      --border: #e6e9ed;

      --danger: #d93025;
      --danger-soft: #fff0ef;

      --blue: #1a73e8;
      --blue-soft: #eaf2ff;

      --purple: #7e57c2;
      --purple-soft: #f2edff;

      --orange: #a86700;
      --orange-soft: #fff4dc;

      --green-soft: #e9f8ef;
      --green-text: #13883e;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--background);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        sans-serif;
    }

    body.modal-open {
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background: var(--background);
    }

    .page {
      width: 100%;
      height: 100%;
      padding:
        18px
        15px
        calc(
          var(--nav-height) +
          24px +
          env(safe-area-inset-bottom)
        );

      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    .page-header {
      margin-bottom: 15px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .card {
      padding: 16px;
      margin-bottom: 13px;
      border: 1px solid rgba(230, 233, 237, 0.9);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    }

    .landlord-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      display: flex;
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--green-soft);
      color: var(--primary);
      font-size: 19px;
      font-weight: 900;
    }

    .landlord-name {
      font-size: 16px;
      font-weight: 900;
    }

    .landlord-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .section-title {
      margin-bottom: 12px;
      font-size: 17px;
      font-weight: 900;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .summary-item {
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #fafbfc;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
    }

    .summary-value {
      margin-top: 5px;
      font-size: 22px;
      font-weight: 900;
    }

    .summary-value.amount {
      color: var(--green-text);
      font-size: 19px;
    }

    .summary-item.manual .summary-value {
      color: var(--purple);
    }

    .summary-item.report .summary-value {
      color: var(--blue);
    }

    .toolbar {
      display: grid;
      gap: 10px;
    }

    .search-input,
    .filter-select {
      width: 100%;
      min-height: 44px;
      padding: 11px 13px;
      border: 1px solid #dfe3e8;
      border-radius: 12px;
      outline: none;
      background: #ffffff;
      color: #222222;
      font-size: 14px;
    }

    .search-input:focus,
    .filter-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.12);
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .quick-link {
      min-height: 42px;
      padding: 10px 7px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #ffffff;
      color: #555555;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .quick-link.active {
      border-color: #b9ebca;
      background: #effcf4;
      color: var(--green-text);
    }

    .paid-card {
      position: relative;
      padding: 17px;
      margin-bottom: 13px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 3px 13px rgba(0, 0, 0, 0.055);
    }

    .paid-card::before {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 4px;
      background: var(--primary);
      content: "";
    }

    .paid-card.manual::before {
      background: var(--purple);
    }

    .paid-card.payment_report::before {
      background: var(--blue);
    }

    .paid-card.legacy::before {
      background: var(--orange);
    }

    .paid-card.other::before {
      background: #777777;
    }

    .paid-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .tenant-block {
      min-width: 0;
    }

    .tenant-name {
      font-size: 17px;
      font-weight: 900;
      line-height: 1.45;
      word-break: break-word;
    }

    .room-name {
      margin-left: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .paid-time {
      flex: 0 0 auto;
      color: #92979e;
      font-size: 11px;
      line-height: 1.5;
      text-align: right;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .badge {
      display: inline-flex;
      min-height: 23px;
      padding: 4px 8px;
      align-items: center;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .badge-paid {
      background: var(--green-soft);
      color: var(--green-text);
    }

    .badge-manual {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .badge-report {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge-legacy {
      background: var(--orange-soft);
      color: var(--orange);
    }

    .badge-other {
      background: #f0f1f3;
      color: #666666;
    }

    .badge-month {
      background: #f1f3f5;
      color: #555555;
    }

    .amount-box {
      padding: 14px;
      margin-top: 14px;
      border-radius: 13px;
      background: #f7f8fa;
    }

    .amount-label {
      color: var(--muted);
      font-size: 12px;
    }

    .amount-value {
      margin-top: 5px;
      color: var(--green-text);
      font-size: 25px;
      font-weight: 900;
    }

    .detail-list {
      margin-top: 11px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid #eeeeee;
      font-size: 13px;
      line-height: 1.55;
    }

    .detail-row:first-child {
      border-top: none;
    }

    .detail-label {
      flex: 0 0 auto;
      color: var(--muted);
    }

    .detail-value {
      min-width: 0;
      font-weight: 800;
      text-align: right;
      word-break: break-word;
    }

    .payment-id {
      color: var(--green-text);
      font-size: 11px;
    }

    .bill-id {
      color: #555555;
      font-size: 11px;
    }

    .last5 {
      color: var(--blue);
      letter-spacing: 2px;
    }

    .note-box,
    .warning-box {
      padding: 12px 13px;
      margin-top: 11px;
      border-radius: 11px;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-box {
      border: 1px solid #dfe3e8;
      background: #f7f8fa;
      color: #555555;
    }

    .warning-box {
      border: 1px solid #efd9a7;
      background: #fffaf0;
      color: #7c5b00;
    }

    .box-title {
      margin-bottom: 5px;
      font-weight: 900;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 14px;
    }

    .btn {
      width: 100%;
      min-height: 44px;
      padding: 11px 13px;
      border: 0;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn:active {
      opacity: 0.72;
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn-black {
      background: #222222;
      color: #ffffff;
    }

    .btn-light {
      background: #eef1f5;
      color: #333333;
    }

    .btn-outline {
      border: 1px solid #dfe3e8;
      background: #ffffff;
      color: #444444;
    }

    .btn-danger-soft {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .full-action {
      grid-column: 1 / -1;
    }

    .page-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .loading,
    .empty {
      padding: 42px 20px;
      color: var(--muted);
      text-align: center;
    }

    .empty-icon {
      margin-bottom: 10px;
      font-size: 36px;
    }

    .empty-title {
      color: #444444;
      font-size: 17px;
      font-weight: 900;
    }

    .empty-desc {
      margin-top: 7px;
      font-size: 13px;
      line-height: 1.65;
    }

    .error-title {
      margin-bottom: 8px;
      color: var(--danger);
      font-size: 19px;
      font-weight: 900;
    }

    .error-text {
      color: #555555;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    /* ==================================================
       撤銷 Modal
       ================================================== */

    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      background: rgba(0, 0, 0, 0.48);
    }

    .modal-mask.show {
      display: flex;
    }

    .modal-sheet {
      width: 100%;
      max-width: 560px;
      max-height: 94vh;
      max-height: 94dvh;

      padding:
        18px
        18px
        calc(18px + env(safe-area-inset-bottom));

      overflow-y: auto;
      overscroll-behavior: contain;
      border-radius: 22px 22px 0 0;
      background: #ffffff;
      box-shadow: 0 -12px 36px rgba(0, 0, 0, 0.22);
    }

    .modal-handle {
      width: 40px;
      height: 5px;
      margin: 0 auto 15px;
      border-radius: 999px;
      background: #d9dde2;
    }

    .modal-title {
      color: var(--danger);
      font-size: 21px;
      font-weight: 900;
    }

    .modal-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .modal-preview {
      padding: 13px;
      margin-top: 14px;
      border-radius: 13px;
      background: #f7f8fa;
    }

    .preview-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid #e8ebef;
      font-size: 13px;
      line-height: 1.5;
    }

    .preview-row:first-child {
      border-top: none;
    }

    .preview-label {
      color: var(--muted);
    }

    .preview-value {
      font-weight: 900;
      text-align: right;
      word-break: break-word;
    }

    .field {
      margin-top: 16px;
    }

    .field-label {
      display: block;
      margin-bottom: 7px;
      color: #444444;
      font-size: 13px;
      font-weight: 900;
    }

    .required-mark {
      color: var(--danger);
    }

    .field-textarea {
      width: 100%;
      min-height: 110px;
      padding: 13px 14px;
      resize: vertical;
      border: 1px solid #dfe3e8;
      border-radius: 12px;
      outline: none;
      background: #ffffff;
      color: #222222;
      font-size: 15px;
      line-height: 1.7;
    }

    .field-textarea:focus {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(217, 48, 37, 0.1);
    }

    .char-count {
      margin-top: 6px;
      color: #999999;
      font-size: 12px;
      text-align: right;
    }

    .notify-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px;
      margin-top: 16px;
      border: 1px solid #f0c8c4;
      border-radius: 12px;
      background: #fff7f6;
      cursor: pointer;
    }

    .notify-row input {
      width: 19px;
      height: 19px;
      flex: 0 0 19px;
      accent-color: var(--danger);
    }

    .notify-title {
      font-size: 14px;
      font-weight: 900;
    }

    .notify-desc {
      margin-top: 3px;
      color: #755f5d;
      font-size: 11px;
      line-height: 1.5;
    }

    .modal-warning {
      padding: 12px 13px;
      margin-top: 16px;
      border: 1px solid #efc7c3;
      border-radius: 11px;
      background: #fff5f4;
      color: #9d2e25;
      font-size: 12px;
      line-height: 1.7;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    /* ==================================================
       提示視窗
       ================================================== */

    .alert-mask {
      position: fixed;
      inset: 0;
      z-index: 1000000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.48);
    }

    .alert-mask.show {
      display: flex;
    }

    .alert-box {
      width: 100%;
      max-width: 350px;
      padding: 22px 18px 16px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22);
      text-align: center;
    }

    .alert-title {
      margin-bottom: 10px;
      font-size: 20px;
      font-weight: 900;
    }

    .alert-message {
      margin-bottom: 18px;
      color: #555555;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ==================================================
       固定底部導覽列
       ================================================== */

    .bottom-nav {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 99999;
      width: 100%;
      padding-bottom: env(safe-area-inset-bottom);
      border-top: 1px solid #eceff3;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      height: var(--nav-height);
    }

    .nav-item {
      position: relative;
      display: flex;
      appearance: none;
      -webkit-appearance: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b9098;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    .nav-item:active {
      opacity: 0.65;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div id="app" class="loading">
        資料載入中...
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button
          class="nav-item"
          onclick="goPage('landlord-home.html')"
        >
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button
          class="nav-item active"
          onclick="goPage('landlord-arrears.html')"
        >
          <svg viewBox="0 0 24 24">
            <rect
              x="5"
              y="4.5"
              width="14"
              height="15"
              rx="2"
            ></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>帳款</span>
        </button>

        <button
          class="nav-item"
          onclick="goPage('landlord-tenants.html')"
        >
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button
          class="nav-item"
          onclick="goPage('landlord-more.html')"
        >
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>
  </div>

  <!-- 撤銷已繳 Modal -->
  <div id="reversalModal" class="modal-mask">
    <div class="modal-sheet">
      <div class="modal-handle"></div>

      <div class="modal-title">
        撤銷已繳／恢復欠款
      </div>

      <div
        id="reversalSubtitle"
        class="modal-subtitle"
      ></div>

      <div
        id="reversalPreview"
        class="modal-preview"
      ></div>

      <div class="field">
        <label
          class="field-label"
          for="reversalReason"
        >
          撤銷原因
          <span class="required-mark">*</span>
        </label>

        <textarea
          id="reversalReason"
          class="field-textarea"
          maxlength="300"
          placeholder="例如：先前誤認為已入帳，實際尚未收到款項。"
          oninput="updateReversalCount()"
        ></textarea>

        <div
          id="reversalCount"
          class="char-count"
        >
          0 / 300
        </div>
      </div>

      <label class="notify-row">
        <input
          id="notifyTenant"
          type="checkbox"
          checked
        />

        <div>
          <div class="notify-title">
            LINE 通知房客
          </div>

          <div class="notify-desc">
            通知房客付款確認已撤銷，帳單已恢復為未繳。
          </div>
        </div>
      </label>

      <div class="modal-warning">
        確認後會作廢原付款紀錄、將 V2 帳單恢復為未繳、同步 V1 每月帳單及歷史帳單，並讓帳單重新出現在欠款頁。原付款資料會保留作為稽核紀錄。
      </div>

      <div class="modal-actions">
        <button
          class="btn btn-light"
          onclick="closeReversalModal()"
        >
          取消
        </button>

        <button
          id="submitReversalBtn"
          class="btn btn-danger-soft"
          onclick="submitReversal()"
        >
          確認撤銷
        </button>
      </div>
    </div>
  </div>

  <!-- 提示視窗 -->
  <div id="alertModal" class="alert-mask">
    <div class="alert-box">
      <div class="alert-title">
        提示
      </div>

      <div
        id="alertMessage"
        class="alert-message"
      ></div>

      <button
        class="btn btn-primary"
        onclick="closeAlertModal()"
      >
        確定
      </button>
    </div>
  </div>

  <script>
    // ==================================================
    // 基本設定
    // ==================================================

    const API_URL =

    function rawText(value) {
      if (
        value === undefined ||
        value === null
      ) {
        return '';
      }

      return String(value);
    }

    function escapeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeText(value) {
      const text =
        rawText(value).trim();

      return text
        ? escapeHtml(text)
        : '-';
    }

    function money(value) {
      return (
        'NT$ ' +
        Math.round(
          Number(value || 0)
        ).toLocaleString('zh-TW')
      );
    }

    function getInitial(name) {
      const text =
        rawText(name).trim();

      return text
        ? text.slice(0, 1)
        : '房';
    }

    function dateFromValue(value) {
      if (
        value === undefined ||
        value === null ||
        value === ''
      ) {
        return null;
      }

      if (
        typeof value === 'number' ||
        /^\d{5}(\.\d+)?$/.test(
          rawText(value).trim()
        )
      ) {
        const serial =
          Number(value);

        if (
          isFinite(serial) &&
          serial > 20000 &&
          serial < 100000
        ) {
          return new Date(
            Date.UTC(1899, 11, 30) +
            serial * 86400000
          );
        }
      }

      const text =
        rawText(value).trim();

      if (
        /^\d{4}-\d{2}$/.test(text)
      ) {
        return new Date(
          text + '-01T12:00:00+08:00'
        );
      }

      const parsed =
        new Date(text);

      return isNaN(
        parsed.getTime()
      )
        ? null
        : parsed;
    }

    function formatDateOnly(value) {
      const date =
        dateFromValue(value);

      if (!date) {
        return safeText(value);
      }

      return new Intl.DateTimeFormat(
        'en-CA',
        {
          timeZone: 'Asia/Taipei',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        }
      ).format(date);
    }

    function formatDateTime(value) {
      const date =
        dateFromValue(value);

      if (!date) {
        return safeText(value);
      }

      return new Intl.DateTimeFormat(
        'zh-TW',
        {
          timeZone: 'Asia/Taipei',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        }
      ).format(date);
    }

    function formatBillMonth(value) {
      const text =
        rawText(value).trim();

      if (
        /^\d{4}-\d{2}$/.test(text)
      ) {
        return text;
      }

      const date =
        dateFromValue(value);

      if (!date) {
        return safeText(value);
      }

      return new Intl.DateTimeFormat(
        'en-CA',
        {
          timeZone: 'Asia/Taipei',
          year: 'numeric',
          month: '2-digit'
        }
      ).format(date);
    }

    // ==================================================
    // JSONP API
    // ==================================================

    function callApi(
      action,
      params
    ) {
      return new Promise(
        function (
          resolve,
          reject
        ) {
          if (!LINE_USER_ID) {
            reject(
              new Error(
                '缺少房東 LINE User ID'
              )
            );

            return;
          }

          params =
            params || {};

          const callbackName =
            'cmwebsJsonp_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;
          let timer = null;

          function cleanup() {
            if (timer) {
              clearTimeout(timer);
            }

            if (
              script.parentNode
            ) {
              script.parentNode
                .removeChild(script);
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[
                callbackName
              ] = undefined;
            }
          }

          window[callbackName] =
            function (json) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              if (
                !json ||
                json.success !== true
              ) {
                const message =
                  json &&
                  json.message
                    ? json.message
                    : 'API 操作失敗';

                const code =
                  json &&
                  json.code
                    ? json.code
                    : '';

                reject(
                  new Error(
                    code
                      ? message +
                        '\n錯誤代碼：' +
                        code
                      : message
                  )
                );

                return;
              }

              resolve(json);
            };

          timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished = true;
                cleanup();

                reject(
                  new Error(
                    'API 載入逾時'
                  )
                );
              },
              30000
            );

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(params)
            .forEach(
              function (key) {
                const value =
                  params[key];

                if (
                  value === undefined ||
                  value === null
                ) {
                  return;
                }

                url +=
                  '&' +
                  encodeURIComponent(
                    key
                  ) +
                  '=' +
                  encodeURIComponent(
                    value
                  );
              }
            );

          script.charset =
            'UTF-8';

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 載入失敗'
                )
              );
            };

          script.src = url;

          document.body
            .appendChild(script);
        }
      );
    }

    async function initLineUserId() {
      if (
        typeof liff ===
        'undefined'
      ) {
        if (TEST_MODE) {
          LINE_USER_ID =
            TEST_LINE_USER_ID;

          return true;
        }

        throw new Error(
          'LIFF SDK 載入失敗'
        );
      }

      try {
        await liff.init({
          liffId:
            LIFF_ID
        });

        if (
          !liff.isLoggedIn()
        ) {
          liff.login({
            redirectUri:
              location.href
          });

          return false;
        }

        const profile =
          await liff.getProfile();

        LINE_USER_ID =
          profile.userId ||
          '';

        if (!LINE_USER_ID) {
          throw new Error(
            '無法取得房東 LINE User ID'
          );
        }

        return true;

      } catch (error) {
        if (TEST_MODE) {
          LINE_USER_ID =
            TEST_LINE_USER_ID;

          return true;
        }

        throw error;
      }
    }

    function applyFilters() {
      const keyword =
        rawText(
          document
            .getElementById(
              'searchInput'
            )
            .value
        )
          .trim()
          .toLowerCase();

      const sourceFilter =
        rawText(
          document
            .getElementById(
              'sourceFilter'
            )
            .value
        )
          .trim()
          .toLowerCase();

      const monthFilter =
        rawText(
          document
            .getElementById(
              'monthFilter'
            )
            .value
        ).trim();

      const filtered =
        ALL_PAID_BILLS.filter(
          function (bill) {
            const sourceType =
              rawText(
                bill.source_type
              )
                .trim()
                .toLowerCase();

            const billMonth =
              formatBillMonth(
                bill.bill_month
              );

            if (
              sourceFilter &&
              sourceType !==
                sourceFilter
            ) {
              return false;
            }

            if (
              monthFilter &&
              billMonth !==
                monthFilter
            ) {
              return false;
            }

            if (keyword) {
              const haystack = [
                bill.tenant_name,
                bill.room_name,
                bill.bill_id,
                bill.payment_id,
                bill.bill_month,
                bill.source_label,
                bill.bank_last5,
                bill.payment_note
              ]
                .join(' ')
                .toLowerCase();

              if (
                !haystack.includes(
                  keyword
                )
              ) {
                return false;
              }
            }

            return true;
          }
        );

      renderPaidBills(
        filtered
      );
    }

        '?tenant_id=' +
        encodeURIComponent(
          tenantId
        ) +
        '&v=' +
        Date.now();
    }

    // ==================================================
    // 撤銷已繳
    // ==================================================

    function openReversalModal(
      billId
    ) {
      const bill =
        findBillById(
          billId
        );

      if (!bill) {
        showAlert(
          '找不到指定帳單'
        );

        return;
      }

      ACTIVE_BILL_ID =
        rawText(
          billId
        ).trim();

      document
        .getElementById(
          'reversalSubtitle'
        )
        .textContent =
          (bill.tenant_name || '-') +
          '｜房號 ' +
          (bill.room_name || '-');

      document
        .getElementById(
          'reversalPreview'
        )
        .innerHTML = `
          <div class="preview-row">
            <div class="preview-label">
              帳單月份
            </div>

            <div class="preview-value">
              ${formatBillMonth(
                bill.bill_month
              )}
            </div>
          </div>

          <div class="preview-row">
            <div class="preview-label">
              已繳金額
            </div>

            <div class="preview-value">
              ${money(
                bill.payment_amount ||
                bill.total_amount
              )}
            </div>
          </div>

          <div class="preview-row">
            <div class="preview-label">
              付款來源
            </div>

            <div class="preview-value">
              ${safeText(
                bill.source_label
              )}
            </div>
          </div>

          <div class="preview-row">
            <div class="preview-label">
              付款 ID
            </div>

            <div class="preview-value">
              ${safeText(
                bill.payment_id
              )}
            </div>
          </div>

          <div class="preview-row">
            <div class="preview-label">
              帳單 ID
            </div>

            <div class="preview-value">
              ${safeText(
                bill.bill_id
              )}
            </div>
          </div>
        `;

      document
        .getElementById(
          'reversalReason'
        )
        .value = '';

      document
        .getElementById(
          'notifyTenant'
        )
        .checked = true;

      updateReversalCount();

      document
        .getElementById(
          'reversalModal'
        )
        .classList
        .add('show');

      document.body
        .classList
        .add('modal-open');
    }

    function closeReversalModal() {
      document
        .getElementById(
          'reversalModal'
        )
        .classList
        .remove('show');

      document.body
        .classList
        .remove('modal-open');

      ACTIVE_BILL_ID = '';
    }

    async function submitReversal() {
      const bill =
        findBillById(
          ACTIVE_BILL_ID
        );

      if (!bill) {
        showAlert(
          '找不到指定帳單'
        );

        return;
      }

      const reason =
        document
          .getElementById(
            'reversalReason'
          )
          .value
          .trim();

      const notifyTenant =
        document
          .getElementById(
            'notifyTenant'
          )
          .checked;

      if (!reason) {
        showAlert(
          '請輸入撤銷原因'
        );

        return;
      }

      if (
        reason.length < 3
      ) {
        showAlert(
          '撤銷原因至少需要 3 個字'
        );

        return;
      }

      if (
        reason.length > 300
      ) {
        showAlert(
          '撤銷原因最多 300 字'
        );

        return;
      }

      const button =
        document.getElementById(
          'submitReversalBtn'
        );

      try {
        button.disabled = true;
        button.textContent =
          '撤銷處理中...';

        const response =
          await callApi(
            'landlord_bill_reopen',
            {
              bill_id:
                bill.bill_id,

              reversal_reason:
                reason,

              notify_tenant:
                notifyTenant
                  ? 'true'
                  : 'false'
            }
          );

        const result =
          response.data ||
          {};

        closeReversalModal();

        let message =
          response.message ||
          '帳單已恢復為未繳';

        if (
          result.reversal_id
        ) {
          message +=
            '\n\n撤銷紀錄：' +
            result.reversal_id;
        }

        if (
          result
            .voided_payment_count !==
          undefined
        ) {
          message +=
            '\n作廢付款紀錄：' +
            result
              .voided_payment_count +
            ' 筆';
        }

        if (
          result
            .voided_report_count !==
          undefined
        ) {
          message +=
            '\n作廢付款回報：' +
            result
              .voided_report_count +
            ' 筆';
        }

        if (
          result.legacy_sync
        ) {
          message +=
            '\nV1 每月帳單：' +
            (
              result
                .legacy_sync
                .monthly
                .status ||
              '未回傳'
            );

          message +=
            '\nV1 歷史帳單：' +
            (
              result
                .legacy_sync
                .history
                .status ||
              '未回傳'
            );
        }

        showAlert(
          message,
          function () {
            setTimeout(
              loadPage,
              1000
            );
          }
        );

      } catch (error) {
        showAlert(
          error.message ||
          String(error)
        );

      } finally {
        button.disabled = false;
        button.textContent =
          '確認撤銷';
      }
    }

    // ==================================================
    // 提示視窗
    // ==================================================

    function showAlert(
      message,
      callback
    ) {
      ALERT_CALLBACK =
        typeof callback ===
        'function'
          ? callback
          : null;

      document
        .getElementById(
          'alertMessage'
        )
        .textContent =
          message || '';

      document
        .getElementById(
          'alertModal'
        )
        .classList
        .add('show');
    }

    function closeAlertModal() {
      document
        .getElementById(
          'alertModal'
        )
        .classList
        .remove('show');

      const callback =
        ALERT_CALLBACK;

      ALERT_CALLBACK = null;

      if (callback) {
        callback();
      }
    }

    document
      .getElementById(
        'reversalModal'
      )
      .addEventListener(
        'click',
        function (event) {
          if (
            event.target === this
          ) {
            closeReversalModal();
          }
        }
      );

    document
      .getElementById(
        'alertModal'
      )
      .addEventListener(
        'click',
        function (event) {
          if (
            event.target === this
          ) {
            closeAlertModal();
          }
        }
      );

    // ==================================================
    // 載入
    // ==================================================

    async function loadPage() {
      try {
        app.className =
          'loading';

        app.innerHTML =
          '資料載入中...';

        const response =
          await callApi(
            'landlord_paid_bills_init'
          );

        renderPage(
          response.data ||
          {}
        );

      } catch (error) {
        renderError(
          error.message ||
          String(error)
        );
      }
    }

    async function main() {
      try {
        const ready =
          await initLineUserId();

        if (!ready) {
          return;
        }

        await loadPage();

      } catch (error) {
        renderError(
          error.message ||
          String(error)
        );
      }
    }

    main();
  </script>
</body>
</html>
