<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs 通知中心</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 68px;
      --primary: #06c755;
      --primary-soft: #edf9f2;
      --purple: #7654c4;
      --purple-soft: #f3efff;
      --blue: #1a73e8;
      --blue-soft: #edf4ff;
      --orange: #ef8f00;
      --orange-soft: #fff5df;
      --danger: #d93025;
      --danger-soft: #fff0ef;
      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;
      --shadow: 0 10px 34px rgba(25, 35, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    select {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 650px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(
          circle at 100% 0%,
          rgba(118, 84, 196, 0.10),
          transparent 28%
        ),
        var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(16px, env(safe-area-inset-top))
        15px
        calc(
          var(--nav-height) +
          22px +
          env(safe-area-inset-bottom)
        );
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .eyebrow {
      color: var(--purple);
      font-size: 10px;
      font-weight: 900;
    }

    .page-title {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.35px;
    }

    .refresh-button {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #ffffff;
      color: #5f6670;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #6040b0 0%,
          #7654c4 58%,
          #513394 100%
        );
    }

    .hero::after {
      position: absolute;
      top: -65px;
      right: -45px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.13);
      content: "";
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 9px;
      font-weight: 900;
    }

    .workspace-name {
      margin-top: 5px;
      font-size: 21px;
      font-weight: 900;
    }

    .hero-desc {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 10px;
      line-height: 1.65;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-top: 15px;
    }

    .summary-item {
      min-width: 0;
      padding: 9px 7px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.1);
    }

    .summary-label {
      overflow: hidden;
      color: rgba(255, 255, 255, 0.72);
      font-size: 7px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-value {
      margin-top: 4px;
      font-size: 16px;
      font-weight: 900;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      padding: 12px;
    }

    .filter-select {
      min-width: 0;
      height: 40px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      background: #ffffff;
      color: var(--text);
      font-size: 9px;
      font-weight: 800;
    }

    .mark-all-button {
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--purple);
      border-radius: 10px;
      background: var(--purple-soft);
      color: var(--purple);
      font-size: 9px;
      font-weight: 900;
      cursor: pointer;
    }

    .mark-all-button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 9px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 900;
    }

    .section-count {
      color: var(--muted);
      font-size: 10px;
    }

    .notification-card {
      position: relative;
      overflow: hidden;
      padding: 14px;
    }

    .notification-card.unread {
      border-color: rgba(118, 84, 196, 0.34);
      background:
        linear-gradient(
          90deg,
          rgba(118, 84, 196, 0.06),
          #ffffff 28%
        );
    }

    .unread-dot {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--purple);
      box-shadow: 0 0 0 4px rgba(118, 84, 196, 0.10);
    }

    .notification-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 11px;
      padding-right: 16px;
    }

    .notification-main {
      min-width: 0;
      flex: 1;
    }

    .title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .notification-title {
      font-size: 13px;
      font-weight: 900;
    }

    .notification-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 8px;
      line-height: 1.55;
    }

    .badge {
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 900;
    }

    .badge.payment,
    .badge.billing {
      background: var(--primary-soft);
      color: #079641;
    }

    .badge.contract,
    .badge.announcement {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .badge.message,
    .badge.checkin {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge.overdue {
      background: var(--orange-soft);
      color: #9b6200;
    }

    .badge.system {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.sent {
      background: var(--primary-soft);
      color: #079641;
    }

    .badge.partial,
    .badge.stored_only,
    .badge.stored {
      background: var(--orange-soft);
      color: #9b6200;
    }

    .badge.failed {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .notification-body {
      margin-top: 11px;
      padding: 10px 11px;
      border-radius: 10px;
      background: var(--surface-soft);
      color: #4f5660;
      font-size: 9px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .delivery-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-top: 11px;
    }

    .delivery-item {
      min-width: 0;
      padding: 8px;
      border-radius: 9px;
      background: var(--surface-soft);
    }

    .delivery-label {
      color: var(--muted);
      font-size: 7px;
    }

    .delivery-value {
      margin-top: 3px;
      font-size: 11px;
      font-weight: 900;
    }

    .notification-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 11px;
      padding-top: 11px;
      border-top: 1px solid var(--border);
    }

    .action-button {
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      color: var(--text);
      font-size: 9px;
      font-weight: 900;
      cursor: pointer;
    }

    .action-button.primary {
      border-color: var(--purple);
      background: var(--purple);
      color: #ffffff;
    }

    .action-button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .loading-card,
    .error-card,
    .empty-card {
      padding: 30px 18px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      text-align: center;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 14px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-title,
    .error-title {
      margin-bottom: 7px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .retry-button {
      width: 100%;
      min-height: 44px;
      margin-top: 15px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .toast {
      position: absolute;
      z-index: 2600;
      right: 16px;
      bottom:
        calc(
          var(--nav-height) +
          18px +
          env(safe-area-inset-bottom)
        );
      left: 16px;
      max-width: 470px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 13px;
      background: #22252a;
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      line-height: 1.55;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition:
        opacity 0.18s ease,
        transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--danger);
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    @media (max-width: 520px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .mark-all-button {
        grid-column: 1 / -1;
      }

      .delivery-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="topbar">
        <div>
          <div class="eyebrow">Workspace Notifications</div>
          <div class="page-title">通知中心</div>
        </div>

        <button
          class="refresh-button"
          type="button"
          onclick="loadPage()"
        >
          ↻
        </button>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">通知載入中</div>
          正在讀取管理團隊事件與 LINE 送達結果。
        </section>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(
        location.search
      );

    const TEST_MODE =
      URL_PARAMS.get('test') ===
      '1';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let toastTimer = null;
    let processing = false;

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      return value === undefined || value === null
        ? ''
        : String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function inputValue(id) {
      const element =
        document.getElementById(
          id
        );

      return element
        ? rawText(
            element.value
          ).trim()
        : '';
    }

    function goPage(page) {
      const separator =
        page.indexOf('?') >= 0
          ? '&'
          : '?';

      location.href =
        page +
        separator +
        'v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        );
    }

    function openAction(url) {
      url =
        rawText(
          url
        ).trim();

      if (!url) {
        return;
      }

      const target =
        new URL(
          url,
          location.href
        );

      target.searchParams.set(
        'v',
        Date.now()
      );

      if (TEST_MODE) {
        target.searchParams.set(
          'test',
          '1'
        );
      }

      location.href =
        target.href;
    }

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

      entryUrl.searchParams.set(
        'return_to',
        returnTo
      );

      return entryUrl.href;
    }

    async function initLine() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      await liff.init({
        liffId:
          LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            buildLandlordLoginRedirectUri()
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId ||
        '';

      return true;
    }

    function showToast(
      message,
      isError
    ) {
      const toast =
        document.getElementById(
          'toast'
        );

      clearTimeout(
        toastTimer
      );

      toast.textContent =
        message ||
        '';

      toast.className =
        isError
          ? 'toast error show'
          : 'toast show';

      toastTimer =
        setTimeout(
          function () {
            toast.className =
              'toast';
          },
          3200
        );
    }

    function jsonpRequest(
      action,
      params,
      retryCount
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_notifications_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished =
            false;

          const timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished =
                  true;

                cleanup();

                if (
                  Number(
                    retryCount ||
                    0
                  ) <
                  1
                ) {
                  jsonpRequest(
                    action,
                    params,
                    1
                  ).then(
                    resolve
                  ).catch(
                    reject
                  );

                  return;
                }

                reject(
                  new Error(
                    'API 載入逾時，請確認通知中心後端已部署。'
                  )
                );
              },
              45000
            );

          function cleanup() {
            clearTimeout(
              timer
            );

            if (
              script.parentNode
            ) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[
                callbackName
              ] =
                undefined;
            }
          }

          window[
            callbackName
          ] =
            function (result) {
              if (finished) {
                return;
              }

              finished =
                true;

              cleanup();

              resolve(
                result
              );
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params ||
            {}
          ).forEach(
            function (key) {
              url +=
                '&' +
                encodeURIComponent(
                  key
                ) +
                '=' +
                encodeURIComponent(
                  params[
                    key
                  ]
                );
            }
          );

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished =
                true;

              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗'
                )
              );
            };

          script.src =
            url;

          document.body.appendChild(
            script
          );
        }
      );
    }

    function renderPage() {
      const workspace =
        PAGE_DATA.workspace ||
        {};

      const summary =
        PAGE_DATA.summary ||
        {};

      const items =
        PAGE_DATA.notifications ||
        [];

      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card hero">
          <div class="hero-content">
            <div class="hero-label">目前管理團隊</div>

            <div class="workspace-name">
              ${safeHtml(
                workspace.workspace_name ||
                '-'
              )}
            </div>

            <div class="hero-desc">
              集中查看付款、租約、房客訊息與系統事件，並追蹤團隊 LINE 送達結果。
            </div>

            <div class="summary-grid">
              ${summaryItem('全部通知', summary.total_count)}
              ${summaryItem('未讀', summary.unread_count)}
              ${summaryItem('已送達', summary.sent_count)}
              ${summaryItem('送達異常', summary.issue_count)}
            </div>
          </div>
        </section>

        <section class="card toolbar">
          <select
            id="statusFilter"
            class="filter-select"
            onchange="loadPage(false)"
          >
            ${statusOption('all', '全部狀態')}
            ${statusOption('unread', '只看未讀')}
            ${statusOption('failed', '送達異常')}
          </select>

          <select
            id="eventFilter"
            class="filter-select"
            onchange="loadPage(false)"
          >
            ${
              (
                PAGE_DATA.event_options ||
                []
              ).map(
                function (option) {
                  return `
                    <option
                      value="${safeHtml(option.value)}"
                      ${
                        option.value ===
                        PAGE_DATA.event_filter
                          ? 'selected'
                          : ''
                      }
                    >
                      ${safeHtml(option.label)}
                    </option>
                  `;
                }
              ).join('')
            }
          </select>

          <button
            class="mark-all-button"
            type="button"
            onclick="markAllRead()"
            ${
              Number(
                summary.unread_count ||
                0
              ) >
              0
                ? ''
                : 'disabled'
            }
          >
            全部標示已讀
          </button>
        </section>

        <div class="section-head">
          <div class="section-title">通知紀錄</div>
          <div class="section-count">${items.length} 筆</div>
        </div>

        ${
          items.length
            ? items.map(
                notificationCard
              ).join('')
            : `
              <section class="card empty-card">
                目前沒有符合條件的通知。
              </section>
            `
        }
      `;
    }

    function summaryItem(
      label,
      value
    ) {
      return `
        <div class="summary-item">
          <div class="summary-label">
            ${safeHtml(label)}
          </div>

          <div class="summary-value">
            ${Number(value || 0)}
          </div>
        </div>
      `;
    }

    function statusOption(
      value,
      label
    ) {
      return `
        <option
          value="${safeHtml(value)}"
          ${
            value ===
            PAGE_DATA.status_filter
              ? 'selected'
              : ''
          }
        >
          ${safeHtml(label)}
        </option>
      `;
    }

    function notificationCard(
      item
    ) {
      const unread =
        item.read_status !==
        'read';

      return `
        <section
          class="card notification-card ${unread ? 'unread' : ''}"
        >
          ${unread ? '<span class="unread-dot"></span>' : ''}

          <div class="notification-head">
            <div class="notification-main">
              <div class="title-row">
                <span class="notification-title">
                  ${safeHtml(item.event_title || '-')}
                </span>

                <span class="badge ${safeHtml(item.category)}">
                  ${safeHtml(item.event_label)}
                </span>

                <span class="badge ${safeHtml(item.status)}">
                  ${safeHtml(item.status_label)}
                </span>
              </div>

              <div class="notification-meta">
                ${safeHtml(item.created_at || '-')}
                ・
                ${unread ? '未讀' : '已讀'}
                ${
                  item.preference_enabled ===
                  false
                    ? '・此類 LINE 通知已關閉'
                    : ''
                }
              </div>
            </div>
          </div>

          <div class="notification-body">
            ${safeHtml(item.event_body || '')}
          </div>

          <div class="delivery-grid">
            ${deliveryItem('收件人', item.recipient_count)}
            ${deliveryItem('已送達', item.sent_count)}
            ${deliveryItem('失敗', item.failed_count)}
            ${deliveryItem('略過', item.skipped_count)}
          </div>

          <div class="notification-actions">
            <button
              class="action-button"
              type="button"
              onclick="markRead('${safeHtml(item.notification_id)}')"
              ${unread ? '' : 'disabled'}
            >
              ${unread ? '標示已讀' : '已讀'}
            </button>

            <button
              class="action-button primary"
              type="button"
              onclick="openAction('${safeHtml(item.action_url)}')"
              ${item.action_url ? '' : 'disabled'}
            >
              查看事件
            </button>
          </div>
        </section>
      `;
    }

    function deliveryItem(
      label,
      value
    ) {
      return `
        <div class="delivery-item">
          <div class="delivery-label">
            ${safeHtml(label)}
          </div>

          <div class="delivery-value">
            ${Number(value || 0)}
          </div>
        </div>
      `;
    }

    async function markRead(
      notificationId
    ) {
      if (processing) {
        return;
      }

      processing =
        true;

      try {
        const result =
          await jsonpRequest(
            'landlord_notification_mark_read',
            {
              notification_id:
                notificationId
            }
          );

        if (
          !result ||
          result.success !==
          true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '通知已讀更新失敗'
          );
        }

        showToast(
          result.message ||
          '通知已標示為已讀'
        );

        await loadPage(
          false
        );

      } catch (error) {
        showToast(
          error &&
          error.message
            ? error.message
            : '通知已讀更新失敗',
          true
        );

      } finally {
        processing =
          false;
      }
    }

    async function markAllRead() {
      if (processing) {
        return;
      }

      processing =
        true;

      try {
        const result =
          await jsonpRequest(
            'landlord_notifications_mark_all_read',
            {}
          );

        if (
          !result ||
          result.success !==
          true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '全部已讀更新失敗'
          );
        }

        showToast(
          result.message ||
          '全部通知已標示為已讀'
        );

        await loadPage(
          false
        );

      } catch (error) {
        showToast(
          error &&
          error.message
            ? error.message
            : '全部已讀更新失敗',
          true
        );

      } finally {
        processing =
          false;
      }
    }

    function renderLoading() {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">通知載入中</div>
          正在讀取管理團隊事件與 LINE 送達結果。
        </section>
      `;
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">
            通知中心載入失敗
          </div>

          ${safeHtml(
            message ||
            '未知錯誤'
          )}

          <button
            class="retry-button"
            type="button"
            onclick="loadPage()"
          >
            重新整理
          </button>
        </section>
      `;
    }

    async function loadPage(
      showLoading
    ) {
      const statusFilter =
        inputValue(
          'statusFilter'
        ) ||
        (
          PAGE_DATA
            ? PAGE_DATA.status_filter
            : 'all'
        );

      const eventFilter =
        inputValue(
          'eventFilter'
        ) ||
        (
          PAGE_DATA
            ? PAGE_DATA.event_filter
            : 'all'
        );

      if (
        showLoading !==
        false
      ) {
        renderLoading();
      }

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLine();

          if (!ready) {
            return;
          }
        }

        const result =
          await jsonpRequest(
            'landlord_notifications_init',
            {
              status_filter:
                statusFilter,

              event_filter:
                eventFilter
            }
          );

        if (
          !result ||
          result.success !==
          true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '通知中心載入失敗'
          );
        }

        PAGE_DATA =
          result.data ||
          {};

        renderPage();

      } catch (error) {
        renderError(
          error &&
          error.message
            ? error.message
            : String(
                error
              )
        );
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    if (
      window.visualViewport
    ) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
