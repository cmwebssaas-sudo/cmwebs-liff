<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>CMWebs 付款回報管理</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --nav-height: 64px;
      --primary: #06c755;
      --primary-dark: #05a847;
      --background: #f5f7fb;
      --surface: #ffffff;
      --text: #222222;
      --muted: #70757d;
      --border: #e8ebef;
      --danger: #d93025;
      --danger-soft: #ffe8e6;
      --warning: #9a6b00;
      --warning-soft: #fff4d7;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
      --purple: #7e57c2;
      --purple-soft: #f0eaff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--background);
      color: var(--text);
      font-family: Arial, "Noto Sans TC", sans-serif;
    }

    body.modal-open {
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: 100vh;
      height: 100dvh;
      margin: 0 auto;
      overflow: hidden;
      background: var(--background);
    }

    .page {
      width: 100%;
      height: 100%;
      padding:
        18px
        16px
        calc(
          var(--nav-height) +
          30px +
          env(safe-area-inset-bottom)
        );

      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    .page-header {
      margin-bottom: 16px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .card {
      padding: 17px;
      margin-bottom: 14px;
      border: 1px solid rgba(232, 235, 239, 0.8);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
    }

    .section-title {
      margin-bottom: 12px;
      font-size: 17px;
      font-weight: 900;
    }

    .landlord-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      display: flex;
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #e8f7ee;
      color: var(--primary);
      font-size: 19px;
      font-weight: 900;
    }

    .landlord-name {
      font-size: 16px;
      font-weight: 900;
    }

    .landlord-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .summary-item {
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #fafbfc;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
    }

    .summary-value {
      margin-top: 5px;
      font-size: 23px;
      font-weight: 900;
    }

    .summary-item.total .summary-value {
      color: var(--blue);
    }

    .summary-item.pending .summary-value {
      color: var(--warning);
    }

    .summary-item.confirmed .summary-value {
      color: #188038;
    }

    .summary-item.rejected .summary-value {
      color: var(--danger);
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .search-input,
    .filter-select {
      width: 100%;
      min-height: 44px;
      padding: 11px 13px;
      border: 1px solid #dfe3e8;
      border-radius: 12px;
      outline: none;
      background: #ffffff;
      color: #222222;
      font-size: 14px;
    }

    .search-input:focus,
    .filter-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.12);
    }

    .report-card {
      position: relative;
      padding: 17px;
      margin-bottom: 13px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.05);
    }

    .report-card::before {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 4px;
      content: "";
      background: #a0a4aa;
    }

    .report-card.pending::before {
      background: #f9ab00;
    }

    .report-card.confirmed::before {
      background: #188038;
    }

    .report-card.rejected::before {
      background: var(--danger);
    }

    .report-card.voided::before {
      background: var(--purple);
    }

    .report-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .tenant-block {
      min-width: 0;
    }

    .tenant-name {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.45;
      word-break: break-word;
    }

    .room-name {
      margin-left: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .report-time {
      flex: 0 0 auto;
      color: #92979e;
      font-size: 11px;
      line-height: 1.5;
      text-align: right;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .badge {
      display: inline-flex;
      min-height: 24px;
      padding: 4px 8px;
      align-items: center;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .badge-yellow {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .badge-green {
      background: #e8f7ee;
      color: #10893e;
    }

    .badge-red {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge-blue {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge-purple {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .badge-gray {
      background: #f1f3f5;
      color: #666666;
    }

    .amount-box {
      padding: 15px;
      margin-top: 14px;
      border-radius: 13px;
      background: #f7f8fa;
    }

    .amount-label {
      color: var(--muted);
      font-size: 12px;
    }

    .amount-value {
      margin-top: 5px;
      color: var(--danger);
      font-size: 26px;
      font-weight: 900;
    }

    .detail-list {
      margin-top: 12px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid #eeeeee;
      font-size: 13px;
      line-height: 1.55;
    }

    .detail-row:first-child {
      border-top: none;
    }

    .detail-label {
      flex: 0 0 auto;
      color: var(--muted);
    }

    .detail-value {
      min-width: 0;
      font-weight: 800;
      text-align: right;
      word-break: break-word;
    }

    .last5-value {
      color: var(--blue);
      font-size: 18px;
      letter-spacing: 3px;
    }

    .payment-id {
      color: #188038;
      font-size: 11px;
    }

    .reason-box,
    .note-box,
    .void-box,
    .warning-box {
      padding: 12px 13px;
      margin-top: 11px;
      border-radius: 11px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .reason-box {
      border: 1px solid #f2cbc7;
      background: #fff5f4;
      color: #9d2e25;
    }

    .note-box {
      border: 1px solid #dde2e7;
      background: #f7f8fa;
      color: #555555;
    }

    .void-box {
      border: 1px solid #dacdf3;
      background: #f7f3ff;
      color: #6945a5;
    }

    .warning-box {
      border: 1px solid #f0dda6;
      background: #fffaf0;
      color: #7e5b00;
    }

    .box-title {
      margin-bottom: 5px;
      font-weight: 900;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 14px;
    }

    .btn {
      width: 100%;
      min-height: 44px;
      padding: 11px 13px;
      border: 0;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn:active {
      opacity: 0.72;
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-black {
      background: #222222;
      color: #ffffff;
    }

    .btn-light {
      background: #eef1f5;
      color: #333333;
    }

    .btn-green-soft {
      background: #e8f7ee;
      color: #10893e;
    }

    .btn-red-soft {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .btn-purple-soft {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .full-action {
      grid-column: 1 / -1;
    }

    .page-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .loading,
    .empty {
      padding: 42px 20px;
      color: var(--muted);
      text-align: center;
    }

    .empty-icon {
      margin-bottom: 10px;
      font-size: 36px;
    }

    .empty-title {
      color: #444444;
      font-size: 17px;
      font-weight: 900;
    }

    .empty-desc {
      margin-top: 7px;
      font-size: 13px;
      line-height: 1.65;
    }

    .error-title {
      margin-bottom: 8px;
      color: var(--danger);
      font-size: 19px;
      font-weight: 900;
    }

    .error-text {
      color: #555555;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    /* ==================================================
       共用底部 Modal
       ================================================== */

    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      background: rgba(0, 0, 0, 0.48);
    }

    .modal-mask.show {
      display: flex;
    }

    .modal-sheet {
      width: 100%;
      max-width: 560px;
      max-height: 94vh;
      max-height: 94dvh;

      padding:
        18px
        18px
        calc(18px + env(safe-area-inset-bottom));

      overflow-y: auto;
      overscroll-behavior: contain;
      border-radius: 22px 22px 0 0;
      background: #ffffff;
      box-shadow: 0 -12px 36px rgba(0, 0, 0, 0.22);
    }

    .modal-handle {
      width: 40px;
      height: 5px;
      margin: 0 auto 15px;
      border-radius: 999px;
      background: #d9dde2;
    }

    .modal-title {
      font-size: 21px;
      font-weight: 900;
    }

    .modal-title.danger {
      color: var(--danger);
    }

    .modal-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .modal-preview {
      padding: 13px;
      margin-top: 14px;
      border-radius: 13px;
      background: #f7f8fa;
    }

    .preview-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid #e8ebef;
      font-size: 13px;
      line-height: 1.5;
    }

    .preview-row:first-child {
      border-top: none;
    }

    .preview-label {
      color: var(--muted);
    }

    .preview-value {
      font-weight: 900;
      text-align: right;
      word-break: break-word;
    }

    .decision-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .decision-option {
      position: relative;
    }

    .decision-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .decision-label {
      display: block;
      padding: 13px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      color: #555555;
      font-size: 14px;
      font-weight: 900;
      text-align: center;
      cursor: pointer;
    }

    .decision-option.confirmed input:checked + .decision-label {
      border-color: var(--primary);
      background: #f2fff7;
      color: #10893e;
    }

    .decision-option.rejected input:checked + .decision-label {
      border-color: var(--danger);
      background: #fff5f4;
      color: var(--danger);
    }

    .field {
      margin-top: 16px;
    }

    .field.hidden {
      display: none;
    }

    .field-label {
      display: block;
      margin-bottom: 7px;
      color: #444444;
      font-size: 13px;
      font-weight: 900;
    }

    .required-mark {
      color: var(--danger);
    }

    .field-input,
    .field-textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #dfe3e8;
      border-radius: 12px;
      outline: none;
      background: #ffffff;
      color: #222222;
      font-size: 15px;
    }

    .field-textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.7;
    }

    .field-input:focus,
    .field-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.12);
    }

    .char-count {
      margin-top: 6px;
      color: #999999;
      font-size: 12px;
      text-align: right;
    }

    .notify-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px;
      margin-top: 16px;
      border: 1px solid #f0c5c1;
      border-radius: 12px;
      background: #fff7f6;
      cursor: pointer;
    }

    .notify-row input {
      width: 19px;
      height: 19px;
      flex: 0 0 19px;
      accent-color: var(--danger);
    }

    .notify-title {
      font-size: 14px;
      font-weight: 900;
    }

    .notify-desc {
      margin-top: 3px;
      color: #755f5d;
      font-size: 11px;
      line-height: 1.5;
    }

    .modal-warning,
    .modal-danger-warning {
      padding: 12px 13px;
      margin-top: 16px;
      border-radius: 11px;
      font-size: 12px;
      line-height: 1.7;
    }

    .modal-warning {
      border: 1px solid #f0dda6;
      background: #fffaf0;
      color: #7e5b00;
    }

    .modal-danger-warning {
      border: 1px solid #efc7c3;
      background: #fff5f4;
      color: #9d2e25;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    /* ==================================================
       提示視窗
       ================================================== */

    .alert-mask {
      position: fixed;
      inset: 0;
      z-index: 1000000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.48);
    }

    .alert-mask.show {
      display: flex;
    }

    .alert-box {
      width: 100%;
      max-width: 350px;
      padding: 22px 18px 16px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22);
      text-align: center;
    }

    .alert-title {
      margin-bottom: 10px;
      font-size: 20px;
      font-weight: 900;
    }

    .alert-message {
      margin-bottom: 18px;
      color: #555555;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ==================================================
       底部導覽列
       ================================================== */

    .bottom-nav {
      position: fixed;
      right: auto;
      bottom: 0;
      left: 50%;
      z-index: 99999;
      width: 100%;
      max-width: 560px;
      transform: translateX(-50%);
      padding-bottom: env(safe-area-inset-bottom);
      border-top: 1px solid #eceff3;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      height: var(--nav-height);
    }

    .nav-item {
      position: relative;
      display: flex;
      appearance: none;
      -webkit-appearance: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b9098;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    .nav-item:active {
      opacity: 0.65;
    }

    @media (min-width: 480px) {
      .summary-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .summary-item {
        padding: 13px 10px;
      }

      .summary-value {
        font-size: 21px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div id="app" class="loading">
        資料載入中...
      </div>
    </main>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <button
        class="nav-item"
        onclick="goPage('landlord-home.html')"
      >
        <svg viewBox="0 0 24 24">
          <path d="M4 11.5L12 5l8 6.5"></path>
          <path d="M6.5 10.5V19h11v-8.5"></path>
          <path d="M9.5 19v-5h5v5"></path>
        </svg>
        <span>首頁</span>
      </button>

      <button
        class="nav-item active"
        onclick="goPage('landlord-arrears.html')"
      >
        <svg viewBox="0 0 24 24">
          <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
          <path d="M8.5 9h7"></path>
          <path d="M8.5 13h7"></path>
          <path d="M8.5 17h4"></path>
        </svg>
        <span>帳款</span>
      </button>

      <button
        class="nav-item"
        onclick="goPage('landlord-tenants.html')"
      >
        <svg viewBox="0 0 24 24">
          <circle cx="9" cy="8" r="3"></circle>
          <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
          <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
          <path d="M16 14c2.2.4 3.5 2 4 5"></path>
        </svg>
        <span>房客</span>
      </button>

      <button
        class="nav-item"
        onclick="goPage('landlord-more.html')"
      >
        <svg viewBox="0 0 24 24">
          <circle cx="6" cy="12" r="1.5"></circle>
          <circle cx="12" cy="12" r="1.5"></circle>
          <circle cx="18" cy="12" r="1.5"></circle>
        </svg>
        <span>更多</span>
      </button>
    </div>
  </nav>

  <!-- 確認／駁回付款回報 -->
  <div id="decisionModal" class="modal-mask">
    <div class="modal-sheet">
      <div class="modal-handle"></div>

      <div class="modal-title">
        處理付款回報
      </div>

      <div
        id="decisionModalSubtitle"
        class="modal-subtitle"
      ></div>

      <div
        id="decisionPreview"
        class="modal-preview"
      ></div>

      <div class="decision-options">
        <label class="decision-option confirmed">
          <input
            type="radio"
            name="decision"
            value="confirmed"
            checked
            onchange="handleDecisionChange()"
          />

          <span class="decision-label">
            確認並銷帳
          </span>
        </label>

        <label class="decision-option rejected">
          <input
            type="radio"
            name="decision"
            value="rejected"
            onchange="handleDecisionChange()"
          />

          <span class="decision-label">
            駁回回報
          </span>
        </label>
      </div>

      <div
        id="rejectReasonField"
        class="field hidden"
      >
        <label
          class="field-label"
          for="rejectReason"
        >
          駁回原因
          <span class="required-mark">*</span>
        </label>

        <textarea
          id="rejectReason"
          class="field-textarea"
          maxlength="300"
          placeholder="例如：未查到符合的匯款紀錄，請重新確認付款日期及帳戶。"

    function goPage(filename) {

        TEST_MODE

    function rawText(value) {
      if (
        value === undefined ||
        value === null
      ) {
        return '';
      }

      return String(value);
    }

    function escapeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeText(value) {
      const text =
        rawText(value).trim();

      return text
        ? escapeHtml(text)
        : '-';
    }

    function money(value) {
      return (
        'NT$ ' +
        Math.round(
          Number(value || 0)
        ).toLocaleString('zh-TW')
      );
    }

    function getInitial(name) {
      const text =
        rawText(name).trim();

      return text
        ? text.slice(0, 1)
        : '房';
    }

    function dateFromSheetValue(value) {
      if (
        value === undefined ||
        value === null ||
        value === ''
      ) {
        return null;
      }

      if (
        typeof value === 'number' ||
        /^\d{5}(\.\d+)?$/.test(
          rawText(value).trim()
        )
      ) {
        const serial =
          Number(value);

        if (
          isFinite(serial) &&
          serial > 20000 &&
          serial < 100000
        ) {
          return new Date(
            Date.UTC(1899, 11, 30) +
            serial * 86400000
          );
        }
      }

      const text =
        rawText(value).trim();

      if (
        /^\d{4}-\d{2}$/.test(text)
      ) {
        return new Date(
          text + '-01T12:00:00+08:00'
        );
      }

      if (
        /^\d{4}[\/-]\d{1,2}[\/-]\d{1,2}$/.test(
          text
        )
      ) {
        return new Date(
          text.replace(/\//g, '-') +
          'T12:00:00+08:00'
        );
      }

      const parsed =
        new Date(text);

      return isNaN(
        parsed.getTime()
      )
        ? null
        : parsed;
    }

    function taipeiDateParts(value) {
      const date =
        dateFromSheetValue(value);

      if (!date) {
        return null;
      }

      const parts =
        new Intl.DateTimeFormat(
          'en-CA',
          {
            timeZone: 'Asia/Taipei',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
          }
        ).formatToParts(date);

      const result = {};

      parts.forEach(function (part) {
        if (part.type !== 'literal') {
          result[part.type] =
            part.value;
        }
      });

      return result;
    }

    function formatDateOnly(value) {
      const parts =
        taipeiDateParts(value);

      if (!parts) {
        return safeText(value);
      }

      return (
        parts.year +
        '-' +
        parts.month +
        '-' +
        parts.day
      );
    }

    function formatDateTime(value) {
      const date =
        dateFromSheetValue(value);

      if (!date) {
        return safeText(value);
      }

      return new Intl.DateTimeFormat(
        'zh-TW',
        {
          timeZone: 'Asia/Taipei',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        }
      ).format(date);
    }

    function formatBillMonth(value) {
      const text =
        rawText(value).trim();

      if (
        /^\d{4}-\d{2}$/.test(text)
      ) {
        return text;
      }

      const parts =
        taipeiDateParts(value);

      if (!parts) {
        return safeText(value);
      }

      return (
        parts.year +
        '-' +
        parts.month
      );
    }

    function statusText(value) {
      const status =
        rawText(value)
          .trim()
          .toLowerCase();

      const map = {
        pending: '待確認',
        payment_reported: '已回報',
        confirmed: '已確認',
        rejected: '已駁回',
        voided: '已撤銷'
      };

      return (
        map[status] ||
        safeText(value)
      );
    }

    function statusBadgeClass(value) {
      const status =
        rawText(value)
          .trim()
          .toLowerCase();

      if (
        status === 'pending' ||
        status === 'payment_reported'

      if (status === 'confirmed') {
        return 'badge badge-green';

      if (status === 'rejected') {
        return 'badge badge-red';
      }

      if (status === 'voided') {
        return 'badge badge-purple';
      }

      return 'badge badge-gray';
    }

    // ==================================================
    // JSONP API
    // ==================================================

    function callApi(action, params) {
      return new Promise(
        function (resolve, reject) {
          if (!LINE_USER_ID) {
            reject(
              new Error(
                '缺少房東 LINE User ID'
              )
            );
            return;
          }

          params = params || {};

          const callbackName =
            'cmwebsJsonp_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() * 1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;
          let timer = null;

          function cleanup() {
            if (timer) {
              clearTimeout(timer);
            }

            if (script.parentNode) {
              script.parentNode
                .removeChild(script);
            }

            try {
              delete window[callbackName];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (json) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              if (
                !json ||
                json.success !== true
              ) {
                const message =
                  json &&
                  json.message
                    ? json.message
                    : 'API 操作失敗';

                const code =
                  json &&
                  json.code
                    ? json.code
                    : '';

                reject(
                  new Error(
                    code
                      ? message +
                        '\n錯誤代碼：' +
                        code
                      : message
                  )
                );

                return;
              }

              resolve(json);
            };

          timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished = true;
                cleanup();

                reject(
                  new Error(
                    'API 載入逾時'
                  )
                );
              },
              30000
            );

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(action) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(params)
            .forEach(function (key) {
              if (
                params[key] === undefined ||
                params[key] === null
              ) {
                return;
              }

              url +=
                '&' +
                encodeURIComponent(key) +
                '=' +
                encodeURIComponent(
                  params[key]
                );
            });

          script.charset =
            'UTF-8';

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 載入失敗'
                )
              );
            };

          script.src = url;

          document.body
            .appendChild(script);
        }
      );
    }

    // ==================================================
    // LIFF
    // ==================================================

    async function initLineUserId() {
      if (
        typeof liff === 'undefined'
      ) {
        if (TEST_MODE) {
          LINE_USER_ID =
            TEST_LINE_USER_ID;
          return true;
        }

        throw new Error(
          'LIFF SDK 載入失敗'
        );
      }

      try {
        await liff.init({
          liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {
          liff.login({
            redirectUri:
              location.href
          });

          return false;
        }

        const profile =
          await liff.getProfile();

        LINE_USER_ID =
          profile.userId || '';

        if (!LINE_USER_ID) {
          throw new Error(
            '無法取得房東 LINE User ID'
          );
        }

        return true;

      } catch (error) {
        if (TEST_MODE) {
          LINE_USER_ID =
            TEST_LINE_USER_ID;
          return true;
        }

        throw error;
      }
    }

              ? `
                <div class="reason-box">
                  <div class="box-title">
                    駁回原因
                  </div>
                  ${safeText(rejectReason)}
                </div>
              `
              : ''
          }

          ${
            voidReason
              ? `
                <div class="void-box">
                  <div class="box-title">
                    撤銷原因
                  </div>
                  ${safeText(voidReason)}
                </div>
              `
              : ''
          }

          ${
            note
              ? `
                <div class="note-box">
                  <div class="box-title">
                    備註
                  </div>
                  ${safeText(note)}
                </div>
              `
              : ''
          }

          ${
            status === 'confirmed' &&
            !matchedPaymentId
              ? `
                <div class="warning-box">
                  此筆回報已標示為確認，但尚未建立正式付款紀錄。請執行「補做正式銷帳」。
                </div>
              `
              : ''
          }

          <div class="action-grid">
            ${
              item.tenant_id
                ? `
                  <button
                    class="btn btn-light"
                    data-tenant-id="${escapeHtml(
                      item.tenant_id
                    )}"
                    onclick="openTenantDetail(
                      this.dataset.tenantId
                    )"
                  >
                    查看房客
                  </button>
                `
                : `
                  <button
                    class="btn btn-light"
                    disabled
                  >
                    查看房客
                  </button>
                `
            }

            ${renderActionButtons(item)}
          </div>
        </article>
      `;
    }

    function renderReports(reports) {
      const container =
        document.getElementById(
          'reportList'
        );

      if (!container) {
        return;
      }

      if (
        !Array.isArray(reports) ||
        reports.length === 0
      ) {
        container.innerHTML = `
          <div class="card empty">
            <div class="empty-icon">
              ✓
            </div>

            <div class="empty-title">
              沒有符合條件的付款回報
            </div>

            <div class="empty-desc">
              可調整篩選條件或重新整理頁面。
            </div>
          </div>
        `;

        return;
      }

      container.innerHTML =
        reports
          .map(renderReportCard)
          .join('');
    }

    function renderPage(data) {
      PAGE_DATA =
        data || {};

      ALL_REPORTS =
        Array.isArray(
          PAGE_DATA.reports
        )
          ? PAGE_DATA.reports
          : [];

      const landlord =
        PAGE_DATA.landlord || {};

      const summary =
        PAGE_DATA.summary || {};

      app.className = '';

      app.innerHTML = `
        <header class="page-header">
          <h1 class="page-title">
            付款回報管理
          </h1>

          <div class="page-subtitle">
            確認付款、正式銷帳、駁回回報，以及撤銷誤認的已繳紀錄。
          </div>
        </header>

        <section class="card">
          <div class="landlord-row">
            <div class="avatar">
              ${safeText(
                getInitial(
                  landlord.landlord_name
                )
              )}
            </div>

            <div>
              <div class="landlord-name">
                ${safeText(
                  landlord.landlord_name
                )}
              </div>

              <div class="landlord-desc">
                共
                ${Number(
                  summary.total || 0
                )}
                筆付款回報
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="section-title">
            回報概況
          </div>

          ${renderSummary(summary)}
        </section>

        ${renderToolbar()}

        <section id="reportList"></section>

        <div class="page-actions">
          <button
            class="btn btn-light"
            onclick="goPage(
              'landlord-arrears.html'
            )"
          >
            查看欠款帳單
          </button>

          <button
            class="btn btn-black"
            onclick="loadPage()"
          >
            重新整理
          </button>
        </div>
      `;

      renderReports(
        ALL_REPORTS
      );
    }

    function applyFilters() {
      const keyword =
        rawText(
          document
            .getElementById(
              'searchInput'
            )
            .value
        )
          .trim()
          .toLowerCase();

      const statusFilter =
        rawText(
          document
            .getElementById(
              'statusFilter'
            )
            .value
        )
          .trim()
          .toLowerCase();

      const monthFilter =
        rawText(
          document
            .getElementById(
              'monthFilter'
            )
            .value
        ).trim();

      const filtered =
        ALL_REPORTS.filter(
          function (item) {
            const status =
              rawText(
                item.status
              )
                .trim()
                .toLowerCase();

            const billMonth =
              rawText(
                item.bill_month
              ).trim();

            if (
              statusFilter &&
              status !== statusFilter
            ) {
              return false;
            }

            if (
              monthFilter &&
              billMonth !== monthFilter
            ) {
              return false;
            }

            if (keyword) {
              const haystack = [
                item.tenant_name,
                item.room_name,
                item.bill_id,
                item.bill_month,
                item.reported_last5,
                item.report_id,
                item.matched_payment_id,
                item.reject_reason,
                item.void_reason,
                item.note,
                statusText(item.status)
              ]
                .join(' ')
                .toLowerCase();

              if (
                !haystack.includes(keyword)
              ) {
                return false;
              }
            }

            return true;
          }
        );

      renderReports(filtered);
    }

    function renderError(message) {
      app.className = '';

      app.innerHTML = `
        <div class="card">
          <div class="error-title">
            資料讀取失敗
          </div>

          <div class="error-text">
            ${safeText(message)}
          </div>

          <div class="page-actions">
            <button
              class="btn btn-black"
              onclick="loadPage()"
            >
              重新整理
            </button>

            <button
              class="btn btn-primary"
              onclick="goPage(
                'landlord-home.html'
              )"
            >
              返回首頁
            </button>
          </div>
        </div>
      `;
    }

    function findReportById(reportId) {
      return (
        ALL_REPORTS.find(
          function (item) {
            return (
              rawText(
                item.report_id
              ).trim() ===
              rawText(
                reportId
              ).trim()
            );
          }
        ) ||
        null
      );
    }

    function openTenantDetail(tenantId) {
      tenantId =
        rawText(tenantId).trim();

      if (!tenantId) {
        showAlert(
          '缺少房客 ID'
        );
        return;
      }

      location.href =
        'landlord-tenant-detail.html' +
        '?tenant_id=' +
        encodeURIComponent(tenantId) +
        '&v=' +
        Date.now();
    }

    // ==================================================
    // 確認／駁回付款回報
    // ==================================================

    function openDecisionModal(reportId) {
      const item =
        findReportById(reportId);

      if (!item) {
        showAlert(
          '找不到指定付款回報'
        );
        return;
      }

      ACTIVE_REPORT_ID =
        rawText(reportId).trim();

      document
        .getElementById(
          'decisionModalSubtitle'
        )
        .textContent =
          (item.tenant_name || '-') +
          '｜房號 ' +
          (item.room_name || '-');

      document
        .getElementById(
          'decisionPreview'
        )
        .innerHTML = `
          <div class="preview-row">
            <div class="preview-label">
              帳單月份
            </div>

            <div class="preview-value">
              ${formatBillMonth(
                item.bill_month
              )}
            </div>
          </div>

          <div class="preview-row">
            <div class="preview-label">
              回報金額
            </div>

            <div class="preview-value">
              ${money(
                item.reported_amount
              )}
            </div>
          </div>

          <div class="preview-row">
            <div class="preview-label">
              匯款後 5 碼
            </div>

            <div class="preview-value">
              ${safeText(
                item.reported_last5
              )}
            </div>
          </div>

          <div class="preview-row">
            <div class="preview-label">
              付款日期
            </div>

            <div class="preview-value">
              ${formatDateOnly(
                item.reported_paid_date
              )}
            </div>
          </div>
        `;

      const confirmedInput =
        document.querySelector(
          'input[name="decision"][value="confirmed"]'
        );

      if (confirmedInput) {
        confirmedInput.checked = true;
      }

      document
        .getElementById(
          'rejectReason'
        )
        .value = '';

      document
        .getElementById(
          'landlordNote'
        )
        .value = '';

      updateRejectCount();
      updateNoteCount();
      handleDecisionChange();

      document
        .getElementById(
          'decisionModal'
        )
        .classList
        .add('show');

      document.body
        .classList
        .add('modal-open');
    }

    function closeDecisionModal() {
      document
        .getElementById(
          'decisionModal'
        )
        .classList
        .remove('show');

      document.body
        .classList
        .remove('modal-open');

      ACTIVE_REPORT_ID = '';
    }

    function handleDecisionChange() {
      const decision =
        getSelectedDecision();

      const rejectField =
        document.getElementById(
          'rejectReasonField'
        );

      const button =
        document.getElementById(
          'saveDecisionBtn'
        );

      if (decision === 'rejected') {
        rejectField
          .classList
          .remove('hidden');

        button.className =
          'btn btn-red-soft';

        button.textContent =
          '確認駁回';
      } else {
        rejectField
          .classList
          .add('hidden');

        button.className =
          'btn btn-primary';

        button.textContent =
          '確認付款並銷帳';
      }
    }

    async function submitDecision() {
      if (!ACTIVE_REPORT_ID) {
        showAlert(
          '缺少付款回報 ID'
        );
        return;
      }

      const decision =
        getSelectedDecision();

      const rejectReason =
        document
          .getElementById(
            'rejectReason'
          )
          .value
          .trim();

      const landlordNote =
        document
          .getElementById(
            'landlordNote'
          )
          .value
          .trim();

      if (
        decision === 'rejected' &&
        !rejectReason
      ) {
        showAlert(
          '駁回時請輸入駁回原因'
        );
        return;
      }

      const button =
        document.getElementById(
          'saveDecisionBtn'
        );

      try {
        button.disabled = true;
        button.textContent =
          '處理中...';

        let response;

        if (decision === 'confirmed') {
          response =
            await callApi(
              'landlord_payment_report_settle',
              {
                report_id:
                  ACTIVE_REPORT_ID,

                landlord_note:
                  landlordNote
              }
            );
        } else {
          response =
            await callApi(
              'landlord_payment_report_update',
              {
                report_id:
                  ACTIVE_REPORT_ID,

                decision:
                  'rejected',

                reject_reason:
                  rejectReason,

                landlord_note:
                  landlordNote
              }
            );
        }

        closeDecisionModal();

        const result =
          response.data || {};

        let message =
          response.message ||
          '付款回報處理完成';

        if (
          result.payment_id
        ) {
          message +=
            '\n\n付款紀錄：' +
            result.payment_id;
        }

        if (
          result.legacy_sync
        ) {
          message +=
            '\nV1 每月帳單：' +
            (
              result
                .legacy_sync
                .monthly
                .status ||
              '未回傳'
            );

          message +=
            '\nV1 歷史帳單：' +
            (
              result
                .legacy_sync
                .history
                .status ||
              '未回傳'
            );
        }

        showAlert(
          message,
          function () {
            setTimeout(
              loadPage,
              1000
            );
          }
        );

      } catch (error) {
        showAlert(
          error.message ||
          String(error)
        );

      } finally {
        button.disabled = false;
        handleDecisionChange();
      }
    }

    function quickConfirm(reportId) {
      const item =
        findReportById(reportId);

      if (!item) {
        showAlert(
          '找不到指定付款回報'
        );
        return;
      }

      openDecisionModal(reportId);

      document
        .getElementById(
          'landlordNote'
        )
        .value =
          '房東已確認入帳';

      updateNoteCount();
    }

    async function settleConfirmedLegacyReport(
      reportId
    ) {
      const item =
        findReportById(reportId);

      if (!item) {
        showAlert(
          '找不到指定付款回報'
        );
        return;
      }

      try {
        const response =
          await callApi(
            'landlord_payment_report_settle',
            {
              report_id:
                reportId,

              landlord_note:
                '補做正式付款銷帳'
            }
          );

        const result =
          response.data || {};

        let message =
          response.message ||
          '正式銷帳完成';

        if (result.payment_id) {
          message +=
            '\n\n付款紀錄：' +
            result.payment_id;
        }

        showAlert(
          message,
          function () {
            setTimeout(
              loadPage,
              1000
            );
          }
        );

      } catch (error) {
        showAlert(
          error.message ||
          String(error)
        );
      }
    }

    // ==================================================
    // 撤銷已繳／恢復欠款
    // ==================================================

    function openReversalModal(reportId) {
      const item =
        findReportById(reportId);

      if (!item) {
        showAlert(
          '找不到指定付款回報'
        );
        return;
      }

      if (!item.bill_id) {
        showAlert(
          '此付款回報缺少帳單 ID'
        );
        return;
      }

      if (!item.matched_payment_id) {
        showAlert(
          '此付款回報尚未建立正式付款紀錄，不能執行撤銷銷帳'
        );
        return;
      }

      ACTIVE_REVERSAL_REPORT_ID =
        rawText(reportId).trim();

      document
        .getElementById(
          'reversalModalSubtitle'
        )
        .textContent =
          (item.tenant_name || '-') +
          '｜房號 ' +
          (item.room_name || '-');

      document
        .getElementById(
          'reversalPreview'
        )
        .innerHTML = `
          <div class="preview-row">
            <div class="preview-label">
              帳單月份
            </div>

            <div class="preview-value">
              ${formatBillMonth(
                item.bill_month
              )}
            </div>
          </div>

          <div class="preview-row">
            <div class="preview-label">
              帳單金額
            </div>

            <div class="preview-value">
              ${money(
                item.bill_total_amount ||
                item.reported_amount
              )}
            </div>
          </div>

          <div class="preview-row">
            <div class="preview-label">
              帳單 ID
            </div>

            <div class="preview-value">
              ${safeText(
                item.bill_id
              )}
            </div>
          </div>

          <div class="preview-row">
            <div class="preview-label">
              原付款 ID
            </div>

            <div class="preview-value">
              ${safeText(
                item.matched_payment_id
              )}
            </div>
          </div>
        `;

      document
        .getElementById(
          'reversalReason'
        )
        .value = '';

      document
        .getElementById(
          'reversalNotifyTenant'
        )
        .checked = true;

      updateReversalCount();

      document
        .getElementById(
          'reversalModal'
        )
        .classList
        .add('show');

      document.body
        .classList
        .add('modal-open');
    }

    function closeReversalModal() {
      document
        .getElementById(
          'reversalModal'
        )
        .classList
        .remove('show');

      document.body
        .classList
        .remove('modal-open');

      ACTIVE_REVERSAL_REPORT_ID = '';
    }

    async function submitReversal() {
      const item =
        findReportById(
          ACTIVE_REVERSAL_REPORT_ID
        );

      if (!item) {
        showAlert(
          '找不到指定付款回報'
        );
        return;
      }

      const reversalReason =
        document
          .getElementById(
            'reversalReason'
          )
          .value
          .trim();

      const notifyTenant =
        document
          .getElementById(
            'reversalNotifyTenant'
          )
          .checked;

      if (!reversalReason) {
        showAlert(
          '請輸入撤銷原因'
        );
        return;
      }

      if (
        reversalReason.length < 3
      ) {
        showAlert(
          '撤銷原因至少需要 3 個字'
        );
        return;
      }

      if (
        reversalReason.length > 300
      ) {
        showAlert(
          '撤銷原因最多 300 字'
        );
        return;
      }

      const button =
        document.getElementById(
          'submitReversalBtn'
        );

      try {
        button.disabled = true;
        button.textContent =
          '撤銷處理中...';

        const response =
          await callApi(
            'landlord_bill_reopen',
            {
              bill_id:
                item.bill_id,

              reversal_reason:
                reversalReason,

              notify_tenant:
                notifyTenant
                  ? 'true'
                  : 'false'
            }
          );

        const result =
          response.data || {};

        closeReversalModal();

        let message =
          response.message ||
          '帳單已恢復為未繳';

        if (result.reversal_id) {
          message +=
            '\n\n撤銷紀錄：' +
            result.reversal_id;
        }

        if (result.voided_payment_count !== undefined) {
          message +=
            '\n作廢付款紀錄：' +
            result.voided_payment_count +
            ' 筆';
        }

        if (result.voided_report_count !== undefined) {
          message +=
            '\n作廢付款回報：' +
            result.voided_report_count +
            ' 筆';
        }

        if (result.legacy_sync) {
          message +=
            '\nV1 每月帳單：' +
            (
              result
                .legacy_sync
                .monthly
                .status ||
              '未回傳'
            );

          message +=
            '\nV1 歷史帳單：' +
            (
              result
                .legacy_sync
                .history
                .status ||
              '未回傳'
            );
        }

        showAlert(
          message,
          function () {
            setTimeout(
              loadPage,
              1200
            );
          }
        );

      } catch (error) {
        showAlert(
          error.message ||
          String(error)
        );

      } finally {
        button.disabled = false;
        button.textContent =
          '確認撤銷並恢復欠款';
      }
    }

    // ==================================================
    // 提示視窗
    // ==================================================

    function showAlert(
      message,
      callback
    ) {
      ALERT_CALLBACK =
        typeof callback === 'function'
          ? callback
          : null;

      document
        .getElementById(
          'alertMessage'
        )
        .textContent =
          message || '';

      document
        .getElementById(
          'alertModal'
        )
        .classList
        .add('show');
    }

    function closeAlertModal() {
      document
        .getElementById(
          'alertModal'
        )
        .classList
        .remove('show');

      const callback =
        ALERT_CALLBACK;

      ALERT_CALLBACK = null;

      if (callback) {
        callback();
      }
    }

    document
      .getElementById(
        'decisionModal'
      )
      .addEventListener(
        'click',
        function (event) {
          if (event.target === this) {
            closeDecisionModal();
          }
        }
      );

    document
      .getElementById(
        'reversalModal'
      )
      .addEventListener(
        'click',
        function (event) {
          if (event.target === this) {
            closeReversalModal();
          }
        }
      );

    document
      .getElementById(
        'alertModal'
      )
      .addEventListener(
        'click',
        function (event) {
          if (event.target === this) {
            closeAlertModal();
          }
        }
      );

    // ==================================================
    // 初始化
    // ==================================================

    async function loadPage() {
      try {
        app.className =
          'loading';

        app.innerHTML =
          '資料載入中...';

        const response =
          await callApi(
            'landlord_payment_reports_init'
          );

        renderPage(
          response.data || {}
        );

      } catch (error) {
        renderError(
          error.message ||
          String(error)
        );
      }
    }

    async function main() {
      try {
        app.className =
          'loading';

        app.innerHTML =
          '資料載入中...';

        const ready =
          await initLineUserId();

        if (!ready) {
          return;
        }

        await loadPage();

      } catch (error) {
        renderError(
          error.message ||
          String(error)
        );
      }
    }

    main();
  </script>
</body>
</html>
