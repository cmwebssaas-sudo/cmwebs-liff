<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CMWebs LINE 帳單通知</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --nav-height: 68px;
      --primary: #06c755;
      --primary-dark: #079641;
      --primary-soft: #edf9f2;
      --purple: #7654c4;
      --purple-soft: #f3efff;
      --blue: #1a73e8;
      --blue-soft: #edf4ff;
      --orange: #ef8f00;
      --orange-soft: #fff5df;
      --danger: #d93025;
      --danger-soft: #fff0ef;
      --gray-soft: #f0f2f5;
      --page-bg: #f4f6f9;
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --text: #1d2025;
      --muted: #747a83;
      --border: #e7eaee;
      --shadow: 0 10px 34px rgba(25, 35, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        Arial,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      position: relative;
      width: 100%;
      max-width: 650px;
      height: var(--app-height);
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(
          circle at 100% 0%,
          rgba(6, 199, 85, 0.11),
          transparent 28%
        ),
        var(--page-bg);
    }

    .page {
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(16px, env(safe-area-inset-top))
        15px
        calc(
          var(--nav-height) +
          92px +
          env(safe-area-inset-bottom)
        );
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .eyebrow {
      color: var(--primary-dark);
      font-size: 10px;
      font-weight: 900;
    }

    .page-title {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.35px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-button {
      min-height: 41px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      color: #5f6670;
      font-size: 9px;
      font-weight: 900;
      cursor: pointer;
    }

    .top-button.icon {
      width: 41px;
      padding: 0;
      font-size: 18px;
    }

    .card {
      margin-bottom: 13px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      color: #ffffff;
      background:
        linear-gradient(
          145deg,
          #079641 0%,
          #06c755 58%,
          #059943 100%
        );
    }

    .hero::after {
      position: absolute;
      top: -65px;
      right: -45px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.13);
      content: "";
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 9px;
      font-weight: 900;
    }

    .workspace-name {
      margin-top: 5px;
      font-size: 21px;
      font-weight: 900;
    }

    .hero-desc {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 10px;
      line-height: 1.65;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
      margin-top: 15px;
    }

    .summary-item {
      min-width: 0;
      padding: 9px 7px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.1);
    }

    .summary-label {
      overflow: hidden;
      color: rgba(255, 255, 255, 0.72);
      font-size: 7px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-value {
      margin-top: 4px;
      font-size: 16px;
      font-weight: 900;
    }

    .filters-card {
      padding: 14px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
    }

    .field-label {
      margin-bottom: 7px;
      font-size: 9px;
      font-weight: 900;
    }

    .input,
    .select {
      width: 100%;
      height: 42px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 11px;
      outline: none;
      background: #ffffff;
      color: var(--text);
    }

    .input:focus,
    .select:focus {
      border-color: rgba(6, 199, 85, 0.55);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.08);
    }

    .notice-note {
      margin-top: 10px;
      padding: 10px 11px;
      border: 1px solid #cde9d7;
      border-radius: 11px;
      background: var(--primary-soft);
      color: #386b4a;
      font-size: 9px;
      line-height: 1.65;
    }

    .toolbar-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
    }

    .toolbar-title {
      font-size: 13px;
      font-weight: 900;
    }

    .toolbar-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.5;
    }

    .toolbar-button {
      min-height: 38px;
      flex: 0 0 auto;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #ffffff;
      color: var(--text);
      font-size: 9px;
      font-weight: 900;
      cursor: pointer;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 9px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 900;
    }

    .section-count {
      color: var(--muted);
      font-size: 10px;
    }

    .notification-card {
      padding: 14px;
    }

    .notification-card.disabled {
      opacity: 0.75;
    }

    .notification-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .bill-checkbox {
      width: 19px;
      height: 19px;
      flex: 0 0 19px;
      margin-top: 2px;
      accent-color: var(--primary);
    }

    .notification-main {
      min-width: 0;
      flex: 1;
    }

    .notification-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .notification-title {
      font-size: 14px;
      font-weight: 900;
    }

    .badge {
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 900;
    }

    .badge.not_sent {
      background: var(--orange-soft);
      color: #9b6200;
    }

    .badge.sent {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .badge.failed {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.unbound {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .badge.paid {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .notification-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.55;
    }

    .bill-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-top: 12px;
    }

    .bill-item {
      min-width: 0;
      padding: 8px;
      border-radius: 9px;
      background: var(--surface-soft);
    }

    .bill-label {
      color: var(--muted);
      font-size: 7px;
    }

    .bill-value {
      margin-top: 3px;
      overflow: hidden;
      font-size: 10px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .send-info {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin-top: 9px;
      padding-top: 9px;
      border-top: 1px solid var(--border);
    }

    .send-info-item {
      min-width: 0;
      font-size: 8px;
      line-height: 1.5;
    }

    .send-info-label {
      color: var(--muted);
    }

    .send-info-value {
      margin-top: 2px;
      overflow: hidden;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .error-box {
      margin-top: 9px;
      padding: 9px 10px;
      border: 1px solid #f0cfcc;
      border-radius: 10px;
      background: var(--danger-soft);
      color: var(--danger);
      font-size: 8px;
      line-height: 1.55;
    }

    .unbound-box {
      margin-top: 9px;
      padding: 9px 10px;
      border: 1px solid #d9d0f3;
      border-radius: 10px;
      background: var(--purple-soft);
      color: #5c478e;
      font-size: 8px;
      line-height: 1.55;
    }

    .preview-toggle {
      width: 100%;
      min-height: 35px;
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      color: #626975;
      font-size: 9px;
      font-weight: 900;
      cursor: pointer;
    }

    .message-preview {
      display: none;
      margin-top: 9px;
      padding: 11px;
      border: 1px solid #d7e8dd;
      border-radius: 11px;
      background: var(--primary-soft);
      color: #355d43;
      font-size: 9px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-preview.show {
      display: block;
    }

    .loading-card,
    .error-card,
    .empty-card {
      padding: 30px 18px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      text-align: center;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 14px;
      border: 3px solid #e5e9ed;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-title,
    .error-title {
      margin-bottom: 7px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .error-title {
      color: var(--danger);
    }

    .retry-button {
      width: 100%;
      min-height: 44px;
      margin-top: 15px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .action-bar {
      position: absolute;
      z-index: 1100;
      right: 0;
      bottom:
        calc(
          var(--nav-height) +
          env(safe-area-inset-bottom)
        );
      left: 0;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(12px);
    }

    .action-inner {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .selection-summary {
      min-width: 0;
      flex: 1;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.45;
    }

    .selection-summary strong {
      display: block;
      color: var(--text);
      font-size: 11px;
    }

    .send-button {
      min-height: 46px;
      flex: 0 0 auto;
      padding: 0 18px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(6, 199, 85, 0.18);
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
    }

    .toast {
      position: absolute;
      z-index: 2100;
      right: 16px;
      bottom:
        calc(
          var(--nav-height) +
          86px +
          env(safe-area-inset-bottom)
        );
      left: 16px;
      max-width: 470px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 13px;
      background: #22252a;
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      line-height: 1.55;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition:
        opacity 0.18s ease,
        transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--danger);
    }

    .bottom-nav {
      position: absolute;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      border-top: 1px solid #e8ecf1;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: env(safe-area-inset-bottom);
      backdrop-filter: blur(12px);
    }

    .bottom-nav-inner {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #8b919a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 900;
    }

    .nav-item.active::after {
      position: absolute;
      bottom: 5px;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      content: "";
    }

    @media (max-width: 520px) {
      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .bill-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .send-info {
        grid-template-columns: 1fr;
      }

      .action-inner {
        align-items: stretch;
        flex-direction: column;
      }

      .send-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <main class="page">
      <div class="topbar">
        <div>
          <div class="eyebrow">LINE Bill Notification</div>
          <div class="page-title">帳單通知</div>
        </div>

        <div class="top-actions">
          <button
            class="top-button"
            type="button"
            onclick="goBilling()"
          >
            帳單管理
          </button>

          <button
            class="top-button icon"
            type="button"
            onclick="loadPage()"
          >
            ↻
          </button>
        </div>
      </div>

      <div id="app">
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">通知資料載入中</div>
          正在讀取帳單、LINE 綁定與發送狀態。
        </section>
      </div>
    </main>

    <div id="actionBar" class="action-bar" style="display:none;">
      <div class="action-inner">
        <div id="selectionSummary" class="selection-summary"></div>

        <button
          id="sendButton"
          class="send-button"
          type="button"
          onclick="sendSelected()"
        >
          發送所選通知
        </button>
      </div>
    </div>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item" type="button" onclick="goPage('landlord-home.html')">
          <svg viewBox="0 0 24 24">
            <path d="M4 11.5L12 5l8 6.5"></path>
            <path d="M6.5 10.5V19h11v-8.5"></path>
            <path d="M9.5 19v-5h5v5"></path>
          </svg>
          <span>首頁</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-arrears.html')">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="4.5" width="14" height="15" rx="2"></rect>
            <path d="M8.5 9h7"></path>
            <path d="M8.5 13h7"></path>
            <path d="M8.5 17h4"></path>
          </svg>
          <span>欠款</span>
        </button>

        <button class="nav-item" type="button" onclick="goPage('landlord-tenants.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="8" r="3"></circle>
            <path d="M4 19c.5-3.2 2.2-5 5-5s4.5 1.8 5 5"></path>
            <path d="M15.5 7.5a2.5 2.5 0 0 1 0 5"></path>
            <path d="M16 14c2.2.4 3.5 2 4 5"></path>
          </svg>
          <span>房客</span>
        </button>

        <button class="nav-item active" type="button" onclick="goPage('landlord-more.html')">
          <svg viewBox="0 0 24 24">
            <circle cx="6" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="18" cy="12" r="1.5"></circle>
          </svg>
          <span>更多</span>
        </button>
      </div>
    </nav>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API_URL =
      'https://script.google.com/macros/s/AKfycby5n2iXv0z5Y99dpBATTkKHaF56bnHNZRdMmVh5aZKU8ciGa_Nc0vJzXaO120LT81X6Og/exec';

    const LIFF_ID =
      '2010314940-EjX1qbb8';

    const LANDLORD_ENTRY_URL =
      new URL(
        'landlord-entry.html',
        location.href
      ).href.split('?')[0];

    const TEST_LINE_USER_ID =
      'Uf708ece75c9c985cfe1dbda48d123511';

    const URL_PARAMS =
      new URLSearchParams(
        location.search
      );

    const TEST_MODE =
      URL_PARAMS.get('test') ===
      '1';

    const INITIAL_MONTH =
      URL_PARAMS.get(
        'bill_month'
      ) || '';

    let LINE_USER_ID = '';
    let PAGE_DATA = null;
    let toastTimer = null;

    function setAppHeight() {
      const height =
        window.visualViewport &&
        window.visualViewport.height
          ? window.visualViewport.height
          : window.innerHeight;

      document.documentElement.style.setProperty(
        '--app-height',
        Math.round(height) + 'px'
      );
    }

    function rawText(value) {
      return value === undefined || value === null
        ? ''
        : String(value);
    }

    function safeHtml(value) {
      return rawText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function money(value) {
      return new Intl.NumberFormat(
        'zh-TW'
      ).format(
        Math.round(
          Number(value || 0)
        )
      );
    }

    function goPage(page) {
      const separator =
        page.indexOf('?') >= 0
          ? '&'
          : '?';

      location.href =
        page +
        separator +
        'v=' +
        Date.now() +
        (
          TEST_MODE
            ? '&test=1'
            : ''
        );
    }

    function goBilling() {
      const month =
        getSelectedMonth();

      goPage(
        'landlord-billing.html' +
        (
          month
            ? '?bill_month=' +
              encodeURIComponent(
                month
              )
            : ''
        )
      );
    }

    function buildLandlordLoginRedirectUri() {
      const currentUrl =
        new URL(
          location.href
        );

      [
        'code',
        'state',
        'liff.state',
        'friendship_status_changed',
        'error',
        'error_description'
      ].forEach(
        function (key) {
          currentUrl.searchParams.delete(
            key
          );
        }
      );

      const returnTo =
        currentUrl.pathname
          .split('/')
          .pop() +
        (
          currentUrl.searchParams
            .toString()
            ? '?' +
              currentUrl.searchParams
                .toString()
            : ''
        );

      sessionStorage.setItem(
        'cmwebs_landlord_return_to',
        returnTo
      );

      const entryUrl =
        new URL(
          LANDLORD_ENTRY_URL
        );

      entryUrl.searchParams.set(
        'return_to',
        returnTo
      );

      return entryUrl.href;
    }

    function showToast(
      message,
      isError
    ) {
      const toast =
        document.getElementById(
          'toast'
        );

      clearTimeout(
        toastTimer
      );

      toast.textContent =
        message || '';

      toast.className =
        isError
          ? 'toast error show'
          : 'toast show';

      toastTimer =
        setTimeout(
          function () {
            toast.className =
              'toast';
          },
          3200
        );
    }

    function jsonpRequest(
      action,
      params,
      retryCount
    ) {
      return new Promise(
        function (resolve, reject) {
          const callbackName =
            '__cmwebs_bill_notice_' +
            Date.now() +
            '_' +
            Math.floor(
              Math.random() *
              1000000
            );

          const script =
            document.createElement(
              'script'
            );

          let finished = false;

          const timer =
            setTimeout(
              function () {
                if (finished) {
                  return;
                }

                finished = true;
                cleanup();

                if (
                  Number(
                    retryCount || 0
                  ) < 1
                ) {
                  jsonpRequest(
                    action,
                    params,
                    1
                  ).then(
                    resolve
                  ).catch(
                    reject
                  );

                  return;
                }

                reject(
                  new Error(
                    'API 載入逾時，請確認帳單通知後端已部署。'
                  )
                );
              },
              45000
            );

          function cleanup() {
            clearTimeout(
              timer
            );

            if (script.parentNode) {
              script.parentNode.removeChild(
                script
              );
            }

            try {
              delete window[
                callbackName
              ];
            } catch (error) {
              window[callbackName] =
                undefined;
            }
          }

          window[callbackName] =
            function (result) {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();
              resolve(result);
            };

          let url =
            API_URL +
            '?v2_action=' +
            encodeURIComponent(
              action
            ) +
            '&line_user_id=' +
            encodeURIComponent(
              LINE_USER_ID
            ) +
            '&callback=' +
            encodeURIComponent(
              callbackName
            ) +
            '&_=' +
            Date.now();

          Object.keys(
            params || {}
          ).forEach(
            function (key) {
              url +=
                '&' +
                encodeURIComponent(
                  key
                ) +
                '=' +
                encodeURIComponent(
                  params[
                    key
                  ]
                );
            }
          );

          script.onerror =
            function () {
              if (finished) {
                return;
              }

              finished = true;
              cleanup();

              reject(
                new Error(
                  'API 路由執行失敗'
                )
              );
            };

          script.src =
            url;

          document.body.appendChild(
            script
          );
        }
      );
    }

    async function initLine() {
      if (TEST_MODE) {
        LINE_USER_ID =
          TEST_LINE_USER_ID;

        return true;
      }

      await liff.init({
        liffId:
          LIFF_ID
      });

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri:
            buildLandlordLoginRedirectUri()
        });

        return false;
      }

      const profile =
        await liff.getProfile();

      LINE_USER_ID =
        profile.userId ||
        '';

      return true;
    }

    function currentMonth() {
      const date =
        new Date();

      return [
        date.getFullYear(),
        String(
          date.getMonth() + 1
        ).padStart(
          2,
          '0'
        )
      ].join(
        '-'
      );
    }

    function inputValue(id) {
      const element =
        document.getElementById(
          id
        );

      return element
        ? rawText(
            element.value
          ).trim()
        : '';
    }

    function getSelectedMonth() {
      return inputValue(
        'billMonth'
      ) ||
      (
        PAGE_DATA
          ? PAGE_DATA.bill_month
          : INITIAL_MONTH ||
            currentMonth()
      );
    }

    function getSelectedProperty() {
      return inputValue(
        'propertyFilter'
      );
    }

    function getStatusFilter() {
      return inputValue(
        'statusFilter'
      ) ||
      'all';
    }

    function propertyOptions() {
      return `
        <option value="">全部物件</option>
        ${
          (
            PAGE_DATA.properties ||
            []
          ).map(
            function (property) {
              return `
                <option
                  value="${safeHtml(property.property_id)}"
                  ${
                    property.property_id ===
                    PAGE_DATA.selected_property_id
                      ? 'selected'
                      : ''
                  }
                >
                  ${safeHtml(property.property_name)}
                </option>
              `;
            }
          ).join('')
        }
      `;
    }

    function statusOptions() {
      const options = [
        ['all', '全部狀態'],
        ['not_sent', '待發送'],
        ['sent', '已發送'],
        ['failed', '發送失敗'],
        ['unbound', '尚未綁定 LINE'],
        ['paid', '已繳']
      ];

      return options.map(
        function (option) {
          return `
            <option
              value="${option[0]}"
              ${
                option[0] ===
                PAGE_DATA.status_filter
                  ? 'selected'
                  : ''
              }
            >
              ${option[1]}
            </option>
          `;
        }
      ).join('');
    }

    function renderPage() {
      const workspace =
        PAGE_DATA.workspace ||
        {};

      const summary =
        PAGE_DATA.summary ||
        {};

      const items =
        PAGE_DATA.items ||
        [];

      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card hero">
          <div class="hero-content">
            <div class="hero-label">目前管理團隊</div>

            <div class="workspace-name">
              ${safeHtml(
                workspace.workspace_name ||
                '-'
              )}
            </div>

            <div class="hero-desc">
              批次發送當月帳單，並管理待發送、失敗與重新發送狀態。
            </div>

            <div class="summary-grid">
              ${summaryItem('待發送', summary.ready_count)}
              ${summaryItem('已發送', summary.sent_count)}
              ${summaryItem('失敗', summary.failed_count)}
              ${summaryItem('未綁定', summary.unbound_count)}
              ${summaryItem('已繳', summary.paid_count)}
            </div>
          </div>
        </section>

        <section class="card filters-card">
          <div class="filter-grid">
            <div>
              <div class="field-label">帳單月份</div>

              <input
                id="billMonth"
                class="input"
                type="month"
                value="${safeHtml(PAGE_DATA.bill_month || INITIAL_MONTH || currentMonth())}"
                onchange="loadPage(false)"
              />
            </div>

            <div>
              <div class="field-label">物件</div>

              <select
                id="propertyFilter"
                class="select"
                onchange="loadPage(false)"
              >
                ${propertyOptions()}
              </select>
            </div>

            <div>
              <div class="field-label">通知狀態</div>

              <select
                id="statusFilter"
                class="select"
                onchange="loadPage(false)"
              >
                ${statusOptions()}
              </select>
            </div>
          </div>

          <div class="notice-note">
            已發送帳單仍可勾選重新發送；已繳帳單與尚未綁定 LINE 的房客會自動鎖定。
          </div>
        </section>

        <section class="card toolbar-card">
          <div>
            <div class="toolbar-title">LINE 帳單通知</div>

            <div class="toolbar-desc">
              訊息會包含月份、期限、費用明細、應繳總額與房客 LIFF 入口。
            </div>
          </div>

          <button
            class="toolbar-button"
            type="button"
            onclick="toggleAll()"
          >
            全選／取消
          </button>
        </section>

        <div class="section-head">
          <div class="section-title">帳單清單</div>
          <div class="section-count">${items.length} 筆</div>
        </div>

        ${
          items.length
            ? items.map(
                function (item, index) {
                  return notificationCard(
                    item,
                    index
                  );
                }
              ).join('')
            : `
              <section class="card empty-card">
                此篩選條件沒有帳單通知資料。
              </section>
            `
        }
      `;

      document.getElementById(
        'actionBar'
      ).style.display =
        (
          items.length &&
          PAGE_DATA.can_send
        )
          ? 'block'
          : 'none';

      updateSelectionSummary();
    }

    function summaryItem(
      label,
      value
    ) {
      return `
        <div class="summary-item">
          <div class="summary-label">
            ${safeHtml(label)}
          </div>

          <div class="summary-value">
            ${Number(value || 0)}
          </div>
        </div>
      `;
    }

    function notificationCard(
      item,
      index
    ) {
      const disabled =
        !item.eligible;

      const defaultChecked =
        item.notification_status ===
          'not_sent' ||
        item.notification_status ===
          'failed';

      return `
        <section
          class="card notification-card ${disabled ? 'disabled' : ''}"
          data-index="${index}"
        >
          <div class="notification-head">
            <input
              id="selected_${index}"
              class="bill-checkbox"
              type="checkbox"
              ${
                defaultChecked &&
                !disabled
                  ? 'checked'
                  : ''
              }
              ${
                disabled
                  ? 'disabled'
                  : ''
              }
              onchange="updateSelectionSummary()"
            />

            <div class="notification-main">
              <div class="notification-title-row">
                <span class="notification-title">
                  ${safeHtml(item.room_name || '-')}
                </span>

                <span class="badge ${safeHtml(item.notification_status)}">
                  ${safeHtml(item.notification_status_label)}
                </span>
              </div>

              <div class="notification-meta">
                ${safeHtml(item.property_name || '-')}
                ・
                ${safeHtml(item.tenant_name || '未命名房客')}
                ・
                ${safeHtml(item.bill_month || '-')}
              </div>
            </div>
          </div>

          <div class="bill-grid">
            ${billItem('繳款期限', item.due_date || '-')}
            ${billItem('月租', 'NT$ ' + money(item.rent_amount))}
            ${billItem('電費＋耗損', 'NT$ ' + money(Number(item.electricity_amount || 0) + Number(item.equipment_amount || 0)))}
            ${billItem('應繳總額', 'NT$ ' + money(item.total_amount))}
          </div>

          <div class="send-info">
            ${sendInfoItem('發送次數', Number(item.send_count || 0) + ' 次')}
            ${sendInfoItem('最近發送', item.last_sent_at || '尚未發送')}
            ${sendInfoItem('LINE 綁定', item.tenant_line_user_id ? '已綁定' : '尚未綁定')}
          </div>

          ${
            item.notification_status ===
              'failed' &&
            item.last_send_error
              ? `
                <div class="error-box">
                  ${safeHtml(item.last_send_error)}
                </div>
              `
              : ''
          }

          ${
            item.notification_status ===
              'unbound'
              ? `
                <div class="unbound-box">
                  房客尚未完成 LINE 綁定。請先將房客 LIFF 綁定訊息傳給房客，完成後再發送帳單。
                </div>
              `
              : ''
          }

          <button
            class="preview-toggle"
            type="button"
            onclick="togglePreview(${index})"
          >
            預覽 LINE 訊息
          </button>

          <div
            id="preview_${index}"
            class="message-preview"
          >${safeHtml(item.message_preview || '')}</div>
        </section>
      `;
    }

    function billItem(
      label,
      value
    ) {
      return `
        <div class="bill-item">
          <div class="bill-label">
            ${safeHtml(label)}
          </div>

          <div class="bill-value">
            ${safeHtml(value)}
          </div>
        </div>
      `;
    }

    function sendInfoItem(
      label,
      value
    ) {
      return `
        <div class="send-info-item">
          <div class="send-info-label">
            ${safeHtml(label)}
          </div>

          <div class="send-info-value">
            ${safeHtml(value)}
          </div>
        </div>
      `;
    }

    function togglePreview(index) {
      document.getElementById(
        'preview_' +
        index
      ).classList.toggle(
        'show'
      );
    }

    function eligibleCheckboxes() {
      return (
        PAGE_DATA.items ||
        []
      ).map(
        function (_, index) {
          return document.getElementById(
            'selected_' +
            index
          );
        }
      ).filter(
        function (checkbox) {
          return (
            checkbox &&
            !checkbox.disabled
          );
        }
      );
    }

    function toggleAll() {
      const checkboxes =
        eligibleCheckboxes();

      const shouldCheck =
        checkboxes.some(
          function (checkbox) {
            return !checkbox.checked;
          }
        );

      checkboxes.forEach(
        function (checkbox) {
          checkbox.checked =
            shouldCheck;
        }
      );

      updateSelectionSummary();
    }

    function selectedIndexes() {
      return (
        PAGE_DATA.items ||
        []
      ).map(
        function (_, index) {
          const checkbox =
            document.getElementById(
              'selected_' +
              index
            );

          return (
            checkbox &&
            checkbox.checked &&
            !checkbox.disabled
          )
            ? index
            : -1;
        }
      ).filter(
        function (index) {
          return index >= 0;
        }
      );
    }

    function updateSelectionSummary() {
      const indexes =
        selectedIndexes();

      const resendCount =
        indexes.filter(
          function (index) {
            return Number(
              PAGE_DATA.items[
                index
              ].send_count ||
              0
            ) > 0;
          }
        ).length;

      const totalAmount =
        indexes.reduce(
          function (sum, index) {
            return (
              sum +
              Number(
                PAGE_DATA.items[
                  index
                ].total_amount ||
                0
              )
            );
          },
          0
        );

      const summary =
        document.getElementById(
          'selectionSummary'
        );

      if (summary) {
        summary.innerHTML = `
          <strong>已選 ${indexes.length} 筆</strong>
          應繳總額 NT$ ${money(totalAmount)}
          ${
            resendCount
              ? '・其中 ' +
                resendCount +
                ' 筆為重新發送'
              : ''
          }
        `;
      }

      const button =
        document.getElementById(
          'sendButton'
        );

      if (button) {
        button.disabled =
          indexes.length ===
          0;
      }
    }

    async function sendSelected() {
      const indexes =
        selectedIndexes();

      if (
        indexes.length ===
        0
      ) {
        showToast(
          '請至少選擇一筆帳單。',
          true
        );

        return;
      }

      const billIds =
        indexes.map(
          function (index) {
            return PAGE_DATA.items[
              index
            ].bill_id;
          }
        );

      const button =
        document.getElementById(
          'sendButton'
        );

      button.disabled =
        true;

      button.textContent =
        '發送中...';

      try {
        const result =
          await jsonpRequest(
            'landlord_bill_notifications_send',
            {
              bill_ids_json:
                JSON.stringify(
                  billIds
                )
            }
          );

        const data =
          result &&
          result.data
            ? result.data
            : {};

        if (
          !result ||
          (
            result.success !==
              true &&
            Number(
              data.sent_count ||
              0
            ) === 0
          )
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '帳單通知發送失敗'
          );
        }

        showToast(
          '已發送 ' +
          Number(
            data.sent_count ||
            0
          ) +
          ' 筆' +
          (
            Number(
              data.failed_count ||
              0
            ) > 0
              ? '，失敗 ' +
                data.failed_count +
                ' 筆'
              : ''
          ) +
          (
            Number(
              data.skipped_count ||
              0
            ) > 0
              ? '，略過 ' +
                data.skipped_count +
                ' 筆'
              : ''
          ),
          Number(
            data.failed_count ||
            0
          ) > 0
        );

        await loadPage(
          false
        );

      } catch (error) {
        showToast(
          error &&
          error.message
            ? error.message
            : '帳單通知發送失敗',
          true
        );

      } finally {
        button.disabled =
          false;

        button.textContent =
          '發送所選通知';
      }
    }

    function renderLoading() {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card loading-card">
          <div class="loading-spinner"></div>
          <div class="loading-title">通知資料載入中</div>
          正在讀取帳單、LINE 綁定與發送狀態。
        </section>
      `;

      document.getElementById(
        'actionBar'
      ).style.display =
        'none';
    }

    function renderError(message) {
      document.getElementById(
        'app'
      ).innerHTML = `
        <section class="card error-card">
          <div class="error-title">
            通知資料載入失敗
          </div>

          ${safeHtml(
            message ||
            '未知錯誤'
          )}

          <button
            class="retry-button"
            type="button"
            onclick="loadPage()"
          >
            重新整理
          </button>
        </section>
      `;

      document.getElementById(
        'actionBar'
      ).style.display =
        'none';
    }

    async function loadPage(showLoading) {
      const selectedMonth =
        getSelectedMonth();

      const selectedProperty =
        getSelectedProperty();

      const selectedStatus =
        getStatusFilter();

      if (
        showLoading !==
        false
      ) {
        renderLoading();
      }

      try {
        if (!LINE_USER_ID) {
          const ready =
            await initLine();

          if (!ready) {
            return;
          }
        }

        const result =
          await jsonpRequest(
            'landlord_bill_notifications_init',
            {
              bill_month:
                selectedMonth ||
                INITIAL_MONTH ||
                currentMonth(),
              property_id:
                selectedProperty,
              status_filter:
                selectedStatus
            }
          );

        if (
          !result ||
          result.success !==
            true
        ) {
          throw new Error(
            result &&
            result.message
              ? result.message
              : '通知資料載入失敗'
          );
        }

        PAGE_DATA =
          result.data ||
          {};

        renderPage();

      } catch (error) {
        renderError(
          error &&
          error.message
            ? error.message
            : String(
                error
              )
        );
      }
    }

    setAppHeight();

    window.addEventListener(
      'resize',
      setAppHeight
    );

    if (window.visualViewport) {
      window.visualViewport.addEventListener(
        'resize',
        setAppHeight
      );
    }

    loadPage();
  </script>
</body>
</html>
